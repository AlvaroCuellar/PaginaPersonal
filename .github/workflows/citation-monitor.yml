name: Citation monitor

on:
  schedule:
    # Mondays at 08:00 UTC.
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  find-citation-candidates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Run citation monitor
        id: monitor
        shell: bash
        run: |
          set +e
          python scripts/find_citation_candidates.py --output citation-candidates.md
          status=$?
          set -e

          cat citation-candidates.md

          if grep -q "Candidatas nuevas no-autocita: 0" citation-candidates.md; then
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_candidates=true" >> "$GITHUB_OUTPUT"
          fi

          echo "script_status=$status" >> "$GITHUB_OUTPUT"

      - name: Upload citation report
        uses: actions/upload-artifact@v4
        with:
          name: citation-candidates
          path: citation-candidates.md

      - name: Open or update tracking issue
        if: steps.monitor.outputs.has_candidates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh label create citation-monitor \
            --description "Weekly automatic citation monitor" \
            --color "1f77b4" 2>/dev/null || true

          issue_number="$(gh issue list \
            --label citation-monitor \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body-file citation-candidates.md
          else
            gh issue create \
              --title "Weekly citation candidates" \
              --label citation-monitor \
              --body-file citation-candidates.md
          fi
