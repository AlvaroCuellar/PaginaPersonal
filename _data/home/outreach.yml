    type: "interview"
    medium: "Laguna al Día"
    date: "2023-03-20"
    description:
      es: "Entrevista con Álvaro Cuéllar tras el hallazgo de una comedia inédita de Lope de Vega mediante inteligencia artificial. Reflexiona sobre su trayectoria internacional, los retos de la investigación filológica y el potencial de la IA para transformar el estudio del Siglo de Oro."
      en: "Interview with Álvaro Cuéllar following the discovery of a previously unknown Lope de Vega play through artificial intelligence. He reflects on his international career, the challenges of philological research, and the transformative potential of AI in the study of the Spanish Golden Age."
      fr: Entretien avec Álvaro Cuéllar suite à la découverte d'une pièce jusqu'alors inconnue de Lope de Vega grâce à l'intelligence artificielle. Il réfléchit sur sa carrière internationale, les défis de la recherche philologique et le potentiel transformateur de l'IA dans l'étude de l'âge d'or espagnol.
      pt: Entrevista com Álvaro Cuéllar após a descoberta de uma peça até então desconhecida de Lope de Vega através da inteligência artificial. Reflete sobre a sua carreira internacional, os desafios da investigação filológica e o potencial transformador da IA ​​no estudo da Idade de Ouro espanhola.
      it: Intervista ad Álvaro Cuéllar in seguito alla scoperta di un'opera teatrale di Lope de Vega precedentemente sconosciuta attraverso l'intelligenza artificiale. Riflette sulla sua carriera internazionale, sulle sfide della ricerca filologica e sul potenziale di trasformazione dell'intelligenza artificiale nello studio dell'età dell'oro spagnola.
      de: Interview mit Álvaro Cuéllar nach der Entdeckung eines bisher unbekannten Lope de Vega-Stücks durch künstliche Intelligenz. Er reflektiert über seine internationale Karriere, die Herausforderungen der philologischen Forschung und das transformative Potenzial der KI bei der Erforschung des spanischen Goldenen Zeitalters.
      zh: 通过人工智能发现此前未知的洛佩·德·维加戏剧后对阿尔瓦罗·奎利亚尔的采访。他反思了自己的国际职业生涯、语言学研究的挑战以及人工智能在西班牙黄金时代研究中的变革潜力。
      ja: 人工知能を通じてこれまで知られていなかったロペ・デ・ベガの劇が発見された後のアルバロ・クエヤルへのインタビュー。彼は、自身の国際的なキャリア、文献学研究の課題、スペイン黄金時代の研究における AI の変革の可能性について振り返ります。
      ko: 인공 지능을 통해 이전에 알려지지 않은 Lope de Vega 연극을 발견한 후 Álvaro Cuéllar와의 인터뷰. 그는 자신의 국제적인 경력, 문헌학 연구의 과제, 스페인 황금 시대 연구에서 AI의 변혁적 잠재력에 대해 성찰합니다.
      ru: Интервью с Альваро Куэльяром после обнаружения ранее неизвестной пьесы Лопе де Веги с помощью искусственного интеллекта. Он размышляет о своей международной карьере, проблемах филологических исследований и преобразующем потенциале искусственного интеллекта в изучении Золотого века Испании.
      ar: مقابلة مع ألفارو كويلار بعد اكتشاف مسرحية لوبي دي فيغا غير المعروفة سابقًا من خلال الذكاء الاصطناعي. ويتأمل في مسيرته الدولية، وتحديات البحث اللغوي، والإمكانات التحويلية للذكاء الاصطناعي في دراسة العصر الذهبي الإسباني.
    url: "https://www.lagunaaldia.com/alvaro-cuellar-poder-recuperar-una-obra-del-fenix-de-los-ingenios-supone-un-regalo-para-el-patrimonio-hispanico/"
    image: "/assets/images/outreach/cuellar.jpg"

