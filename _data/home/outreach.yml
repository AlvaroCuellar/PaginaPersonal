      es: "Artículo de divulgación sobre la autonomía técnica que la inteligencia artificial generativa abre para la investigación humanística. Presenta ejemplos recientes en la Biblioteca Digital Prolope, TEXORO y Thal-IA."
      en: "Outreach article on the technical autonomy that generative artificial intelligence opens up for humanities research. It presents recent examples from Biblioteca Digital Prolope, TEXORO, and Thal-IA."
      fr: Article de sensibilisation sur l'autonomie technique qu'offre l'intelligence artificielle générative à la recherche en sciences humaines. Il présente des exemples récents de Biblioteca Digital Prolope, TEXORO et Thal-IA.
      pt: Artigo de divulgação sobre a autonomia técnica que a inteligência artificial generativa abre para a pesquisa em humanidades. Apresenta exemplos recentes da Biblioteca Digital Prolope, TEXORO e Thal-IA.
      it: Articolo di divulgazione sull'autonomia tecnica che l'intelligenza artificiale generativa offre alla ricerca umanistica. It presents recent examples from Biblioteca Digital Prolope, TEXORO, and Thal-IA.
      de: Outreach-Artikel über die technische Autonomie, die generative künstliche Intelligenz der geisteswissenschaftlichen Forschung eröffnet. Es präsentiert aktuelle Beispiele von Biblioteca Digital Prolope, TEXORO und Thal-IA.
      zh: 关于生成人工智能为人文研究开辟的技术自主权的外展文章。它介绍了 Biblioteca Digital Prolope、TEXORO 和 Thal-IA 的最新示例。
      ja: 生成人工知能が人文科学研究に切り開く技術的自律性に関するアウトリーチ記事。 Biblioteca Digital Prolope、TEXORO、および Thal-IA の最近の例を紹介します。
      ko: 생성 인공 지능이 인문학 연구에 열어주는 기술적 자율성에 대한 홍보 기사입니다. Biblioteca Digital Prolope, TEXORO 및 Thal-IA의 최근 사례를 소개합니다.
      ru: Информационная статья о технической автономии, которую генеративный искусственный интеллект открывает для гуманитарных исследований. В нем представлены недавние примеры от Biblioteca Digital Prolope, TEXORO и Thal-IA.
      ar: مقالة توعية حول الاستقلال الفني الذي يفتحه الذكاء الاصطناعي التوليدي لأبحاث العلوم الإنسانية. ويعرض أمثلة حديثة من Biblioteca Digital Prolope وTEXORO وThal-IA.
