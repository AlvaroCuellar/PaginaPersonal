  - id: "outreach-filologia-artificial"
    title:
      es: "Filología Artificial"
      en: "Artificial Philology"
      fr: Philologie artificielle
      pt: Filologia Artificial
      it: Filologia artificiale
      de: Künstliche Philologie
      zh: 人工语言学
      ja: 人工言語学
      ko: 인공 언어학
      ru: Искусственная филология
      ar: فقه اللغة الاصطناعية
    type: "article"
    medium: "Revista La Pluma"
    date: "2024-01-01"
    description:
      es: "Artículo de divulgación sobre cómo la inteligencia artificial está transformando la Filología del Siglo de Oro. Explora su aplicación en la atribución de autorías, la datación automática y la lectura de manuscritos mediante herramientas computacionales."
      en: "Outreach article on how artificial intelligence is transforming Golden Age Philology. It explores its use in authorship attribution, automatic dating, and the reading of manuscripts through computational tools."
      fr: Article de sensibilisation sur la façon dont l'intelligence artificielle transforme la philologie de l'âge d'or. Il explore son utilisation dans l'attribution de la paternité, la datation automatique et la lecture de manuscrits au moyen d'outils informatiques.
      pt: Artigo de divulgação sobre como a inteligência artificial está transformando a filologia da Idade de Ouro. Explora seu uso na atribuição de autoria, na datação automática e na leitura de manuscritos por meio de ferramentas computacionais.
      it: Articolo di divulgazione su come l'intelligenza artificiale sta trasformando la filologia dell'età dell'oro. Ne esplora l'uso nell'attribuzione della paternità, nella datazione automatica e nella lettura di manoscritti attraverso strumenti computazionali.
      de: Outreach-Artikel darüber, wie künstliche Intelligenz die Philologie des Goldenen Zeitalters verändert. Es untersucht seinen Einsatz bei der Urheberschaftszuordnung, der automatischen Datierung und dem Lesen von Manuskripten mithilfe von Computertools.
      zh: 关于人工智能如何改变黄金时代文献学的科普文章。它探讨了人工智能在作者归属、自动断代以及通过计算工具阅读手稿方面的应用。
      ja: 人工知能が黄金時代の文献学をどのように変革するかについてのアウトリーチ記事。著者の帰属、自動年代測定、計算ツールによる原稿の読み取りにおけるその使用法を調査します。
      ko: 인공 지능이 황금 시대 문헌학을 어떻게 변화시키고 있는지에 대한 홍보 기사입니다. 저자 귀속, 자동 연대 측정, 계산 도구를 통한 원고 판독에서의 사용을 탐구합니다.
      ru: Информационная статья о том, как искусственный интеллект меняет филологию Золотого века. В нем исследуется его использование для установления авторства, автоматического датирования и чтения рукописей с помощью вычислительных инструментов.
      ar: مقالة توعية حول كيفية قيام الذكاء الاصطناعي بتحويل فقه اللغة في العصر الذهبي. ويستكشف استخدامه في إسناد التأليف، والتأريخ التلقائي، وقراءة المخطوطات من خلال الأدوات الحسابية.
    url: "https://revistalapluma.com/lapluma_articulos/filologia-artificial/"
    image: "/assets/images/outreach/pluma.jpg"

