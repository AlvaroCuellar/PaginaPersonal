      en: "Interview published by the Transkribus team about the discovery of La Francesa Laura. Álvaro Cuéllar explains the technical and philological process that led to the attribution of the play to Lope de Vega through artificial intelligence and stylometry within the ETSO project."
      fr: Interview publiée par l'équipe Transkribus sur la découverte de La Francesa Laura. Álvaro Cuéllar explique le processus technique et philologique qui a conduit à l'attribution de la pièce à Lope de Vega grâce à l'intelligence artificielle et à la stylométrie dans le cadre du projet ETSO.
      pt: Entrevista publicada pela equipe do Transkribus sobre a descoberta de La Francesa Laura. Álvaro Cuéllar explica o processo técnico e filológico que levou à atribuição da peça a Lope de Vega através da inteligência artificial e da estilometria no âmbito do projeto ETSO.
      it: Intervista pubblicata dal team Transkribus sulla scoperta di La Francesa Laura. Álvaro Cuéllar spiega il processo tecnico e filologico che ha portato all'attribuzione dell'opera a Lope de Vega attraverso l'intelligenza artificiale e la stilometria nell'ambito del progetto ETSO.
      de: Vom Transkribus-Team veröffentlichtes Interview über die Entdeckung von La Francesa Laura. Álvaro Cuéllar erklärt den technischen und philologischen Prozess, der durch künstliche Intelligenz und Stilometrie im Rahmen des ETSO-Projekts zur Zuschreibung des Stücks an Lope de Vega führte.
      zh: Transkribus 团队发表的有关 La Francesa Laura 发现的采访。阿尔瓦罗·奎利亚尔 (Álvaro Cuéllar) 解释了通过 ETSO 项目中的人工智能和文体测量学将该剧归属于洛佩·德·维加 (Lope de Vega) 的技术和语言过程。
      ja: La Francesa Laura の発見について Transkribus チームによって公開されたインタビュー。アルバロ・クエヤルは、ETSO プロジェクト内の人工知能とスタイロメトリーを通じて、この劇がロペ・デ・ベガのものであると認定するに至った技術的および文献学的プロセスを説明します。
      ko: La Francesa Laura의 발견에 관해 Transkribus 팀이 게시한 인터뷰입니다. Álvaro Cuéllar는 ETSO 프로젝트 내에서 인공 지능과 문체 측정을 ​​통해 극을 Lope de Vega에 귀속시키는 기술 및 언어학적 과정을 설명합니다.
      ru: Интервью, опубликованное командой Transkribus, об открытии La Francesa Laura. Альваро Куэльяр объясняет технический и филологический процесс, который привел к приписыванию пьесы Лопе де Веге с помощью искусственного интеллекта и стилометрии в рамках проекта ETSO.
      ar: مقابلة نشرها فريق Transkribus حول اكتشاف La Francesa Laura. يشرح ألفارو كويلار العملية التقنية واللغوية التي أدت إلى إسناد المسرحية إلى لوبي دي فيغا من خلال الذكاء الاصطناعي وقياس الأسلوب ضمن مشروع ETSO.
