      pt: 'Álvaro Cuéllar: “Recuperar uma obra da Fênix do Raciocínio é um presente para a herança hispânica”'
      it: "Álvaro Cuéllar: “Recuperare un'opera della Fenice dell'ingegno è un dono al patrimonio ispanico”"
      de: 'Álvaro Cuéllar: „Die Wiedergewinnung eines Werks des Phönix des Geistes ist ein Geschenk an das hispanische Erbe“'
      zh: 阿尔瓦罗·奎利亚尔：“恢复智慧凤凰的作品是对西班牙遗产的一份礼物”
      ja: アルバロ・クエヤル：「機知の不死鳥の作品の修復はヒスパニック系遺産への贈り物である」
      ko: 'Álvaro Cuéllar: “재치 있는 불사조의 작품을 복원하는 것은 히스패닉 유산에 대한 선물입니다”'
      ru: 'Альваро Куэльяр: «Возвращение произведения Феникса ума — это подарок латиноамериканскому наследию»'
