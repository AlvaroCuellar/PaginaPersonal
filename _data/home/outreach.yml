  - id: "outreach-bbc-entrevista"
    title:
      es: "Entrevista en la BBC"
      en: "Interview on the BBC"
      fr: Interview sur la BBC
      pt: Entrevista na BBC
      it: Intervista alla BBC
      de: Interview auf der BBC
      zh: BBC 采访
      ja: BBCのインタビュー
      ko: BBC 인터뷰
      ru: Интервью на BBC
      ar: مقابلة على بي بي سي
    type: "radio"
    medium: "BBC Radio 4 — The World Tonight"
    date: "2023-02-01"
    description:
      es: "El prestigioso programa británico The World Tonight de BBC Radio 4 entrevistó a Álvaro Cuéllar (UAB) en un segmento dedicado a la recuperación de La francesa Laura. Se analiza cómo la inteligencia artificial permitió atribuir esta comedia inédita a Lope de Vega, dentro de un espacio de referencia internacional en periodismo cultural y científico."
      en: "BBC Radio 4’s prestigious current-affairs programme The World Tonight featured an interview with Álvaro Cuéllar (UAB) about the rediscovery of La francesa Laura. The segment explained how artificial intelligence helped attribute this lost play to Lope de Vega, within one of the UK’s leading programmes for cultural and scientific journalism."
      fr: La prestigieuse émission d'actualité de BBC Radio 4, The World Tonight, a présenté une interview d'Álvaro Cuéllar (UAB) sur la redécouverte de La francesa Laura. Le segment expliquait comment l’intelligence artificielle avait contribué à attribuer cette pièce perdue à Lope de Vega, dans le cadre de l’un des principaux programmes britanniques de journalisme culturel et scientifique.
      pt: O prestigiado programa de atualidades da BBC Radio 4, The World Tonight, apresentou uma entrevista com Álvaro Cuéllar (UAB) sobre a redescoberta de La francesa Laura. O segmento explicou como a inteligência artificial ajudou a atribuir esta peça perdida a Lope de Vega, dentro de um dos principais programas de jornalismo cultural e científico do Reino Unido.
      it: Il prestigioso programma di attualità della BBC Radio 4, The World Tonight, ha presentato un'intervista con Álvaro Cuéllar (UAB) sulla riscoperta di La francesa Laura. Il segmento spiegava come l’intelligenza artificiale abbia contribuito ad attribuire questa opera perduta a Lope de Vega, all’interno di uno dei principali programmi del Regno Unito per il giornalismo culturale e scientifico.
      de: In der prestigeträchtigen aktuellen Nachrichtensendung The World Tonight von BBC Radio 4 gab es ein Interview mit Álvaro Cuéllar (UAB) über die Wiederentdeckung von La Francesa Laura. Der Abschnitt erläuterte, wie künstliche Intelligenz dazu beitrug, dieses verlorene Stück Lope de Vega zuzuschreiben, im Rahmen eines der führenden Programme für Kultur- und Wissenschaftsjournalismus Großbritanniens.
      zh: BBC 广播四台著名的时事节目《今夜世界》对阿尔瓦罗·奎利亚尔 (UAB) 进行了采访，内容涉及 La francesa Laura 的重新发现。该片段解释了人工智能如何帮助将这场失利归因于英国领先的文化和科学新闻项目之一的洛普·德·维加(Lope de Vega)。
      ja: BBCラジオ4の権威ある時事番組「ザ・ワールド・トゥナイト」では、ラ・フランセサ・ローラの再発見についてアルバロ・クエヤル氏（UAB）のインタビューが特集された。このコーナーでは、英国を代表する文化的および科学的ジャーナリズム プログラムの 1 つにおいて、人工知能がこの失われたプレーをロペ デ ベガのせいにするのにどのように役立ったかを説明しました。
      ko: BBC Radio 4의 명망 높은 시사 프로그램 The World Tonight에서는 La francesa Laura의 재발견에 관해 Álvaro Cuéllar(UAB)와의 인터뷰를 특집으로 다루었습니다. 이 세그먼트에서는 인공 지능이 영국의 문화 및 과학 저널리즘을 위한 주요 프로그램 중 하나인 Lope de Vega의 잃어버린 연극을 어떻게 귀속시키는 데 도움이 되었는지 설명했습니다.
      ru: В престижной программе о текущих событиях BBC Radio 4 «Мир сегодня вечером» было опубликовано интервью с Альваро Куэльяром (UAB) о новом открытии «Французской Лауры». В этом сегменте объяснялось, как искусственный интеллект помог приписать эту утраченную пьесу Лопе де Веге в рамках одной из ведущих британских программ культурной и научной журналистики.
      ar: تضمن برنامج الشؤون الجارية المرموق على راديو بي بي سي 4 The World Tonight مقابلة مع ألفارو كويلار (UAB) حول إعادة اكتشاف La francesa Laura. وأوضح هذا المقطع كيف ساعد الذكاء الاصطناعي في نسب هذه المسرحية المفقودة إلى لوبي دي فيغا، ضمن أحد البرامج الرائدة في المملكة المتحدة للصحافة الثقافية والعلمية.
    url: "https://www.podchaser.com/podcasts/the-world-tonight-56081/episodes/the-biggest-public-sector-stri-162316712/transcript"
    image: "/assets/images/outreach/bbc.jpg"


