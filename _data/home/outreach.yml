  - id: "outreach-informe-semanal"
    title:
      es: "Lo que aún esconde Lope de Vega"
      en: "What Lope de Vega Still Hides"
      fr: Ce que cache encore Lope de Vega
      pt: O que Lope de Vega ainda esconde
      it: Ciò che Lope de Vega nasconde ancora
      de: Was Lope de Vega immer noch verbirgt
      zh: 洛普·德·维加仍然隐藏着什么
      ja: ロペ・デ・ベガがまだ隠しているもの
      ko: 로페 데 베가가 아직도 숨기고 있는 것
      ru: Что еще скрывает Лопе де Вега
      ar: ما لا يزال يخفيه لوبي دي فيغا
    type: "tv"
    medium: "Informe Semanal — RTVE"
    date: "2024-04-21"
    description:
      es: "Reportaje emitido en Informe Semanal sobre el uso de inteligencia artificial y fotografía espectral para investigar los manuscritos autógrafos de Lope de Vega. Con la participación de Sònia Boadas y Álvaro Cuéllar (UAB)."
      en: "Feature aired on Informe Semanal about the use of artificial intelligence and spectral imaging to study Lope de Vega’s autograph manuscripts. Featuring Sònia Boadas and Álvaro Cuéllar (UAB)."
      fr: Reportage diffusé sur Informe Semanal sur l'utilisation de l'intelligence artificielle et de l'imagerie spectrale pour étudier les manuscrits autographes de Lope de Vega. Avec Sònia Boadas et Álvaro Cuéllar (UAB).
      pt: Reportagem veiculada no Informe Semanal sobre o uso de inteligência artificial e imagens espectrais para estudar os manuscritos autógrafos de Lope de Vega. Apresentando Sònia Boadas e Álvaro Cuéllar (UAB).
      it: Servizio trasmesso su Informe Semanal sull'uso dell'intelligenza artificiale e dell'imaging spettrale per studiare i manoscritti autografi di Lope de Vega. Con Sònia Boadas e Álvaro Cuéllar (UAB).
      de: Auf Informe Semanal wurde ein Beitrag über den Einsatz von künstlicher Intelligenz und Spektralbildgebung zur Untersuchung der Autogrammmanuskripte von Lope de Vega ausgestrahlt. Mit Sònia Boadas und Álvaro Cuéllar (UAB).
      zh: Informe Semanal 播出了有关使用人工智能和光谱成像来研究洛普·德·维加 (Lope de Vega) 亲笔手稿的专题报道。其中收录有 Sònia Boadas 和 Álvaro Cuéllar (UAB) 的作品。
      ja: ロペ・デ・ベガのサイン原稿を研究するための人工知能とスペクトルイメージングの使用に関する特集がInforme Semanalで放映されました。ソニア・ボアダスとアルバロ・クエヤル（UAB）が出演。
      ko: Lope de Vega의 사인 원고를 연구하기 위해 인공 지능과 스펙트럼 이미징을 사용하는 방법에 대해 Informe Semanal에서 방송되었습니다. Sònia Boadas와 Álvaro Cuéllar(UAB)가 출연합니다.
      ru: На канале Informe Semanal был показан материал об использовании искусственного интеллекта и спектральной визуализации для изучения рукописей с автографами Лопе де Веги. В ролях Соня Боадас и Альваро Куэльяр (UAB).
      ar: تم بث ميزة على قناة Informe Semanal حول استخدام الذكاء الاصطناعي والتصوير الطيفي لدراسة مخطوطات توقيع لوبي دي فيغا. يضم سونيا بواداس وألفارو كويلار (UAB).
    url: "https://www.rtve.es/play/videos/informe-semanal/aun-esconde-lope/16069618/"
