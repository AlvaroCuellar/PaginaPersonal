  - id: "outreach-un-idioma-sin-fronteras"
    title:
      es: "Estilometría: conversación con Álvaro Cuéllar"
      en: "Stylometry: A Conversation with Álvaro Cuéllar"
      fr: 'Stylométrie: une conversation avec Álvaro Cuéllar'
      pt: 'Estilometria: uma conversa com Álvaro Cuéllar'
      it: 'Stilometria: conversazione con Álvaro Cuéllar'
      de: 'Stilometrie: Ein Gespräch mit Álvaro Cuéllar'
      zh: 风格测定：与阿尔瓦罗·奎利亚尔的对话
      ja: 'スチロメトリー: アルバロ・クエヤルとの会話'
      ko: '스타일로메트리: Álvaro Cuéllar와의 대화'
      ru: 'Стилометрия: разговор с Альваро Куэльяром'
      ar: 'قياس الأسلوب: محادثة مع ألفارو كويلار'
    type: "interview"
    medium: "RTVE — Un idioma sin fronteras (Radio Exterior de España)"
    date: "2023-11-11"
    description:
      es: "Entrevista radiofónica en la que Álvaro Cuéllar explica cómo la inteligencia artificial y la estilometría permiten atribuir autorías, leer manuscritos complejos y fechar textos del Siglo de Oro. Entre los hallazgos destaca la identificación de La francesa Laura como obra de Lope de Vega."
      en: "Radio interview where Álvaro Cuéllar explains how artificial intelligence and stylometry help attribute authorship, read complex manuscripts, and date Spanish Golden Age texts. Among the discoveries is the identification of La francesa Laura as a play by Lope de Vega."
      fr: Interview radiophonique dans laquelle Álvaro Cuéllar explique comment l'intelligence artificielle et la stylométrie aident à attribuer la paternité, à lire des manuscrits complexes et à dater les textes espagnols du Siècle d'or. Parmi les découvertes figure l'identification de La francesa Laura comme une pièce de Lope de Vega.
      pt: Entrevista de rádio onde Álvaro Cuéllar explica como a inteligência artificial e a estilometria ajudam a atribuir autoria, ler manuscritos complexos e datar textos da Idade de Ouro espanhola. Entre as descobertas está a identificação de La francesa Laura como peça de Lope de Vega.
      it: Intervista radiofonica in cui Álvaro Cuéllar spiega come l'intelligenza artificiale e la stilometria aiutano ad attribuire la paternità, leggere manoscritti complessi e datare testi del Secolo d'oro spagnolo. Tra le scoperte c'è l'identificazione de La francesa Laura con un'opera teatrale di Lope de Vega.
      de: Radiointerview, in dem Álvaro Cuéllar erklärt, wie künstliche Intelligenz und Stilometrie dabei helfen, die Urheberschaft zu bestimmen, komplexe Manuskripte zu lesen und spanische Texte aus dem Goldenen Zeitalter zu datieren. Zu den Entdeckungen gehört die Identifizierung von La francesa Laura als Theaterstück von Lope de Vega.
      zh: 阿尔瓦罗·奎利亚尔 (Álvaro Cuéllar) 在电台采访中解释了人工智能和文体测定法如何帮助确定作者身份、阅读复杂的手稿以及确定西班牙黄金时代文本的日期。其中一项发现是确认《法国劳拉》是洛佩·德·维加的戏剧。
      ja: アルバロ・クエヤルが、人工知能とスタイロメトリーがどのようにして著者の特定、複雑な原稿の読み取り、スペイン黄金時代のテキストの日付付けに役立つかを説明するラジオインタビュー。発見の中には、『ラ・フランセサ・ラウラ』がロペ・デ・ベガの戯曲であると特定されたことも含まれる。
      ko: Álvaro Cuéllar가 인공 지능과 문체 측정법을 사용하여 저자를 식별하고, 복잡한 원고를 읽고, 스페인 황금기 텍스트의 연대를 측정하는 데 어떻게 도움이 되는지 설명하는 라디오 인터뷰입니다. 발견 중에는 La francesa Laura가 Lope de Vega의 연극으로 확인된 것도 있습니다.
      ru: Радиоинтервью, в котором Альваро Куэльяр объясняет, как искусственный интеллект и стилометрия помогают определять авторство, читать сложные рукописи и датировать тексты Золотого века Испании. Среди открытий - идентификация «Французской Лауры» как пьесы Лопе де Веги.
      ar: مقابلة إذاعية يشرح فيها ألفارو كويلار كيف يساعد الذكاء الاصطناعي وقياس الأسلوب في إسناد التأليف، وقراءة المخطوطات المعقدة، وتاريخ نصوص العصر الذهبي الإسباني. ومن بين الاكتشافات تحديد مسرحية La francesa Laura على أنها مسرحية من تأليف Lope de Vega.
    url: "https://www.rtve.es/play/audios/un-idioma-sin-fronteras/estilometria-alvaro-cuellar/7006620/"
    image: "/assets/images/outreach/bne.png"


