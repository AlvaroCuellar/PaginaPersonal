    title:
      es: "El teatro áureo en colaboración: textos, autorías, ámbitos literarios de sociabilidad y nuevos instrumentos de investigación"
      en: "Golden Age Theatre in Collaboration: Texts, Authorships, Literary Networks, and New Research Tools"
      fr: 'Le théâtre de l’âge d’or en collaboration: textes, paternités, réseaux littéraires et nouveaux outils de recherche'
      pt: 'Teatro da Era de Ouro em Colaboração: Textos, Autorias, Redes Literárias e Novas Ferramentas de Pesquisa'
      it: "Teatro dell'Età dell'Oro in collaborazione: testi, paternità, reti letterarie e nuovi strumenti di ricerca"
      de: 'Theater des Goldenen Zeitalters in Zusammenarbeit: Texte, Autorenschaften, literarische Netzwerke und neue Forschungsinstrumente'
      zh: 黄金时代剧院的合作：文本、作者、文学网络和新的研究工具
      ja: '黄金時代演劇のコラボレーション: テキスト、著者、文学ネットワーク、新しい研究ツール'
      ko: '협업의 황금시대 극장: 텍스트, 저자, 문학 네트워크 및 새로운 연구 도구'
      ru: 'Театр Золотого века в сотрудничестве: тексты, авторство, литературные сети и новые инструменты исследования'
      ar: 'مسرح العصر الذهبي بالتعاون: النصوص والتأليف والشبكات الأدبية وأدوات البحث الجديدة'
    description:
      es: "El teatro áureo en colaboración: textos, autorías, ámbitos literarios de sociabilidad y nuevos instrumentos de investigación es un proyecto coordinado por Rafael González Cañal y María Luisa Lobato que estudia las comedias escritas en colaboración durante el Siglo de Oro. A través de la edición crítica, el análisis filológico y las técnicas estilométricas, investiga las dinámicas de autoría compartida y sociabilidad literaria entre dramaturgos como Rojas Zorrilla, Calderón o Moreto, incorporando además nuevas herramientas digitales para el estudio del teatro barroco español."
      en: "Golden Age Theatre in Collaboration: Texts, Authorships, Literary Networks, and New Research Tools is a project coordinated by Rafael González Cañal and María Luisa Lobato that studies collaborative comedies written during the Spanish Golden Age. Through critical editing, philological analysis, and stylometric techniques, it investigates shared authorship dynamics and literary sociability among playwrights such as Rojas Zorrilla, Calderón, and Moreto, while also incorporating new digital tools for the study of Baroque Spanish theatre."
      fr: "Théâtre de l'âge d'or en collaboration: textes, paternités, réseaux littéraires et nouveaux outils de recherche est un projet coordonné par Rafael González Cañal et María Luisa Lobato qui étudie les comédies collaboratives écrites pendant le siècle d'or espagnol. Grâce à l'édition critique, à l'analyse philologique et aux techniques stylométriques, il étudie la dynamique de paternité commune et la sociabilité littéraire entre des dramaturges tels que Rojas Zorrilla, Calderón et Moreto, tout en intégrant de nouveaux outils numériques pour l'étude du théâtre baroque espagnol."
      pt: 'Teatro da Idade de Ouro em Colaboração: Textos, Autorias, Redes Literárias e Novas Ferramentas de Pesquisa é um projeto coordenado por Rafael González Cañal e María Luisa Lobato que estuda comédias colaborativas escritas durante a Idade de Ouro espanhola. Através da edição crítica, análise filológica e técnicas estilométricas, investiga a dinâmica de autoria compartilhada e a sociabilidade literária entre dramaturgos como Rojas Zorrilla, Calderón e Moreto, ao mesmo tempo que incorpora novas ferramentas digitais para o estudo do teatro barroco espanhol.'
      it: "Teatro dell'Età dell'Oro in collaborazione: testi, paternità, reti letterarie e nuovi strumenti di ricerca è un progetto coordinato da Rafael González Cañal e María Luisa Lobato che studia le commedie collaborative scritte durante l'Età dell'oro spagnola. Attraverso il montaggio critico, l’analisi filologica e le tecniche stilometriche, indaga le dinamiche di paternità condivisa e la socialità letteraria tra drammaturghi come Rojas Zorrilla, Calderón e Moreto, incorporando anche nuovi strumenti digitali per lo studio del teatro barocco spagnolo."
      de: 'Golden Age Theatre in Collaboration: Texts, Authorships, Literary Networks, and New Research Tools ist ein von Rafael González Cañal und María Luisa Lobato koordiniertes Projekt, das kollaborative Komödien untersucht, die während des spanischen Goldenen Zeitalters geschrieben wurden. Durch kritische Bearbeitung, philologische Analyse und stilometrische Techniken untersucht es die gemeinsame Dynamik der Autorenschaft und die literarische Geselligkeit unter Dramatikern wie Rojas Zorrilla, Calderón und Moreto und integriert gleichzeitig neue digitale Werkzeuge für das Studium des barocken spanischen Theaters.'
      zh: 黄金时代戏剧合作：文本、作者、文学网络和新研究工具是由拉斐尔·冈萨雷斯·卡纳尔和玛丽亚·路易莎·洛巴托协调的一个项目，研究西班牙黄金时代创作的合作喜剧。通过批判性编辑、语言学分析和文体计量技术，它调查了罗哈斯·索里拉、卡尔德龙和莫雷托等剧作家之间的共享作者动态和文学社交性，同时还融入了新的数字工具来研究巴洛克西班牙戏剧。
      ja: '「黄金時代劇場のコラボレーション: テキスト、著者、文学ネットワーク、および新しい研究ツール」は、ラファエル・ゴンサレス・カニャルとマリア・ルイーサ・ロバトがコーディネートした、スペイン黄金時代に書かれた共同コメディを研究するプロジェクトです。批判的な編集、文献学的分析、およびスタイロメトリーの手法を通じて、ロハス・ソリーリャ、カルデロン、モレトなどの劇作家の間で共有されている作家力学と文学的社交性を調査するとともに、バロック時代のスペイン演劇の研究のための新しいデジタルツールも組み込んでいます。'
      ko: 'Golden Age Theatre in Collaboration: Texts, Authorships, Literary Networks, and New Research Tools는 Rafael González Cañal과 María Luisa Lobato가 공동으로 기획한 프로젝트로 스페인 황금 시대에 쓰여진 공동 코미디를 연구합니다. 비판적 편집, 문헌학 분석 및 문체 기술을 통해 Rojas Zorrilla, Calderón 및 Moreto와 같은 극작가 간의 공유된 저자 역학 및 문학적 사교성을 조사하는 동시에 바로크 스페인 연극 연구를 위한 새로운 디지털 도구를 통합합니다.'
      ru: 'Театр Золотого века в сотрудничестве: тексты, авторство, литературные сети и новые исследовательские инструменты — это проект, координируемый Рафаэлем Гонсалесом Каньялем и Марией Луизой Лобато, который изучает совместные комедии, написанные во время Золотого века Испании. Посредством критического редактирования, филологического анализа и стилометрических методов он исследует общую динамику авторства и литературную коммуникабельность таких драматургов, как Рохас Соррилья, Кальдерон и Морето, а также включает новые цифровые инструменты для изучения испанского театра в стиле барокко.'
      ar: 'مسرح العصر الذهبي بالتعاون: النصوص والمؤلفات والشبكات الأدبية وأدوات البحث الجديدة هو مشروع ينسقه رافائيل غونزاليس كانيال وماريا لويزا لوباتو ويدرس الأعمال الكوميدية التعاونية المكتوبة خلال العصر الذهبي الإسباني. من خلال التحرير النقدي، والتحليل اللغوي، وتقنيات قياس الأسلوب، فإنه يبحث في ديناميكيات التأليف المشتركة والتواصل الأدبي بين الكتاب المسرحيين مثل روخاس زوريلا، وكالديرون، وموريتو، مع دمج أدوات رقمية جديدة لدراسة المسرح الإسباني الباروكي.'
    image: "colaboracion.jpg"
    url: "https://www.cervantesvirtual.com/portales/francisco_rojas_zorrilla/proyectos_investigacion/#comedias"
