    title:
      es: "ISTAE: Impresos sueltos del teatro antiguo español"
      en: "ISTAE: Loose Prints of Early Modern Spanish Theatre"
      fr: 'ISTAE: Impressions libres du théâtre espagnol moderne'
      pt: 'ISTAE: Impressões soltas do teatro espanhol moderno'
      it: 'ISTAE: Stampe sciolte del teatro spagnolo della prima età moderna'
      de: 'ISTAE: Lose Drucke des frühneuzeitlichen spanischen Theaters'
      zh: ISTAE：早期现代西班牙剧院的松散版画
      ja: 'ISTAE: 近世スペイン演劇のゆるい版画'
      ko: 'ISTAE: 초기 근대 스페인 연극의 느슨한 판화'
      ru: 'ISTAE: Отрывки испанского театра раннего Нового времени'
      ar: 'ISTAE: مطبوعات فضفاضة للمسرح الإسباني الحديث المبكر'
    description:
      es: "ISTAE: Impresos sueltos del teatro antiguo español es un proyecto liderado por Alejandra Ulla Lorenzo (Universidade de Santiago de Compostela) que desarrolla una base de datos especializada en los impresos teatrales sueltos publicados entre 1600 y 1834 que contienen textos dramáticos del Siglo de Oro. Su propósito es identificar, describir y documentar estas ediciones unitarias mediante un sistema de descripción tipográfica, bibliográfico y material, facilitando su reconocimiento incluso cuando carecen de datos de imprenta explícitos. La base de datos se va alimentando progresivamente con nuevos registros, y permite que investigadores consulten detalles estructurales y ortotipográficos de estas obras para estudiar su transmisión editorial."
      en: "ISTAE: Loose Prints of Early Modern Spanish Theatre is a project led by Alejandra Ulla Lorenzo (University of Santiago de Compostela) that develops a specialized database of loose theatrical prints published between 1600 and 1834 containing Golden Age dramatic texts. Its goal is to identify, describe, and document these single-play editions through a typographical, bibliographical, and material description system, allowing their recognition even when lacking explicit printing data. The database is continuously updated with new entries, enabling researchers to consult structural and orthotypographical details of these works to study their editorial transmission."
      fr: "ISTAE: Loose Prints of Early Modern Spanish Theatre est un projet dirigé par Alejandra Ulla Lorenzo (Université de Saint-Jacques-de-Compostelle) qui développe une base de données spécialisée de gravures théâtrales en vrac publiées entre 1600 et 1834 contenant des textes dramatiques de l'âge d'or. Son objectif est d'identifier, de décrire et de documenter ces éditions uniques à travers un système de description typographique, bibliographique et matérielle, permettant leur reconnaissance même en l'absence de données d'impression explicites. La base de données est continuellement mise à jour avec de nouvelles entrées, permettant aux chercheurs de consulter les détails structurels et orthotypographiques de ces œuvres pour étudier leur transmission éditoriale."
      pt: 'ISTAE: Loose Prints of Early Modern Spanish Theatre é um projeto liderado por Alejandra Ulla Lorenzo (Universidade de Santiago de Compostela) que desenvolve uma base de dados especializada de gravuras teatrais soltas publicadas entre 1600 e 1834 contendo textos dramáticos da Idade de Ouro. Seu objetivo é identificar, descrever e documentar essas edições single-play por meio de um sistema tipográfico, bibliográfico e de descrição de materiais, permitindo seu reconhecimento mesmo na falta de dados explícitos de impressão. A base de dados é continuamente atualizada com novas entradas, permitindo aos pesquisadores consultar detalhes estruturais e ortotipográficos dessas obras para estudar sua transmissão editorial.'
      it: "ISTAE: Stampe sciolte del teatro spagnolo della prima età moderna è un progetto guidato da Alejandra Ulla Lorenzo (Università di Santiago de Compostela) che sviluppa un database specializzato di stampe teatrali sciolte pubblicate tra il 1600 e il 1834 contenenti testi drammatici dell'Età dell'Oro. Il suo obiettivo è identificare, descrivere e documentare queste edizioni a riproduzione unica attraverso un sistema di descrizione tipografica, bibliografica e materiale, che ne consenta il riconoscimento anche in mancanza di dati di stampa espliciti. Il database viene continuamente aggiornato con nuove voci, consentendo ai ricercatori di consultare i dettagli strutturali e ortotipografici di queste opere per studiarne la trasmissione editoriale."
      de: 'ISTAE: Loose Prints of Early Modern Spanish Theatre ist ein von Alejandra Ulla Lorenzo (Universität Santiago de Compostela) geleitetes Projekt, das eine spezielle Datenbank mit losen Theaterdrucken entwickelt, die zwischen 1600 und 1834 veröffentlicht wurden und dramatische Texte aus dem Goldenen Zeitalter enthalten. Ziel ist es, diese Einzelausgaben mithilfe eines typografischen, bibliografischen und materiellen Beschreibungssystems zu identifizieren, zu beschreiben und zu dokumentieren, sodass sie auch dann erkannt werden können, wenn explizite Druckdaten fehlen. Die Datenbank wird kontinuierlich mit neuen Einträgen aktualisiert, sodass Forscher strukturelle und orthotypografische Details dieser Werke einsehen können, um ihre redaktionelle Überlieferung zu untersuchen.'
      zh: ISTAE：早期现代西班牙戏剧的散装版画是由 Alejandra Ulla Lorenzo（圣地亚哥德孔波斯特拉大学）领导的一个项目，该项目开发了一个专门数据库，包含 1600 年至 1834 年间出版的散装戏剧版画，其中包含黄金时代的戏剧文本。其目标是通过印刷、书目和材料描述系统来识别、描述和记录这些单播放版本，即使在缺乏明确的印刷数据时也能识别它们。该数据库不断更新新条目，使研究人员能够查阅这些作品的结构和正字印刷细节，以研究其编辑传播。
      ja: 'ISTAE: 初期近代スペイン演劇の緩い版画は、アレハンドラ ウラ ロレンソ (サンティアゴ デ コンポステーラ大学) が主導するプロジェクトで、黄金時代の劇的なテキストを含む 1600 年から 1834 年の間に出版された緩い演劇版画の専門データベースを開発しています。 Its goal is to identify, describe, and document these single-play editions through a typographical, bibliographical, and material description system, allowing their recognition even when lacking explicit printing data.データベースは新しいエントリで継続的に更新されるため、研究者はこれらの作品の構造的および正誤植の詳細を参照して、編集上の伝達を研究することができます。'
      ko: 'ISTAE: Loose Prints of Early Modern Spanish Theatre is a project led by Alejandra Ulla Lorenzo (University of Santiago de Compostela) that develops a specialized database of loose theatrical prints published between 1600 and 1834 containing Golden Age dramatic texts. 그 목표는 인쇄, 서지 및 자료 설명 시스템을 통해 이러한 싱글 플레이 판을 식별, 설명 및 문서화하여 명시적인 인쇄 데이터가 부족한 경우에도 인식할 수 있도록 하는 것입니다. 데이터베이스는 새로운 항목으로 지속적으로 업데이트되므로 연구자는 편집 전달을 연구하기 위해 이러한 작품의 구조적 및 철자법 세부 사항을 참조할 수 있습니다.'
      ru: 'ISTAE: «Свободные репродукции испанского театра раннего Нового времени» — это проект, возглавляемый Алехандрой Уллой Лоренцо (Университет Сантьяго-де-Компостела), который создает специализированную базу данных отдельных театральных репродукций, опубликованных между 1600 и 1834 годами и содержащих драматические тексты Золотого века. Его цель — идентифицировать, описать и документировать эти одноигровые издания с помощью типографской, библиографической и системы описания материалов, позволяя их распознавать даже при отсутствии явных печатных данных. База данных постоянно пополняется новыми записями, что позволяет исследователям обращаться к структурным и ортотипографическим деталям этих работ для изучения их редакционной передачи.'
      ar: 'ISTAE: مطبوعات فضفاضة للمسرح الإسباني الحديث المبكر هو مشروع بقيادة أليخاندرا أولا لورنزو (جامعة سانتياغو دي كومبوستيلا) يقوم بتطوير قاعدة بيانات متخصصة للمطبوعات المسرحية الفضفاضة المنشورة بين عامي 1600 و1834 والتي تحتوي على نصوص درامية من العصر الذهبي. هدفها هو تحديد ووصف وتوثيق هذه الإصدارات الفردية من خلال نظام مطبعي وببليوغرافي ووصف مادي، مما يسمح بالتعرف عليها حتى في حالة عدم وجود بيانات طباعة واضحة. يتم تحديث قاعدة البيانات بشكل مستمر بإدخالات جديدة، مما يمكّن الباحثين من استشارة التفاصيل الهيكلية والتعامدية لهذه الأعمال لدراسة نقلها التحريري.'
    image: "istae.png"
    url: "https://istae.uv.es/"


  - badge:
      es: "Investigador contratado"
      en: "Researcher"
      fr: Chercheur
      pt: Pesquisador
      it: Ricercatore
      de: Forscher
