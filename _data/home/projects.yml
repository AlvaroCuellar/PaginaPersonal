    title:
      es: "Estilometría aplicada al Teatro del Siglo de Oro"
      en: "Stylometry Applied to the Spanish Golden Age Theatre"
      fr: Stylométrie appliquée au théâtre espagnol du Siècle d'Or
      pt: Estilometria aplicada ao teatro espanhol da Idade de Ouro
      it: Stilometria applicata al teatro spagnolo del Secolo d'Oro
      de: Auf das spanische Theater des Goldenen Zeitalters angewandte Stilometrie
      zh: 风格测量法在西班牙黄金时代剧院的应用
      ja: スペイン黄金時代劇場に適用されたスタイロメトリー
      ko: 스페인 황금시대 극장에 적용된 스타일로메트리
      ru: Стилометрия в применении к театру Золотого века Испании
      ar: قياس الأسلوب المطبق على مسرح العصر الذهبي الإسباني
    description:
      es: "Estilometría aplicada al Teatro del Siglo de Oro (ETSO) es un proyecto dirigido por Álvaro Cuéllar (UAB) y Germán Vega García-Luengos (Universidad de Valladolid) que aplica métodos de inteligencia artificial y análisis estilométrico al estudio de miles de comedias del Siglo de Oro. A partir de un corpus de más de 2.800 textos, el proyecto investiga la autoría, la cronología y las relaciones textuales entre obras, combinando filología tradicional y humanidades digitales para descubrir nuevas atribuciones y comprender mejor los procesos creativos de los dramaturgos auriseculares."
      en: "Stylometry Applied to the Spanish Golden Age Theatre (ETSO) is a project directed by Álvaro Cuéllar (UAB) and Germán Vega García-Luengos (University of Valladolid) that applies artificial intelligence and stylometric methods to the study of thousands of Golden Age plays. Based on a corpus of more than 2,800 texts, the project investigates authorship, chronology, and textual relationships among works, combining traditional philology and digital humanities to uncover new attributions and better understand the creative processes of early modern playwrights."
      fr: Stylométrie appliquée au Théâtre espagnol du Siècle d'Or (ETSO) est un projet dirigé par Álvaro Cuéllar (UAB) et Germán Vega García-Luengos (Université de Valladolid) qui applique l'intelligence artificielle et les méthodes stylométriques à l'étude de milliers de pièces du Siècle d'or. Basé sur un corpus de plus de 2 800 textes, le projet étudie la paternité, la chronologie et les relations textuelles entre les œuvres, combinant philologie traditionnelle et humanités numériques pour découvrir de nouvelles attributions et mieux comprendre les processus créatifs des premiers dramaturges modernes.
      pt: A Estilometria Aplicada ao Teatro Espanhol da Idade de Ouro (ETSO) é um projeto dirigido por Álvaro Cuéllar (UAB) e Germán Vega García-Luengos (Universidade de Valladolid) que aplica inteligência artificial e métodos estilométricos ao estudo de milhares de peças da Idade de Ouro. Com base em um corpus de mais de 2.800 textos, o projeto investiga autoria, cronologia e relações textuais entre obras, combinando filologia tradicional e humanidades digitais para descobrir novas atribuições e compreender melhor os processos criativos dos primeiros dramaturgos modernos.
      it: Stylometry Applied to the Spanish Golden Age Theatre (ETSO) è un progetto diretto da Álvaro Cuéllar (UAB) e Germán Vega García-Luengos (Università di Valladolid) che applica l'intelligenza artificiale e metodi stilometrici allo studio di migliaia di opere teatrali dell'Età dell'Oro. Basato su un corpus di oltre 2.800 testi, il progetto indaga la paternità, la cronologia e le relazioni testuali tra le opere, combinando la filologia tradizionale e le discipline umanistiche digitali per scoprire nuove attribuzioni e comprendere meglio i processi creativi dei primi drammaturghi moderni.
      de: Stylometry Applied to the Spanish Golden Age Theatre (ETSO) ist ein von Álvaro Cuéllar (UAB) und Germán Vega García-Luengos (Universität Valladolid) geleitetes Projekt, das künstliche Intelligenz und stilometrische Methoden auf die Untersuchung Tausender Theaterstücke des Goldenen Zeitalters anwendet. Basierend auf einem Korpus von mehr als 2.800 Texten untersucht das Projekt Urheberschaft, Chronologie und Textbeziehungen zwischen Werken und kombiniert traditionelle Philologie und digitale Geisteswissenschaften, um neue Zuschreibungen aufzudecken und die kreativen Prozesse frühneuzeitlicher Dramatiker besser zu verstehen.
      zh: 应用于西班牙黄金时代剧院的文体测量 (ETSO) 是由 Álvaro Cuéllar (UAB) 和 Germán Vega García-Luengos（巴利亚多利德大学）指导的一个项目，该项目将人工智能和文体测量方法应用于对数千部黄金时代戏剧的研究。该项目基于 2,800 多篇文本的语料库，调查作品之间的作者身份、年代顺序和文本关系，结合传统语言学和数字人文，以发现新的归属并更好地理解早期现代剧作家的创作过程。
      ja: スペイン黄金時代劇場に適用されたスタイロメトリー (ETSO) は、アルバロ・クエヤル (UAB) とジェルマン・ベガ・ガルシア・ルエンゴス (バリャドリード大学) が監督するプロジェクトで、人工知能とスタイロメトリーの手法を何千もの黄金時代の演劇の研究に適用しています。このプロジェクトは、2,800 を超えるテキストのコーパスに基づいて、著作者、年代、作品間のテキスト関係を調査し、伝統的な文献学とデジタル人文科学を組み合わせて、新しい帰属を明らかにし、近世の劇作家の創造プロセスをより深く理解します。
      ko: 스페인 황금 시대 극장(ETSO)에 적용되는 스타일로메트리는 Álvaro Cuéllar(UAB)와 Germán Vega García-Luengos(바야돌리드 대학)가 감독한 프로젝트로, 수천 편의 황금 시대 연극 연구에 인공 지능과 문체 측정 방법을 적용합니다. 2,800개 이상의 텍스트 모음을 기반으로 하는 이 프로젝트는 저작자, 연대기, 작품 간의 텍스트 관계를 조사하고, 전통 문헌학과 디지털 인문학을 결합하여 새로운 속성을 찾아내고 초기 현대 극작가의 창작 과정을 더 잘 이해합니다.
      ru: «Стилометрия, примененная в Испанском театре Золотого века» (ETSO) — это проект под руководством Альваро Куэльяра (UAB) и Хермана Веги Гарсиа-Луэнгоса (Университет Вальядолида), который применяет искусственный интеллект и стилометрические методы для изучения тысяч пьес Золотого века. Основываясь на корпусе из более чем 2800 текстов, проект исследует авторство, хронологию и текстовые связи между произведениями, объединяя традиционную филологию и цифровые гуманитарные науки, чтобы раскрыть новые атрибуции и лучше понять творческие процессы драматургов раннего Нового времени.
      ar: قياس الأنماط المطبق على مسرح العصر الذهبي الإسباني (ETSO) هو مشروع من إخراج ألفارو كويلار (UAB) وجيرمان فيغا غارسيا لونغوس (جامعة بلد الوليد) الذي يطبق الذكاء الاصطناعي وأساليب قياس الأسلوب لدراسة الآلاف من مسرحيات العصر الذهبي. استنادًا إلى مجموعة مكونة من أكثر من 2800 نص، يبحث المشروع في التأليف والتسلسل الزمني والعلاقات النصية بين الأعمال، ويجمع بين فقه اللغة التقليدية والعلوم الإنسانية الرقمية للكشف عن سمات جديدة وفهم أفضل للعمليات الإبداعية للكتاب المسرحيين المعاصرين المبكرين.
