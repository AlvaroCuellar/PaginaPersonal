    title:
      es: "TEXORO: búsquedas en 3000 obras literarias auriseculares"
      en: "TEXORO: Searching 3,000 Spanish Golden Age Plays"
      fr: TEXORO: Recherche parmi 3 000 pièces de théâtre espagnoles de l’âge d’or
      pt: 'TEXORO: Pesquisando 3.000 peças da Era de Ouro Espanhola'
      it: "TEXORO: ricerca di 3.000 opere teatrali spagnole dell'età dell'oro"
      de: 'TEXORO: Suche in 3.000 spanischen Stücken des Goldenen Zeitalters'
      zh: TEXORO：搜索 3,000 部西班牙黄金时代戏剧
      ja: 'TEXORO: 3,000 のスペイン黄金時代の演劇を検索'
      ko: 'TEXORO: 스페인 황금기 희곡 3,000편 검색'
      ru: 'TEXORO: поиск 3000 пьес Золотого века Испании'
      ar: 'تيكسورو: البحث في 3000 مسرحية من العصر الذهبي الإسباني'
    description:
      es: "TEXORO es una plataforma digital que permite realizar búsquedas textuales en casi 3.000 obras teatrales de más de 350 autores. Desarrollada por Álvaro Cuéllar y Germán Vega García-Luengos, ofrece un acceso unificado al mayor corpus digital del teatro aurisecular, facilitando la consulta y el estudio directo de los textos. Actualmente permite búsquedas simples por palabras o frases exactas, con futuras mejoras previstas para ampliar sus capacidades de análisis y exploración."
      en: "TEXORO is a digital platform that enables textual searches across nearly 3,000 theatrical works by more than 350 authors. Developed by Álvaro Cuéllar and Germán Vega García-Luengos, it provides unified access to the largest digital corpus of Spanish Golden Age theatre, facilitating the consultation and direct study of texts. It currently supports simple searches by words or exact phrases, with future developments planned to expand its analytical and exploratory capabilities."
      fr: TEXORO est une plateforme numérique qui permet des recherches textuelles dans près de 3 000 œuvres théâtrales de plus de 350 auteurs. Développé par Álvaro Cuéllar et Germán Vega García-Luengos, il offre un accès unifié au plus grand corpus numérique du théâtre espagnol du Siècle d'Or, facilitant la consultation et l'étude directe des textes. Il prend actuellement en charge des recherches simples par mots ou expressions exactes, et des développements futurs sont prévus pour étendre ses capacités analytiques et exploratoires.
      pt: TEXORO é uma plataforma digital que permite pesquisas textuais em cerca de 3.000 obras teatrais de mais de 350 autores. Desenvolvido por Álvaro Cuéllar e Germán Vega García-Luengos, permite acesso unificado ao maior corpus digital do teatro espanhol da Idade de Ouro, facilitando a consulta e o estudo direto dos textos. Atualmente suporta pesquisas simples por palavras ou frases exatas, com desenvolvimentos futuros planejados para expandir suas capacidades analíticas e exploratórias.
      it: TEXORO è una piattaforma digitale che consente ricerche testuali tra quasi 3.000 opere teatrali di più di 350 autori. Sviluppato da Álvaro Cuéllar e Germán Vega García-Luengos, fornisce un accesso unificato al più grande corpus digitale del teatro spagnolo del Secolo d'oro, facilitando la consultazione e lo studio diretto dei testi. Attualmente supporta semplici ricerche per parole o frasi esatte, con sviluppi futuri pianificati per espandere le sue capacità analitiche ed esplorative.
      de: TEXORO ist eine digitale Plattform, die eine Textsuche in fast 3.000 Theaterwerken von mehr als 350 Autoren ermöglicht. Es wurde von Álvaro Cuéllar und Germán Vega García-Luengos entwickelt und bietet einen einheitlichen Zugang zum größten digitalen Korpus des spanischen Theaters des Goldenen Zeitalters und erleichtert die Konsultation und das direkte Studium von Texten. Derzeit unterstützt es die einfache Suche nach Wörtern oder genauen Phrasen. Zukünftige Entwicklungen sind geplant, um die analytischen und explorativen Fähigkeiten zu erweitern.
      zh: TEXORO 是一个数字平台，可以对 350 多名作者的近 3,000 部戏剧作品进行文本搜索。它由 Álvaro Cuéllar 和 Germán Vega García-Luengos 开发，提供对西班牙黄金时代剧院最大的数字语料库的统一访问，促进文本的咨询和直接研究。它目前支持通过单词或精确短语进行简单搜索，未来计划扩展其分析和探索能力。
      ja: TEXORO は、350 人を超える作家による 3,000 近くの演劇作品のテキスト検索を可能にするデジタル プラットフォームです。アルバロ・クエヤルとゲルマン・ベガ・ガルシア＝ルエンゴスによって開発されたこのツールは、スペイン黄金時代演劇の最大のデジタル コーパスへの統合アクセスを提供し、テキストの参照と直接学習を容易にします。現在、単語または正確な語句による単純な検索をサポートしていますが、将来の開発では分析機能と探索機能を拡張することが計画されています。
      ko: TEXORO는 350명 이상의 작가가 제작한 약 3,000편의 연극 작품에 대한 텍스트 검색을 가능하게 하는 디지털 플랫폼입니다. Álvaro Cuéllar와 Germán Vega García-Luengos가 개발한 이 솔루션은 스페인 황금기 극장의 가장 큰 디지털 코퍼스에 대한 통합 액세스를 제공하여 텍스트에 대한 상담과 직접적인 연구를 촉진합니다. 현재는 단어나 정확한 구문을 사용한 간단한 검색을 지원하며 향후 분석 및 탐색 기능을 확장하기 위한 개발이 계획되어 있습니다.
      ru: TEXORO — это цифровая платформа, позволяющая осуществлять текстовый поиск по почти 3000 театральным произведениям более чем 350 авторов. Разработанный Альваро Куэльяром и Херманом Вегой Гарсиа-Луэнгосом, он обеспечивает единый доступ к крупнейшему цифровому корпусу испанского театра Золотого века, облегчая консультации и прямое изучение текстов. В настоящее время он поддерживает простой поиск по словам или точным фразам, а в будущем планируется расширить его аналитические и исследовательские возможности.
      ar: TEXORO هي منصة رقمية تتيح البحث النصي في ما يقرب من 3000 عمل مسرحي لأكثر من 350 مؤلفًا. تم تطويره بواسطة ألفارو كويلار وجيرمان فيغا غارسيا لونغوس، وهو يوفر وصولاً موحدًا إلى أكبر مجموعة رقمية لمسرح العصر الذهبي الإسباني، مما يسهل التشاور والدراسة المباشرة للنصوص. وهو يدعم حاليًا عمليات البحث البسيطة عن طريق الكلمات أو العبارات الدقيقة، مع التخطيط للتطورات المستقبلية لتوسيع قدراته التحليلية والاستكشافية.
    image: "texoro.png"
    url: "https://etso.es/texoro"

  
