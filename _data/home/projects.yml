    title:
      es: "METADRAMA: Aula de teatro e investigación"
      en: "METADRAMA: Theatre and Research Workshop"
      fr: 'METADRAMA: Atelier Théâtre et Recherche'
      pt: 'METADRAMA: Oficina de Teatro e Pesquisa'
      it: 'METADRAMA: Laboratorio di teatro e ricerca'
      de: 'METADRAMA: Theater- und Forschungswerkstatt'
      zh: 元戏剧：戏剧与研究工作坊
      ja: 'メタドラマ: 演劇と研究のワークショップ'
      ko: '메타드라마: 연극 및 연구 워크숍'
      ru: 'МЕТАДРАМА: Театрально-исследовательская мастерская'
      ar: 'الميتادراما: ورشة عمل المسرح والبحث'
    description:
      es: "METADRAMA es un proyecto de investigación de la Universitat de Barcelona, dirigido por Gastón Gilabert, que estudia el verso y la métrica en el teatro del Siglo de Oro desde una perspectiva filológica y digital. Su objetivo es analizar cómo la forma poética contribuye al sentido dramático y escénico de las obras, explorando también motivos recurrentes —como el de Dido y Eneas— y su proyección en la puesta en escena del teatro aurisecular."
      en: "METADRAMA is a research project at the University of Barcelona, directed by Gastón Gilabert, that studies verse and metrics in Spanish Golden Age theatre from both philological and digital perspectives. Its aim is to analyze how poetic form contributes to the dramatic and scenic meaning of plays, while also exploring recurring motifs —such as that of Dido and Aeneas— and their projection in the staging of early modern theatre."
      fr: METADRAMA est un projet de recherche de l'Université de Barcelone, dirigé par Gastón Gilabert, qui étudie les vers et la métrique du théâtre espagnol du Siècle d'Or du point de vue philologique et numérique. Son objectif est d'analyser comment la forme poétique contribue à la signification dramatique et scénique des pièces de théâtre, tout en explorant des motifs récurrents – comme celui de Didon et d'Énée – et leur projection dans la mise en scène du théâtre moderne.
      pt: METADRAMA é um projeto de pesquisa da Universidade de Barcelona, ​​dirigido por Gastón Gilabert, que estuda versos e métricas no teatro espanhol da Idade de Ouro a partir de perspectivas filológicas e digitais. Seu objetivo é analisar como a forma poética contribui para o significado dramático e cênico das peças, ao mesmo tempo em que explora motivos recorrentes —como os de Dido e Enéias— e sua projeção na encenação do início do teatro moderno.
      it: METADRAMA è un progetto di ricerca dell'Università di Barcellona, ​​diretto da Gastón Gilabert, che studia la strofa e la metrica del teatro spagnolo del Secolo d'Oro sia da una prospettiva filologica che digitale. Il suo scopo è analizzare il modo in cui la forma poetica contribuisce al significato drammatico e scenico delle opere teatrali, esplorando anche motivi ricorrenti – come quello di Didone ed Enea – e la loro proiezione nella messa in scena del teatro della prima età moderna.
      de: METADRAMA ist ein Forschungsprojekt an der Universität Barcelona unter der Leitung von Gastón Gilabert, das Verse und Metriken im spanischen Theater des Goldenen Zeitalters sowohl aus philologischer als auch aus digitaler Perspektive untersucht. Ziel ist es, zu analysieren, wie die poetische Form zur dramatischen und szenischen Bedeutung von Theaterstücken beiträgt, und gleichzeitig wiederkehrende Motive – wie das von Dido und Aeneas – und ihre Projektion in der Inszenierung des frühneuzeitlichen Theaters zu untersuchen.
      zh: METADRAMA 是巴塞罗那大学的一个研究项目，由加斯顿·吉拉伯特 (Gastón Gilabert) 指导，从语言学和数字角度研究西班牙黄金时代戏剧的诗句和韵律。其目的是分析诗歌形式如何有助于戏剧和场景的意义，同时探索反复出现的主题（例如狄多和埃涅阿斯的主题）及其在早期现代戏剧舞台中的投射。
      ja: METADRAMA は、ガストン ジラバートが監督を務めるバルセロナ大学の研究プロジェクトで、スペイン黄金時代の演劇における韻文と韻律を文献学とデジタルの両方の観点から研究しています。その目的は、詩的な形式が劇の劇的な意味や風景的な意味にどのように寄与しているかを分析すると同時に、ディドやアエネアスなどの反復的なモチーフと近世演劇の演出におけるそれらの投影を探ることです。
      ko: METADRAMA는 Gastón Gilabert가 감독하는 바르셀로나 대학의 연구 프로젝트로, 문학적 관점과 디지털 관점 모두에서 스페인 황금기 연극의 운문과 측정법을 연구합니다. 이 책의 목적은 시적 형식이 연극의 드라마틱하고 풍경적인 의미에 어떻게 기여하는지 분석하는 동시에 디도(Dido)와 아이네이아스(Aeneas)의 모티브와 같이 반복되는 모티프와 초기 현대 연극 무대에서의 투영을 탐구하는 것입니다.
      ru: МЕТАДРАМА — это исследовательский проект Университета Барселоны под руководством Гастона Гилаберта, который изучает стихи и метрику испанского театра Золотого века как с филологической, так и с цифровой точки зрения. Его цель — проанализировать, как поэтическая форма способствует драматическому и сценическому значению пьес, а также изучить повторяющиеся мотивы, такие как мотивы Дидоны и Энея, и их проекцию в постановках раннего современного театра.
      ar: ميتادراما هو مشروع بحثي في ​​جامعة برشلونة، يديره غاستون جيلابيرت، يدرس الشعر والقياسات في مسرح العصر الذهبي الإسباني من المنظورين الفلسفي والرقمي. هدفها هو تحليل كيفية مساهمة الشكل الشعري في المعنى الدرامي والخلابي للمسرحيات، مع استكشاف أيضًا العناصر المتكررة - مثل ديدو وإينياس - وإسقاطها في عرض المسرح الحديث المبكر.
    image: "metadrama.png"
    url: "https://www.ub.edu/metadrama/"

  

  
