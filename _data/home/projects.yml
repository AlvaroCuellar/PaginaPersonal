    title:
      es: "ASODAT: Bases de Datos Integradas del Teatro Clásico Español"
      en: "ASODAT: Integrated Databases of Spanish Classical Theatre"
      fr: 'ASODAT: Bases de données intégrées du théâtre classique espagnol'
      pt: 'ASODAT: Bases de Dados Integradas do Teatro Clássico Espanhol'
      it: 'ASODAT: Database integrati del teatro classico spagnolo'
      de: 'ASODAT: Integrierte Datenbanken des spanischen klassischen Theaters'
      zh: ASODAT：西班牙古典戏剧综合数据库
      ja: 'ASODAT: スペイン古典演劇の統合データベース'
      ko: 'ASODAT: 스페인 고전극 통합 데이터베이스'
      ru: 'ASODAT: Интегрированные базы данных испанского классического театра'
      ar: 'ASODAT: قواعد بيانات متكاملة للمسرح الكلاسيكي الإسباني'
    description:
      es: "ASODAT (Bases de Datos Integradas del Teatro Clásico Español) es un proyecto dirigido por Alejandro García Reidy (Universidad de Salamanca) y fundado por Teresa Ferrer Valls (Universitat de València). Nacido con el propósito de unificar y enlazar las principales bases de datos dedicadas al teatro clásico español, ASODAT permite realizar búsquedas transversales sobre obras, autores, manuscritos, ediciones y representaciones, ofreciendo una visión integrada y dinámica del patrimonio dramático del Siglo de Oro."
      en: "ASODAT (Integrated Databases of Spanish Classical Theatre) is a project directed by Alejandro García Reidy (University of Salamanca) and founded by Teresa Ferrer Valls (University of Valencia). Created with the goal of unifying and linking the main databases devoted to Spanish classical theatre, ASODAT enables cross-searches across plays, authors, manuscripts, editions, and performances, offering an integrated and dynamic view of the dramatic heritage of the Spanish Golden Age."
      fr: ASODAT (Bases de données intégrées du théâtre classique espagnol) est un projet dirigé par Alejandro García Reidy (Université de Salamanque) et fondé par Teresa Ferrer Valls (Université de Valence). Créé dans le but d'unifier et de relier les principales bases de données consacrées au théâtre classique espagnol, ASODAT permet des recherches croisées parmi les pièces de théâtre, les auteurs, les manuscrits, les éditions et les représentations, offrant une vision intégrée et dynamique de l'héritage dramatique du Siècle d'Or espagnol.
      pt: ASODAT (Bancos de Dados Integrados do Teatro Clássico Espanhol) é um projeto dirigido por Alejandro García Reidy (Universidade de Salamanca) e fundado por Teresa Ferrer Valls (Universidade de Valência). Criado com o objetivo de unificar e interligar as principais bases de dados dedicadas ao teatro clássico espanhol, o ASODAT permite pesquisas cruzadas entre peças, autores, manuscritos, edições e espetáculos, oferecendo uma visão integrada e dinâmica da herança dramática da Idade de Ouro espanhola.
      it: ASODAT (Database Integrati del Teatro Classico Spagnolo) è un progetto diretto da Alejandro García Reidy (Università di Salamanca) e fondato da Teresa Ferrer Valls (Università di Valencia). Creato con l'obiettivo di unificare e collegare i principali database dedicati al teatro classico spagnolo, ASODAT consente ricerche incrociate tra opere teatrali, autori, manoscritti, edizioni e rappresentazioni, offrendo una visione integrata e dinamica del patrimonio drammatico del Secolo d'Oro spagnolo.
      de: ASODAT (Integrated Databases of Spanish Classical Theatre) ist ein Projekt unter der Leitung von Alejandro García Reidy (Universität Salamanca) und gegründet von Teresa Ferrer Valls (Universität Valencia). ASODAT wurde mit dem Ziel erstellt, die wichtigsten Datenbanken zum klassischen spanischen Theater zu vereinheitlichen und zu verknüpfen. Es ermöglicht eine übergreifende Suche nach Theaterstücken, Autoren, Manuskripten, Editionen und Aufführungen und bietet so einen integrierten und dynamischen Blick auf das dramatische Erbe des spanischen Goldenen Zeitalters.
      zh: ASODAT（西班牙古典戏剧综合数据库）是由 Alejandro García Reidy（萨拉曼卡大学）指导、Teresa Ferrer Valls（瓦伦西亚大学）创立的项目。 ASODAT 的创建目标是统一和链接西班牙古典戏剧的主要数据库，可实现戏剧、作者、手稿、版本和表演之间的交叉搜索，提供西班牙黄金时代戏剧遗产的综合动态视图。
      ja: ASODAT (スペイン古典劇場統合データベース) は、Alejandro García Reidy (サラマンカ大学) が監督し、Teresa Ferrer Valls (バレンシア大学) が設立したプロジェクトです。 ASODAT は、スペインの古典演劇専用の主要なデータベースを統合してリンクすることを目的として作成され、戯曲、作者、原稿、版、公演にわたる横断検索を可能にし、スペイン黄金時代の演劇遺産の統合的かつダイナミックなビューを提供します。
      ko: ASODAT(스페인 고전극 통합 데이터베이스)는 Alejandro García Reidy(살라망카 대학교)가 감독하고 Teresa Ferrer Valls(발렌시아 대학교)가 설립한 프로젝트입니다. 스페인 고전 연극에 관한 주요 데이터베이스를 통합하고 연결하려는 목표로 만들어진 ASODAT는 연극, 작가, 원고, 판 및 공연 전반에 걸쳐 교차 검색을 가능하게 하여 스페인 황금 시대의 극적인 유산에 대한 통합적이고 역동적인 관점을 제공합니다.
      ru: ASODAT (Интегрированные базы данных испанского классического театра) — это проект под руководством Алехандро Гарсиа Рейди (Университет Саламанки) и основанный Терезой Феррер Вальс (Университет Валенсии). Созданный с целью объединить и связать основные базы данных, посвященные испанскому классическому театру, ASODAT позволяет осуществлять перекрестный поиск по пьесам, авторам, рукописям, изданиям и спектаклям, предлагая интегрированный и динамичный взгляд на драматическое наследие Золотого века Испании.
      ar: ASODAT (قواعد البيانات المتكاملة للمسرح الكلاسيكي الإسباني) هو مشروع يديره أليخاندرو غارسيا ريدي (جامعة سالامانكا) وأسسته تيريزا فيرير فالس (جامعة فالنسيا). تم إنشاء ASODAT بهدف توحيد وربط قواعد البيانات الرئيسية المخصصة للمسرح الكلاسيكي الإسباني، وهو يتيح إجراء عمليات بحث مشتركة عبر المسرحيات والمؤلفين والمخطوطات والإصدارات والعروض، مما يوفر رؤية متكاملة وديناميكية للتراث الدرامي للعصر الذهبي الإسباني.
    image: "asodat.png"
    url: "https://asodat.uv.es/"


