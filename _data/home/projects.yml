    title:
      es: "THAL-IA: Patrimonio teatral áureo: inteligencia artificial y fotografía espectral"
      en: "THAL-IA: Golden Age Theatrical Heritage — Artificial Intelligence and Spectral Imaging"
      fr: 'THAL-IA: Patrimoine théâtral de l’âge d’or — Intelligence artificielle et imagerie spectrale'
      pt: 'THAL-IA: Herança Teatral da Idade de Ouro - Inteligência Artificial e Imagem Espectral'
      it: "THAL-IA: Patrimonio teatrale dell'età dell'oro: intelligenza artificiale e imaging spettrale"
      de: 'THAL-IA: Theatererbe des Goldenen Zeitalters – Künstliche Intelligenz und Spektralbildgebung'
      zh: THAL-IA：黄金时代戏剧遗产——人工智能和光谱成像
      ja: 'THAL-IA: 黄金時代の演劇遺産 — 人工知能とスペクトル イメージング'
      ko: 'THAL-IA: 황금기 연극 유산 — 인공 지능 및 스펙트럼 이미징'
      ru: 'THAL-IA: Театральное наследие Золотого века — искусственный интеллект и спектральная визуализация'
      ar: 'THAL-IA: التراث المسرحي للعصر الذهبي – الذكاء الاصطناعي والتصوير الطيفي'
    description:
      es: "Thal-IA (Patrimonio teatral áureo: inteligencia artificial y fotografía espectral) es un proyecto dirigido por Sònia Boadas (Universitat Autònoma de Barcelona) que investiga las relaciones entre los manuscritos teatrales del Siglo de Oro y los distintos agentes implicados en su transmisión —autores, copistas, censores y libreros—. Mediante técnicas de inteligencia artificial y análisis multiespectral, el proyecto busca identificar manos autógrafas y de copistas, reconstruir redes de producción y circulación de textos, y aportar nuevas perspectivas sobre la materialidad y autoría en el teatro aurisecular."
      en: "THAL-IA (Golden Age Theatrical Heritage: Artificial Intelligence and Spectral Imaging) is a project directed by Sònia Boadas (Universitat Autònoma de Barcelona) that explores the relationships between Spanish Golden Age theatrical manuscripts and the various agents involved in their transmission —authors, scribes, censors, and booksellers. Using artificial intelligence and multispectral imaging techniques, the project aims to identify authorial and scribal hands, reconstruct networks of textual production and circulation, and offer new perspectives on materiality and authorship in early modern theatre."
      fr: 'THAL-IA (Golden Age Theatrical Heritage: Artificial Intelligence and Spectral Imaging) est un projet dirigé par Sònia Boadas (Universitat Autònoma de Barcelona) qui explore les relations entre les manuscrits théâtraux espagnols de l’âge d’or et les différents agents impliqués dans leur transmission – auteurs, scribes, censeurs et libraires. Utilisant l’intelligence artificielle et des techniques d’imagerie multispectrale, le projet vise à identifier les mains des auteurs et des scribes, à reconstruire les réseaux de production et de circulation textuelles et à offrir de nouvelles perspectives sur la matérialité et la paternité dans le théâtre moderne.'
      pt: 'THAL-IA (Herança Teatral da Idade de Ouro: Inteligência Artificial e Imagem Espectral) é um projeto dirigido por Sònia Boadas (Universitat Autònoma de Barcelona) que explora as relações entre os manuscritos teatrais da Idade de Ouro espanhola e os vários agentes envolvidos na sua transmissão – autores, escribas, censores e livreiros. Utilizando inteligência artificial e técnicas de imagem multiespectral, o projeto visa identificar mãos autorais e de escribas, reconstruir redes de produção e circulação textual e oferecer novas perspectivas sobre materialidade e autoria no teatro moderno.'
      it: "THAL-IA (Golden Age Theatrical Heritage: Artificial Intelligence and Spectral Imaging) è un progetto diretto da Sònia Boadas (Universitat Autònoma de Barcelona) che esplora le relazioni tra i manoscritti teatrali spagnoli del Secolo d'oro e i vari agenti coinvolti nella loro trasmissione: autori, scribi, censori e librai. Utilizzando l'intelligenza artificiale e tecniche di imaging multispettrale, il progetto mira a identificare le mani dell'autore e dello scriba, ricostruire le reti di produzione e circolazione testuale e offrire nuove prospettive sulla materialità e sulla paternità nel teatro della prima età moderna."
      de: 'THAL-IA (Golden Age Theatrical Heritage: Artificial Intelligence and Spectral Imaging) ist ein von Sònia Boadas (Universitat Autònoma de Barcelona) geleitetes Projekt, das die Beziehungen zwischen spanischen Theatermanuskripten des Goldenen Zeitalters und den verschiedenen Akteuren untersucht, die an ihrer Übermittlung beteiligt sind – Autoren, Schreiber, Zensoren und Buchhändler. Mithilfe künstlicher Intelligenz und multispektraler Bildgebungstechniken zielt das Projekt darauf ab, Autoren- und Schreibhände zu identifizieren, Netzwerke der Textproduktion und -zirkulation zu rekonstruieren und neue Perspektiven auf Materialität und Autorschaft im frühneuzeitlichen Theater zu bieten.'
      zh: THAL-IA（黄金时代戏剧遗产：人工智能和光谱成像）是由 Sònia Boadas（巴塞罗那自治大学）指导的一个项目，旨在探索西班牙黄金时代戏剧手稿与参与其传播的各种代理人（作者、抄写员、审查员和书商）之间的关系。该项目旨在利用人工智能和多光谱成像技术，识别作者和抄写者的手，重建文本生产和流通的网络，并为早期现代戏剧的物质性和作者身份提供新的视角。
      ja: 'THAL-IA (黄金時代の演劇遺産: 人工知能とスペクトル イメージング) は、ソニア ボアダス (バルセロナ自治大学) が監督するプロジェクトで、スペインの黄金時代の演劇原稿と、その伝達に関与したさまざまなエージェント (著者、筆記者、検閲官、書店) との関係を調査します。このプロジェクトは、人工知能とマルチスペクトル イメージング技術を使用して、作者と脚本家の手を特定し、テキストの制作と流通のネットワークを再構築し、近世演劇における物質性と作者についての新しい視点を提供することを目的としています。'
      ko: 'THAL-IA(황금 시대 연극 유산: 인공 지능 및 스펙트럼 이미징)는 Sònia Boadas(Universitat Autònoma de Barcelona)가 감독하는 프로젝트로, 스페인 황금 시대 연극 원고와 그 전송에 관련된 다양한 주체(작가, 서기관, 검열관 및 서점) 간의 관계를 탐구합니다. 인공 지능과 다중 스펙트럼 이미징 기술을 사용하여 이 프로젝트는 작가와 필사자의 손을 식별하고, 텍스트 생산 및 유통 네트워크를 재구성하고, 초기 현대 극장의 물질성과 작가성에 대한 새로운 관점을 제공하는 것을 목표로 합니다.'
      ru: 'THAL-IA (Театральное наследие Золотого века: искусственный интеллект и спектральная визуализация) — это проект Сони Боадас (Автономный университет Барселоны), который исследует отношения между театральными рукописями Золотого века Испании и различными агентами, участвующими в их передаче — авторами, писцами, цензорами и книготорговцами. Используя искусственный интеллект и методы мультиспектральной визуализации, проект направлен на выявление рук авторов и переписчиков, реконструирует сети производства и распространения текстов, а также предлагает новые взгляды на материальность и авторство в театре раннего Нового времени.'
      ar: 'THAL-IA (التراث المسرحي للعصر الذهبي: الذكاء الاصطناعي والتصوير الطيفي) هو مشروع تديره سونيا بوداس (جامعة برشلونة المستقلة) ويستكشف العلاقات بين المخطوطات المسرحية الإسبانية في العصر الذهبي ومختلف الوكلاء المشاركين في نقلها - المؤلفون والكتبة والرقباء وبائعو الكتب. باستخدام الذكاء الاصطناعي وتقنيات التصوير متعدد الأطياف، يهدف المشروع إلى تحديد الأيدي المؤلفة والكاتبة، وإعادة بناء شبكات إنتاج النص وتداوله، وتقديم وجهات نظر جديدة حول المادية والتأليف في المسرح الحديث المبكر.'
    image: "thalia.jpg"
    url: "https://webs.uab.cat/thal-ia/"


  - badge:
      es: "Mercator Fellow"
      en: "Mercator Fellow"
      fr: Boursier Mercator
      pt: Companheiro Mercador
      it: Compagno di Mercatore
      de: Mercator Fellow
      zh: 墨卡托研究员
      ja: メルカトルフェロー
      ko: 메르카토르 펠로우
      ru: Товарищ Меркатора
      ar: زميل مركاتور
    title:
      es: "Tracing Regularities in Pedro Calderón de la Barca's Dramatic Œuvre with a Computational Approach"
      en: "Tracing Regularities in Pedro Calderón de la Barca's Dramatic Œuvre with a Computational Approach"
      fr: Retracer les régularités dans l'œuvre dramatique de Pedro Calderón de la Barca avec une approche informatique
      pt: Rastreando Regularidades na Obra Dramática de Pedro Calderón de la Barca com uma Abordagem Computacional
      it: Tracciare le regolarità nell'opera drammatica di Pedro Calderón de la Barca con un approccio computazionale
      de: Aufspüren von Regelmäßigkeiten im dramatischen Werk von Pedro Calderón de la Barca mit einem rechnerischen Ansatz
      zh: 用计算方法追踪佩德罗·卡尔德隆·德拉·巴尔卡戏剧作品中的规律
      ja: ペドロ・カルデロン・デ・ラ・バルサの劇的な演技の規則性を計算的アプローチで追跡する
      ko: 전산적 접근 방식을 사용하여 Pedro Calderón de la Barca의 극적인 작품에서 규칙성 추적
      ru: Отслеживание закономерностей в драматическом творчестве Педро Кальдерона де ла Барки с помощью вычислительного подхода
      ar: تتبع الانتظام في العمل الدرامي لبيدرو كالديرون دي لا برشلونة من خلال النهج الحسابي
    description:
      es: "Proyecto financiado por la DFG dentro del programa Computational Literary Studies, desarrollado entre la Universidad de Tübingen y el Instituto de Lingüística Computacional de Stuttgart. Su objetivo es analizar cuantitativamente la obra dramática de Calderón de la Barca a partir de textos codificados en TEI-XML, aplicando métodos de análisis léxico, redes de personajes, estructura métrica y dinámica temporal. El estudio busca establecer regularidades estilísticas, proponer nuevas clasificaciones genéricas y contribuir a la datación de obras de autoría o cronología discutida."
      en: "DFG-funded project within the Computational Literary Studies program, carried out between the University of Tübingen and the Institute for Computational Linguistics at the University of Stuttgart. It quantitatively analyzes Calderón de la Barca’s dramatic works using TEI-XML encoded texts, applying lexical analysis, character network modeling, metrical structure, and temporal dynamics. The project aims to identify stylistic regularities, refine genre classifications, and propose new datings for works of uncertain or disputed authorship."
      fr: Projet financé par la DFG dans le cadre du programme Computational Literary Studies, réalisé entre l'Université de Tübingen et l'Institut de linguistique computationnelle de l'Université de Stuttgart. Il analyse quantitativement les œuvres dramatiques de Calderón de la Barca à l’aide de textes codés TEI-XML, en appliquant l’analyse lexicale, la modélisation de réseaux de caractères, la structure métrique et la dynamique temporelle. Le projet vise à identifier des régularités stylistiques, à affiner les classifications des genres et à proposer de nouvelles datations pour des œuvres à la paternité incertaine ou contestée.
      pt: Projeto financiado pela DFG no âmbito do programa de Estudos Literários Computacionais, realizado entre a Universidade de Tübingen e o Instituto de Lingüística Computacional da Universidade de Stuttgart. Analisa quantitativamente as obras dramáticas de Calderón de la Barca usando textos codificados em TEI-XML, aplicando análise lexical, modelagem de redes de caracteres, estrutura métrica e dinâmica temporal. O projeto visa identificar regularidades estilísticas, refinar classificações de gênero e propor novas datações para obras de autoria incerta ou contestada.
      it: Progetto finanziato dalla DFG nell'ambito del programma Computational Literary Studies, realizzato tra l'Università di Tubinga e l'Istituto di Linguistica Computazionale dell'Università di Stoccarda. Analizza quantitativamente le opere drammatiche di Calderón de la Barca utilizzando testi codificati TEI-XML, applicando analisi lessicale, modellazione della rete di caratteri, struttura metrica e dinamica temporale. Il progetto si propone di individuare regolarità stilistiche, affinare classificazioni di genere e proporre nuove datazioni per opere di paternità incerta o controversa.
      de: DFG-gefördertes Projekt im Rahmen des Studiengangs Computational Literary Studies, durchgeführt zwischen der Universität Tübingen und dem Institut für Computerlinguistik der Universität Stuttgart. Es analysiert quantitativ die dramatischen Werke von Calderón de la Barca mithilfe von TEI-XML-codierten Texten und wendet dabei lexikalische Analyse, Zeichennetzwerkmodellierung, metrische Struktur und zeitliche Dynamik an. Ziel des Projekts ist es, stilistische Regelmäßigkeiten zu identifizieren, Genreklassifikationen zu verfeinern und neue Datierungen für Werke ungewisser oder umstrittener Urheberschaft vorzuschlagen.
      zh: DFG 资助的计算文学研究项目中的项目，由蒂宾根大学和斯图加特大学计算语言学研究所合作开展。它使用 TEI-XML 编码文本，应用词法分析、字符网络建模、韵律结构和时间动态来定量分析 Calderón de la Barca 的戏剧作品。该项目旨在识别文体规律，完善流派分类，并为作者身份不确定或有争议的作品提出新的年代确定方法。
      ja: 計算文学研究プログラム内で DFG が資金提供したプロジェクト。テュービンゲン大学とシュトゥットガルト大学の計算言語学研究所の間で実施されました。 TEI-XML でエンコードされたテキストを使用し、語彙分析、文字ネットワーク モデリング、韻律構造、および時間的ダイナミクスを適用して、カルデロン デ ラ バルカの劇的な作品を定量的に分析します。このプロジェクトは、文体の規則性を特定し、ジャンル分類を洗練し、作者が不明または論争のある作品の新しい年代を提案することを目的としています。
      ko: 튀빙겐 대학교와 슈투트가르트 대학교의 컴퓨터 언어학 연구소 간에 수행된 컴퓨터 문학 연구 프로그램 내의 DFG 자금 지원 프로젝트입니다. TEI-XML로 인코딩된 텍스트를 사용하고 어휘 분석, 문자 네트워크 모델링, 운율 구조 및 시간 역학을 적용하여 Calderón de la Barca의 연극 작품을 정량적으로 분석합니다. 이 프로젝트는 문체적 규칙성을 식별하고, 장르 분류를 개선하고, 불확실하거나 논쟁의 여지가 있는 저자의 작품에 대한 새로운 날짜를 제안하는 것을 목표로 합니다.
      ru: Финансируемый DFG проект в рамках программы компьютерных литературных исследований, реализуемый Тюбингенским университетом и Институтом компьютерной лингвистики Штутгартского университета. В нем количественно анализируются драматические произведения Кальдерона де ла Барки с использованием текстов, закодированных TEI-XML, с применением лексического анализа, моделирования сети персонажей, метрической структуры и временной динамики. Целью проекта является выявление стилистических закономерностей, уточнение жанровых классификаций и предложение новых датировок произведений неопределенного или спорного авторства.
      ar: مشروع ممول من DFG ضمن برنامج الدراسات الأدبية الحاسوبية، والذي يتم تنفيذه بين جامعة توبنغن ومعهد اللغويات الحاسوبية في جامعة شتوتغارت. يقوم بتحليل كمي لأعمال كالديرون دي لا باركا الدرامية باستخدام النصوص المشفرة بـ TEI-XML، وتطبيق التحليل المعجمي، ونمذجة شبكة الشخصيات، والبنية المترية، والديناميكيات الزمنية. يهدف المشروع إلى تحديد الأنماط الأسلوبية، وتحسين تصنيفات الأنواع، واقتراح تواريخ جديدة للأعمال ذات التأليف غير المؤكد أو المتنازع عليه.
    image: "tracing.png"
    url: "https://romanistik.de/aktuelles/6456"





