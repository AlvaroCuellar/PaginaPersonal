    title:
      es: "Sound and Meaning in Spanish Golden Age Literature"
      en: "Sound and Meaning in Spanish Golden Age Literature"
      fr: Son et signification dans la littérature espagnole du Siècle d’Or
      pt: Som e significado na literatura espanhola da Idade de Ouro
      it: Suono e significato nella letteratura spagnola del Secolo d'oro
      de: Klang und Bedeutung in der spanischen Literatur des Goldenen Zeitalters
      zh: 西班牙黄金时代文学中的声音和意义
      ja: スペイン黄金時代文学の音と意味
      ko: 스페인 황금기 문학의 소리와 의미
      ru: Звук и значение в литературе Золотого века Испании
      ar: الصوت والمعنى في أدب العصر الذهبي الإسباني
    description:
      es: "Sound and Meaning in Spanish Golden Age Literature es un proyecto dirigido por Simon Kroll (Universidad de Viena) que investiga la relación entre sonoridad y significado en la literatura del Siglo de Oro. A través de métodos filológicos y herramientas digitales, analiza cómo los patrones sonoros del verso generan efectos de sentido y emoción en la poesía y el teatro de autores como Lope de Vega o Calderón de la Barca."
      en: "Sound and Meaning in Spanish Golden Age Literature is a project directed by Simon Kroll (University of Vienna) that investigates the relationship between sound and meaning in Spanish Golden Age literature. Through philological methods and digital tools, it analyzes how the sonic patterns of verse produce effects of meaning and emotion in the poetry and theatre of authors such as Lope de Vega and Calderón de la Barca."
      fr: Son et sens dans la littérature espagnole de l’âge d’or est un projet dirigé par Simon Kroll (Université de Vienne) qui étudie la relation entre le son et le sens dans la littérature espagnole de l’âge d’or. À travers des méthodes philologiques et des outils numériques, il analyse comment les modèles sonores du vers produisent des effets de sens et d'émotion dans la poésie et le théâtre d'auteurs tels que Lope de Vega et Calderón de la Barca.
      pt: Som e Significado na Literatura Espanhola da Idade de Ouro é um projeto dirigido por Simon Kroll (Universidade de Viena) que investiga a relação entre som e significado na literatura espanhola da Idade de Ouro. Através de métodos filológicos e ferramentas digitais, analisa como os padrões sonoros do verso produzem efeitos de sentido e emoção na poesia e no teatro de autores como Lope de Vega e Calderón de la Barca.
      it: Suono e significato nella letteratura spagnola del Secolo d'oro è un progetto diretto da Simon Kroll (Università di Vienna) che indaga la relazione tra suono e significato nella letteratura spagnola del Secolo d'oro. Attraverso metodi filologici e strumenti digitali, analizza come i modelli sonori dei versi producono effetti di significato ed emozione nella poesia e nel teatro di autori come Lope de Vega e Calderón de la Barca.
      de: Klang und Bedeutung in der spanischen Literatur des Goldenen Zeitalters ist ein von Simon Kroll (Universität Wien) geleitetes Projekt, das die Beziehung zwischen Klang und Bedeutung in der spanischen Literatur des Goldenen Zeitalters untersucht. Mithilfe philologischer Methoden und digitaler Werkzeuge wird analysiert, wie die Klangmuster von Versen Bedeutungs- und Emotionseffekte in der Poesie und im Theater von Autoren wie Lope de Vega und Calderón de la Barca hervorrufen.
      zh: 西班牙黄金时代文学中的声音和意义是西蒙·克罗尔（维也纳大学）指导的一个项目，旨在研究西班牙黄金时代文学中声音和意义之间的关系。通过语言学方法和数字工具，它分析了诗歌的声音模式如何在洛普·德·维加和卡尔德龙·德拉·巴尔卡等作家的诗歌和戏剧中产生意义和情感的效果。
      ja: 「スペイン黄金時代文学における音と意味」は、スペイン黄金時代文学における音と意味の関係を調査する、サイモン・クロール（ウィーン大学）監督のプロジェクトです。文献学的手法とデジタルツールを通じて、ロペ・デ・ベガやカルデロン・デ・ラ・バルカなどの作家の詩や演劇において、詩の音のパターンがどのように意味や感情の効果を生み出すのかを分析します。
      ko: 스페인 황금기 문학의 소리와 의미(Sound and Meaning in Spanish Golden Age Literature)는 사이먼 크롤(비엔나 대학교)이 감독한 프로젝트로 스페인 황금기 문학의 소리와 의미 사이의 관계를 조사합니다. 문학적 방법과 디지털 도구를 통해 시의 음향 패턴이 Lope de Vega 및 Calderón de la Barca와 같은 작가의 시와 연극에서 의미와 감정의 효과를 어떻게 생성하는지 분석합니다.
      ru: Звук и значение в испанской литературе Золотого века — это проект Саймона Кролла (Венский университет), который исследует взаимосвязь между звуком и значением в испанской литературе Золотого века. С помощью филологических методов и цифровых инструментов он анализирует, как звуковые модели стихов создают смысловые и эмоциональные эффекты в поэзии и театре таких авторов, как Лопе де Вега и Кальдерон де ла Барка.
      ar: الصوت والمعنى في أدب العصر الذهبي الإسباني هو مشروع من إخراج سيمون كرول (جامعة فيينا) يبحث في العلاقة بين الصوت والمعنى في أدب العصر الذهبي الإسباني. ومن خلال الأساليب اللغوية والأدوات الرقمية، يحلل كيف تنتج الأنماط الصوتية للشعر تأثيرات المعنى والعاطفة في الشعر والمسرح لمؤلفين مثل لوبي دي فيغا وكالديرون دي لا باركا.
    image: "sound.png"
    url: "https://soundandmeaning.univie.ac.at/"


