    title:
      es: "PROLOPE"
      en: "PROLOPE"
      fr: PROLOPE
      pt: PRÓLOPO
      it: PROLOPE
      de: PROLOP
      zh: 普洛普
      ja: プロロープ
      ko: 프롤로페
      ru: ПРОЛОПА
      ar: برولوب
    description:
      es: "PROLOPE es un grupo de investigación de la Universitat Autònoma de Barcelona, fundado en 1989 por Alberto Blecua y dirigido actualmente por Gonzalo Pontón Gijón y Sònia Boadas. Su misión es la edición crítica y el estudio filológico integral del teatro de Lope de Vega, atendiendo a la transmisión textual, la historia editorial y el contexto literario de sus comedias. Desde su creación, el grupo ha publicado las Partes de comedias en ediciones rigurosas y comentadas, y promueve la difusión internacional del legado lopesco a través de la revista Anuario Lope de Vega y de proyectos de investigación en humanidades digitales."
      en: "PROLOPE is a research group at the Universitat Autònoma de Barcelona, founded in 1989 by Alberto Blecua and currently directed by Gonzalo Pontón Gijón and Sònia Boadas. Its mission is the critical edition and comprehensive philological study of Lope de Vega’s theatre, focusing on textual transmission, editorial history, and the literary context of his comedias. Since its foundation, the group has published the Partes de comedias in rigorous, annotated editions and promotes the international dissemination of Lope’s legacy through the journal Anuario Lope de Vega and various digital humanities research projects."
      fr: PROLOPE est un groupe de recherche de l'Université autonome de Barcelone, fondé en 1989 par Alberto Blecua et actuellement dirigé par Gonzalo Pontón Gijón et Sònia Boadas. Sa mission est l’édition critique et l’étude philologique approfondie du théâtre de Lope de Vega, en se concentrant sur la transmission textuelle, l’histoire éditoriale et le contexte littéraire de ses comédies. Depuis sa création, le groupe publie les Partes de comedias dans des éditions rigoureuses et annotées et promeut la diffusion internationale de l’héritage de Lope à travers la revue Anuario Lope de Vega et divers projets de recherche en humanités numériques.
      pt: PROLOPE é um grupo de investigação da Universitat Autònoma de Barcelona, ​​fundado em 1989 por Alberto Blecua e atualmente dirigido por Gonzalo Pontón Gijón e Sònia Boadas. A sua missão é a edição crítica e o estudo filológico abrangente do teatro de Lope de Vega, centrando-se na transmissão textual, na história editorial e no contexto literário das suas comédias. Desde a sua fundação, o grupo publica as Partes de comedias em edições rigorosas e comentadas e promove a divulgação internacional do legado de Lope através da revista Anuario Lope de Vega e de vários projetos de investigação em humanidades digitais.
      it: PROLOPE è un gruppo di ricerca dell'Universitat Autònoma de Barcelona, ​​fondato nel 1989 da Alberto Blecua e attualmente diretto da Gonzalo Pontón Gijón e Sònia Boadas. La sua missione è l’edizione critica e lo studio filologico completo del teatro di Lope de Vega, concentrandosi sulla trasmissione testuale, sulla storia editoriale e sul contesto letterario delle sue commedie. Fin dalla sua fondazione, il gruppo pubblica le Partes de comedias in edizioni rigorose e commentate e promuove la diffusione internazionale dell’eredità di Lope attraverso la rivista Anuario Lope de Vega e vari progetti di ricerca di digital humanities.
      de: PROLOPE ist eine Forschungsgruppe an der Universitat Autònoma de Barcelona, ​​die 1989 von Alberto Blecua gegründet wurde und derzeit von Gonzalo Pontón Gijón und Sònia Boadas geleitet wird. Seine Mission ist die kritische Edition und umfassende philologische Untersuchung des Theaters von Lope de Vega, wobei der Schwerpunkt auf der Textüberlieferung, der Herausgebergeschichte und dem literarischen Kontext seiner Komödien liegt. Seit ihrer Gründung veröffentlicht die Gruppe die Partes de comedias in strengen, kommentierten Ausgaben und fördert die internationale Verbreitung von Lopes Vermächtnis durch die Zeitschrift Anuario Lope de Vega und verschiedene Forschungsprojekte im Bereich der digitalen Geisteswissenschaften.
      zh: PROLOPE 是巴塞罗那自治大学的一个研究小组，由 Alberto Blecua 于 1989 年创立，目前由 Gonzalo Pontón Gijón 和 Sònia Boadas 领导。它的使命是对洛佩·德·维加的戏剧进行批判性编辑和全面的语言学研究，重点关注他的喜剧的文本传播、编辑历史和文学背景。自成立以来，该组织出版了严谨的带注释版本的《喜剧部分》，并通过《Anuario Lope de Vega》杂志和各种数字人文研究项目促进洛佩遗产的国际传播。
      ja: PROLOPE はバルセロナ自治大学の研究グループで、1989 年にアルベルト ブレクアによって設立され、現在はゴンサロ ポントン ヒホンとソニア ボアダスが監督しています。その使命は、ロペ・デ・ベガの演劇の批評版と包括的な文献学的研究であり、テキストの伝達、編集の歴史、彼のコメディの文学的文脈に焦点を当てています。設立以来、このグループは厳密な注釈付き版で『コメディ』を出版し、雑誌『アヌアリオ ロペ デ ベガ』やさまざまなデジタル人文科学研究プロジェクトを通じてロペの遺産の国際的な普及を促進しています。
      ko: PROLOPE는 Universitat Autònoma de Barcelona의 연구 그룹으로 Alberto Blecua가 1989년에 설립했으며 현재 Gonzalo Pontón Gijón과 Sònia Boadas가 이끌고 있습니다. 이 단체의 사명은 텍스트 전달, 편집 역사 및 그의 코미디의 문학적 맥락에 초점을 맞춘 로페 데 베가 극장에 대한 비평 판이자 포괄적인 문학적 연구입니다. 창립 이래 이 그룹은 주석이 달린 엄격한 버전의 코미디 파티를 출판했으며 Anuario Lope de Vega 저널과 다양한 디지털 인문학 연구 프로젝트를 통해 Lope의 유산의 국제적 보급을 촉진합니다.
      ru: ПРОЛОП — исследовательская группа Автономного университета Барселоны, основанная в 1989 году Альберто Блекуа и в настоящее время возглавляемая Гонсало Понтон Хихон и Соней Боадас. Его миссия — критическое издание и всестороннее филологическое исследование театра Лопе де Веги с упором на текстовую передачу, редакционную историю и литературный контекст его комедий. С момента своего основания группа публикует «Партии комедии» в подробных, аннотированных изданиях и способствует международному распространению наследия Лопе через журнал «Ануарио Лопе де Вега» и различные исследовательские проекты в области цифровых гуманитарных наук.
      ar: PROLOPE هي مجموعة بحثية في الجامعة المستقلة ببرشلونة، تأسست عام 1989 على يد ألبرتو بليكوا ويديرها حاليًا غونزالو بونتون خيخون وسونيا بواداس. وتتمثل مهمتها في إصدار نقدي ودراسة فقهية شاملة لمسرح لوبي دي فيغا، مع التركيز على النقل النصي، وتاريخ التحرير، والسياق الأدبي لمسرحياته الكوميدية. منذ تأسيسها، قامت المجموعة بنشر أجزاء من الكوميديا ​​في طبعات صارمة ومشروحة وتشجع النشر الدولي لتراث لوبي من خلال مجلة Anuario Lope de Vega ومختلف المشاريع البحثية في العلوم الإنسانية الرقمية.
    image: "prolope.png"
    url: "https://prolope.uab.cat/"

  
