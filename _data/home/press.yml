      en: "The Austrian newspaper Salzburger Nachrichten published a feature by Clemens Panagl about the discovery of La Francesa Laura, an anonymous play identified as a work by Lope de Vega through artificial intelligence. The article highlights the importance of the find made by researchers at the University of Vienna and the Spanish National Library, comparing it to the discovery of an unknown text by Schiller. The research was led by Álvaro Cuéllar and Germán Vega, heads of the ETSO project."



      fr: Le journal autrichien Salzburger Nachrichten a publié un article de Clemens Panagl sur la découverte de La Francesa Laura, une pièce anonyme identifiée comme une œuvre de Lope de Vega grâce à l'intelligence artificielle. L'article souligne l'importance de la découverte réalisée par des chercheurs de l'Université de Vienne et de la Bibliothèque nationale espagnole, en la comparant à la découverte d'un texte inconnu de Schiller. La recherche a été dirigée par Álvaro Cuéllar et Germán Vega, responsables du projet ETSO.
      pt: O jornal austríaco Salzburger Nachrichten publicou reportagem de Clemens Panagl sobre a descoberta de La Francesa Laura, peça anônima identificada como obra de Lope de Vega por meio de inteligência artificial. O artigo destaca a importância da descoberta feita por pesquisadores da Universidade de Viena e da Biblioteca Nacional Espanhola, comparando-a à descoberta de um texto desconhecido de Schiller. A investigação foi liderada por Álvaro Cuéllar e Germán Vega, responsáveis ​​do projeto ETSO.
      it: Il quotidiano austriaco Salisburgo Nachrichten ha pubblicato un articolo di Clemens Panagl sulla scoperta de La Francesa Laura, un'opera anonima identificata come opera di Lope de Vega attraverso l'intelligenza artificiale. L'articolo sottolinea l'importanza del ritrovamento effettuato dai ricercatori dell'Università di Vienna e della Biblioteca Nazionale Spagnola, paragonandolo al ritrovamento di un testo sconosciuto di Schiller. La ricerca è stata condotta da Álvaro Cuéllar e Germán Vega, responsabili del progetto ETSO.
      de: Die österreichischen Salzburger Nachrichten veröffentlichten einen Beitrag von Clemens Panagl über die Entdeckung von La Francesa Laura, einem anonymen Stück, das durch künstliche Intelligenz als Werk von Lope de Vega identifiziert wurde. Der Artikel hebt die Bedeutung des Fundes von Forschern der Universität Wien und der Spanischen Nationalbibliothek hervor und vergleicht ihn mit der Entdeckung eines unbekannten Textes von Schiller. Die Forschung wurde von Álvaro Cuéllar und Germán Vega, den Leitern des ETSO-Projekts, geleitet.
      zh: 奥地利报纸《萨尔茨堡新闻报》发表了克莱门斯·帕纳格尔 (Clemens Panagl) 的一篇专题文章，介绍了《弗朗西斯·劳拉》(La Francesa Laura) 的发现，这部匿名戏剧通过人工智能被识别为洛佩·德·维加 (Lope de Vega) 的作品。这篇文章强调了维也纳大学和西班牙国家图书馆研究人员发现的重要性，并将其与席勒发现的未知文本进行了比较。该研究由 ETSO 项目负责人 Álvaro Cuéllar 和 Germán Vega 领导。
      ja: オーストリアの新聞ザルツブルガー・ナハリヒテンは、人工知能によってロペ・デ・ベガの作品であると特定された匿名劇「ラ・フランセサ・ローラ」の発見に関するクレメンス・パナグルによる特集を掲載した。この記事は、ウィーン大学とスペイン国立図書館の研究者らによる発見の重要性を強調し、シラーによる未知の文書の発見と比較している。この研究は、ETSO プロジェクトの責任者であるアルバロ・クエヤル氏とゲルマン・ベガ氏が主導しました。
      ko: 오스트리아 신문 Salzburger Nachrichten은 인공 지능을 통해 Lope de Vega의 작품으로 확인된 익명의 연극인 La Francesa Laura의 발견에 대한 Clemens Panagl의 특집을 게재했습니다. 이 기사는 비엔나 대학과 스페인 국립 도서관의 연구자들이 발견한 것의 중요성을 강조하며 이를 실러의 알려지지 않은 텍스트 발견과 비교합니다. 이 연구는 ETSO 프로젝트 책임자인 Álvaro Cuéllar와 Germán Vega가 주도했습니다.
      ru: Австрийская газета Salzburger Nachrichten опубликовала статью Клеменса Панагля об открытии «Франции Лауры», анонимной пьесы, идентифицированной с помощью искусственного интеллекта как произведение Лопе де Веги. В статье подчеркивается важность находки, сделанной исследователями Венского университета и Национальной библиотеки Испании, сравнивая ее с открытием неизвестного текста Шиллера. Исследование возглавили Альваро Куэльяр и Херман Вега, руководители проекта ETSO.
      ar: نشرت صحيفة Salzburger Nachrichten النمساوية مقالًا بقلم كليمنس باناجل حول اكتشاف La Francesa Laura، وهي مسرحية مجهولة تم تحديدها على أنها عمل لوبي دي فيجا من خلال الذكاء الاصطناعي. ويسلط المقال الضوء على أهمية الاكتشاف الذي توصل إليه الباحثون في جامعة فيينا والمكتبة الوطنية الإسبانية، ومقارنته باكتشاف نص غير معروف لشيلر. قاد البحث ألفارو كويلار وجيرمان فيجا، رئيسا مشروع ETSO.
