      es: "El periódico ruso Gazeta.Ru publicó un artículo de Maksim Voronezhsky sobre el descubrimiento de La francesa Laura, una obra perdida de Lope de Vega identificada mediante inteligencia artificial. El texto explica que los investigadores analizaron más de 1.300 piezas teatrales anónimas con herramientas de IA que compararon el lenguaje de las obras con el de 350 dramaturgos. Los resultados atribuyeron la comedia a Lope de Vega, hipótesis que fue luego confirmada por análisis filológicos tradicionales."
      en: "The Russian newspaper Gazeta.Ru published an article by Maksim Voronezhsky on the discovery of La Francesa Laura, a lost play by Lope de Vega identified through artificial intelligence. The article explains that researchers analyzed over 1,300 anonymous plays using AI tools that compared linguistic patterns with those of 350 playwrights. The results attributed the comedy to Lope de Vega, a conclusion later confirmed through traditional philological analysis."




      fr: Le journal russe Gazeta.Ru a publié un article de Maksim Voronezhsky sur la découverte de La Francesa Laura, une pièce perdue de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique que les chercheurs ont analysé plus de 1 300 pièces anonymes à l’aide d’outils d’IA comparant les modèles linguistiques à ceux de 350 dramaturges. Les résultats attribuent la comédie à Lope de Vega, conclusion confirmée plus tard par l'analyse philologique traditionnelle.
      pt: O jornal russo Gazeta.Ru publicou um artigo de Maksim Voronezhsky sobre a descoberta de La Francesa Laura, peça perdida de Lope de Vega identificada através de inteligência artificial. O artigo explica que os pesquisadores analisaram mais de 1.300 peças anônimas usando ferramentas de IA que compararam padrões linguísticos com os de 350 dramaturgos. Os resultados atribuíram a comédia a Lope de Vega, conclusão posteriormente confirmada pela análise filológica tradicional.
      it: Il quotidiano russo Gazeta.Ru ha pubblicato un articolo di Maksim Voronezhsky sulla scoperta de La Francesa Laura, un'opera perduta di Lope de Vega identificata attraverso l'intelligenza artificiale. L'articolo spiega che i ricercatori hanno analizzato oltre 1.300 opere teatrali anonime utilizzando strumenti di intelligenza artificiale che hanno confrontato i modelli linguistici con quelli di 350 drammaturghi. I risultati attribuirono la commedia a Lope de Vega, conclusione poi confermata dall'analisi filologica tradizionale.
      de: Die russische Zeitung Gazeta.Ru veröffentlichte einen Artikel von Maksim Voronezhsky über die Entdeckung von La Francesa Laura, einem verlorenen Stück von Lope de Vega, das mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel erklärt, dass Forscher über 1.300 anonyme Theaterstücke mithilfe von KI-Tools analysierten, die sprachliche Muster mit denen von 350 Dramatikern verglichen. Die Ergebnisse führten die Komödie Lope de Vega zu, eine Schlussfolgerung, die später durch traditionelle philologische Analysen bestätigt wurde.
      zh: 俄罗斯报纸 Gazeta.Ru 发表了马克西姆·沃罗涅日斯基 (Maksim Voronezhsky) 的一篇文章，内容涉及通过人工智能识别出洛佩·德·维加 (Lope de Vega) 遗失的戏剧《弗朗西斯·劳拉》(La Francesa Laura) 的发现。文章解释说，研究人员使用人工智能工具分析了 1,300 多部匿名戏剧，并将语言模式与 350 名剧作家的语言模式进行了比较。结果将这部喜剧归因于洛普·德·维加，这一结论后来通过传统语言学分析得到证实。
      ja: ロシアの新聞Gazeta.Ruは、人工知能によって特定されたロペ・デ・ベガの失われた戯曲「ラ・フランセサ・ローラ」の発見に関するマクシム・ヴォロネジスキーの記事を掲載した。記事では、研究者らが AI ツールを使用して 1,300 以上の匿名演劇を分析し、言語パターンを 350 人の劇作家の言語パターンと比較したと説明しています。その結果、このコメディはロペ・デ・ベガによるものであることが判明し、この結論は後に伝統的な文献学的分析によって確認されました。
      ko: 러시아 신문 Gazeta.Ru는 인공 지능을 통해 식별된 Lope de Vega의 잃어버린 희곡인 La Francesa Laura의 발견에 대한 Maksim Voronezhsky의 기사를 게재했습니다. 기사에서는 연구자들이 350명의 극작가의 언어 패턴과 언어 패턴을 비교하는 AI 도구를 사용하여 1,300개 이상의 익명 희곡을 분석했다고 설명합니다. 그 결과는 코미디의 원인이 Lope de Vega였으며 나중에 전통적인 문헌학적 분석을 통해 확인된 결론이었습니다.
      ru: Российская газета «Газета.Ру» опубликовала статью Максима Воронежского об обнаружении «Франсезы Лауры» — утраченной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье объясняется, что исследователи проанализировали более 1300 анонимных пьес с помощью инструментов искусственного интеллекта, которые сравнили лингвистические модели с паттернами 350 драматургов. Результаты приписали комедию Лопе де Веге, и этот вывод позже был подтвержден традиционным филологическим анализом.
      ar: نشرت صحيفة Gazeta.Ru الروسية مقالًا لمكسيم فورونيجسكي حول اكتشاف La Francesa Laura، وهي مسرحية مفقودة من تأليف Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. يوضح المقال أن الباحثين قاموا بتحليل أكثر من 1300 مسرحية مجهولة باستخدام أدوات الذكاء الاصطناعي التي قارنت الأنماط اللغوية مع أنماط 350 كاتبًا مسرحيًا. نسبت النتائج الكوميديا ​​إلى لوبي دي فيغا، وهو استنتاج تم تأكيده لاحقًا من خلال التحليل اللغوي التقليدي.
