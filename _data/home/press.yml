      fr: Le journal britannique The Olive Press rapporte la découverte de La Francesa Laura, une comédie jusqu'alors inconnue de Lope de Vega, exhumée grâce à l'intelligence artificielle à la Bibliothèque nationale d'Espagne. Écrit par Alex Trelinski, l'article met en lumière la manière dont les chercheurs ont transcrit et analysé plus de 1 300 manuscrits, révélant ainsi une nouvelle œuvre du dramaturge de l'âge d'or.
      pt: O jornal britânico The Olive Press noticia a descoberta de La Francesa Laura, uma comédia até então desconhecida de Lope de Vega, desenterrada através de inteligência artificial na Biblioteca Nacional de Espanha. Escrito por Alex Trelinski, o artigo destaca como os pesquisadores transcreveram e analisaram mais de 1.300 manuscritos, revelando uma nova obra do dramaturgo da Idade de Ouro.
