      ja: 国際通信社ロイターは、スペイン国立図書館で人工知能によって特定された、これまで知られていなかったロペ・デ・ベガの戯曲『ラ・フランセサ・ラウラ』の発見について報じた。エマ・ピネドが執筆したこの記事は、ウィーン大学とバリャドリード大学の研究者らがどのようにして1,300冊の匿名原稿を転写し、その後の文献学的分析を通じて劇作家の作者であることを確認したかについて説明している。この話は国際メディアによって広く再現されました。
