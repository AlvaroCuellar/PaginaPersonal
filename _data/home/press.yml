      en: "RTVE’s 'Atención obras' features a segment on 'La francesa Laura', an unpublished comedy by Lope de Vega attributed in 2023 through artificial intelligence. Marta Poveda makes her directorial debut with this Fundación Siglo de Oro production, focusing on love, jealousy, and emotional toxicity."


      fr: L'émission « Atención obras » de RTVE présente un segment sur « La francesa Laura », une comédie inédite de Lope de Vega attribuée en 2023 grâce à l'intelligence artificielle. Marta Poveda fait ses débuts en tant que réalisatrice avec cette production de la Fundación Siglo de Oro, axée sur l'amour, la jalousie et la toxicité émotionnelle.
      pt: "'Atención obras' da RTVE traz um segmento sobre 'La francesa Laura', comédia inédita de Lope de Vega atribuída em 2023 por meio de inteligência artificial. Marta Poveda faz sua estreia na direção com esta produção da Fundación Siglo de Oro, focada no amor, no ciúme e na toxicidade emocional."
      it: "\"Atención obras\" di RTVE presenta un segmento su \"La francesa Laura\", una commedia inedita di Lope de Vega attribuita nel 2023 attraverso l'intelligenza artificiale. Marta Poveda fa il suo debutto alla regia con questa produzione della Fundación Siglo de Oro, incentrata sull'amore, la gelosia e la tossicità emotiva."
      de: RTVEs „Atención obras“ enthält einen Abschnitt über „La francesa Laura“, eine unveröffentlichte Komödie von Lope de Vega aus dem Jahr 2023, die auf künstlicher Intelligenz basiert. Marta Poveda gibt ihr Regiedebüt mit dieser Produktion der Fundación Siglo de Oro, in der es um Liebe, Eifersucht und emotionale Toxizität geht.
      zh: RTVE 的《Atención obras》中有一段关于《La francesa Laura》的片段，这是洛佩·德·维加 (Lope de Vega) 于 2023 年通过人工智能创作的一部未出版的喜剧。玛尔塔·波韦达 (Marta Poveda) 凭借这部由黄金基金会 (Fundación Siglo de Oro) 制作的导演处女作，聚焦于爱情、嫉妒和情感毒性。
      ja: RTVE の「Atención obras」では、2023 年に人工知能によって作られたとされるロペ・デ・ベガの未発表コメディ「La francesa Laura」に関するコーナーを特集しています。マルタ ポベダは、愛、嫉妬、感情の毒性に焦点を当てたこのシグロ デ オロ財団の作品で監督デビューを果たします。
      ko: RTVE의 'Atención obras'는 인공 지능을 통해 2023년에 제작된 Lope de Vega의 미공개 코미디 'La francesa Laura'의 한 부분을 담고 있습니다. Marta Poveda는 사랑, 질투, 정서적 독성에 초점을 맞춘 Fundación Siglo de Oro 프로덕션으로 감독 데뷔를 했습니다.
      ru: В программе «Atención obras» на канале RTVE представлен отрывок из неопубликованной комедии Лопе де Веги «La francesa Laura», созданной в 2023 году с помощью искусственного интеллекта. Марта Поведа дебютирует в качестве режиссера в постановке Fundación Siglo de Oro, посвященной любви, ревности и эмоциональной токсичности.
      ar: يعرض برنامج "Atención obras" على قناة RTVE مقطعًا عن "La francesa Laura"، وهو فيلم كوميدي غير منشور من تأليف Lope de Vega يُنسب إلى عام 2023 من خلال الذكاء الاصطناعي. تقوم "مارتا بوفيدا" بأول تجربة إخراجية لها مع إنتاج Fundación Siglo de Oro، الذي يركز على الحب والغيرة والسمية العاطفية.
  - id: "press15"
    title:
      es: "'La francesa Laura': Lope de Vega ya escribió sobre la violencia machista de hoy"
      en: "'La francesa Laura': Lope de Vega Had Already Written About Today’s Gender Violence"
      fr: "« La francesa Laura »: Lope de Vega avait déjà écrit sur la violence de genre d'aujourd'hui"
      pt: "'La francesa Laura': Lope de Vega já havia escrito sobre a violência de gênero atual"
      it: "'La francesa Laura': Lope de Vega aveva già scritto sulla violenza di genere di oggi"
      de: '„La francesa Laura“: Lope de Vega hatte bereits über die heutige geschlechtsspezifische Gewalt geschrieben'
      zh: 《法国劳拉》：洛佩·德·维加已经写过关于当今性别暴力的文章
      ja: 「ラ・フランセサ・ローラ」：ロペ・デ・ベガはすでに今日のジェンダー暴力について書いていた
      ko: "'La francesa Laura': Lope de Vega는 이미 오늘날의 성폭력에 대해 글을 썼습니다."
      ru: '«Французская Лаура»: Лопе де Вега уже писал о сегодняшнем гендерном насилии'
      ar: '"La francesa Laura": كتب لوبي دي فيجا بالفعل عن العنف ضد المرأة اليوم'
    outlet: "El Confidencial"
    date: "2023-12-08"
    url: "https://www.elconfidencial.com/cultura/2023-12-08/la-francesa-laura-lope-de-vega-violencia-machista_3788872/"
    thumbnail: "/assets/images/press/15.png"
    type: "review"
    summary:
      es: "La periodista Marta García Miranda reseña en El Confidencial el estreno de 'La francesa Laura' en los Teatros del Canal, destacando su lectura contemporánea de los celos, la honra y la violencia de género. Dirigida por Marta Poveda y atribuida a Lope de Vega mediante inteligencia artificial, la obra se representa por primera vez cuatro siglos después de su escritura."
      en: "Journalist Marta García Miranda reviews in El Confidencial the premiere of 'La francesa Laura' at Madrid’s Teatros del Canal, highlighting its contemporary reading of jealousy, honor, and gender violence. Directed by Marta Poveda and attributed to Lope de Vega through artificial intelligence, the play is performed for the first time four centuries after it was written."


      fr: La journaliste Marta García Miranda revient dans El Confidencial sur la première de "La francesa Laura" au Teatros del Canal de Madrid, en soulignant sa lecture contemporaine de la jalousie, de l'honneur et de la violence de genre. Mise en scène par Marta Poveda et attribuée à Lope de Vega grâce à l'intelligence artificielle, la pièce est jouée pour la première fois quatre siècles après sa création.
      pt: A jornalista Marta García Miranda analisa no El Confidencial a estreia de 'La francesa Laura' nos Teatros del Canal de Madrid, destacando a sua leitura contemporânea do ciúme, da honra e da violência de género. Dirigida por Marta Poveda e atribuída a Lope de Vega através de inteligência artificial, a peça é encenada pela primeira vez quatro séculos depois de ter sido escrita.
      it: La giornalista Marta García Miranda recensisce su El Confidencial la prima di "La francesa Laura" al Teatros del Canal di Madrid, evidenziandone la lettura contemporanea della gelosia, dell'onore e della violenza di genere. Diretta da Marta Poveda e attribuita a Lope de Vega attraverso l'intelligenza artificiale, l'opera viene rappresentata per la prima volta quattro secoli dopo la sua scrittura.
      de: Die Journalistin Marta García Miranda rezensiert in El Confidencial die Premiere von „La francesa Laura“ im Teatros del Canal in Madrid und hebt die zeitgenössische Lesart von Eifersucht, Ehre und geschlechtsspezifischer Gewalt hervor. Das von Marta Poveda inszenierte und durch künstliche Intelligenz Lope de Vega zugeschriebene Stück wird vier Jahrhunderte nach seiner Entstehung zum ersten Mal aufgeführt.
      zh: 记者玛塔·加西亚·米兰达在《机密》杂志上评论了《法国劳拉》在马德里运河剧院的首映式，强调了该剧对嫉妒、荣誉和性别暴力的当代解读。该剧由玛尔塔·波韦达 (Marta Poveda) 执导，通过人工智能将其归功于洛佩·德·维加 (Lope de Vega)，该剧在创作四个世纪后首次上演。
      ja: ジャーナリストのマルタ・ガルシア・ミランダは、マドリードの運河劇場で行われた『ラ・フランセサ・ローラ』の初演を『エル・コンフィデンシャル』でレビューし、嫉妬、名誉、ジェンダー暴力を現代的に解釈した作品に焦点を当てている。マルタ・ポベダが演出し、人工知能を通じてロペ・デ・ベガの作とされるこの劇は、書かれてから4世紀を経て初めて上演される。
      ko: 언론인 마르타 가르시아 미란다(Marta García Miranda)는 마드리드의 테아트로스 델 카날(Teatros del Canal)에서 열린 '라 프란체사 로라(La francesa Laura)'의 초연을 El Confidencial에서 리뷰하며 질투, 명예, 성폭력에 대한 현대적 해석을 강조합니다. 마르타 포베다(Marta Poveda)가 감독하고 인공 지능을 통해 로페 데 베가(Lope de Vega)가 작곡한 것으로 알려진 이 연극은 쓰여진 지 4세기 후에 처음으로 공연되었습니다.
      ru: Журналистка Марта Гарсия Миранда рецензирует в El Confidencial премьеру спектакля «Французская Лаура» в мадридском Театрос-дель-Канал, подчеркивая современное прочтение ревности, чести и гендерного насилия. Спектакль, поставленный Мартой Поведой и приписываемый Лопе де Вега с помощью искусственного интеллекта, впервые ставится через четыре столетия после его написания.
      ar: تستعرض الصحفية مارتا غارسيا ميراندا في El Confidencial العرض الأول لفيلم "La francesa Laura" في مسرح Teatros del Canal بمدريد، وتسلط الضوء على قراءته المعاصرة للغيرة والشرف والعنف بين الجنسين. المسرحية من إخراج مارتا بوفيدا ونسبت إلى لوبي دي فيجا من خلال الذكاء الاصطناعي، وتم عرض المسرحية لأول مرة بعد أربعة قرون من كتابتها.
  - id: "press14"
    title:
      es: "La Inteligencia Artificial ayuda a descubrir una obra desconocida de Lope de Vega en los fondos de la BNE"
      en: "Artificial Intelligence Helps Discover an Unknown Play by Lope de Vega in the Holdings of the BNE"
      fr: L'intelligence artificielle permet de découvrir une pièce inconnue de Lope de Vega dans les fonds du BNE
      pt: Inteligência Artificial Ajuda a Descobrir uma Jogada Desconhecida de Lope de Vega no Patrimônio do BNE
      it: L'intelligenza artificiale aiuta a scoprire un'opera sconosciuta di Lope de Vega nelle partecipazioni della BNE
      de: Künstliche Intelligenz hilft bei der Entdeckung eines unbekannten Stücks von Lope de Vega in den Beständen des BNE
      zh: 人工智能帮助发现 BNE 所持有的洛佩·德·维加 (Lope de Vega) 的未知戏剧
      ja: 人工知能が BNE 所蔵のロペ・デ・ベガの未知のプレーの発見に貢献
      ko: 인공 지능은 BNE 홀딩스에서 Lope de Vega의 알려지지 않은 연극을 발견하는 데 도움이 됩니다.
      ru: Искусственный интеллект помог обнаружить неизвестную пьесу Лопе де Веги в фондах BNE
      ar: الذكاء الاصطناعي يساعد في اكتشاف مسرحية غير معروفة لـ Lope de Vega في مقتنيات BNE
    outlet: "Biblioteca Nacional de España (BNE)"
    date: "2023-01-31"
    url: "https://www.bne.es/es/noticias/inteligencia-artificial-ayuda-descubrir-obra-desconocida-lope-vega-fondos-bne"
    thumbnail: "/assets/images/press/14.png"
    type: "news"
    summary:
      es: "La Biblioteca Nacional de España anuncia el descubrimiento de La francesa Laura, una comedia anónima ahora atribuida a Lope de Vega. La investigación, realizada por Álvaro Cuéllar y Germán Vega con la colaboración de la BNE, la UAB y el proyecto ETSO, combina inteligencia artificial, transcripción automática y análisis filológico tradicional."
      en: "The National Library of Spain announces the discovery of La francesa Laura, an anonymous comedy now attributed to Lope de Vega. The research, carried out by Álvaro Cuéllar and Germán Vega in collaboration with the BNE, UAB, and the ETSO project, combines artificial intelligence, automatic transcription, and traditional philological analysis."



      fr: La Bibliothèque nationale d'Espagne annonce la découverte de La francesa Laura, une comédie anonyme désormais attribuée à Lope de Vega. La recherche, réalisée par Álvaro Cuéllar et Germán Vega en collaboration avec le BNE, l'UAB et le projet ETSO, combine intelligence artificielle, transcription automatique et analyse philologique traditionnelle.
      pt: A Biblioteca Nacional da Espanha anuncia a descoberta de La francesa Laura, comédia anônima agora atribuída a Lope de Vega. A investigação, realizada por Álvaro Cuéllar e Germán Vega em colaboração com o BNE, a UAB e o projeto ETSO, combina inteligência artificial, transcrição automática e análise filológica tradicional.
      it: La Biblioteca Nazionale di Spagna annuncia la scoperta di La francesa Laura, commedia anonima ora attribuita a Lope de Vega. La ricerca, condotta da Álvaro Cuéllar e Germán Vega in collaborazione con il progetto BNE, UAB e ETSO, combina intelligenza artificiale, trascrizione automatica e analisi filologica tradizionale.
      de: Die spanische Nationalbibliothek gibt die Entdeckung von La francesa Laura bekannt, einer anonymen Komödie, die nun Lope de Vega zugeschrieben wird. Die von Álvaro Cuéllar und Germán Vega in Zusammenarbeit mit der BNE, UAB und dem ETSO-Projekt durchgeführte Forschung kombiniert künstliche Intelligenz, automatische Transkription und traditionelle philologische Analyse.
      zh: 西班牙国家图书馆宣布发现了《法国劳拉》这部匿名喜剧，目前归属于洛佩·德·维加。这项研究由 Álvaro Cuéllar 和 Germán Vega 与 BNE、UAB 和 ETSO 项目合作进行，结合了人工智能、自动转录和传统语言学分析。
      ja: スペイン国立図書館は、現在ロペ・デ・ベガ作とされる匿名の喜劇『ラ・フランセサ・ローラ』の発見を発表した。アルバロ・クエヤル氏とゲルマン・ベガ氏がBNE、UAB、ETSOプロジェクトと協力して実施したこの研究は、人工知能、自動転写、伝統的な文献学的分析を組み合わせたものである。
      ko: 스페인 국립도서관은 현재 로페 데 베가의 작품인 익명의 희극인 라 프란세사 라우라(La francesa Laura)를 발견했다고 발표했습니다. Álvaro Cuéllar와 Germán Vega가 BNE, UAB 및 ETSO 프로젝트와 협력하여 수행한 이 연구는 인공 지능, 자동 전사 및 전통적인 문헌학 분석을 결합합니다.
      ru: Национальная библиотека Испании объявляет об открытии «Французской Лауры», анонимной комедии, приписываемой Лопе де Веге. Исследование, проведенное Альваро Куэльяром и Херманом Вегой в сотрудничестве с BNE, UAB и проектом ETSO, сочетает в себе искусственный интеллект, автоматическую транскрипцию и традиционный филологический анализ.
      ar: تعلن المكتبة الوطنية الإسبانية عن اكتشاف La francesa Laura، وهي كوميديا ​​مجهولة المصدر تُنسب الآن إلى Lope de Vega. يجمع البحث، الذي أجراه ألفارو كويلار وجيرمان فيجا بالتعاون مع BNE وUAB ومشروع ETSO، بين الذكاء الاصطناعي والنسخ التلقائي والتحليل اللغوي التقليدي.
