      fr: La revue TEATROS rapporte la première de 'La francesa Laura', une comédie inédite de Lope de Vega mise en scène par la Fundación Siglo de Oro sous la direction de Marta Poveda. L'article met en lumière la collaboration entre Álvaro Cuéllar et Germán Vega dans la découverte de la pièce grâce à l'intelligence artificielle et son édition savante publiée par Gredos.
      pt: A revista TEATROS informa sobre a estreia de 'La francesa Laura', comédia inédita de Lope de Vega encenada pela Fundación Siglo de Oro sob a direção de Marta Poveda. O artigo destaca a colaboração entre Álvaro Cuéllar e Germán Vega na descoberta da peça através da inteligência artificial e sua edição acadêmica publicada pela Gredos.
      it: La rivista TEATROS riporta la prima di 'La francesa Laura', una commedia inedita di Lope de Vega messa in scena dalla Fundación Siglo de Oro sotto la direzione di Marta Poveda. L'articolo mette in risalto la collaborazione tra Álvaro Cuéllar e Germán Vega nella scoperta dell'opera teatrale attraverso l'intelligenza artificiale e la sua edizione scientifica pubblicata da Gredos.
      de: Das Magazin TEATROS berichtet über die Premiere von „La francesa Laura“, einer unveröffentlichten Komödie von Lope de Vega, inszeniert von der Fundación Siglo de Oro unter der Regie von Marta Poveda. Der Artikel beleuchtet die Zusammenarbeit zwischen Álvaro Cuéllar und Germán Vega bei der Entdeckung des Stücks durch künstliche Intelligenz und seiner wissenschaftlichen Ausgabe, die von Gredos veröffentlicht wurde.
      zh: TEATROS 杂志报道了洛佩·德·维加 (Lope de Vega) 未出版的喜剧《La francesa Laura》的首映式，该喜剧由黄金基金会 (Fundación Siglo de Oro) 在玛尔塔·波韦达 (Marta Poveda) 的指导下上演。这篇文章重点介绍了 Álvaro Cuéllar 和 Germán Vega 在通过人工智能发现该剧及其由 Gredos 出版的学术版本方面的合作。
      ja: 雑誌『テアトロス』は、マルタ・ポベダの演出のもと、シグロ・デ・オロ財団によって上演されたロペ・デ・ベガの未発表コメディ『ラ・フランセサ・ローラ』の初演について報じている。この記事では、人工知能によるこの劇の発見とグレドス社から出版されたその学術版におけるアルバロ・クエヤルとジェルマン・ベガの協力に焦点を当てています。
      ko: 잡지 TEATROS는 Marta Poveda의 감독 하에 Fundación Siglo de Oro가 연출한 Lope de Vega의 미발표 코미디 'La francesa Laura'의 초연에 대해 보도합니다. 이 기사는 인공 지능을 통해 극을 발견하고 Gredos에서 출판한 학술 판을 발견하는 과정에서 Álvaro Cuéllar와 Germán Vega의 협력을 강조합니다.
      ru: Журнал TEATROS сообщает о премьере неопубликованной комедии Лопе де Веги «Французская Лаура» в постановке Fundación Siglo de Oro под руководством Марты Поведа. В статье освещается сотрудничество Альваро Куэльяра и Хермана Веги в открытии пьесы с помощью искусственного интеллекта и ее научном издании, опубликованном Gredos.
      ar: نشرت مجلة TEATROS تقريرًا عن العرض الأول للفيلم الكوميدي "La francesa Laura"، وهو فيلم كوميدي غير منشور من تأليف Lope de Vega وإخراج Fundación Siglo de Oro تحت إشراف مارتا بوفيدا. يسلط المقال الضوء على التعاون بين ألفارو كويلار وجيرمان فيغا في اكتشاف المسرحية من خلال الذكاء الاصطناعي ونسختها العلمية التي نشرها جريدوس.
