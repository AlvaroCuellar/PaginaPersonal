      ru: Критик Хосе-Мигель Вила пишет в Diariocrítico о «Французской Лауре», неопубликованной комедии Лопе де Веги, созданной с помощью искусственного интеллекта и поставленной Мартой Поведа. Он хвалит режиссуру, поэтическую структуру текста и сильную игру Шейлы Ниньо и Агуса Руиса.
