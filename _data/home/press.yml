      ar: تتحدث صحيفة The Olive Press البريطانية عن اكتشاف فيلم La Francesa Laura، وهو فيلم كوميدي غير معروف سابقًا من تأليف Lope de Vega، تم اكتشافه من خلال الذكاء الاصطناعي في المكتبة الوطنية الإسبانية. يسلط المقال الذي كتبه أليكس تريلينسكي الضوء على كيفية قيام الباحثين بنسخ وتحليل أكثر من 1300 مخطوطة، وكشفوا عن عمل جديد للكاتب المسرحي من العصر الذهبي.
