    summary:
      es: "El diario malasio The Star reprodujo la noticia de Reuters sobre el hallazgo de La francesa Laura, una obra desconocida de Lope de Vega descubierta mediante inteligencia artificial en la Biblioteca Nacional de España. El artículo explica cómo los investigadores de las universidades de Viena y Valladolid transcribieron más de 1.300 manuscritos anónimos y confirmaron la autoría del dramaturgo mediante análisis filológicos, destacando la relevancia del hallazgo para los estudios del Siglo de Oro."
      en: "The Malaysian newspaper The Star reprinted Reuters’ report on the discovery of La Francesa Laura, a previously unknown play by Lope de Vega identified through artificial intelligence at Spain’s National Library. The article explains how researchers from the universities of Vienna and Valladolid transcribed over 1,300 anonymous manuscripts and confirmed the playwright’s authorship through philological analysis, emphasizing the importance of the find for Golden Age studies."


      fr: Le journal malaisien The Star a réimprimé le rapport de Reuters sur la découverte de La Francesa Laura, une pièce jusqu'alors inconnue de Lope de Vega identifiée grâce à l'intelligence artificielle à la Bibliothèque nationale d'Espagne. L’article explique comment des chercheurs des universités de Vienne et de Valladolid ont transcrit plus de 1 300 manuscrits anonymes et confirmé la paternité du dramaturge par une analyse philologique, soulignant l’importance de cette découverte pour les études sur l’âge d’or.
      pt: O jornal malaio The Star reimprimiu a reportagem da Reuters sobre a descoberta de La Francesa Laura, uma peça até então desconhecida de Lope de Vega identificada através de inteligência artificial na Biblioteca Nacional de Espanha. O artigo explica como pesquisadores das universidades de Viena e Valladolid transcreveram mais de 1.300 manuscritos anônimos e confirmaram a autoria do dramaturgo por meio de análise filológica, enfatizando a importância do achado para os estudos da Idade de Ouro.
      it: Il quotidiano malese The Star ha ripubblicato il rapporto della Reuters sulla scoperta di La Francesa Laura, un’opera precedentemente sconosciuta di Lope de Vega identificata attraverso l’intelligenza artificiale nella Biblioteca Nazionale spagnola. L’articolo spiega come i ricercatori delle università di Vienna e Valladolid hanno trascritto oltre 1.300 manoscritti anonimi e hanno confermato la paternità del drammaturgo attraverso l’analisi filologica, sottolineando l’importanza del ritrovamento per gli studi sull’Età dell’Oro.
      de: Die malaysische Zeitung The Star hat den Bericht von Reuters über die Entdeckung von La Francesa Laura, einem bisher unbekannten Stück von Lope de Vega, das durch künstliche Intelligenz in der spanischen Nationalbibliothek identifiziert wurde, nachgedruckt. Der Artikel erklärt, wie Forscher der Universitäten Wien und Valladolid über 1.300 anonyme Manuskripte transkribierten und die Urheberschaft des Dramatikers durch philologische Analysen bestätigten, wobei er die Bedeutung des Fundes für die Erforschung des Goldenen Zeitalters hervorhebt.
      zh: 马来西亚报纸《星报》转载了路透社关于发现《弗朗西斯·劳拉》的报道，该剧是西班牙国家图书馆通过人工智能识别出的洛佩·德·维加创作的一部此前不为人知的戏剧。文章解释了维也纳大学和巴利亚多利德大学的研究人员如何转录 1,300 多份匿名手稿，并通过语言学分析确认剧作家的作者身份，强调了这一发现对黄金时代研究的重要性。
      ja: マレーシアの新聞ザ・スターは、スペイン国立図書館で人工知能によって特定された、これまで知られていなかったロペ・デ・ベガの戯曲『ラ・フランセサ・ローラ』の発見に関するロイターの報道を転載した。この記事は、ウィーン大学とバリャドリード大学の研究者たちがどのようにして1,300以上の匿名原稿を転写し、文献学的分析を通じて劇作家の作者であることを確認したかを説明し、黄金時代研究にとってこの発見の重要性を強調している。
      ko: 말레이시아 신문 더 스타(The Star)는 스페인 국립도서관에서 인공지능을 통해 확인된 로페 데 베가의 이전에 알려지지 않은 희곡인 라 프란체사 라우라(La Francesa Laura)의 발견에 대한 로이터의 보도를 재인쇄했습니다. 이 기사는 비엔나 대학과 바야돌리드 대학의 연구자들이 어떻게 1,300개가 넘는 익명의 원고를 필사하고 문헌학적 분석을 통해 극작가의 저자임을 확인했는지 설명하며 황금기 연구에 대한 발견의 중요성을 강조합니다.
      ru: Малазийская газета The Star перепечатала сообщение агентства Reuters об обнаружении ранее неизвестной пьесы Лопе де Веги «Ла Франческа Лаура», идентифицированной с помощью искусственного интеллекта в Национальной библиотеке Испании. В статье рассказывается, как исследователи из университетов Вены и Вальядолида расшифровали более 1300 анонимных рукописей и подтвердили авторство драматурга посредством филологического анализа, подчеркивая важность находки для изучения Золотого века.
      ar: أعادت صحيفة "ذا ستار" الماليزية نشر تقرير رويترز عن اكتشاف "لا فرانشيسا لورا"، وهي مسرحية غير معروفة من قبل للوب دي فيجا تم التعرف عليها من خلال الذكاء الاصطناعي في المكتبة الوطنية الإسبانية. يشرح المقال كيف قام باحثون من جامعتي فيينا وبلد الوليد بنسخ أكثر من 1300 مخطوطة مجهولة المصدر وأكدوا تأليف الكاتب المسرحي من خلال التحليل اللغوي، مع التركيز على أهمية الاكتشاف لدراسات العصر الذهبي.
