      fr: Antonio Illan revient sur ABC la représentation de « La francesa Laura » au Teatro de Rojas de Tolède, mise en scène par Marta Poveda. L’article met en évidence l’équilibre entre la fidélité au texte de Lope et la sensibilité moderne, la performance d’ensemble de la distribution et la pertinence continue de la jalousie, de l’honneur et de la violence de genre dans la pièce.
      pt: Antonio Illán analisa na ABC a performance de 'La francesa Laura' no Teatro de Rojas de Toledo, dirigida por Marta Poveda. O artigo destaca o equilíbrio entre a fidelidade ao texto de Lope e a sensibilidade moderna, a atuação do elenco e a contínua relevância do ciúme, da honra e da violência de gênero na peça.
      it: Antonio Illán recensisce su ABC la rappresentazione di 'La francesa Laura' al Teatro de Rojas di Toledo, diretta da Marta Poveda. L’articolo evidenzia l’equilibrio tra fedeltà al testo di Lope e sensibilità moderna, la performance d’insieme del cast e la continua rilevanza della gelosia, dell’onore e della violenza di genere nello spettacolo.
      de: Antonio Illán rezensiert in ABC die Aufführung von „La francesa Laura“ im Teatro de Rojas in Toledo unter der Regie von Marta Poveda. Der Artikel beleuchtet das Gleichgewicht zwischen Lopes Texttreue und moderner Sensibilität, die Ensembleleistung der Besetzung und die anhaltende Relevanz von Eifersucht, Ehre und geschlechtsspezifischer Gewalt im Stück.
      zh: 安东尼奥·伊兰 (Antonio Illán) 在美国广播公司 (ABC) 上回顾了由玛尔塔·波韦达 (Marta Poveda) 执导的托莱多罗哈斯剧院 (Teatro de Rojas) 演出的《法国劳拉》(La francesa Laura)。文章强调了对洛普文本的忠实度和现代感性之间的平衡，演员们的整体表演，以及剧中嫉妒、荣誉和性别暴力的持续相关性。
      ja: アントニオ・イランがABCで、マルタ・ポヴェダ演出、トレドのロハス劇場での『ラ・フランセサ・ローラ』の公演を批評。この記事では、ロペのテキストへの忠実さと現代的な感性とのバランス、キャストのアンサンブルパフォーマンス、そして劇中における嫉妬、名誉、ジェンダー暴力の継続的な関連性に焦点を当てています。
      ko: Antonio Illán은 ABC에서 Marta Poveda가 감독한 톨레도 Teatro de Rojas의 'La francesa Laura' 공연을 리뷰합니다. 기사는 로페의 텍스트에 대한 충실도와 현대적 감성 사이의 균형, 출연진의 앙상블 공연, 극중 질투, 명예, 성폭력의 지속적인 관련성을 강조합니다.
      ru: Антонио Иллан делает рецензию на канале ABC о спектакле «Французская Лаура» в Театре Рохас в Толедо в постановке Марты Поведа. В статье подчеркивается баланс между верностью тексту Лопе и современной чувствительностью, игрой актерского ансамбля и сохраняющейся актуальностью ревности, чести и гендерного насилия в пьесе.
      ar: يستعرض أنطونيو إيلان على قناة ABC أداء "La francesa Laura" في مسرح تياترو دي روخاس في توليدو، من إخراج مارتا بوفيدا. يسلط المقال الضوء على التوازن بين الإخلاص لنص لوب والحساسية الحديثة، وأداء طاقم الممثلين، والأهمية المستمرة للغيرة والشرف والعنف الجنسي في المسرحية.
