      fr: Le Guardian a rapporté la découverte de La Francesa Laura, une pièce jusqu'alors inconnue de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article décrit comment les chercheurs Álvaro Cuéllar et Germán Vega, à l’aide de Transkribus et Stylo, ont attribué la comédie au dramaturge et ont discuté du potentiel de l’IA pour découvrir davantage d’œuvres perdues de l’âge d’or espagnol.
      pt: O Guardian noticiou a descoberta de La Francesa Laura, uma peça até então desconhecida de Lope de Vega identificada através de inteligência artificial. O artigo descreve como os pesquisadores Álvaro Cuéllar e Germán Vega, usando Transkribus e Stylo, atribuíram a comédia ao dramaturgo e discutiram o potencial da IA ​​para descobrir mais obras perdidas da Idade de Ouro da Espanha.
      it: Il Guardian ha riferito della scoperta di La Francesa Laura, un'opera precedentemente sconosciuta di Lope de Vega identificata tramite l'intelligenza artificiale. L’articolo descrive come i ricercatori Álvaro Cuéllar e Germán Vega, utilizzando Transkribus e Stylo, hanno attribuito la commedia al drammaturgo e hanno discusso il potenziale dell’intelligenza artificiale per scoprire altre opere perdute dell’età dell’oro della Spagna.
      de: Der Guardian berichtete über die Entdeckung von La Francesa Laura, einem bisher unbekannten Stück von Lope de Vega, das mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel beschreibt, wie die Forscher Álvaro Cuéllar und Germán Vega mithilfe von Transkribus und Stylo die Komödie dem Dramatiker zuschrieben und das Potenzial der KI diskutierten, weitere verlorene Werke aus dem Goldenen Zeitalter Spaniens aufzudecken.
      zh: 《卫报》报道了《La Francesa Laura》的发现，这是通过人工智能识别出的洛佩·德·维加 (Lope de Vega) 创作的一部此前不为人知的戏剧。文章介绍了研究人员 Álvaro Cuéllar 和 Germán Vega 如何使用 Transkribus 和 Stylo 将这部喜剧归因于剧作家，并讨论了人工智能发现更多西班牙黄金时代遗失作品的潜力。
      ja: ガーディアン紙は、人工知能によって特定された、これまで知られていなかったロペ・デ・ベガの戯曲『ラ・フランセサ・ローラ』の発見について報じた。この記事では、研究者のアルバロ・クエヤル氏とジェルマン・ベガ氏が、Transkribus 氏と Stylo 氏を利用して、このコメディを劇作家の作と特定し、失われたスペイン黄金時代の作品をさらに発見する AI の可能性について議論した方法について説明しています。
      ko: 가디언은 인공지능을 통해 확인된 로페 데 베가의 이전에 알려지지 않았던 희곡인 라 프란체사 로라(La Francesa Laura)의 발견에 대해 보도했습니다. 이 기사에서는 연구원 Álvaro Cuéllar와 Germán Vega가 Transkribus와 Stylo를 사용하여 이 코미디의 공로를 극작가에게 돌리고 스페인 황금기의 잃어버린 작품을 더 많이 발견할 수 있는 AI의 잠재력에 대해 논의한 방법을 설명합니다.
      ru: The Guardian сообщила об открытии ранее неизвестной пьесы Лопе де Веги «La Francesa Laura», идентифицированной с помощью искусственного интеллекта. В статье описывается, как исследователи Альваро Куэльяр и Херман Вега с помощью Transkribus и Stylo приписали комедию драматургу и обсудили потенциал ИИ в обнаружении большего количества утерянных произведений Золотого века Испании.
      ar: ذكرت صحيفة الغارديان عن اكتشاف لا فرانشيسا لورا، وهي مسرحية غير معروفة من قبل لوبي دي فيغا تم التعرف عليها من خلال الذكاء الاصطناعي. يصف المقال كيف نسب الباحثون ألفارو كويلار وجيرمان فيجا، باستخدام Transkribus وStylo، الكوميديا ​​إلى الكاتب المسرحي وناقشوا إمكانات الذكاء الاصطناعي في الكشف عن المزيد من الأعمال المفقودة من العصر الذهبي لإسبانيا.
