  - id: "press82"
    title:
      es: "El Museo Canario aborda el impacto de la inteligencia artificial en el patrimonio histórico"
      en: "El Museo Canario Addresses the Impact of Artificial Intelligence on Historical Heritage"
      fr: El Museo Canario aborde l'impact de l'intelligence artificielle sur le patrimoine historique
      pt: El Museo Canario aborda o impacto da inteligência artificial no patrimônio histórico
      it: El Museo Canario affronta l'impatto dell'intelligenza artificiale sul patrimonio storico
      de: El Museo Canario befasst sich mit den Auswirkungen künstlicher Intelligenz auf das historische Erbe
      zh: 卡纳里奥博物馆探讨人工智能对历史遗产的影响
      ja: El Museo Canario が歴史遺産に対する人工知能の影響に取り組む
      ko: El Museo Canario는 인공 지능이 역사적 유산에 미치는 영향을 다루고 있습니다.
      ru: El Museo Canario рассказывает о влиянии искусственного интеллекта на историческое наследие
      ar: El Museo Canario يتناول تأثير الذكاء الاصطناعي على التراث التاريخي
    outlet: "Libertad Digital Canarias"
    author: "Redacción Gran Canaria"
    date: "2026-06-08"
    url: "https://www.libertaddigital.com/canarias/2026-06-08/el-museo-canario-aborda-el-impacto-de-la-inteligencia-artificial-en-el-patrimonio-historico-7417145/"
    thumbnail: "/assets/images/press/82.png"
    type: "news"
    summary:
      es: "Libertad Digital informa sobre la inauguración de las III Jornadas de Patrimonio Documental de El Museo Canario, centradas en la aplicación de la inteligencia artificial y las nuevas tecnologías a la gestión de fondos históricos. La noticia destaca la conferencia inaugural de Álvaro Cuéllar González, «Patrimonio documental e inteligencia artificial: una mirada tecnoptimista», y el debate sobre transcripción automática, estilometría y digitalización de prensa histórica."
      en: "Libertad Digital reports on the opening of El Museo Canario's 3rd Documentary Heritage Conference, focused on the application of artificial intelligence and new technologies to the management of historical collections. The article highlights the opening lecture by Álvaro Cuéllar González, 'Documentary Heritage and Artificial Intelligence: A Techno-Optimistic View', and the discussion of automatic transcription, stylometry, and historical press digitization."


      fr: "Libertad Digital rapporte l'ouverture de la 3e Conférence sur le patrimoine documentaire du Musée Canario, axée sur l'application de l'intelligence artificielle et des nouvelles technologies à la gestion des collections historiques. L'article met en lumière la conférence d'ouverture d'Álvaro Cuéllar González, « Patrimoine documentaire et intelligence artificielle: une vision techno-optimiste », et la discussion sur la transcription automatique, la stylométrie et la numérisation de la presse historique."
      pt: "Libertad Digital informa sobre a abertura da 3ª Conferência do Patrimônio Documental do El Museo Canario, focada na aplicação de inteligência artificial e novas tecnologias à gestão de coleções históricas. O artigo destaca a palestra de abertura de Álvaro Cuéllar González, 'Patrimônio Documental e Inteligência Artificial: Uma Visão Tecno-Otimista', e a discussão sobre transcrição automática, estilometria e digitalização histórica da imprensa."
      it: "Libertad Digital riferisce dell'apertura della terza Conferenza sul Patrimonio Documentario del Museo Canario, incentrata sull'applicazione dell'intelligenza artificiale e delle nuove tecnologie alla gestione delle collezioni storiche. L'articolo mette in evidenza la conferenza di apertura di Álvaro Cuéllar González, \"Patrimonio documentario e intelligenza artificiale: una visione tecno-ottimistica\", e la discussione sulla trascrizione automatica, sulla stilometria e sulla digitalizzazione della stampa storica."
      de: 'Libertad Digital berichtet über die Eröffnung der 3. Documentary Heritage Conference des El Museo Canario, die sich auf die Anwendung künstlicher Intelligenz und neuer Technologien bei der Verwaltung historischer Sammlungen konzentriert. Der Artikel beleuchtet den Eröffnungsvortrag von Álvaro Cuéllar González, „Dokumentarisches Erbe und künstliche Intelligenz: Eine technologisch-optimistische Sichtweise“, und die Diskussion über automatische Transkription, Stilometrie und die Digitalisierung historischer Presse.'
      zh: Libertad Digital 报道了卡纳里奥博物馆第三届文献遗产会议的开幕，会议重点讨论了人工智能和新技术在历史藏品管理中的应用。本文重点介绍了阿尔瓦罗·奎利亚尔·冈萨雷斯 (Álvaro Cuéllar González) 的开幕演讲“纪录片遗产与人工智能：技术乐观主义观点”，以及对自动转录、文体测量和历史新闻数字化的讨论。
      ja: Libertad Digital は、歴史的コレクションの管理への人工知能と新技術の応用に焦点を当てたエル・ムセオ・カナリオの第 3 回ドキュメンタリー遺産カンファレンスの開催について報じています。この記事では、アルバロ・クエヤル・ゴンサレス氏による「ドキュメンタリーの遺産と人工知能：テクノ楽観的な見方」という冒頭の講演と、自動転写、スタイロメトリー、歴史的報道のデジタル化についての議論が取り上げられています。
      ko: "Libertad Digital은 역사 컬렉션 관리에 인공 지능과 신기술을 적용하는 데 초점을 맞춘 El Museo Canario의 제3회 다큐멘터리 유산 컨퍼런스 개막에 대해 보고합니다. 이 기사에서는 Álvaro Cuéllar González의 '다큐멘터리 유산과 인공 지능: 기술 낙관적 관점'의 개회 강연과 자동 전사, 문체 측정 및 역사적 언론 디지털화에 대한 논의를 강조합니다."
      ru: 'Libertad Digital сообщает об открытии 3-й конференции по документальному наследию El Museo Canario, посвященной применению искусственного интеллекта и новых технологий для управления историческими коллекциями. В статье освещается вступительная лекция Альваро Куэльяра Гонсалеса «Документальное наследие и искусственный интеллект: технооптимистический взгляд», а также обсуждение автоматической транскрипции, стилометрии и оцифровки исторической прессы.'
      ar: 'تقارير Libertad Digital عن افتتاح مؤتمر El Museo Canario الثالث للتراث الوثائقي، والذي يركز على تطبيق الذكاء الاصطناعي والتقنيات الجديدة لإدارة المجموعات التاريخية. يسلط المقال الضوء على المحاضرة الافتتاحية التي ألقاها ألفارو كويلار غونزاليس، "التراث الوثائقي والذكاء الاصطناعي: رؤية تكنولوجية متفائلة"، ومناقشة النسخ الآلي، وقياس الأسلوب، ورقمنة الصحافة التاريخية.'
