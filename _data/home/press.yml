    thumbnail: "/assets/images/press/70.png"
    type: "press"
    summary:
      es: "El prestigioso diario británico The Times informó sobre el hallazgo de La francesa Laura, una comedia perdida de Lope de Vega identificada mediante inteligencia artificial. El artículo explica cómo los investigadores Álvaro Cuéllar y Germán Vega, a través del proyecto ETSO, emplearon herramientas de aprendizaje automático y análisis estilométrico para atribuir la obra al dramaturgo del Siglo de Oro, destacando el papel de la Biblioteca Nacional de España y la colaboración internacional en este descubrimiento."
      en: "The prestigious British newspaper The Times reported on the discovery of La Francesa Laura, a lost comedy by Lope de Vega identified through artificial intelligence. The article explains how researchers Álvaro Cuéllar and Germán Vega, through the ETSO project, used machine-learning and stylometric analysis tools to attribute the play to the Golden Age dramatist, highlighting the role of Spain’s National Library and international collaboration in this discovery."



      fr: Le prestigieux journal britannique The Times a fait état de la découverte de La Francesa Laura, une comédie perdue de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique comment les chercheurs Álvaro Cuéllar et Germán Vega, à travers le projet ETSO, ont utilisé des outils d’apprentissage automatique et d’analyse stylométrique pour attribuer la pièce au dramaturge de l’âge d’or, en soulignant le rôle de la Bibliothèque nationale espagnole et de la collaboration internationale dans cette découverte.
      pt: O prestigiado jornal britânico The Times noticiou a descoberta de La Francesa Laura, comédia perdida de Lope de Vega identificada através de inteligência artificial. O artigo explica como os investigadores Álvaro Cuéllar e Germán Vega, através do projeto ETSO, utilizaram ferramentas de aprendizagem automática e de análise estilométrica para atribuir a peça ao dramaturgo da Idade de Ouro, destacando o papel da Biblioteca Nacional de Espanha e da colaboração internacional nesta descoberta.
      it: Il prestigioso quotidiano britannico The Times ha riferito della scoperta de La Francesa Laura, una commedia perduta di Lope de Vega identificata attraverso l'intelligenza artificiale. L’articolo spiega come i ricercatori Álvaro Cuéllar e Germán Vega, attraverso il progetto ETSO, hanno utilizzato strumenti di apprendimento automatico e di analisi stilometrica per attribuire l’opera al drammaturgo dell’Età dell’Oro, evidenziando il ruolo della Biblioteca nazionale spagnola e della collaborazione internazionale in questa scoperta.
      de: Die renommierte britische Zeitung The Times berichtete über die Entdeckung von La Francesa Laura, einer verlorenen Komödie von Lope de Vega, die mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel erklärt, wie die Forscher Álvaro Cuéllar und Germán Vega im Rahmen des ETSO-Projekts maschinelles Lernen und stilometrische Analysewerkzeuge nutzten, um das Stück dem Dramatiker des Goldenen Zeitalters zuzuordnen, und hebt die Rolle der spanischen Nationalbibliothek und der internationalen Zusammenarbeit bei dieser Entdeckung hervor.
      zh: 英国著名报纸《泰晤士报》报道了洛普·德·维加通过人工智能识别出的一部失落喜剧《弗朗西斯·劳拉》的发现。文章解释了研究人员 Álvaro Cuéllar 和 Germán Vega 如何通过 ETSO 项目，使用机器学习和文体分析工具将该剧归因于黄金时代剧作家，并强调了西班牙国家图书馆和国际合作在这一发现中的作用。
      ja: 英国の権威ある新聞タイムズは、人工知能によって特定されたロペ・デ・ベガの失われたコメディ「ラ・フランセサ・ローラ」の発見について報じた。この記事では、研究者のアルバロ・クエヤル氏とジェルマン・ベガ氏がETSOプロジェクトを通じて、機械学習とスタイロメトリー分析ツールをどのように使用して、この劇を黄金時代の劇作家によるものと特定したかについて説明し、この発見におけるスペイン国立図書館と国際協力の役割を強調しています。
      ko: 영국의 명문지 더 타임스는 인공지능을 통해 확인된 로페 데 베가의 잃어버린 코미디 '라 프란체사 로라'의 발견을 보도했다. 이 기사에서는 연구원인 Álvaro Cuéllar와 Germán Vega가 ETSO 프로젝트를 통해 기계 학습 및 문체 분석 도구를 사용하여 이 극을 황금 시대 극작가의 작품으로 간주하고 이 발견에 대한 스페인 국립 도서관의 역할과 국제 협력을 강조한 방법을 설명합니다.
      ru: Престижная британская газета The Times сообщила об открытии «Франсезы Лауры», утраченной комедии Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье объясняется, как исследователи Альваро Куэльяр и Херман Вега в рамках проекта ETSO использовали инструменты машинного обучения и стилометрического анализа, чтобы приписать пьесу драматургу Золотого века, подчеркивая роль Национальной библиотеки Испании и международного сотрудничества в этом открытии.
      ar: أفادت صحيفة التايمز البريطانية المرموقة عن اكتشاف فيلم La Francesa Laura، وهو فيلم كوميدي مفقود من تأليف Lope de Vega تم التعرف عليه من خلال الذكاء الاصطناعي. يشرح المقال كيف استخدم الباحثان ألفارو كويلار وجيرمان فيجا، من خلال مشروع ETSO، أدوات التعلم الآلي والتحليل الأسلوبي لإسناد المسرحية إلى كاتب مسرحي من العصر الذهبي، مع تسليط الضوء على دور المكتبة الوطنية الإسبانية والتعاون الدولي في هذا الاكتشاف.
