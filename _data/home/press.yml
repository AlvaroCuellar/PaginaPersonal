      en: "The US technology magazine PCMag published an article by Marco Marcelline about the discovery of La Francesa Laura, a previously unknown play by Lope de Vega identified through artificial intelligence. Drawing on reporting from The Guardian, the piece explains how researchers Álvaro Cuéllar and Germán Vega used Transkribus and Stylo within the ETSO project to attribute the comedy to the playwright, highlighting AI’s potential to solve authorship problems in Spain’s Golden Age theatre."



      fr: Le magazine technologique américain PCMag a publié un article de Marco Marcelline sur la découverte de La Francesa Laura, une pièce jusqu'alors inconnue de Lope de Vega identifiée grâce à l'intelligence artificielle. S'appuyant sur des reportages du Guardian, l'article explique comment les chercheurs Álvaro Cuéllar et Germán Vega ont utilisé Transkribus et Stylo dans le cadre du projet ETSO pour attribuer la comédie au dramaturge, soulignant ainsi le potentiel de l'IA pour résoudre les problèmes de paternité dans le théâtre de l'âge d'or espagnol.
      pt: A revista de tecnologia norte-americana Garon publicou artigo de Marco Marcelline sobre a descoberta de La Francesa Laura, peça até então desconhecida de Lope de Vega identificada por meio de inteligência artificial. Com base em reportagens do The Guardian, o artigo explica como os investigadores Álvaro Cuéllar e Germán Vega utilizaram Transkribus e Stylo no âmbito do projeto ETSO para atribuir a comédia ao dramaturgo, destacando o potencial da IA ​​para resolver problemas de autoria no teatro da Idade de Ouro de Espanha.
      it: La rivista tecnologica statunitense PCMag ha pubblicato un articolo di Marco Marcelline sulla scoperta de La Francesa Laura, un'opera teatrale precedentemente sconosciuta di Lope de Vega identificata attraverso l'intelligenza artificiale. Basandosi su un resoconto di The Guardian, l’articolo spiega come i ricercatori Álvaro Cuéllar e Germán Vega hanno utilizzato Transkribus e Stylo nell’ambito del progetto ETSO per attribuire la commedia al drammaturgo, evidenziando il potenziale dell’intelligenza artificiale per risolvere i problemi di paternità nel teatro spagnolo dell’età dell’oro.
      de: Das US-amerikanische Technologiemagazin PCMag veröffentlichte einen Artikel von Marco Marcelline über die Entdeckung von La Francesa Laura, einem bisher unbekannten Stück von Lope de Vega, das durch künstliche Intelligenz identifiziert wurde. Basierend auf Berichten von The Guardian erklärt der Artikel, wie die Forscher Álvaro Cuéllar und Germán Vega im Rahmen des ETSO-Projekts Transkribus und Stylo nutzten, um die Komödie dem Dramatiker zuzuordnen, und hebt das Potenzial von KI hervor, Autorenprobleme im spanischen Theater des Goldenen Zeitalters zu lösen.
      zh: 美国科技杂志 PCMag 发表了 Marco Marcelline 的一篇文章，内容涉及《La Francesa Laura》的发现，这是通过人工智能识别出的洛佩·德·维加 (Lope de Vega) 创作的一部此前不为人知的戏剧。这篇文章借鉴了《卫报》的报道，解释了研究人员 Álvaro Cuéllar 和 Germán Vega 如何在 ETSO 项目中使用 Transkribus 和 Stylo 将这部喜剧归因于剧作家，强调了人工智能解决西班牙黄金时代剧院的作者问题的潜力。
      ja: 米国のテクノロジー雑誌 PCMag は、人工知能によって特定された、これまで知られていなかったロペ・デ・ベガの戯曲「ラ・フランセサ・ローラ」の発見に関するマルコ・マルセリン氏の記事を掲載しました。この記事はガーディアン紙の報道を基に、研究者のアルバロ・クエヤル氏とゲルマン・ベガ氏がETSOプロジェクト内でどのようにTranskribusとStyloを使用してコメディを劇作家の仕業とするかを説明し、スペインの黄金時代の劇場における原作者の問題をAIが解決する可能性を強調している。
      ko: 미국 기술 잡지 PCMag는 인공지능을 통해 확인된 로페 데 베가의 이전에 알려지지 않았던 희곡인 라 프란체사 로라(La Francesa Laura)의 발견에 대한 마르코 마르셀린(Marco Marcelline)의 기사를 게재했습니다. The Guardian의 보도를 바탕으로 이 작품은 연구원 Álvaro Cuéllar와 Germán Vega가 어떻게 ETSO 프로젝트 내에서 Transkribus와 Stylo를 사용하여 코미디를 극작가에게 귀속시켰는지 설명하고 스페인 황금기 극장의 작가 문제를 해결할 수 있는 AI의 잠재력을 강조했습니다.
      ru: Американский технологический журнал PCMag опубликовал статью Марко Марселина об открытии La Francesa Laura, ранее неизвестной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. Опираясь на репортаж The Guardian, в статье объясняется, как исследователи Альваро Куэльяр и Херман Вега использовали Transkribus и Stylo в рамках проекта ETSO, чтобы приписать комедию драматургу, подчеркивая потенциал ИИ для решения проблем авторства в театре Золотого века Испании.
      ar: نشرت مجلة التكنولوجيا الأمريكية PCMag مقالاً بقلم ماركو مارسيلين حول اكتشاف La Francesa Laura، وهي مسرحية لم تكن معروفة سابقًا من تأليف Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. بالاعتماد على تقارير صحيفة الغارديان، يشرح المقال كيف استخدم الباحثان ألفارو كويلار وجيرمان فيجا Transkribus وStylo ضمن مشروع ETSO لإسناد الكوميديا ​​إلى الكاتب المسرحي، وتسليط الضوء على إمكانات الذكاء الاصطناعي في حل مشاكل التأليف في مسرح العصر الذهبي في إسبانيا.
  - id: "press49"
    title:
      es: "AI identifies 16th century lost work by Spanish Golden Age author"
      en: "AI identifies 16th century lost work by Spanish Golden Age author"
      fr: L'IA identifie une œuvre perdue du XVIe siècle d'un auteur espagnol du Siècle d'or
      pt: AI identifica obra perdida do século 16 do autor espanhol da Idade de Ouro
      it: L'intelligenza artificiale identifica l'opera perduta del XVI secolo dell'autore spagnolo del Secolo d'oro
      de: KI identifiziert verlorenes Werk des spanischen Autors des Goldenen Zeitalters aus dem 16. Jahrhundert
      zh: 人工智能识别出西班牙黄金时代作家遗失的 16 世纪作品
      ja: スペイン黄金時代の作家による失われた16世紀の作品をAIが特定
      ko: AI, 스페인 황금시대 작가의 16세기 잃어버린 작품 식별
      ru: ИИ идентифицировал утраченную работу испанского автора Золотого века XVI века
      ar: الذكاء الاصطناعي يحدد العمل المفقود لمؤلف العصر الذهبي الإسباني في القرن السادس عشر
    outlet: "TechCircle"
    author: "Shraddha Goled"
    date: "2023-02-06"
    url: "https://www.techcircle.in/2023/02/06/a-16-century-lost-work-by-spain-s-golden-age-author-identified-by-ai"
    thumbnail: "/assets/images/press/49.png"
    type: "press"
    summary:
      es: "El medio tecnológico indio TechCircle, perteneciente al grupo HT Media Limited, informó sobre el descubrimiento de La francesa Laura, una obra inédita de Lope de Vega identificada mediante inteligencia artificial. El artículo explica cómo el proyecto ETSO, dirigido por Álvaro Cuéllar y Germán Vega, utilizó la herramienta Transkribus para transcribir 1.300 manuscritos anónimos y compararlos con un corpus de 350 autores del Siglo de Oro, confirmando la autoría de Lope. La nota destaca la relevancia del hallazgo para la aplicación del aprendizaje automático en la investigación literaria histórica."
      en: "The Indian technology outlet TechCircle, part of the HT Media Limited group, reported on the discovery of La Francesa Laura, an unpublished play by Lope de Vega identified through artificial intelligence. The article describes how the ETSO project, led by Álvaro Cuéllar and Germán Vega, used the Transkribus platform to transcribe 1,300 anonymous manuscripts and compare them with a corpus of 350 Golden Age authors, confirming Lope’s authorship. The piece highlights the significance of the find for the application of machine learning in historical literary research."


      fr: Le média technologique indien TechCircle, qui fait partie du groupe HT Media Limited, a fait état de la découverte de La Francesa Laura, une pièce inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article décrit comment le projet ETSO, dirigé par Álvaro Cuéllar et Germán Vega, a utilisé la plateforme Transkribus pour transcrire 1 300 manuscrits anonymes et les comparer avec un corpus de 350 auteurs de l’âge d’or, confirmant ainsi la paternité de Lope. L’article souligne l’importance de cette découverte pour l’application de l’apprentissage automatique dans la recherche littéraire historique.
      pt: O meio de tecnologia indiano TechCircle, do grupo HT Media Limited, noticiou a descoberta de La Francesa Laura, peça inédita de Lope de Vega identificada por meio de inteligência artificial. O artigo descreve como o projeto ETSO, liderado por Álvaro Cuéllar e Germán Vega, utilizou a plataforma Transkribus para transcrever 1.300 manuscritos anônimos e compará-los com um corpus de 350 autores da Idade de Ouro, confirmando a autoria de Lope. A peça destaca a importância da descoberta para a aplicação do aprendizado de máquina na pesquisa literária histórica.
      it: La testata tecnologica indiana TechCircle, parte del gruppo HT Media Limited, ha riferito della scoperta di La Francesa Laura, un'opera inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. L’articolo descrive come il progetto ETSO, guidato da Álvaro Cuéllar e Germán Vega, ha utilizzato la piattaforma Transkribus per trascrivere 1.300 manoscritti anonimi e confrontarli con un corpus di 350 autori dell’Età dell’Oro, confermando la paternità di Lope. Il pezzo evidenzia l’importanza del ritrovamento per l’applicazione dell’apprendimento automatico nella ricerca storico-letteraria.
      de: Das indische Technologieunternehmen TechCircle, Teil der HT Media Limited-Gruppe, berichtete über die Entdeckung von La Francesa Laura, einem unveröffentlichten Stück von Lope de Vega, das mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel beschreibt, wie das ETSO-Projekt unter der Leitung von Álvaro Cuéllar und Germán Vega die Transkribus-Plattform nutzte, um 1.300 anonyme Manuskripte zu transkribieren und sie mit einem Korpus von 350 Autoren des Goldenen Zeitalters zu vergleichen, was Lopes Urheberschaft bestätigte. Das Stück unterstreicht die Bedeutung des Fundes für die Anwendung maschinellen Lernens in der historischen Literaturforschung.
      zh: HT Media Limited 集团旗下的印度科技媒体 TechCircle 报道了通过人工智能识别出的洛佩·德·维加 (Lope de Vega) 未出版的戏剧《La Francesa Laura》的发现情况。文章介绍了由 Álvaro Cuéllar 和 Germán Vega 领导的 ETSO 项目如何使用 Transkribus 平台转录 1,300 份匿名手稿，并将其与 350 名黄金时代作者的语料库进行比较，从而确认洛普的作者身份。这篇文章强调了这一发现对于机器学习在历史文学研究中应用的意义。
      ja: インドのテクノロジーアウトレット TechCircle (HT Media Limited グループの一部) は、人工知能によって特定されたロペ・デ・ベガの未発表戯曲『ラ・フランセサ・ローラ』の発見について報じた。この記事では、アルバロ・クエヤル氏とゲルマン・ベガ氏が率いるETSOプロジェクトが、Transkribusプラットフォームを使用して1,300件の匿名原稿を転写し、黄金時代の著者350人のコーパスと比較して、ロペ氏の著者であることを確認した方法について説明しています。この作品は、歴史文学研究における機械学習の応用における発見の重要性を強調しています。
      ko: HT Media Limited 그룹의 일부인 인도 기술 아웃렛 TechCircle은 인공 지능을 통해 식별된 Lope de Vega의 미출판 희곡인 La Francesa Laura의 발견에 대해 보도했습니다. 이 기사에서는 Álvaro Cuéllar와 Germán Vega가 이끄는 ETSO 프로젝트가 Transkribus 플랫폼을 사용하여 1,300개의 익명 원고를 복사하고 이를 황금기 저자 350명의 코퍼스와 비교하여 Lope의 저자임을 확인하는 방법을 설명합니다. 이 작품은 역사 ​​문학 연구에서 기계 학습을 적용하기 위한 발견의 중요성을 강조합니다.
      ru: Индийское технологическое издание TechCircle, входящее в группу HT Media Limited, сообщило об открытии «La Francesa Laura», неопубликованной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье описывается, как проект ETSO, возглавляемый Альваро Куэльяром и Херманом Вега, использовал платформу Transkribus для расшифровки 1300 анонимных рукописей и сравнения их с корпусом 350 авторов Золотого века, подтвердив авторство Лопе. В статье подчеркивается значение находки для применения машинного обучения в исторических литературных исследованиях.
      ar: أفاد منفذ التكنولوجيا الهندي TechCircle، وهو جزء من مجموعة HT Media Limited، عن اكتشاف La Francesa Laura، وهي مسرحية غير منشورة من تأليف Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. يصف المقال كيف استخدم مشروع ETSO، بقيادة ألفارو كويلار وجيرمان فيجا، منصة Transkribus لنسخ 1300 مخطوطة مجهولة المصدر ومقارنتها بمجموعة مكونة من 350 مؤلفًا من العصر الذهبي، مما يؤكد تأليف لوبي. يسلط المقال الضوء على أهمية الاكتشاف لتطبيق التعلم الآلي في البحث الأدبي التاريخي.
