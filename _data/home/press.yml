    outlet: "Época Negócios (Brasil)"
    author: "Agência Reuters"
    date: "2023-01-31"
    url: "https://epocanegocios.globo.com/tecnologia/noticia/2023/01/inteligencia-artificial-revela-peca-desconhecida-de-autor-espanhol-em-biblioteca.ghtml"
    thumbnail: "/assets/images/press/78.png"
    type: "press"
    summary:
      es: "El medio brasileño Época Negócios, del grupo Globo, informó sobre el hallazgo de La francesa Laura, una comedia anónima de Lope de Vega descubierta mediante inteligencia artificial. El artículo, basado en una nota de Reuters, detalla que investigadores de la Biblioteca Nacional de España emplearon IA para transcribir manuscritos del Siglo de Oro, confirmando la autoría del dramaturgo tras cotejar el estilo y vocabulario con más de 350 autores contemporáneos."
      en: "The Brazilian outlet Época Negócios, part of the Globo media group, reported on the discovery of La Francesa Laura, an anonymous comedy by Lope de Vega identified through artificial intelligence. The article, based on a Reuters report, explains that researchers from Spain’s National Library used AI to transcribe Golden Age manuscripts, confirming the playwright’s authorship by comparing style and vocabulary with over 350 contemporaneous authors."

      fr: Le média brésilien Época Negócios, qui fait partie du groupe de médias Globo, a fait état de la découverte de La Francesa Laura, une comédie anonyme de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article, basé sur un rapport de Reuters, explique que des chercheurs de la Bibliothèque nationale espagnole ont utilisé l’IA pour transcrire des manuscrits de l’âge d’or, confirmant ainsi la paternité du dramaturge en comparant le style et le vocabulaire avec ceux de plus de 350 auteurs contemporains.
      pt: O veículo brasileiro Época Negócios, do grupo de mídia Globo, noticiou a descoberta de La Francesa Laura, comédia anônima de Lope de Vega identificada por meio de inteligência artificial. O artigo, baseado num relatório da Reuters, explica que investigadores da Biblioteca Nacional de Espanha usaram IA para transcrever manuscritos da Idade de Ouro, confirmando a autoria do dramaturgo ao comparar estilo e vocabulário com mais de 350 autores contemporâneos.
      it: La testata brasiliana Época Negócios, parte del gruppo mediatico Globo, ha riferito della scoperta di La Francesa Laura, una commedia anonima di Lope de Vega identificata attraverso l'intelligenza artificiale. L’articolo, basato su un rapporto Reuters, spiega che i ricercatori della Biblioteca nazionale spagnola hanno utilizzato l’intelligenza artificiale per trascrivere manoscritti dell’Età dell’oro, confermando la paternità del drammaturgo confrontando stile e vocabolario con oltre 350 autori contemporanei.
      de: Der brasilianische Sender Época Negócios, Teil der Globo-Mediengruppe, berichtete über die Entdeckung von La Francesa Laura, einer anonymen Komödie von Lope de Vega, die durch künstliche Intelligenz identifiziert wurde. Der auf einem Reuters-Bericht basierende Artikel erklärt, dass Forscher der spanischen Nationalbibliothek KI zur Transkription von Manuskripten aus dem Goldenen Zeitalter eingesetzt haben, und bestätigte die Autorschaft des Dramatikers durch den Vergleich von Stil und Wortschatz mit über 350 zeitgenössischen Autoren.
      zh: Globo 媒体集团旗下的巴西媒体《Época Negócios》报道了《La Francesa Laura》的发现，这是一部由洛普·德·维加 (Lope de Vega) 通过人工智能识别的匿名喜剧。这篇基于路透社报道的文章解释说，西班牙国家图书馆的研究人员使用人工智能转录黄金时代手稿，通过与 350 多名同时代作家的风格和词汇进行比较，确认了剧作家的作者身份。
      ja: グロボメディアグループのブラジルの報道機関エポカ・ネゴシオスは、人工知能によって特定されたロペ・デ・ベガの匿名コメディ「ラ・フランセサ・ローラ」の発見について報じた。この記事はロイターの報道に基づいており、スペイン国立図書館の研究者らがAIを利用して黄金時代の写本を転写し、350人以上の同時代の作家と文体や語彙を比較することで劇作家の作者であることを確認したと説明している。
      ko: Globo 미디어 그룹의 일부인 브라질 매체 Época Negócios는 인공 지능을 통해 식별된 Lope de Vega의 익명 코미디인 La Francesa Laura의 발견에 대해 보도했습니다. 로이터 보고서를 기반으로 한 이 기사에서는 스페인 국립도서관의 연구원들이 AI를 사용하여 황금기 원고를 필사했으며, 350명이 넘는 동시대 작가들과 문체와 어휘를 비교하여 극작가의 저자임을 확인했다고 설명합니다.
      ru: Бразильское издание Época Negócios, входящее в медиа-группу Globo, сообщило об открытии La Francesa Laura, анонимной комедии Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье, основанной на отчете Reuters, объясняется, что исследователи из Национальной библиотеки Испании использовали искусственный интеллект для расшифровки рукописей Золотого века, подтвердив авторство драматурга путем сравнения стиля и словарного запаса с более чем 350 авторами того времени.
      ar: أفاد المنفذ البرازيلي Época Negócios، وهو جزء من مجموعة Globo الإعلامية، عن اكتشاف La Francesa Laura، وهي كوميديا ​​مجهولة المصدر من تأليف Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. يوضح المقال، المستند إلى تقرير لرويترز، أن باحثين من المكتبة الوطنية الإسبانية استخدموا الذكاء الاصطناعي لتدوين مخطوطات العصر الذهبي، مما يؤكد تأليف الكاتب المسرحي من خلال مقارنة الأسلوب والمفردات مع أكثر من 350 مؤلفًا معاصرًا.
