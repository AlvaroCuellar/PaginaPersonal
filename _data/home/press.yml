      en: "RTVE’s Telediario 1 reports on the discovery of 'La Francesa Laura', a comedy by Lope de Vega identified through artificial intelligence at the Spanish National Library. The finding, led by researchers from the Universities of Valladolid and Vienna, adds a new piece to the prolific repertoire of the Phoenix of Wits."






      fr: Le Telediario 1 de RTVE rapporte la découverte de « La Francesa Laura », une comédie de Lope de Vega identifiée grâce à l'intelligence artificielle à la Bibliothèque nationale espagnole. La découverte, menée par des chercheurs des universités de Valladolid et de Vienne, ajoute une nouvelle pièce au répertoire prolifique du Phénix de l'esprit.
      pt: O Telediario 1 da RTVE relata a descoberta de 'La Francesa Laura', comédia de Lope de Vega identificada através de inteligência artificial na Biblioteca Nacional Espanhola. A descoberta, liderada por investigadores das Universidades de Valladolid e Viena, acrescenta uma nova peça ao prolífico repertório da Fênix da Razão.
      it: Telediario 1 di RTVE riporta la scoperta di "La Francesa Laura", una commedia di Lope de Vega identificata attraverso l'intelligenza artificiale presso la Biblioteca Nazionale Spagnola. La scoperta, condotta da ricercatori delle Università di Valladolid e Vienna, aggiunge un nuovo tassello al prolifico repertorio della Fenice dell'Ingegno.
      de: Telediario 1 von RTVE berichtet über die Entdeckung von „La Francesa Laura“, einer Komödie von Lope de Vega, die mithilfe künstlicher Intelligenz in der spanischen Nationalbibliothek identifiziert wurde. Die von Forschern der Universitäten Valladolid und Wien durchgeführte Entdeckung erweitert das umfangreiche Repertoire des Phoenix of Wits um ein neues Stück.
      zh: RTVE 的 Telediario 1 报道了西班牙国家图书馆通过人工智能识别出洛佩·德·维加创作的一部喜剧《La Francesa Laura》的情况。这项发现是由巴利亚多利德大学和维也纳大学的研究人员领导的，为智慧凤凰的多产曲目增添了新的作品。
      ja: RTVE の Telediario 1 は、スペイン国立図書館で人工知能によって特定されたロペ・デ・ベガのコメディー「La Francesa Laura」の発見について報告しています。バリャドリード大学とウィーン大学の研究者らが主導したこの発見は、「機知の火の鳥」の豊富なレパートリーに新たな作品を加えるものだ。
      ko: RTVE의 Telediario 1은 스페인 국립 도서관에서 인공 지능을 통해 식별된 Lope de Vega의 코미디 'La Francesa Laura'의 발견에 대해 보도합니다. 바야돌리드 대학과 비엔나 대학의 연구자들이 주도한 이번 발견은 재치의 불사조(Phoenix of Wits)의 다작 레퍼토리에 새로운 작품을 추가했습니다.
      ru: Теледиарио 1 RTVE сообщает об открытии комедии Лопе де Веги «La Francesa Laura», идентифицированной с помощью искусственного интеллекта в Национальной библиотеке Испании. Открытие, сделанное исследователями из университетов Вальядолида и Вены, добавляет новую пьесу в богатый репертуар Феникса Остроумия.
      ar: تقرير Telediario 1 على قناة RTVE عن اكتشاف "La Francesa Laura"، وهو فيلم كوميدي من تأليف Lope de Vega تم التعرف عليه من خلال الذكاء الاصطناعي في المكتبة الوطنية الإسبانية. يضيف هذا الاكتشاف، الذي قاده باحثون من جامعتي بلد الوليد وفيينا، قطعة جديدة إلى الذخيرة الغزيرة من فينيكس أوف ويتس.
