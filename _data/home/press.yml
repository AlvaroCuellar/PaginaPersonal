    summary:
      es: "El programa laSexta Columna dedica un reportaje al hallazgo de La francesa Laura, la obra inédita de Lope de Vega identificada mediante inteligencia artificial. Álvaro Cuéllar y Germán Vega explican cómo la IA permitió comparar miles de manuscritos y confirmar la autoría del dramaturgo, en un proceso que combinó tecnología y filología tradicional."
      en: "The television program laSexta Columna features a report on the discovery of La francesa Laura, the unpublished play by Lope de Vega identified through artificial intelligence. Álvaro Cuéllar and Germán Vega explain how AI enabled the comparison of thousands of manuscripts and confirmed the playwright’s authorship, merging technology with traditional philology."


      fr: L'émission télévisée laSexta Columna présente un reportage sur la découverte de La francesa Laura, la pièce inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. Álvaro Cuéllar et Germán Vega expliquent comment l’IA a permis de comparer des milliers de manuscrits et de confirmer la paternité du dramaturge, en fusionnant la technologie avec la philologie traditionnelle.
      pt: O programa de televisão laSexta Columna traz uma reportagem sobre a descoberta de La francesa Laura, peça inédita de Lope de Vega identificada por meio de inteligência artificial. Álvaro Cuéllar e Germán Vega explicam como a IA permitiu a comparação de milhares de manuscritos e confirmou a autoria do dramaturgo, fundindo a tecnologia com a filologia tradicional.
      it: Nel programma televisivo laSexta Columna si racconta il ritrovamento de La francesa Laura, l'opera inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. Álvaro Cuéllar e Germán Vega spiegano come l'intelligenza artificiale abbia consentito il confronto di migliaia di manoscritti e confermato la paternità del drammaturgo, fondendo la tecnologia con la filologia tradizionale.
      de: Die Fernsehsendung laSexta Columna berichtet über die Entdeckung von La francesa Laura, dem unveröffentlichten Stück von Lope de Vega, das durch künstliche Intelligenz identifiziert wurde. Álvaro Cuéllar und Germán Vega erklären, wie KI den Vergleich Tausender Manuskripte ermöglichte und die Urheberschaft des Dramatikers bestätigte, indem sie Technologie mit traditioneller Philologie verschmolz.
      zh: 电视节目《laSexta Columna》报道了《La francesa Laura》的发现，这是通过人工智能识别出的洛佩·德·维加未出版的戏剧。 Álvaro Cuéllar 和 Germán Vega 解释了人工智能如何将技术与传统语言学相结合，对数千份手稿进行比较并确认剧作家的作者身份。
      ja: テレビ番組「laSexta Columna」は、人工知能によって特定されたロペ・デ・ベガの未発表戯曲「ラ・フランセサ・ラウラ」の発見に関するレポートを特集しています。アルバロ・クエヤルとジェルマン・ベガは、テクノロジーと伝統的な文献学を融合させて、AI がどのようにして何千もの写本の比較を可能にし、劇作家の作者であることを確認したのかを説明します。
      ko: 텔레비전 프로그램 laSexta Columna에서는 인공 지능을 통해 확인된 Lope de Vega의 미출판 희곡인 La francesa Laura의 발견에 대한 보고서를 제공합니다. Álvaro Cuéllar와 Germán Vega는 AI가 어떻게 수천 개의 원고를 비교하고 극작가의 저자임을 확인하고 기술과 전통 문헌학을 결합했는지 설명합니다.
      ru: Телевизионная программа laSexta Columna представляет репортаж об открытии «Французской Лауры», неопубликованной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. Альваро Куэльяр и Херман Вега объясняют, как искусственный интеллект позволил сравнить тысячи рукописей и подтвердить авторство драматурга, объединив технологии с традиционной филологией.
      ar: يعرض البرنامج التلفزيوني laSexta Columna تقريرًا عن اكتشاف La francesa Laura، وهي المسرحية غير المنشورة التي كتبها Lope de Vega والتي تم التعرف عليها من خلال الذكاء الاصطناعي. يشرح ألفارو كويلار وجيرمان فيجا كيف أتاح الذكاء الاصطناعي مقارنة آلاف المخطوطات وأكد تأليف الكاتب المسرحي، ودمج التكنولوجيا مع فقه اللغة التقليدي.
