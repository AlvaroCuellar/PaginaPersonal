      fr: AI découvre une nouvelle comédie de Lope de Vega à la Bibliothèque nationale d’Espagne
      pt: AI revela uma nova comédia de Lope de Vega na Biblioteca Nacional da Espanha
      it: AI scopre una nuova commedia di Lope de Vega nella Biblioteca Nazionale spagnola
      de: KI entdeckt eine neue Komödie von Lope de Vega in der spanischen Nationalbibliothek
      zh: 人工智能在西班牙国家图书馆发现了洛佩·德·维加的一部新喜剧
      ja: スペイン国立図書館にあるロペ・デ・ベガの新作コメディを AI が発見
      ko: AI가 스페인 국립도서관에서 Lope de Vega의 새로운 코미디를 발견했습니다.
      ru: Искусственный интеллект обнаружил новую комедию Лопе де Веги в Национальной библиотеке Испании
      ar: الذكاء الاصطناعي يكشف عن كوميديا ​​جديدة للوبي دي فيجا في المكتبة الوطنية بإسبانيا
    outlet: "La Jornada"
    author: "Europa Press"
    date: "2023-02-05"
    url: "https://www.jornada.com.mx/2023/02/05/cultura/a03n2cul"
    thumbnail: "/assets/images/press/68.png"
    type: "press"
    summary:
      es: "El diario mexicano La Jornada publicó un artículo firmado por Europa Press sobre el descubrimiento de La francesa Laura, una comedia anónima atribuida a Lope de Vega mediante inteligencia artificial. El texto detalla el uso de la herramienta Transkribus para transcribir automáticamente 1.300 obras del Siglo de Oro y los análisis del proyecto ETSO, dirigido por Álvaro Cuéllar y Germán Vega, que confirmaron la autoría a través de métodos estilométricos y filológicos."
      en: "The Mexican newspaper La Jornada published an article by Europa Press on the discovery of La Francesa Laura, an anonymous comedy attributed to Lope de Vega through artificial intelligence. The piece details the use of the Transkribus tool to automatically transcribe 1,300 Golden Age plays and the analyses of the ETSO project, led by Álvaro Cuéllar and Germán Vega, which confirmed the authorship through stylometric and philological methods."



      fr: Le journal mexicain La Jornada a publié un article d'Europa Press sur la découverte de La Francesa Laura, une comédie anonyme attribuée à Lope de Vega grâce à l'intelligence artificielle. L'article détaille l'utilisation de l'outil Transkribus pour transcrire automatiquement 1 300 pièces du Siècle d'Or et les analyses du projet ETSO, dirigé par Álvaro Cuéllar et Germán Vega, qui a confirmé la paternité à travers des méthodes stylométriques et philologiques.
      pt: O jornal mexicano La Jornada publicou um artigo da Europa Press sobre a descoberta de La Francesa Laura, comédia anônima atribuída a Lope de Vega por meio da inteligência artificial. A peça detalha o uso da ferramenta Transkribus para transcrever automaticamente 1.300 peças da Era de Ouro e as análises do projeto ETSO, liderado por Álvaro Cuéllar e Germán Vega, que confirmou a autoria através de métodos estilométricos e filológicos.
      it: Il quotidiano messicano La Jornada ha pubblicato un articolo di Europa Press sulla scoperta di La Francesa Laura, una commedia anonima attribuita a Lope de Vega attraverso l'intelligenza artificiale. Il pezzo descrive in dettaglio l'uso dello strumento Transkribus per trascrivere automaticamente 1.300 opere teatrali dell'Età dell'Oro e le analisi del progetto ETSO, guidato da Álvaro Cuéllar e Germán Vega, che ne ha confermato la paternità attraverso metodi stilometrici e filologici.
      de: Die mexikanische Zeitung La Jornada veröffentlichte einen Artikel von Europa Press über die Entdeckung von La Francesa Laura, einer anonymen Komödie, die Lope de Vega durch künstliche Intelligenz zugeschrieben wird. Das Stück beschreibt detailliert die Verwendung des Transkribus-Tools zur automatischen Transkription von 1.300 Stücken des Goldenen Zeitalters und die Analysen des ETSO-Projekts unter der Leitung von Álvaro Cuéllar und Germán Vega, das die Urheberschaft durch stilometrische und philologische Methoden bestätigte.
      zh: 墨西哥报纸 La Jornada 发表了 Europa Press 的一篇文章，介绍了通过人工智能发现的一部匿名喜剧《La Francesa Laura》，该喜剧归因于洛佩·德·维加 (Lope de Vega)。该作品详细介绍了如何使用 Transkribus 工具自动转录 1,300 部黄金时代戏剧，以及对 Álvaro Cuéllar 和 Germán Vega 领导的 ETSO 项目的分析，该项目通过文体测量和语言学方法确认了作者身份。
      ja: メキシコの新聞ラ・ホルナダは、人工知能によるロペ・デ・ベガ作とされる匿名コメディ「ラ・フランセサ・ローラ」の発見に関するヨーロッパ・プレスの記事を掲載した。この作品では、1,300 の黄金時代の演劇を自動的に転写するための Transkribus ツールの使用と、アルバロ・クエヤルとジェルマン・ベガが主導し、スタイロメトリーおよび文献学的な方法によって原作者であることを確認した ETSO プロジェクトの分析について詳しく説明しています。
      ko: 멕시코 신문 La Jornada는 인공 지능을 통해 Lope de Vega가 만든 익명의 코미디인 La Francesa Laura의 발견에 대한 Europa Press의 기사를 게재했습니다. 이 작품에서는 Transkribus 도구를 사용하여 1,300편의 황금기 희곡을 자동으로 필사하는 방법과 문체학적 및 언어학적 방법을 통해 저작자를 확인한 Álvaro Cuéllar와 Germán Vega가 주도한 ETSO 프로젝트 분석에 대해 자세히 설명합니다.
      ru: Мексиканская газета La Jornada опубликовала статью Europa Press об открытии La Francesa Laura, анонимной комедии, приписываемой Лопе де Веге с помощью искусственного интеллекта. В статье подробно рассказывается об использовании инструмента Transkribus для автоматической расшифровки 1300 пьес Золотого века, а также анализ проекта ETSO, возглавляемого Альваро Куэльяром и Херманом Вега, который подтвердил авторство с помощью стилометрических и филологических методов.
      ar: نشرت صحيفة لا جورنادا المكسيكية مقالاً لصحيفة أوروبا برس حول اكتشاف لا فرانسيسا لورا، وهي كوميديا ​​مجهولة المصدر منسوبة إلى لوبي دي فيغا من خلال الذكاء الاصطناعي. توضح المقالة بالتفصيل استخدام أداة Transkribus للنسخ التلقائي لـ 1300 مسرحية من العصر الذهبي وتحليلات مشروع ETSO، بقيادة ألفارو كويلار وجيرمان فيجا، والتي أكدت تأليف المسرحية من خلال الأساليب الأسلوبية واللغوية.
