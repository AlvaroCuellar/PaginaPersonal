      es: "Darío Prieto relata en El Mundo cómo Marta Poveda dirige en los Teatros del Canal La francesa Laura, la obra inédita de Lope de Vega descubierta en la Biblioteca Nacional gracias a la inteligencia artificial. La actriz madrileña reflexiona sobre el poder de la palabra, la fragilidad humana y la vigencia de los conflictos emocionales que atraviesan el texto."
