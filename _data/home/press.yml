      it: Il critico José-Miguel Vila scrive in Diariocrítico di 'La francesa Laura', una commedia inedita di Lope de Vega attribuita all'intelligenza artificiale e diretta da Marta Poveda. Loda la regia, la struttura poetica del testo e le ottime interpretazioni di Sheila Niño e Agus Ruiz.
