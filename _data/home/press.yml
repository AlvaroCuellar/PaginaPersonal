      zh: La Tribuna de Ciudad Real 报道了《弗朗西斯·劳拉》在阿尔马格罗的 Corral de Comedias 进行的排练，该排练由 Marta Poveda 执导，Álvaro Cuéllar 和 Germán Vega 出席，他们利用人工智能发现了该剧。这篇文章重点介绍了文体测量过程、Transkribus 的使用以及确认 Lope de Vega 的作者身份的语言学验证。
      ja: La Tribuna de Ciudad Realは、アルマグロのコラル・デ・コメディアスで行われた『ラ・フランセサ・ラウラ』のゲネプロリハーサルについて報じている。マルタ・ポベダが演出し、人工知能を使ったこの劇を発見したアルバロ・クエヤルとジェルマン・ベガが出席した。この記事では、スタイロメトリーのプロセス、トランスクリバスの使用、ロペ・デ・ベガの著者であることを裏付ける文献学的検証に焦点を当てています。
      ko: La Tribuna de Ciudad Real은 Marta Poveda가 감독하고 인공 지능을 사용하여 연극을 발견한 Álvaro Cuéllar와 Germán Vega가 참석한 Almagro의 Corral de Comedias에서 La Francesa Laura의 일반 리허설에 대해 보고합니다. 이 기사는 문체 과정, Transkribus의 사용, Lope de Vega의 저자임을 확인하는 언어학적 검증을 강조합니다.
      ru: Газета La Tribuna de Ciudad Real сообщает о генеральной репетиции спектакля «Франческа Лаура» в «Коррале комедий» Альмагро под руководством Марты Поведа, на которой присутствовали Альваро Куэльяр и Херман Вега, которые обнаружили пьесу с помощью искусственного интеллекта. В статье освещается стилометрический процесс, использование Транскрибуса и филологическое обоснование, подтверждающее авторство Лопе де Веги.
      ar: تقدم صحيفة "لا تريبونا دي سيوداد ريال" تقريرًا عن التدريب العام على مسرحية "لا فرانشيسا لورا" في مسرح "كورال دي كوميدياس" في ألماجرو، من إخراج مارتا بوفيدا وحضور ألفارو كويلار وجيرمان فيجا، اللذين اكتشفا المسرحية باستخدام الذكاء الاصطناعي. يسلط المقال الضوء على عملية قياس الأسلوب، واستخدام Transkribus، والتحقق اللغوي الذي يؤكد تأليف Lope de Vega.
  - id: "press37"
    title:
      es: "La francesa Laura no tuvo autor durante siglos. Ahora, gracias a una IA, sabemos que fue Lope de Vega"
      en: "‘La Francesa Laura’ Had No Known Author for Centuries. Now, Thanks to AI, We Know It Was by Lope de Vega"
      fr: «La Francesa Laura» n'avait pas d'auteur connu depuis des siècles. Maintenant, grâce à l'IA, nous savons que c'était le cas par Lope de Vega
      pt: ‘La Francesa Laura’ não teve autor conhecido durante séculos. Agora, graças à IA, sabemos que foi, de Lope de Vega
      it: “La Francesa Laura” non ebbe autore conosciuto da secoli. Ora, grazie all'intelligenza artificiale, sappiamo che era di Lope de Vega
      de: „La Francesa Laura“ hatte jahrhundertelang keinen bekannten Autor. Dank der KI wissen wir jetzt, dass es von Lope de Vega war
      zh: 《弗朗西斯·劳拉》几个世纪以来一直没有作者。现在，多亏了人工智能，我们知道这是洛佩·德·维加的作品
      ja: 「ラ・フランセサ・ローラ」は何世紀にもわたって作者が知られていなかった。 AI のおかげで、それがロペ・デ・ベガの作品であることがわかりました
      ko: "'라 프란체사 로라'에는 수세기 동안 알려진 작가가 없었습니다. 이제 AI 덕분에 우리는 그것이 Lope de Vega의 작품이라는 것을 압니다."
      ru: У «Франсезы Лауры» на протяжении столетий не было известного автора. Теперь, благодаря искусственному интеллекту, мы знаем, что это был Лопе де Вега
      ar: لم يكن لـ "La Francesa Laura" مؤلف معروف لعدة قرون. والآن، وبفضل الذكاء الاصطناعي، أصبحنا نعرف أنه من تأليف لوبي دي فيغا
    outlet: "Xataka (Webedia)"
    date: "2023-02-01"
    url: "https://www.xataka.com/magnet/francesa-laura-no-tuvo-autor-durante-siglos-ahora-gracias-a-ia-sabemos-que-fue-lope-vega"
    thumbnail: "/assets/images/press/37.png"
    type: "press"
    summary:
      es: "Albert Sanchis explica en Xataka cómo la inteligencia artificial permitió identificar a Lope de Vega como autor de La francesa Laura, obra que permanecía anónima en la Biblioteca Nacional. El estudio, dirigido por Álvaro Cuéllar y Germán Vega, combinó Transkribus, el corpus ETSO y la herramienta Stylo para analizar más de 1.300 comedias del Siglo de Oro y confirmar la autoría del Fénix de los Ingenios."
      en: "Albert Sanchis reports in Xataka how artificial intelligence made it possible to identify Lope de Vega as the author of La Francesa Laura, a play that had remained anonymous in the Spanish National Library. The study, led by Álvaro Cuéllar and Germán Vega, combined Transkribus, the ETSO corpus, and the Stylo tool to analyze over 1,300 Golden Age comedies and confirm the authorship of the Phoenix of Wits."



      fr: Albert Sanchis raconte dans Xataka comment l'intelligence artificielle a permis d'identifier Lope de Vega comme l'auteur de La Francesa Laura, une pièce restée anonyme à la Bibliothèque nationale espagnole. L'étude, dirigée par Álvaro Cuéllar et Germán Vega, a combiné Transkribus, le corpus ETSO et l'outil Stylo pour analyser plus de 1 300 comédies de l'âge d'or et confirmer la paternité du Phénix de l'esprit.
      pt: Albert Sanchis relata em Xataka como a inteligência artificial permitiu identificar Lope de Vega como o autor de La Francesa Laura, peça que permaneceu anônima na Biblioteca Nacional Espanhola. O estudo, liderado por Álvaro Cuéllar e Germán Vega, combinou o Transkribus, o corpus ETSO e a ferramenta Stylo para analisar mais de 1.300 comédias da Era de Ouro e confirmar a autoria da Fênix do Raciocínio.
      it: Albert Sanchis riferisce su Xataka come l'intelligenza artificiale abbia permesso di identificare Lope de Vega come l'autore di La Francesa Laura, un'opera rimasta anonima nella Biblioteca Nazionale Spagnola. Lo studio, condotto da Álvaro Cuéllar e Germán Vega, ha combinato Transkribus, il corpus ETSO e lo strumento Stylo per analizzare oltre 1.300 commedie dell'Età dell'Oro e confermare la paternità della Fenice dell'Ingegno.
      de: Albert Sanchis berichtet in Xataka, wie künstliche Intelligenz es ermöglichte, Lope de Vega als Autor von La Francesa Laura zu identifizieren, einem Stück, das in der spanischen Nationalbibliothek anonym geblieben war. Die von Álvaro Cuéllar und Germán Vega geleitete Studie kombinierte Transkribus, das ETSO-Korpus und das Stylo-Tool, um über 1.300 Komödien des Goldenen Zeitalters zu analysieren und die Urheberschaft des Phönix des Geistes zu bestätigen.
      zh: 阿尔伯特·桑奇斯 (Albert Sanchis) 在《Xataka》中报道了人工智能如何识别洛佩·德·维加 (Lope de Vega) 为《弗朗西斯·劳拉》(La Francesa Laura) 的作者，该剧在西班牙国家图书馆中一直保持匿名状态。这项研究由 Álvaro Cuéllar 和 Germán Vega 领导，结合了 Transkribus、ETSO 语料库和 Stylo 工具，分析了 1,300 多部黄金时代喜剧，并确认了《智慧之凤凰》的作者身份。
      ja: アルバート・サンチスは、スペイン国立図書館で匿名のままだった戯曲「ラ・フランセサ・ラウラ」の作者としてロペ・デ・ベガを人工知能が特定することをどのようにして可能にしたのかを『ザタカ』で報告している。アルバロ・クエヤル氏とジェルマン・ベガ氏が主導したこの研究では、Transkribus、ETSO コーパス、Stylo ツールを組み合わせて、1,300 を超える黄金時代のコメディを分析し、『機知のフェニックス』の原作者であることを確認しました。
      ko: Albert Sanchis는 Xataka에서 어떻게 인공 지능을 통해 Lope de Vega가 스페인 국립 도서관에 익명으로 남아 있던 연극 La Francesa Laura의 작가인지 식별할 수 있게 되었다고 보고합니다. Álvaro Cuéllar와 Germán Vega가 주도한 이 연구에서는 Transkribus, ETSO 코퍼스, Stylo 도구를 결합하여 1,300개 이상의 황금 시대 코미디를 분석하고 Phoenix of Wits의 저자임을 확인했습니다.
      ru: Альберт Санчис сообщает в Xataka, как искусственный интеллект позволил идентифицировать Лопе де Вегу как автора «Франции Лауры», пьесы, которая осталась анонимной в Национальной библиотеке Испании. Исследование, проведенное Альваро Куэльяром и Херманом Вегой, объединило Transkribus, корпус ETSO и инструмент Stylo для анализа более 1300 комедий Золотого века и подтверждения авторства Феникса Остроумия.
      ar: ويذكر ألبرت سانشيز في Xataka كيف مكّن الذكاء الاصطناعي من التعرف على لوبي دي فيغا باعتباره مؤلف مسرحية La Francesa Laura، وهي مسرحية ظلت مجهولة المصدر في المكتبة الوطنية الإسبانية. جمعت الدراسة، التي أجراها ألفارو كويلار وجيرمان فيجا، بين Transkribus ومجموعة ETSO وأداة Stylo لتحليل أكثر من 1300 فيلم كوميدي من العصر الذهبي وتأكيد تأليف Phoenix of Wits.
