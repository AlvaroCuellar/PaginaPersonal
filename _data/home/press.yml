      it: La Tribuna de Ciudad Real racconta la prova generale de La Francesa Laura al Corral de Comedias di Almagro, diretta da Marta Poveda e alla presenza di Álvaro Cuéllar e Germán Vega, che scoprirono lo spettacolo grazie all'intelligenza artificiale. L’articolo evidenzia il procedimento stilometrico, l’uso del Transkribus e la validazione filologica che conferma la paternità di Lope de Vega.
