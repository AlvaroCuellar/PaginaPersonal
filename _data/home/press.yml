      pt: Almagro Noticias informa sobre a descoberta de La Francesa Laura, peça inédita de Lope de Vega identificada na Biblioteca Nacional Espanhola através de inteligência artificial. Liderado por Álvaro Cuéllar e Germán Vega, o projeto utilizou métodos estilométricos e o sistema Transkribus para confirmar a autoria. A Fundación Siglo de Oro, dirigida por Marta Poveda, ensaiou a peça no Corral de Comedias de Almagro antes da sua estreia em Madrid.
      it: Almagro Noticias informa sulla scoperta di La Francesa Laura, un'opera inedita di Lope de Vega identificata nella Biblioteca Nazionale Spagnola grazie all'intelligenza artificiale. Guidato da Álvaro Cuéllar e Germán Vega, il progetto ha utilizzato metodi stilometrici e il sistema Transkribus per confermare la paternità. La Fundación Siglo de Oro, diretta da Marta Poveda, ha provato lo spettacolo al Corral de Comedias di Almagro prima della sua prima a Madrid.
