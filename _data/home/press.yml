    outlet: "RTVE – Un idioma sin fronteras (Radio Exterior)"
    date: "2023-11-11"
    url: "https://www.rtve.es/play/audios/un-idioma-sin-fronteras/estilometria-alvaro-cuellar/7006620/"
    thumbnail: "/assets/images/press/cinco.png"
    type: "news"
    summary:
      es: "En el programa Un idioma sin fronteras, Álvaro Cuéllar explica cómo la inteligencia artificial y la estilometría permiten atribuir autorías, leer manuscritos difíciles y fechar textos antiguos. Entre sus descubrimientos destaca la identificación de La francesa Laura como obra de Lope de Vega."
      en: "In the radio program Un idioma sin fronteras, Álvaro Cuéllar discusses how artificial intelligence and stylometry help attribute authorship, read complex manuscripts, and date early texts. Among his findings stands out the identification of La francesa Laura as a play by Lope de Vega."





      fr: Dans l'émission de radio Un idioma sin fronteras, Álvaro Cuéllar explique comment l'intelligence artificielle et la stylométrie aident à attribuer la paternité, à lire des manuscrits complexes et à dater des textes anciens. Parmi ses découvertes se distingue l'identification de La francesa Laura comme une pièce de Lope de Vega.
      pt: No programa de rádio Un idioma sin fronteras, Álvaro Cuéllar discute como a inteligência artificial e a estilometria ajudam a atribuir autoria, a ler manuscritos complexos e a datar textos antigos. Entre suas descobertas destaca-se a identificação de La francesa Laura como uma peça de Lope de Vega.
      it: Nel programma radiofonico Un idioma sin fronteras, Álvaro Cuéllar spiega come l'intelligenza artificiale e la stilometria aiutano ad attribuire la paternità, a leggere manoscritti complessi e a datare i primi testi. Tra le sue scoperte spicca l'identificazione di La francesa Laura con un'opera teatrale di Lope de Vega.
      de: In der Radiosendung Un idioma sin fronteras diskutiert Álvaro Cuéllar, wie künstliche Intelligenz und Stilometrie dabei helfen, Autoren zuzuordnen, komplexe Manuskripte zu lesen und frühe Texte zu datieren. Zu seinen Erkenntnissen gehört die Identifizierung von La francesa Laura als Theaterstück von Lope de Vega.
      zh: 在广播节目 Un idioma sin fronteras 中，Álvaro Cuéllar 讨论了人工智能和文体测定法如何帮助确定作者身份、阅读复杂的手稿以及确定早期文本的日期。在他的发现中，最突出的一点是确定《法国劳拉》是洛佩·德·维加的戏剧。
      ja: ラジオ番組「Un idioma sinfronteras」の中で、アルバロ・クエヤル氏は、人工知能とスタイロメトリーが著者の帰属、複雑な原稿の読み取り、初期のテキストの日付付けにどのように役立つかについて説明しています。彼の発見の中で、『ラ・フランセサ・ローラ』がロペ・デ・ベガの戯曲であると特定されたことが際立っている。
      ko: 라디오 프로그램 Un idioma sin fronteras에서 Álvaro Cuéllar는 인공 지능과 문체 측정법이 어떻게 저자임을 밝히고, 복잡한 원고를 읽고, 초기 텍스트의 연대를 측정하는 데 도움이 되는지 논의합니다. 그의 발견 중에는 La francesa Laura가 Lope de Vega의 희곡으로 확인되었다는 점이 눈에 띕니다.
      ru: В радиопрограмме Un idioma sin fronteras Альваро Куэльяр обсуждает, как искусственный интеллект и стилометрия помогают определять авторство, читать сложные рукописи и датировать ранние тексты. Среди его находок выделяется идентификация «Французской Лауры» как пьесы Лопе де Веги.
      ar: في البرنامج الإذاعي Un idioma sin fronteras، يناقش ألفارو كويلار كيف يساعد الذكاء الاصطناعي وقياس الأسلوب في إسناد التأليف، وقراءة المخطوطات المعقدة، وتاريخ النصوص المبكرة. من بين النتائج التي توصل إليها تحديد هوية La francesa Laura على أنها مسرحية من تأليف Lope de Vega.
