    summary:
      es: "Manuel Morales informa en El País del estreno de 'La francesa Laura', comedia anónima del Siglo de Oro atribuida a Lope de Vega gracias a inteligencia artificial. El artículo describe los ensayos dirigidos por Marta Poveda en Almagro y su próxima puesta en escena en los Teatros del Canal, resaltando la fusión entre tradición teatral y tecnología."
      en: "Manuel Morales reports in El País on the premiere of 'La francesa Laura', a Golden Age anonymous play attributed to Lope de Vega through artificial intelligence. The article depicts Marta Poveda’s rehearsals in Almagro and the upcoming staging at Teatros del Canal, highlighting the blend of theatrical tradition and technology."


      fr: Manuel Morales rapporte dans El País la première de « La francesa Laura », une pièce anonyme du Siècle d'Or attribuée à Lope de Vega grâce à l'intelligence artificielle. L’article décrit les répétitions de Marta Poveda à Almagro et la prochaine représentation au Teatros del Canal, en soulignant le mélange de tradition théâtrale et de technologie.
      pt: Manuel Morales informa no El País a estreia de 'La francesa Laura', peça anônima da Idade de Ouro atribuída a Lope de Vega através da inteligência artificial. O artigo retrata os ensaios de Marta Poveda em Almagro e a próxima encenação nos Teatros del Canal, destacando a mistura entre tradição teatral e tecnologia.
      it: Manuel Morales riferisce su El País della prima di 'La francesa Laura', un'opera anonima dell'Età dell'Oro attribuita a Lope de Vega attraverso l'intelligenza artificiale. L’articolo descrive le prove di Marta Poveda ad Almagro e la prossima messa in scena ai Teatros del Canal, evidenziando il connubio tra tradizione teatrale e tecnologia.
      de: Manuel Morales berichtet in El País über die Premiere von „La francesa Laura“, einem anonymen Stück aus dem Goldenen Zeitalter, das Lope de Vega durch künstliche Intelligenz zugeschrieben wird. Der Artikel beschreibt Marta Povedas Proben in Almagro und die bevorstehende Aufführung im Teatros del Canal und hebt die Mischung aus Theatertradition und Technologie hervor.
      zh: 曼努埃尔·莫拉莱斯在《国家报》报道了《法国劳拉》的首映，这部黄金时代的匿名戏剧通过人工智能归因于洛佩·德·维加。这篇文章描述了玛尔塔·波维达在阿尔马格罗的排练以及即将在运河剧院的演出，强调了戏剧传统与技术的融合。
      ja: マヌエル・モラレス氏がエル・パイス紙で、人工知能によるロペ・デ・ベガ作とされる黄金時代の匿名劇「ラ・フランセサ・ラウラ」の初演について報告した。この記事では、アルマグロでのマルタ・ポベダのリハーサルと、テアトロス・デル・カナルでの今後の上演について描写し、演劇の伝統とテクノロジーの融合を強調しています。
      ko: 마누엘 모랄레스(Manuel Morales)는 인공 지능을 통해 로페 데 베가(Lope de Vega)의 작품으로 알려진 황금 시대의 익명 연극 'La francesa Laura'의 초연에 대해 El País에서 보고합니다. 이 기사에서는 Marta Poveda의 알마그로 리허설과 Teatros del Canal에서의 곧 있을 공연을 묘사하며 연극 전통과 기술의 조화를 강조합니다.
      ru: Мануэль Моралес сообщает в El País о премьере «Французской Лауры», анонимной пьесы Золотого века, приписываемой Лопе де Веге с помощью искусственного интеллекта. В статье рассказывается о репетициях Марты Поведы в Альмагро и предстоящей постановке в Театрос дель Канал, подчеркивая сочетание театральных традиций и технологий.
      ar: تقرير مانويل موراليس في صحيفة El País عن العرض الأول لمسرحية La francesa Laura، وهي مسرحية مجهولة من العصر الذهبي منسوبة إلى Lope de Vega من خلال الذكاء الاصطناعي. يصور المقال تدريبات مارتا بوفيدا في ألماجرو والعرض القادم في تياتروس ديل كانال، مع تسليط الضوء على مزيج من التقاليد المسرحية والتكنولوجيا.
