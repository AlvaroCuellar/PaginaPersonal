      fr: Le média français ActuaLitté a publié un rapport de Barbara Fasseur sur la découverte de La Francesa Laura, une œuvre perdue de Lope de Vega identifiée grâce à l'intelligence artificielle. L'article détaille comment les chercheurs Álvaro Cuéllar et Germán Vega ont utilisé les outils Transkribus et Stylo dans le cadre du projet ETSO pour analyser plus de 1 300 manuscrits de l'âge d'or, confirmant la paternité par une analyse stylométrique et philologique. La pièce, écrite vers 1630, devrait être publiée chez Gredos.
      pt: O veículo francês ActuaLitté publicou reportagem de Barbara Fasseur sobre a descoberta de La Francesa Laura, obra perdida de Lope de Vega identificada por inteligência artificial. O artigo detalha como os pesquisadores Álvaro Cuéllar e Germán Vega utilizaram as ferramentas Transkribus e Stylo do projeto ETSO para analisar mais de 1.300 manuscritos da Idade de Ouro, confirmando a autoria por meio de análises estilométricas e filológicas. A peça, escrita por volta de 1630, será publicada pela Gredos.
      it: La testata francese ActuaLitté ha pubblicato un servizio di Barbara Fasseur sulla scoperta di La Francesa Laura, un'opera perduta di Lope de Vega identificata attraverso l'intelligenza artificiale. L'articolo descrive in dettaglio come i ricercatori Álvaro Cuéllar e Germán Vega hanno utilizzato gli strumenti Transkribus e Stylo nell'ambito del progetto ETSO per analizzare oltre 1.300 manoscritti dell'Età dell'Oro, confermandone la paternità attraverso l'analisi stilometrica e filologica. L'opera, scritta intorno al 1630, sarà pubblicata da Gredos.
      de: Das französische Outlet ActuaLitté veröffentlichte einen Bericht von Barbara Fasseur über die Entdeckung von La Francesa Laura, einem verlorenen Werk von Lope de Vega, das mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel beschreibt, wie die Forscher Álvaro Cuéllar und Germán Vega die Transkribus- und Stylo-Tools im Rahmen des ETSO-Projekts nutzten, um über 1.300 Manuskripte des Goldenen Zeitalters zu analysieren und die Urheberschaft durch stilometrische und philologische Analysen zu bestätigen. Das um 1630 geschriebene Stück soll bei Gredos veröffentlicht werden.
      zh: 法国媒体 ActuaLitté 发表了芭芭拉·法瑟 (Barbara Fasseur) 的一篇关于发现《La Francesa Laura》的报告，这是通过人工智能识别出的洛佩·德·维加 (Lope de Vega) 遗失的作品。文章详细介绍了研究人员 Álvaro Cuéllar 和 Germán Vega 如何使用 ETSO 项目中的 Transkribus 和 Stylo 工具来分析 1,300 多份黄金时代手稿，通过文体测量和语言学分析确认作者身份。该剧创作于 1630 年左右，预计由格雷多斯出版。
      ja: フランスのメディア ActuaLitte は、ロペ・デ・ベガの失われた作品、人工知能によって特定された『ラ・フランセサ・ローラ』の発見に関するバルバラ・ファスール氏のレポートを掲載した。この記事では、研究者のアルバロ・クエヤル氏とゲルマン・ベガ氏が、ETSO プロジェクト内で Transkribus ツールと Stylo ツールを使用して 1,300 を超える黄金時代の写本を分析し、筆圧測定および文献学的な分析を通じて著者を確認した方法について詳しく説明しています。この戯曲は1630年頃に書かれ、グレドス社から出版される予定だ。
      ko: 프랑스 매체 ActuaLitté는 인공 지능을 통해 확인된 Lope de Vega의 잃어버린 작품인 La Francesa Laura의 발견에 대한 Barbara Fasseur의 보고서를 발표했습니다. 이 기사에서는 연구원인 Álvaro Cuéllar와 Germán Vega가 ETSO 프로젝트 내에서 Transkribus 및 Stylo 도구를 사용하여 1,300개 이상의 황금기 사본을 분석하고 문체 분석 및 언어학적 분석을 통해 저자임을 확인하는 방법을 자세히 설명합니다. 1630년경에 쓰여진 이 희곡은 그레도스(Gredos)에서 출판될 예정입니다.
      ru: Французское издание ActuaLitte опубликовало отчет Барбары Фассер об открытии La Francesa Laura, утерянной работы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье подробно рассказывается, как исследователи Альваро Куэльяр и Херман Вега использовали инструменты Transkribus и Stylo в рамках проекта ETSO для анализа более 1300 рукописей Золотого века, подтверждая авторство посредством стилометрического и филологического анализа. Пьесу, написанную около 1630 года, собирается опубликовать издательство «Гредос».
      ar: نشر المنفذ الفرنسي ActuaLitté تقريرًا بقلم Barbara Fasseur حول اكتشاف La Francesa Laura، وهو عمل مفقود لـ Lope de Vega تم التعرف عليه من خلال الذكاء الاصطناعي. يشرح المقال بالتفصيل كيف استخدم الباحثان ألفارو كويلار وجيرمان فيجا أدوات Transkribus وStylo ضمن مشروع ETSO لتحليل أكثر من 1300 مخطوطة من العصر الذهبي، مما يؤكد التأليف من خلال التحليل الأسلوبي واللغوي. المسرحية، المكتوبة حوالي عام 1630، من المقرر أن تنشرها دار جريدوس.
