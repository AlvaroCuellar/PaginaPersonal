    summary:
      es: "El diario austríaco Der Standard informó sobre el descubrimiento de La francesa Laura, una comedia anónima atribuida a Lope de Vega mediante inteligencia artificial. El artículo explica cómo los investigadores Álvaro Cuéllar y Germán Vega, junto con la Universidad de Innsbruck, emplearon los programas Transkribus y Stylo en el marco del proyecto ETSO para comparar miles de textos del Siglo de Oro, destacando la magnitud del hallazgo y su potencial para futuras identificaciones de autoría en la literatura europea."
      en: "The Austrian newspaper Der Standard reported on the discovery of La Francesa Laura, an anonymous comedy attributed to Lope de Vega through artificial intelligence. The article explains how researchers Álvaro Cuéllar and Germán Vega, together with the University of Innsbruck, used the Transkribus and Stylo programs within the ETSO project to compare thousands of Golden Age texts, emphasizing the significance of the find and its potential for future authorship discoveries across European literature."


      fr: Le journal autrichien Der Standard a fait état de la découverte de La Francesa Laura, une comédie anonyme attribuée à Lope de Vega grâce à l'intelligence artificielle. L'article explique comment les chercheurs Álvaro Cuéllar et Germán Vega, en collaboration avec l'Université d'Innsbruck, ont utilisé les programmes Transkribus et Stylo au sein du projet ETSO pour comparer des milliers de textes de l'âge d'or, soulignant l'importance de la découverte et son potentiel pour de futures découvertes d'auteurs dans la littérature européenne.
      pt: O jornal austríaco Der Standard noticiou a descoberta de La Francesa Laura, comédia anônima atribuída a Lope de Vega por meio de inteligência artificial. O artigo explica como os investigadores Álvaro Cuéllar e Germán Vega, em conjunto com a Universidade de Innsbruck, utilizaram os programas Transkribus e Stylo no âmbito do projecto ETSO para comparar milhares de textos da Idade de Ouro, enfatizando a importância da descoberta e o seu potencial para futuras descobertas de autoria em toda a literatura europeia.
      it: Il quotidiano austriaco Der Standard ha riferito della scoperta di La Francesa Laura, una commedia anonima attribuita a Lope de Vega attraverso l'intelligenza artificiale. L'articolo spiega come i ricercatori Álvaro Cuéllar e Germán Vega, insieme all'Università di Innsbruck, hanno utilizzato i programmi Transkribus e Stylo nell'ambito del progetto ETSO per confrontare migliaia di testi dell'Età dell'Oro, sottolineando il significato del ritrovamento e il suo potenziale per future scoperte di paternità nella letteratura europea.
      de: Die österreichische Zeitung Der Standard berichtete über die Entdeckung von La Francesa Laura, einer anonymen Komödie, die Lope de Vega durch künstliche Intelligenz zugeschrieben wird. Der Artikel erklärt, wie die Forscher Álvaro Cuéllar und Germán Vega zusammen mit der Universität Innsbruck die Programme Transkribus und Stylo im Rahmen des ETSO-Projekts nutzten, um Tausende von Texten des Goldenen Zeitalters zu vergleichen, und betont die Bedeutung des Fundes und sein Potenzial für zukünftige Autorenentdeckungen in der europäischen Literatur.
      zh: 奥地利报纸《Der Standard》报道了通过人工智能发现的一部匿名喜剧《La Francesa Laura》，该喜剧归因于洛佩·德·维加 (Lope de Vega)。文章解释了研究人员 Álvaro Cuéllar 和 Germán Vega 以及因斯布鲁克大学如何使用 ETSO 项目中的 Transkribus 和 Stylo 程序来比较数千份黄金时代文本，强调了这一发现的重要性及其对欧洲文学未来作者身份发现的潜力。
      ja: オーストリアの新聞「デア・スタンダード」は、ロペ・デ・ベガが人工知能を使って制作したとされる匿名のコメディ「ラ・フランセサ・ローラ」の発見について報じた。この記事では、研究者のアルバロ・クエヤル氏とゲルマン・ベガ氏がインスブルック大学と協力して、ETSOプロジェクト内のTranskribusおよびStyloプログラムを使用して何千もの黄金時代の文書を比較した方法について説明し、この発見の重要性と、ヨーロッパ文学全体にわたる将来の著者発見の可能性を強調しています。
      ko: 오스트리아 신문 Der Standard는 인공 지능을 통해 Lope de Vega가 쓴 익명의 코미디인 La Francesa Laura의 발견에 대해 보도했습니다. 이 기사에서는 연구원인 Álvaro Cuéllar와 Germán Vega가 인스브루크 대학과 함께 ETSO 프로젝트 내에서 Transkribus 및 Stylo 프로그램을 사용하여 수천 개의 황금기 텍스트를 비교하고 발견의 중요성과 유럽 문학 전반에 걸쳐 향후 저자 발견에 대한 잠재력을 강조한 방법을 설명합니다.
      ru: Австрийская газета Der Standard сообщила об открытии La Francesa Laura, анонимной комедии, приписываемой Лопе де Веге с помощью искусственного интеллекта. В статье объясняется, как исследователи Альваро Куэльяр и Херман Вега совместно с Инсбрукским университетом использовали программы Transkribus и Stylo в рамках проекта ETSO для сравнения тысяч текстов Золотого века, подчеркивая значимость находки и ее потенциал для будущих открытий авторства в европейской литературе.
      ar: أفادت صحيفة دير ستاندرد النمساوية عن اكتشاف فيلم La Francesa Laura، وهي كوميديا ​​مجهولة المصدر منسوبة إلى Lope de Vega من خلال الذكاء الاصطناعي. يشرح المقال كيف استخدم الباحثون ألفارو كويلار وجيرمان فيجا، بالتعاون مع جامعة إنسبروك، برنامجي Transkribus وStylo ضمن مشروع ETSO لمقارنة الآلاف من نصوص العصر الذهبي، مع التركيز على أهمية الاكتشاف وإمكاناته لاكتشافات التأليف المستقبلية عبر الأدب الأوروبي.
