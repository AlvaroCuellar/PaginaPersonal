      pt: A emissora internacional Deutsche Welle (DW) noticiou a descoberta de La Francesa Laura, comédia inédita de Lope de Vega identificada através de técnicas de inteligência artificial. O artigo explica que a descoberta foi possível graças ao projeto ETSO, liderado por Álvaro Cuéllar e Germán Vega, em colaboração com a Biblioteca Nacional de Espanha e a Universidade Autónoma de Barcelona, ​​destacando a utilização do Transkribus e da análise filológica para confirmar a autoria.
      it: L'emittente internazionale Deutsche Welle (DW) ha segnalato la scoperta di La Francesa Laura, una commedia inedita di Lope de Vega identificata attraverso tecniche di intelligenza artificiale. L'articolo spiega che il ritrovamento è stato reso possibile dal progetto ETSO, guidato da Álvaro Cuéllar e Germán Vega, in collaborazione con la Biblioteca Nazionale spagnola e l'Università Autonoma di Barcellona, ​​evidenziando l'uso di Transkribus e l'analisi filologica per confermare la paternità.
      de: Der internationale Sender Deutsche Welle (DW) berichtete über die Entdeckung von La Francesa Laura, einer unveröffentlichten Komödie von Lope de Vega, die durch Techniken der künstlichen Intelligenz identifiziert wurde. Der Artikel erklärt, dass der Fund durch das ETSO-Projekt unter der Leitung von Álvaro Cuéllar und Germán Vega in Zusammenarbeit mit der spanischen Nationalbibliothek und der Autonomen Universität Barcelona ermöglicht wurde, und hebt die Verwendung von Transkribus und philologischen Analysen zur Bestätigung der Urheberschaft hervor.
      zh: 国际广播公司德国之声 (DW) 报道了通过人工智能技术识别出洛普·德·维加未出版的喜剧《弗朗西斯·劳拉》的发现。文章解释说，这一发现是由 Álvaro Cuéllar 和 Germán Vega 领导的 ETSO 项目与西班牙国家图书馆和巴塞罗那自治大学合作实现的，并强调使用 Transkribus 和语言学分析来确认作者身份。
      ja: 国際放送ドイチェ・ヴェレ（DW）は、人工知能技術によって特定されたロペ・デ・ベガの未発表コメディ「ラ・フランセサ・ローラ」の発見を報じた。記事では、この発見はアルバロ・クエヤル氏とジェルマン・ベガ氏が主導するETSOプロジェクトとスペイン国立図書館およびバルセロナ自治大学の協力により可能になったと説明し、著者を確認するためのトランスクリバスと文献学的分析の使用を強調している。
      ko: 국제 방송사 도이치벨레(DW)는 인공지능 기술을 통해 확인한 로페 데 베가의 미공개 코미디 '라 프란체사 로라(La Francesa Laura)'를 발견했다고 보도했다. 기사에서는 Álvaro Cuéllar와 Germán Vega가 이끄는 ETSO 프로젝트가 스페인 국립도서관 및 바르셀로나 자치대학교와 협력하여 이번 발견이 가능했다고 설명하며, 저자임을 확인하기 위해 Transkribus와 문헌학 분석의 사용을 강조했습니다.
      ru: Международная телекомпания Deutsche Welle (DW) сообщила об открытии неопубликованной комедии Лопе де Веги «La Francesa Laura», идентифицированной с помощью методов искусственного интеллекта. В статье объясняется, что находка стала возможной благодаря проекту ETSO, возглавляемому Альваро Куэльяром и Херманом Вега в сотрудничестве с Национальной библиотекой Испании и Автономным университетом Барселоны, подчеркивая использование Transkribus и филологического анализа для подтверждения авторства.
      ar: أفادت قناة دويتشه فيله الدولية (DW) عن اكتشاف فيلم La Francesa Laura، وهو فيلم كوميدي غير منشور من تأليف Lope de Vega تم التعرف عليه من خلال تقنيات الذكاء الاصطناعي. يوضح المقال أن هذا الاكتشاف أصبح ممكنًا بفضل مشروع ETSO، بقيادة ألفارو كويلار وجيرمان فيجا، بالتعاون مع المكتبة الوطنية الإسبانية وجامعة برشلونة المستقلة، مع تسليط الضوء على استخدام Transkribus والتحليل اللغوي لتأكيد المؤلف.
