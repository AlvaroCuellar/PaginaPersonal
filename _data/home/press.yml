    url: "https://www.echo24.cz/a/HzvsP/zpravy-domaci-historicky-objev-divadelni-hra-spanelsky-klasik-lope-de-vega-objevila-umela-inteligence"
    thumbnail: "/assets/images/press/75.png"
    type: "press"
    summary:
      es: "El diario checo Echo24.cz publicó un artículo sobre el hallazgo de La francesa Laura, una comedia perdida de Lope de Vega identificada por inteligencia artificial. El texto explica que investigadores de las universidades de Viena y Valladolid transcribieron más de 1.300 manuscritos anónimos de la Biblioteca Nacional de España con ayuda de Transkribus, y que el programa Stylo atribuyó la obra al dramaturgo, confirmándose después mediante métodos filológicos. La pieza será publicada por Gredos."
      en: "The Czech newspaper Echo24.cz reported on the discovery of La Francesa Laura, a lost play by Lope de Vega identified through artificial intelligence. The article explains that researchers from the Universities of Vienna and Valladolid transcribed over 1,300 anonymous manuscripts from Spain’s National Library using Transkribus, and that the Stylo program attributed the work to the playwright, later confirmed through philological analysis. The play will be published by Gredos."



      fr: Le journal tchèque Echo24.cz a fait état de la découverte de La Francesa Laura, une pièce perdue de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique que des chercheurs des universités de Vienne et de Valladolid ont transcrit plus de 1 300 manuscrits anonymes de la Bibliothèque nationale d’Espagne à l’aide de Transkribus, et que le programme Stylo a attribué l’œuvre au dramaturge, ce qui a été confirmé plus tard par une analyse philologique. La pièce sera publiée par Gredos.
      pt: O jornal checo Echo24.cz noticiou a descoberta de La Francesa Laura, peça perdida de Lope de Vega identificada através de inteligência artificial. O artigo explica que investigadores das Universidades de Viena e Valladolid transcreveram mais de 1.300 manuscritos anónimos da Biblioteca Nacional de Espanha através do Transkribus, e que o programa Stylo atribuiu a obra ao dramaturgo, posteriormente confirmada através de análise filológica. A peça será publicada pela Gredos.
      it: Il quotidiano ceco Echo24.cz ha riferito della scoperta di La Francesa Laura, un'opera perduta di Lope de Vega identificata attraverso l'intelligenza artificiale. L'articolo spiega che ricercatori delle università di Vienna e Valladolid hanno trascritto oltre 1.300 manoscritti anonimi della Biblioteca nazionale spagnola utilizzando Transkribus e che il programma Stylo ha attribuito l'opera al drammaturgo, successivamente confermato attraverso l'analisi filologica. Lo spettacolo sarà pubblicato da Gredos.
      de: Die tschechische Zeitung Echo24.cz berichtete über die Entdeckung von La Francesa Laura, einem verlorenen Stück von Lope de Vega, das mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel erklärt, dass Forscher der Universitäten Wien und Valladolid mit Transkribus über 1.300 anonyme Manuskripte aus der spanischen Nationalbibliothek transkribierten und dass das Stylo-Programm das Werk dem Dramatiker zuschrieb, was später durch philologische Analysen bestätigt wurde. Das Stück wird von Gredos veröffentlicht.
      zh: 捷克报纸 Echo24.cz 报道了《La Francesa Laura》的发现，这是通过人工智能识别出的洛佩·德·维加 (Lope de Vega) 遗失的戏剧。文章解释说，维也纳大学和巴利亚多利德大学的研究人员使用 Transkribus 从西班牙国家图书馆转录了 1,300 多份匿名手稿，Stylo 程序将该作品归属于剧作家，后来通过语言学分析得到证实。该剧将由格雷多斯出版。
      ja: チェコの新聞 Echo24.cz は、人工知能によって特定されたロペ・デ・ベガの紛失劇である「ラ・フランセサ・ローラ」の発見について報じた。この記事では、ウィーン大学とバリャドリッド大学の研究者が、Transkribus を使用してスペイン国立図書館から 1,300 冊を超える匿名の原稿を転記し、Stylo プログラムがその作品を劇作家の著作であると認定し、後に文献学的分析によって確認されたと説明しています。この戯曲はグレドス社から出版される予定だ。
      ko: 체코 신문 Echo24.cz는 인공지능을 통해 확인된 로페 데 베가의 잃어버린 희곡인 라 프란체사 라우라(La Francesa Laura)의 발견을 보도했습니다. 기사에서는 비엔나 대학교와 바야돌리드 대학교의 연구자들이 Transkribus를 사용하여 스페인 국립 도서관의 1,300개 이상의 익명 원고를 필사했으며 Stylo 프로그램이 그 작품을 극작가의 작품으로 돌렸고 나중에 문헌학적 분석을 통해 확인했다고 설명합니다. 이 연극은 Gredos에서 출판될 예정입니다.
      ru: Чешская газета Echo24.cz сообщила об открытии «Франсезы Лауры», утраченной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье объясняется, что исследователи из университетов Вены и Вальядолида расшифровали более 1300 анонимных рукописей из Национальной библиотеки Испании с помощью Transkribus и что программа Stylo приписала произведение драматургу, что позже было подтверждено филологическим анализом. Пьесу издаст издательство Gredos.
      ar: أفادت صحيفة Echo24.cz التشيكية عن اكتشاف La Francesa Laura، وهي مسرحية مفقودة من تأليف Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. يوضح المقال أن باحثين من جامعتي فيينا وبلد الوليد قاموا بنسخ أكثر من 1300 مخطوطة مجهولة المصدر من المكتبة الوطنية الإسبانية باستخدام ترانسكريبوس، وأن برنامج ستايلو نسب العمل إلى الكاتب المسرحي، وهو ما تم تأكيده لاحقًا من خلال التحليل اللغوي. سيتم نشر المسرحية من قبل جريدوس.
