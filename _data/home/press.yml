    outlet: "Slator"
    author: "Lucy Andresen"
    date: "2023-08-09"
    url: "https://slator.com/unpacking-state-of-the-art-handwritten-text-recognition/"
    thumbnail: "/assets/images/press/47.png"
    type: "press"
    summary:
      es: "El medio especializado Slator, dedicado a la inteligencia en la industria lingüística, destacó el descubrimiento de La francesa Laura dentro de un reportaje sobre los avances más recientes en reconocimiento automático de escritura manuscrita. El artículo menciona el uso de Transkribus por Álvaro Cuéllar y Germán Vega en el proyecto ETSO, subrayando cómo la inteligencia artificial permitió atribuir la obra a Lope de Vega y mostrando el potencial de estas tecnologías para la investigación filológica."
      en: "The language industry publication Slator featured the discovery of La Francesa Laura in a broader article about state-of-the-art handwritten text recognition. It mentions how Álvaro Cuéllar and Germán Vega used Transkribus within the ETSO project, highlighting how artificial intelligence enabled the attribution of the play to Lope de Vega and illustrating the potential of such technologies for philological research."


      fr: La publication de l'industrie linguistique Slator a présenté la découverte de La Francesa Laura dans un article plus large sur la reconnaissance de texte manuscrite de pointe. Il mentionne comment Álvaro Cuéllar et Germán Vega ont utilisé Transkribus dans le cadre du projet ETSO, soulignant comment l'intelligence artificielle a permis d'attribuer la pièce à Lope de Vega et illustrant le potentiel de telles technologies pour la recherche philologique.
      pt: A publicação da indústria linguística Slator apresentou a descoberta de La Francesa Laura em um artigo mais amplo sobre reconhecimento de texto manuscrito de última geração. Menciona como Álvaro Cuéllar e Germán Vega utilizaram o Transkribus no âmbito do projeto ETSO, destacando como a inteligência artificial permitiu a atribuição da peça a Lope de Vega e ilustrando o potencial de tais tecnologias para a investigação filológica.
      it: La pubblicazione del settore linguistico Slator ha presentato la scoperta di La Francesa Laura in un articolo più ampio sul riconoscimento del testo scritto a mano all'avanguardia. Si menziona come Álvaro Cuéllar e Germán Vega abbiano utilizzato Transkribus nell'ambito del progetto ETSO, evidenziando come l'intelligenza artificiale abbia consentito l'attribuzione dell'opera a Lope de Vega e illustrando il potenziale di tali tecnologie per la ricerca filologica.
      de: Die Sprachindustriepublikation Slator berichtete über die Entdeckung von La Francesa Laura in einem umfassenderen Artikel über modernste handschriftliche Texterkennung. Darin wird erwähnt, wie Álvaro Cuéllar und Germán Vega Transkribus im Rahmen des ETSO-Projekts verwendeten. Dabei wird hervorgehoben, wie künstliche Intelligenz die Zuschreibung des Stücks an Lope de Vega ermöglichte und das Potenzial solcher Technologien für die philologische Forschung veranschaulicht.
      zh: 语言行业出版物 Slator 在一篇有关最先进的手写文本识别的更广泛的文章中介绍了 La Francesa Laura 的发现。它提到了 Álvaro Cuéllar 和 Germán Vega 如何在 ETSO 项目中使用 Transkribus，强调了人工智能如何将戏剧归属于 Lope de Vega，并说明了此类技术在语言学研究中的潜力。
      ja: 言語業界の出版物である Slator は、最先端の手書きテキスト認識に関する広範な記事で、La Francesa Laura の発見を特集しました。この記事では、アルバロ・クエヤルとジェルマン・ベガがETSOプロジェクト内でどのようにTranskribusを使用したかについて言及し、人工知能がどのようにしてこの劇の作者がロペ・デ・ベガであるかを強調し、文献学研究におけるそのようなテクノロジーの可能性を説明しています。
      ko: 언어 산업 간행물 Slator는 최첨단 필기 텍스트 인식에 관한 광범위한 기사에서 La Francesa Laura의 발견을 소개했습니다. Álvaro Cuéllar와 Germán Vega가 ETSO 프로젝트 내에서 Transkribus를 사용한 방법을 언급하고, 인공 지능이 어떻게 극의 Lope de Vega에 대한 귀속을 가능하게 했는지 강조하고 문헌학 연구를 위한 그러한 기술의 잠재력을 보여줍니다.
      ru: Издание лингвистической отрасли Slator рассказало об открытии La Francesa Laura в более широкой статье о современном распознавании рукописного текста. В нем упоминается, как Альваро Куэльяр и Херман Вега использовали Transkribus в рамках проекта ETSO, подчеркивается, как искусственный интеллект позволил приписать пьесу Лопе де Веге, и иллюстрируется потенциал таких технологий для филологических исследований.
      ar: عرضت مجلة صناعة اللغات "سلاتور" اكتشاف La Francesa Laura في مقالة أوسع حول أحدث تقنيات التعرف على النصوص المكتوبة بخط اليد. ويذكر كيف استخدم ألفارو كويلار وجيرمان فيجا Transkribus ضمن مشروع ETSO، مما يسلط الضوء على كيف مكّن الذكاء الاصطناعي من إسناد المسرحية إلى Lope de Vega ويوضح إمكانات مثل هذه التقنيات للبحث اللغوي.
