      es: "El periódico turco Daily Sabah informó sobre el hallazgo de La francesa Laura, una obra inédita de Lope de Vega atribuida al dramaturgo gracias al uso de inteligencia artificial. El artículo explica cómo investigadores de Viena y Valladolid emplearon herramientas digitales para transcribir y analizar más de 1.300 manuscritos anónimos de la Biblioteca Nacional de España, confirmando la autoría del célebre escritor barroco."
      en: "The Turkish newspaper Daily Sabah reported on the discovery of La Francesa Laura, an unpublished play by Lope de Vega attributed to the playwright through artificial intelligence. The article describes how researchers from Vienna and Valladolid used digital tools to transcribe and analyze over 1,300 anonymous manuscripts from Spain’s National Library, confirming the authorship of the celebrated Baroque writer."


      fr: Le journal turc Daily Sabah a fait état de la découverte de La Francesa Laura, une pièce inédite de Lope de Vega attribuée au dramaturge grâce à l'intelligence artificielle. L’article décrit comment des chercheurs de Vienne et de Valladolid ont utilisé des outils numériques pour transcrire et analyser plus de 1 300 manuscrits anonymes de la Bibliothèque nationale d’Espagne, confirmant ainsi la paternité du célèbre écrivain baroque.
      pt: O jornal turco Daily Sabah noticiou a descoberta de La Francesa Laura, peça inédita de Lope de Vega atribuída ao dramaturgo através de inteligência artificial. O artigo descreve como pesquisadores de Viena e Valladolid utilizaram ferramentas digitais para transcrever e analisar mais de 1.300 manuscritos anônimos da Biblioteca Nacional da Espanha, confirmando a autoria do célebre escritor barroco.
      it: Il quotidiano turco Daily Sabah ha riferito della scoperta di La Francesa Laura, un'opera inedita di Lope de Vega attribuita al drammaturgo attraverso l'intelligenza artificiale. L’articolo descrive come i ricercatori di Vienna e Valladolid hanno utilizzato strumenti digitali per trascrivere e analizzare oltre 1.300 manoscritti anonimi della Biblioteca Nazionale spagnola, confermando la paternità del celebre scrittore barocco.
      de: Die türkische Zeitung Daily Sabah berichtete über die Entdeckung von La Francesa Laura, einem unveröffentlichten Stück von Lope de Vega, das dem Dramatiker durch künstliche Intelligenz zugeschrieben wird. Der Artikel beschreibt, wie Forscher aus Wien und Valladolid mithilfe digitaler Tools über 1.300 anonyme Manuskripte aus der spanischen Nationalbibliothek transkribierten und analysierten und damit die Urheberschaft des berühmten Barockschriftstellers bestätigten.
      zh: 土耳其报纸《沙巴日报》报道了洛佩·德·维加未出版的戏剧《弗朗西斯·劳拉》的发现，通过人工智能将其归功于这位剧作家。这篇文章介绍了来自维也纳和巴利亚多利德的研究人员如何使用数字工具转录和分析来自西班牙国家图书馆的 1,300 多份匿名手稿，从而确认了这位著名巴洛克作家的作者身份。
      ja: トルコの新聞デイリー・サバは、ロペ・デ・ベガの未発表戯曲『ラ・フランセサ・ラウラ』が人工知能によって劇作家のものとされる作品の発見について報じた。この記事は、ウィーンとバリャドリッドの研究者がデジタルツールを使用して、スペイン国立図書館から保管されている1,300以上の匿名写本をどのように転記、分析し、この有名なバロック作家の著者であることを確認したかについて説明しています。
      ko: 터키 신문 데일리 사바(Daily Sabah)는 로페 데 베가(Lope de Vega)의 미발표 희곡인 라 프란체사 라우라(La Francesa Laura)가 인공지능을 통해 발견됐다고 보도했습니다. 이 기사는 비엔나와 바야돌리드의 연구자들이 어떻게 디지털 도구를 사용하여 스페인 국립 도서관의 1,300개 이상의 익명 원고를 필사하고 분석하여 유명한 바로크 작가의 저자임을 확인했는지 설명합니다.
      ru: Турецкая газета Daily Sabah сообщила об открытии «Франсезы Лауры», неопубликованной пьесы Лопе де Веги, приписываемой драматургу с помощью искусственного интеллекта. В статье рассказывается, как исследователи из Вены и Вальядолида с помощью цифровых инструментов расшифровали и проанализировали более 1300 анонимных рукописей из Национальной библиотеки Испании, подтвердив авторство знаменитого писателя эпохи барокко.
      ar: أفادت صحيفة ديلي صباح التركية عن اكتشاف مسرحية "لا فرانشيسا لورا"، وهي مسرحية غير منشورة للكاتب المسرحي لوبي دي فيغا، منسوبة إلى الكاتب المسرحي من خلال الذكاء الاصطناعي. يصف المقال كيف استخدم الباحثون من فيينا وبلد الوليد الأدوات الرقمية لنسخ وتحليل أكثر من 1300 مخطوطة مجهولة المصدر من المكتبة الوطنية الإسبانية، مما يؤكد تأليف الكاتب الباروكي الشهير.
