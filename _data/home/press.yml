    summary:
      es: "Victoria M. Niño informa sobre la investigación de Germán Vega y Álvaro Cuéllar, que reatribuye La monja alférez a Juan Ruiz de Alarcón mediante análisis estilométricos y documentación histórica. La Compañía Nacional de Teatro de México estrena la obra en el Festival de Alcalá de Henares bajo la dirección de Zaide Silvia Gutiérrez."
      en: "Victoria M. Niño reports on the research by Germán Vega and Álvaro Cuéllar, which reattributes La monja alférez to Juan Ruiz de Alarcón through stylometric and historical analysis. Mexico’s National Theatre Company premiered the play at the Alcalá de Henares Festival under the direction of Zaide Silvia Gutiérrez."



  
      fr: Victoria M. Niño rend compte des recherches de Germán Vega et Álvaro Cuéllar, qui réattribuent La monja alférez à Juan Ruiz de Alarcón à travers une analyse stylométrique et historique. La Compagnie Nationale de Théâtre du Mexique a créé la pièce au Festival d’Alcalá de Henares sous la direction de Zaide Silvia Gutiérrez.
      pt: Victoria M. Niño relata a pesquisa de Germán Vega e Álvaro Cuéllar, que reatribui La monja alférez a Juan Ruiz de Alarcón através de análises estilométricas e históricas. A Companhia Nacional de Teatro do México estreou a peça no Festival Alcalá de Henares sob a direção de Zaide Silvia Gutiérrez.
      it: Victoria M. Niño riferisce della ricerca di Germán Vega e Álvaro Cuéllar, che riattribuisce La monja alférez a Juan Ruiz de Alarcón attraverso l'analisi stilometrica e storica. La Compagnia Teatrale Nazionale del Messico ha presentato lo spettacolo in anteprima al Festival di Alcalá de Henares sotto la direzione di Zaide Silvia Gutiérrez.
      de: Victoria M. Niño berichtet über die Forschung von Germán Vega und Álvaro Cuéllar, die La monja alférez durch stilometrische und historische Analyse wieder Juan Ruiz de Alarcón zuschreibt. Die mexikanische Nationaltheaterkompanie brachte das Stück beim Alcalá de Henares Festival unter der Leitung von Zaide Silvia Gutiérrez zur Uraufführung.
      zh: Victoria M. Niño 报道了 Germán Vega 和 Álvaro Cuéllar 的研究，该研究通过风格测量和历史分析将《La monja alférez》重新归因于 Juan Ruiz de Alarcón。墨西哥国家剧院公司在扎伊德·西尔维娅·古铁雷斯 (Zaide Silvia Gutiérrez) 的指导下，在阿尔卡拉·德·埃纳雷斯音乐节上首演了该剧。
      ja: Victoria M. Niño は、スタイロメーターと歴史的分析を通じて、La monja alférez を Juan Ruiz de Alarcón に再帰した、Germán Vega と Álvaro Cuéjar の研究について報告しています。メキシコ国立劇場は、ザイデ・シルビア・グティエレスの指揮のもと、アルカラ・デ・エナレスフェスティバルでこの劇を初演した。
      ko: Victoria M. Niño는 문체학적 및 역사적 분석을 통해 La monja alférez를 Juan Ruiz de Alarcón에게 귀속시키는 Germán Vega와 Álvaro Cuéllar의 연구에 대해 보고합니다. 멕시코 국립극단은 Zaide Silvia Gutiérrez의 지휘로 Alcalá de Henares Festival에서 이 연극을 초연했습니다.
      ru: Виктория М. Ниньо сообщает об исследовании Хермана Веги и Альваро Куэльяра, которые посредством стилометрического и исторического анализа относят La monja alférez к Хуану Руису де Аларкону. Национальная театральная труппа Мексики представила спектакль на фестивале в Алькала-де-Энарес под руководством Заиде Сильвии Гутьеррес.
      ar: تقدم فيكتوريا إم نينو تقريرًا عن البحث الذي أجراه جيرمان فيجا وألفارو كويلار، والذي يعيد نسب La monja alférez إلى خوان رويز دي ألاركون من خلال التحليل الأسلوبي والتاريخي. عرضت شركة المسرح الوطني المكسيكية المسرحية لأول مرة في مهرجان الكالا دي هيناريس تحت إشراف زيد سيلفيا جوتيريز.
