    summary:
      es: "El diario La Tribuna de Valladolid destaca el estreno de La francesa Laura en los Teatros del Canal, obra descubierta por los investigadores vallisoletanos Germán Vega y Álvaro Cuéllar mediante inteligencia artificial. El montaje, dirigido por Marta Poveda y protagonizado por la vallisoletana Sheyla Niño, presenta una lectura contemporánea y feminista sobre los celos y el amor en el Siglo de Oro."
      en: "La Tribuna de Valladolid reports on the premiere of La Francesa Laura at Teatros del Canal, a play discovered by Valladolid researchers Germán Vega and Álvaro Cuéllar through artificial intelligence. Directed by Marta Poveda and starring Valladolid actress Sheyla Niño, the production offers a contemporary and feminist perspective on jealousy and love in Spain’s Golden Age."



      fr: La Tribuna de Valladolid rapporte la première de La Francesa Laura au Teatros del Canal, une pièce découverte par les chercheurs de Valladolid Germán Vega et Álvaro Cuéllar grâce à l'intelligence artificielle. Réalisé par Marta Poveda et mettant en vedette l’actrice de Valladolid Sheyla Niño, la production offre une perspective contemporaine et féministe sur la jalousie et l’amour à l’âge d’or espagnol.
      pt: La Tribuna de Valladolid informa sobre a estreia de La Francesa Laura nos Teatros del Canal, peça descoberta pelos pesquisadores de Valladolid Germán Vega e Álvaro Cuéllar através da inteligência artificial. Dirigida por Marta Poveda e estrelada pela atriz de Valladolid, Sheyla Niño, a produção oferece uma perspectiva contemporânea e feminista sobre o ciúme e o amor na Idade de Ouro da Espanha.
      it: La Tribuna de Valladolid racconta la prima di La Francesa Laura al Teatros del Canal, un'opera scoperta dai ricercatori di Valladolid Germán Vega e Álvaro Cuéllar attraverso l'intelligenza artificiale. Diretta da Marta Poveda e interpretata dall'attrice di Valladolid Sheyla Niño, la produzione offre una prospettiva contemporanea e femminista sulla gelosia e l'amore nell'età dell'oro della Spagna.
      de: La Tribuna de Valladolid berichtet über die Premiere von La Francesa Laura im Teatros del Canal, einem Stück, das die Valladolid-Forscher Germán Vega und Álvaro Cuéllar mithilfe künstlicher Intelligenz entdeckt haben. Unter der Regie von Marta Poveda und mit der Valladolid-Schauspielerin Sheyla Niño in der Hauptrolle bietet die Produktion eine zeitgenössische und feministische Perspektive auf Eifersucht und Liebe im Goldenen Zeitalter Spaniens.
      zh: 《巴利亚多利德论坛报》报道了《弗朗西斯·劳拉》在运河剧院首演的情况，该剧是巴利亚多利德研究人员 Germán Vega 和 Álvaro Cuéllar 通过人工智能发现的一部戏剧。该作品由玛塔·波维达 (Marta Poveda) 执导，巴利亚多利德 (Valladolid) 女演员希拉·尼诺 (Sheyla Niño) 主演，从当代和女权主义的角度看待西班牙黄金时代的嫉妒和爱情。
      ja: ラ・トリブナ・デ・バリャドリッドは、バリャドリッドの研究者ジェルマン・ベガとアルバロ・クエヤルが人工知能を通じて発見した演劇、テアトロス・デル・カナルでの『ラ・フランセサ・ローラ』の初演について報じている。マルタ・ポベダが監督し、バリャドリードの女優シェイラ・ニーニョが主演したこの作品は、スペイン黄金時代の嫉妬と愛について現代的でフェミニスト的な視点を提供している。
      ko: La Tribuna de Valladolid는 바야돌리드 연구원 Germán Vega와 Álvaro Cuéllar가 인공 지능을 통해 발견한 연극인 Teatros del Canal에서 La Francesa Laura의 초연에 대해 보고합니다. 마르타 포베다(Marta Poveda)가 감독하고 바야돌리드 여배우 셰일라 니뇨(Sheyla Niño)가 주연을 맡은 이 작품은 스페인 황금 시대의 질투와 사랑에 대한 현대적이고 페미니스트적인 관점을 제공합니다.
      ru: La Tribuna de Valladolid сообщает о премьере спектакля «Франческа Лаура» в Театрос дель Канал, пьесы, обнаруженной исследователями Вальядолида Херманом Вегой и Альваро Куэльяром с помощью искусственного интеллекта. Спектакль, поставленный Мартой Поведа, с актрисой из Вальядолида Шейлой Ниньо в главной роли, предлагает современный и феминистский взгляд на ревность и любовь в золотой век Испании.
      ar: تقدم لا تريبونا دي بلد الوليد تقريرًا عن العرض الأول لفيلم La Francesa Laura في مسرح تياتروس ديل كانال، وهي مسرحية اكتشفها الباحثون في بلد الوليد، جيرمان فيجا وألفارو كويلار، من خلال الذكاء الاصطناعي. يقدم الإنتاج، من إخراج مارتا بوفيدا وبطولة ممثلة بلد الوليد شيلا نينو، منظورًا معاصرًا ونسويًا للغيرة والحب في العصر الذهبي لإسبانيا.
