    summary:
      es: "El periodista David Barreira informa en El Español del hallazgo de La francesa Laura, una comedia anónima de la Biblioteca Nacional de España que ha sido atribuida a Lope de Vega. El estudio, dirigido por Álvaro Cuéllar y Germán Vega, combina análisis filológicos con herramientas de inteligencia artificial como Transkribus para demostrar su autoría."
      en: "Journalist David Barreira reports in El Español on the discovery of La francesa Laura, an anonymous comedy held at Spain’s National Library now attributed to Lope de Vega. The study, led by Álvaro Cuéllar and Germán Vega, combines philological analysis with artificial-intelligence tools such as Transkribus to confirm its authorship."


      fr: Le journaliste David Barreira rapporte dans El Español la découverte de La francesa Laura, une comédie anonyme conservée à la Bibliothèque nationale d'Espagne et désormais attribuée à Lope de Vega. L'étude, dirigée par Álvaro Cuéllar et Germán Vega, combine l'analyse philologique avec des outils d'intelligence artificielle tels que Transkribus pour confirmer sa paternité.
      pt: O jornalista David Barreira relata no El Español a descoberta de La francesa Laura, uma comédia anônima mantida na Biblioteca Nacional da Espanha e agora atribuída a Lope de Vega. O estudo, liderado por Álvaro Cuéllar e Germán Vega, combina análise filológica com ferramentas de inteligência artificial como o Transkribus para confirmar a sua autoria.
      it: Il giornalista David Barreira riferisce su El Español della scoperta di La francesa Laura, una commedia anonima conservata presso la Biblioteca Nazionale spagnola e ora attribuita a Lope de Vega. Lo studio, condotto da Álvaro Cuéllar e Germán Vega, combina l'analisi filologica con strumenti di intelligenza artificiale come Transkribus per confermarne la paternità.
      de: Der Journalist David Barreira berichtet in El Español über die Entdeckung von La francesa Laura, einer anonymen Komödie aus der spanischen Nationalbibliothek, die jetzt Lope de Vega zugeschrieben wird. Die von Álvaro Cuéllar und Germán Vega geleitete Studie kombiniert philologische Analysen mit Werkzeugen der künstlichen Intelligenz wie Transkribus, um ihre Urheberschaft zu bestätigen.
      zh: 记者大卫·巴雷拉 (David Barreira) 在《西班牙语》上报道了《法国劳拉》(La francesa Laura) 的发现情况，这是西班牙国家图书馆收藏的一部匿名喜剧，目前归属于洛佩·德·维加 (Lope de Vega)。这项研究由 Álvaro Cuéllar 和 Germán Vega 领导，将语言学分析与 Transkribus 等人工智能工具相结合，以确认其作者身份。
      ja: ジャーナリストのデビッド・バレイラは、スペイン国立図書館に所蔵され、現在はロペ・デ・ベガ作とされる匿名の喜劇『ラ・フランセサ・ローラ』の発見についてエル・スペイン語で報告している。アルバロ・クエヤル氏とゲルマン・ベガ氏が主導するこの研究は、文献学的分析とTranskribusなどの人工知能ツールを組み合わせて、その著者であることを確認している。
      ko: 언론인 David Barreira는 현재 Lope de Vega의 것으로 추정되는 스페인 국립 도서관에서 개최된 익명의 코미디인 La francesa Laura의 발견에 대해 El Español에 보고합니다. Álvaro Cuéllar와 Germán Vega가 주도한 이 연구는 문헌학 분석과 Transkribus와 같은 인공 지능 도구를 결합하여 저자임을 확인했습니다.
      ru: Журналист Давид Баррейра сообщает в El Español об открытии «Французской Лауры», анонимной комедии, хранящейся в Национальной библиотеке Испании, теперь приписываемой Лопе де Веге. Исследование, проведенное Альваро Куэльяром и Херманом Вегой, сочетает в себе филологический анализ с инструментами искусственного интеллекта, такими как Transkribus, для подтверждения его авторства.
      ar: تقرير الصحفي ديفيد باريرا في صحيفة El Español عن اكتشاف La francesa Laura، وهي كوميديا ​​مجهولة المصدر محفوظة في المكتبة الوطنية الإسبانية وتُنسب الآن إلى Lope de Vega. تجمع الدراسة، التي أجراها ألفارو كويلار وجيرمان فيجا، بين التحليل اللغوي وأدوات الذكاء الاصطناعي مثل ترانسكريبوس لتأكيد هوية المؤلف.
