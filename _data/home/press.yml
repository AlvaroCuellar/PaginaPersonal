      en: "Journalist Eduardo Mesa Leiva reports in Historia y Vida on the premiere of La francesa Laura at Madrid’s Teatros del Canal, the unpublished play by Lope de Vega identified through artificial intelligence. Germán Vega and Álvaro Cuéllar explain the discovery process and how the Fundación Siglo de Oro and Marta Poveda have brought it to the contemporary stage."




      fr: Le journaliste Eduardo Mesa Leiva rapporte dans Historia y Vida la première de La francesa Laura au Teatros del Canal de Madrid, la pièce inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. Germán Vega et Álvaro Cuéllar expliquent le processus de découverte et comment la Fundación Siglo de Oro et Marta Poveda l'ont amené sur la scène contemporaine.
      pt: O jornalista Eduardo Mesa Leiva relata na História y Vida a estreia de La francesa Laura nos Teatros del Canal de Madrid, a peça inédita de Lope de Vega identificada através de inteligência artificial. Germán Vega e Álvaro Cuéllar explicam o processo de descoberta e como a Fundación Siglo de Oro e Marta Poveda o trouxeram para o cenário contemporâneo.
      it: Il giornalista Eduardo Mesa Leiva racconta su Historia y Vida la prima di La francesa Laura al Teatros del Canal di Madrid, l'opera inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. Germán Vega e Álvaro Cuéllar spiegano il processo di scoperta e come la Fundación Siglo de Oro e Marta Poveda lo hanno portato alla scena contemporanea.
      de: Der Journalist Eduardo Mesa Leiva berichtet in Historia y Vida über die Premiere von La francesa Laura im Teatros del Canal in Madrid, dem unveröffentlichten Stück von Lope de Vega, das durch künstliche Intelligenz identifiziert wurde. Germán Vega und Álvaro Cuéllar erklären den Entdeckungsprozess und wie die Fundación Siglo de Oro und Marta Poveda ihn auf die heutige Bühne gebracht haben.
      zh: 记者 Eduardo Mesa Leiva 在《Historia y Vida》中报道了《法国劳拉》在马德里运河剧院首演的情况，该剧是通过人工智能识别出的洛佩·德·维加未出版的戏剧。 Germán Vega 和 Álvaro Cuéllar 解释了这一发现过程，以及 Fundación Siglo de Oro 和 Marta Poveda 如何将其带入当代舞台。
      ja: ジャーナリストのエドゥアルド・メサ・レイバは、人工知能によって識別されたロペ・デ・ベガの未発表劇、マドリッドの運河劇場での『ラ・フランセサ・ラウラ』の初演について『ヒストリア・イ・ヴィダ』誌にレポートしている。ジェルマン・ベガとアルバロ・クエヤルが、発見のプロセスと、シグロ・デ・オロ財団とマルタ・ポベダがどのようにしてそれを現代の舞台にもたらしたかについて説明します。
      ko: 언론인 Eduardo Mesa Leiva는 인공 지능을 통해 식별된 Lope de Vega의 미출판 연극인 마드리드 Teatros del Canal에서 열린 La francesa Laura의 초연에 대해 Historia y Vida에서 보도합니다. Germán Vega와 Álvaro Cuéllar는 발견 과정과 Fundación Siglo de Oro와 Marta Poveda가 이를 어떻게 현대 무대로 가져왔는지 설명합니다.
      ru: Журналист Эдуардо Меса Лейва сообщает в журнале Historia y Vida о премьере «Французской Лауры» в мадридском Театрос дель Канал, неопубликованной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. Херман Вега и Альваро Куэльяр объясняют процесс открытия и то, как Fundación Siglo de Oro и Марта Поведа вывели его на современный уровень.
      ar: تقرير الصحفي إدواردو ميسا ليفا في Historia y Vida عن العرض الأول لفيلم La francesa Laura في مسرح Teatros del Canal بمدريد، وهي المسرحية غير المنشورة التي كتبها Lope de Vega والتي تم التعرف عليها من خلال الذكاء الاصطناعي. يشرح جيرمان فيجا وألفارو كويلار عملية الاكتشاف وكيف أوصلتها مؤسسة Siglo de Oro وMarta Poveda إلى المرحلة المعاصرة.
