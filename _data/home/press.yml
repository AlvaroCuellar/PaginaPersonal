    url: "https://historia.nationalgeographic.com.es/a/la-inteligencia-artificial-logra-identificar-una-obra-de-lope-de-vega_19061"
    thumbnail: "/assets/images/press/diez.png"
    type: "news"
    summary:
      es: "El periodista J. M. Sadurní relata en Historia National Geographic cómo las universidades de Valladolid y Viena, junto con la BNE y la UAB, han identificado La francesa Laura como una obra de Lope de Vega gracias a técnicas de inteligencia artificial y análisis estilométrico. La investigación, liderada por Álvaro Cuéllar y Germán Vega, fue publicada en el Anuario Lope de Vega."
      en: "Journalist J. M. Sadurní reports in Historia National Geographic on how researchers from the Universities of Valladolid and Vienna, together with Spain’s National Library and the UAB, identified La francesa Laura as a play by Lope de Vega using artificial intelligence and stylometric analysis. The study, led by Álvaro Cuéllar and Germán Vega, was published in the Anuario Lope de Vega."


      fr: Le journaliste J. M. Sadurní rapporte dans Historia National Geographic comment des chercheurs des universités de Valladolid et de Vienne, en collaboration avec la Bibliothèque nationale d'Espagne et l'UAB, ont identifié La francesa Laura comme une pièce de Lope de Vega en utilisant l'intelligence artificielle et l'analyse stylométrique. L'étude, dirigée par Álvaro Cuéllar et Germán Vega, a été publiée dans l'Anuario Lope de Vega.
      pt: O jornalista J. M. Sadurní relata na Historia National Geographic como pesquisadores das Universidades de Valladolid e Viena, juntamente com a Biblioteca Nacional da Espanha e a UAB, identificaram La francesa Laura como uma peça de Lope de Vega usando inteligência artificial e análise estilométrica. O estudo, liderado por Álvaro Cuéllar e Germán Vega, foi publicado no Anuario Lope de Vega.
      it: Il giornalista J. M. Sadurní riferisce su Historia National Geographic come ricercatori delle Università di Valladolid e Vienna, insieme alla Biblioteca Nazionale spagnola e all'UAB, hanno identificato La francesa Laura come un'opera teatrale di Lope de Vega utilizzando l'intelligenza artificiale e l'analisi stilometrica. Lo studio, condotto da Álvaro Cuéllar e Germán Vega, è stato pubblicato sull'Anuario Lope de Vega.
      de: Der Journalist J. M. Sadurní berichtet in Historia National Geographic darüber, wie Forscher der Universitäten Valladolid und Wien zusammen mit der spanischen Nationalbibliothek und der UAB La francesa Laura mithilfe künstlicher Intelligenz und stilometrischer Analyse als ein Stück von Lope de Vega identifizierten. Die von Álvaro Cuéllar und Germán Vega geleitete Studie wurde im Anuario Lope de Vega veröffentlicht.
      zh: 记者 J. M. Sadurní 在《国家地理历史》中报道了来自巴利亚多利德大学和维也纳大学以及西班牙国家图书馆和 UAB 的研究人员如何利用人工智能和风格分析将《法国劳拉》确定为洛佩·德·维加的戏剧。这项研究由 Álvaro Cuéllar 和 Germán Vega 领导，发表在《Anuario Lope de Vega》上。
      ja: ジャーナリストのJ・M・サドゥルニ氏は、バリャドリード大学とウィーン大学の研究者がスペイン国立図書館とUABと協力し、人工知能とスタイロメトリー分析を用いて『ラ・フランセサ・ラウラ』をロペ・デ・ベガの戯曲であると特定した経緯をヒストリア・ナショナル・ジオグラフィック誌に報告している。アルバロ・クエヤル氏とジェルマン・ベガ氏が主導したこの研究は、『アヌアリオ・ロペ・デ・ベガ』誌に掲載された。
      ko: 저널리스트 J. M. Sadurní는 바야돌리드 대학과 비엔나 대학, 스페인 국립 도서관 및 UAB의 연구자들이 인공 지능과 문체 분석을 사용하여 La francesa Laura를 Lope de Vega의 희곡으로 식별한 방법에 대해 Historia National Geographic에 보고했습니다. Álvaro Cuéllar와 Germán Vega가 주도한 이 연구는 Anuario Lope de Vega에 게재되었습니다.
      ru: Журналист Ж. М. Садурни сообщает в Historia National Geographic о том, как исследователи из университетов Вальядолида и Вены совместно с Национальной библиотекой Испании и UAB идентифицировали «Французскую Лауру» как пьесу Лопе де Веги с помощью искусственного интеллекта и стилометрического анализа. Исследование, проведенное Альваро Куэльяром и Херманом Вега, было опубликовано в журнале Anuario Lope de Vega.
      ar: تقرير الصحفي جيه إم سادورني في هيستوريا ناشيونال جيوغرافيك حول كيفية قيام باحثين من جامعتي بلد الوليد وفيينا، جنبًا إلى جنب مع المكتبة الوطنية الإسبانية وUAB، بتحديد La francesa Laura على أنها مسرحية من تأليف Lope de Vega باستخدام الذكاء الاصطناعي وتحليل قياس الأسلوب. نُشرت الدراسة، التي أجراها ألفارو كويلار وجيرمان فيغا، في مجلة Anuario Lope de Vega.
