    thumbnail: "/assets/images/press/67.png"
    type: "press"
    summary:
      es: "La revista Newsweek Argentina informó sobre el hallazgo de La francesa Laura, una obra inédita de Lope de Vega descubierta mediante inteligencia artificial. El artículo explica que investigadores de las universidades de Viena y Valladolid utilizaron la herramienta Transkribus para transcribir 1.300 manuscritos anónimos de la Biblioteca Nacional de España y, posteriormente, confirmar la autoría a través de análisis filológicos. También destaca la próxima edición del texto por el sello Gredos."
      en: "The magazine Newsweek Argentina reported on the discovery of La Francesa Laura, an unpublished play by Lope de Vega identified through artificial intelligence. The article explains that researchers from the universities of Vienna and Valladolid used the Transkribus tool to transcribe 1,300 anonymous manuscripts from Spain’s National Library and later confirmed the authorship through philological analysis. It also notes that the play will soon be published by Gredos."


      fr: Le magazine Newsweek Argentine a rapporté la découverte de La Francesa Laura, une pièce inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique que des chercheurs des universités de Vienne et de Valladolid ont utilisé l’outil Transkribus pour transcrire 1 300 manuscrits anonymes de la Bibliothèque nationale espagnole et ont ensuite confirmé la paternité par une analyse philologique. Il note également que la pièce sera bientôt publiée chez Gredos.
      pt: A revista Newsweek Argentina noticiou a descoberta de La Francesa Laura, peça inédita de Lope de Vega identificada por meio de inteligência artificial. O artigo explica que pesquisadores das universidades de Viena e Valladolid utilizaram a ferramenta Transkribus para transcrever 1.300 manuscritos anônimos da Biblioteca Nacional da Espanha e posteriormente confirmaram a autoria por meio de análise filológica. Informa ainda que a peça será publicada em breve pela Gredos.
      it: La rivista Newsweek Argentina ha riferito della scoperta di La Francesa Laura, un'opera inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. L’articolo spiega che i ricercatori delle università di Vienna e Valladolid hanno utilizzato lo strumento Transkribus per trascrivere 1.300 manoscritti anonimi della Biblioteca nazionale spagnola e successivamente ne hanno confermato la paternità attraverso l’analisi filologica. Si segnala inoltre che lo spettacolo sarà presto pubblicato da Gredos.
      de: Das Magazin Newsweek Argentina berichtete über die Entdeckung von La Francesa Laura, einem unveröffentlichten Stück von Lope de Vega, das mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel erklärt, dass Forscher der Universitäten Wien und Valladolid das Transkribus-Tool zur Transkription von 1.300 anonymen Manuskripten aus der spanischen Nationalbibliothek nutzten und später die Urheberschaft durch philologische Analysen bestätigten. Es wird auch darauf hingewiesen, dass das Stück bald bei Gredos veröffentlicht wird.
      zh: 《阿根廷新闻周刊》杂志报道了通过人工智能识别出的洛佩·德·维加未出版的戏剧《弗朗西斯·劳拉》的发现。文章解释说，维也纳大学和巴利亚多利德大学的研究人员使用 Transkribus 工具抄写了来自西班牙国家图书馆的 1300 份匿名手稿，随后通过语言学分析确认了作者身份。它还指出该剧将很快由格雷多斯出版。
      ja: 雑誌『ニューズウィーク・アルゼンチン』は、人工知能によって特定されたロペ・デ・ベガの未発表戯曲『ラ・フランセサ・ローラ』の発見について報じた。この記事では、ウィーン大学とバリャドリッド大学の研究者が、Transkribus ツールを使用してスペイン国立図書館から 1,300 件の匿名原稿を転記し、その後文献学的分析を通じて著者を確認したと説明しています。また、この戯曲は間もなくグレドス社から出版される予定であるとも記されている。
      ko: 뉴스위크 아르헨티나(Newsweek Argentina) 잡지는 인공지능을 통해 확인된 로페 데 베가의 미발표 희곡 라 프란체사 라우라(La Francesa Laura)의 발견을 보도했습니다. 기사에서는 비엔나 대학과 바야돌리드 대학의 연구자들이 Transkribus 도구를 사용하여 스페인 국립 도서관의 익명 사본 1,300개를 필사했으며 나중에 문헌 분석을 통해 저자임을 확인했다고 설명합니다. 또한 이 연극은 곧 Gredos에서 출판될 예정이라고 합니다.
      ru: Журнал Newsweek Argentina сообщил об открытии «La Francesa Laura», неопубликованной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье поясняется, что исследователи из университетов Вены и Вальядолида использовали инструмент Transkribus для расшифровки 1300 анонимных рукописей из Национальной библиотеки Испании, а затем подтвердили авторство посредством филологического анализа. Там также отмечается, что пьеса вскоре будет опубликована издательством Gredos.
      ar: أفادت مجلة نيوزويك الأرجنتين عن اكتشاف مسرحية لا فرانشيسا لورا، وهي مسرحية غير منشورة من تأليف لوبي دي فيغا تم التعرف عليها من خلال الذكاء الاصطناعي. يوضح المقال أن باحثين من جامعتي فيينا وبلد الوليد استخدموا أداة Transkribus لنسخ 1300 مخطوطة مجهولة المصدر من المكتبة الوطنية الإسبانية وأكدوا لاحقًا هوية التأليف من خلال التحليل اللغوي. ويلاحظ أيضًا أن المسرحية ستنشر قريبًا بواسطة Gredos.
