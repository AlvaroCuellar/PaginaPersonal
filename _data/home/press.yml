      de: Sie entdecken eine unbekannte Komödie von Lope de Vega
      zh: 他们发现了一部由洛普·德·维加创作的未知喜剧
      ja: 彼らはロペ・デ・ベガの未知のコメディーを発見する
      ko: 그들은 로페 데 베가의 알려지지 않은 코미디를 발견합니다
      ru: Они обнаруживают неизвестную комедию Лопе де Веги.
      ar: يكتشفون كوميديا ​​غير معروفة من تأليف Lope de Vega
    outlet: "Madrid Press"
    date: "2021-05-28"
    url: "https://madridpress.com/archive/288885/descubren-una-comedia-desconocida-de-lope-de-vega"
    thumbnail: "/assets/images/press/uno.png"
    type: "news"
    summary:
      es: "Se ha identificado en los fondos de la Biblioteca Nacional de España una comedia titulada «Yo he hecho lo que he podido, Fortuna lo que ha querido», atribuida hasta hoy a otro autor, pero que un estudio estilométrico demuestra pertenece al dramaturgo Lope de Vega. La obra podría datar de 1632-34 y aludir de forma velada a la vida política del momento."
      en: "A previously unknown comedy titled “Yo he hecho lo que he podido, Fortuna lo que ha querido” has been identified in the holdings of the National Library of Spain. While attributed to another author, a stylometric study shows it belongs to playwright Lope de Vega and likely dates from 1632–34, possibly encoding political references of its time."


      fr: Une comédie jusqu'alors inconnue intitulée « Yo he hecho lo que he podido, Fortuna lo que ha querido » a été identifiée dans les fonds de la Bibliothèque nationale d'Espagne. Bien qu'attribuée à un autre auteur, une étude stylométrique montre qu'elle appartient au dramaturge Lope de Vega et date probablement de 1632-1634, codant peut-être des références politiques de son époque.
      pt: Uma comédia até então desconhecida intitulada “Yo he hecho lo que he podido, Fortuna lo que ha querido” foi identificada no acervo da Biblioteca Nacional da Espanha. Embora atribuído a outro autor, um estudo estilométrico mostra que pertence ao dramaturgo Lope de Vega e data provavelmente de 1632 a 1634, possivelmente codificando referências políticas de sua época.
      it: Una commedia precedentemente sconosciuta intitolata “Yo he hecho lo que he podido, Fortuna lo que ha querido” è stata identificata nel patrimonio della Biblioteca Nazionale di Spagna. Sebbene attribuito a un altro autore, uno studio stilometrico mostra che appartiene al drammaturgo Lope de Vega e risale probabilmente al 1632-34, forse codificando riferimenti politici dell'epoca.
      de: In den Beständen der spanischen Nationalbibliothek wurde eine bisher unbekannte Komödie mit dem Titel „Yo he hecho lo que he podido, Fortuna lo que ha querido“ identifiziert. Obwohl es einem anderen Autor zugeschrieben wird, zeigt eine stilometrische Studie, dass es dem Dramatiker Lope de Vega gehört und wahrscheinlich aus den Jahren 1632–34 stammt, was möglicherweise politische Bezüge seiner Zeit enthält.
      zh: 一部以前不为人知的喜剧，名为“Yo he hecho lo que he podido, Fortuna lo que ha querido”，已在西班牙国家图书馆藏品中被发现。虽然被认为是另一位作者的作品，但风格测量研究表明它属于剧作家洛佩·德·维加 (Lope de Vega)，年代可能为 1632-34 年，可能包含了当时的政治参考文献。
      ja: 「Yo he hecho lo que he podido, Fortuna lo que ha querido」というタイトルのこれまで知られていなかったコメディが、スペイン国立図書館の所蔵品で確認された。別の作者によるものとされていますが、スタイロメーターの研究により、この作品は劇作家ロペ・デ・ベガのものであり、おそらく 1632 年から 1634 年に作られたものであることが示されており、おそらく当時の政治的言及が符号化されています。
      ko: 이전에 알려지지 않았던 "Yo he hecho lo que he podido, Fortuna lo que ha querido"라는 제목의 코미디가 스페인 국립도서관 소장품에서 확인되었습니다. 다른 작가의 작품으로 여겨지지만 문체학적 연구에 따르면 이 작품은 극작가 로페 데 베가의 작품으로 추정되며 1632~34년의 작품으로 추정되며 당시의 정치적 언급을 암호화했을 가능성이 있습니다.
      ru: Ранее неизвестная комедия под названием «Yo he hecho lo que he podido, Fortuna lo que ha querido» была обнаружена в фондах Национальной библиотеки Испании. Хотя оно принадлежит другому автору, стилометрическое исследование показывает, что оно принадлежит драматургу Лопе де Вега и, вероятно, датируется 1632–1634 годами, что, возможно, кодирует политические отсылки того времени.
      ar: تم التعرف على فيلم كوميدي غير معروف سابقًا بعنوان "Yo he hecho lo que he podido, Fortuna lo que ha querido" في مقتنيات المكتبة الوطنية الإسبانية. بينما تُنسب إلى مؤلف آخر، تظهر دراسة أسلوبية أنها تنتمي إلى الكاتب المسرحي لوبي دي فيغا ومن المحتمل أن يعود تاريخها إلى الفترة من 1632 إلى 1634، وربما ترمز إلى المراجع السياسية في عصرها.
  - id: "press02"
    title:
      es: "'La monja alférez', Siglo de Oro travestido"
      en: "'The Lieutenant Nun', a Cross-Dressed Golden Age Play"
      fr: « Le lieutenant-nonne », une pièce de théâtre travestie de l'âge d'or
      pt: "'The Lieutenant Nun', uma peça travestida da Idade de Ouro"
      it: "\"La tenente monaca\", un'opera teatrale dell'età dell'oro travestita"
      de: „The Lieutenant Nun“, ein Cross-Dressed-Theaterstück aus dem Goldenen Zeitalter
      zh: 黄金时代的变装剧《修女中尉》
      ja: 女装黄金時代の劇「尼僧中尉」
      ko: 남장을 한 황금시대 연극 '수녀 중위'
      ru: «Лейтенант-монахиня», пьеса Золотого века в переодетой одежде
      ar: '"الملازم الراهبة"، مسرحية من العصر الذهبي بملابس متقاطعة'
    outlet: "El Cultural (El Español)"
    date: "2022-07-01"
    url: "https://www.elespanol.com/el-cultural/escenarios/teatro/20220701/monja-alferez-siglo-oro-travestido/684182101_0.html"
    thumbnail: "/assets/images/press/dos.png"
    type: "news"
    summary:
      es: "El artículo de Alberto Ojeda en El Cultural analiza la atribución de La monja alférez al dramaturgo novohispano Juan Ruiz de Alarcón, tras los estudios estilométricos de Germán Vega y Álvaro Cuéllar. La investigación, apoyada en la herramienta ETso, demuestra que la obra tradicionalmente atribuida a Pérez de Montalbán pertenece en realidad a Ruiz de Alarcón."
      en: "An article by Alberto Ojeda in El Cultural discusses the attribution of La monja alférez to the New Spanish playwright Juan Ruiz de Alarcón, following stylometric research by Germán Vega and Álvaro Cuéllar. Using the ETso tool, their study shows that the play, long attributed to Pérez de Montalbán, actually belongs to Ruiz de Alarcón."


      fr: Un article d'Alberto Ojeda dans El Cultural discute de l'attribution de La monja alférez au nouveau dramaturge espagnol Juan Ruiz de Alarcón, à la suite des recherches stylométriques de Germán Vega et Álvaro Cuéllar. Grâce à l'outil ETso, leur étude montre que la pièce, longtemps attribuée à Pérez de Montalbán, appartient en réalité à Ruiz de Alarcón.
      pt: Um artigo de Alberto Ojeda no El Cultural discute a atribuição de La monja alférez ao novo dramaturgo espanhol Juan Ruiz de Alarcón, seguindo pesquisas estilométricas de Germán Vega e Álvaro Cuéllar. Utilizando a ferramenta ETso, o estudo mostra que a peça, há muito atribuída a Pérez de Montalbán, na verdade pertence a Ruiz de Alarcón.
      it: Un articolo di Alberto Ojeda su El Cultural discute l'attribuzione di La monja alférez al drammaturgo neo-spagnolo Juan Ruiz de Alarcón, a seguito della ricerca stilometrica di Germán Vega e Álvaro Cuéllar. Utilizzando lo strumento ETso, il loro studio mostra che l'opera, a lungo attribuita a Pérez de Montalbán, in realtà appartiene a Ruiz de Alarcón.
      de: Ein Artikel von Alberto Ojeda in El Cultural diskutiert die Zuschreibung von La monja alférez an den neuen spanischen Dramatiker Juan Ruiz de Alarcón, basierend auf stilometrischen Forschungen von Germán Vega und Álvaro Cuéllar. Mithilfe des ETso-Tools zeigt ihre Studie, dass das Stück, das lange Zeit Pérez de Montalbán zugeschrieben wurde, tatsächlich Ruiz de Alarcón gehört.
      zh: 阿尔贝托·奥赫达 (Alberto Ojeda) 在《文化》杂志上发表的一篇文章讨论了西班牙新剧作家胡安·鲁伊斯·德·阿拉尔孔 (Juan Ruiz de Alarcón) 的作品《La monja alférez》的归属，这是在德国人维加 (Germán Vega) 和阿尔瓦罗·奎利亚尔 (Álvaro Cuéllar) 的风格测量研究之后进行的。使用 ETso 工具，他们的研究表明，这部长期以来被认为是佩雷斯·德·蒙塔尔班 (Pérez de Montalbán) 创作的戏剧实际上属于鲁伊斯·德·阿拉尔孔 (Ruiz de Alarcón)。
      ja: 『El Culture』のアルベルト・オヘダによる記事では、ジェルマン・ベガとアルバロ・クエヤルによるスタイロメーターの研究に基づいて、『ラ・モンハ・アルフェレス』の帰属が新スペインの劇作家フアン・ルイス・デ・アラルコンであると論じている。 ETso ツールを使用した彼らの研究は、長らくペレス・デ・モンタルバンのものとされてきたこの劇が、実際にはルイス・デ・アラルコンのものであることを示した。
      ko: El Cultural의 Alberto Ojeda의 기사에서는 Germán Vega와 Álvaro Cuéllar의 문체학적 연구에 따라 La monja alférez가 신스페인 극작가 Juan Ruiz de Alarcón의 작품이라고 설명합니다. ETso 도구를 사용하여 그들의 연구에 따르면 오랫동안 Pérez de Montalbán의 작품으로 여겨졌던 이 연극이 실제로는 Ruiz de Alarcón의 작품이라는 사실이 밝혀졌습니다.
      ru: В статье Альберто Охеды в Elcultural обсуждается приписывание La monja alférez новому испанскому драматургу Хуану Руису де Аларкону на основе стилометрических исследований Хермана Веги и Альваро Куэльяра. Используя инструмент ETso, их исследование показывает, что пьеса, долгое время приписывавшаяся Пересу де Монтальбану, на самом деле принадлежит Руису де Аларкону.
      ar: يناقش مقال بقلم ألبرتو أوجيدا في El Culture إسناد La monja alférez إلى الكاتب المسرحي الإسباني الجديد خوان رويز دي ألاركون، بعد البحث الأسلوبي الذي أجراه جيرمان فيجا وألفارو كويلار. وباستخدام أداة ETso، أظهرت دراستهم أن المسرحية، التي كانت تُنسب منذ فترة طويلة إلى بيريز دي مونتالبان، تنتمي في الواقع إلى رويز دي ألاركون.
