    thumbnail: "/assets/images/press/cuatro.png"
    type: "news"
    summary:
      es: "Una comedia desconocida de Lope de Vega ha sido descubierta en los fondos de la Biblioteca Nacional de España, tras un estudio que revela que podría pertenecer a la etapa de madurez del autor y contener alusiones veladas a la situación política de su tiempo."
      en: "An unknown comedy by Lope de Vega has been discovered in the collections of the National Library of Spain, following a study suggesting it belongs to the playwright’s mature period and contains veiled references to the political context of its time."


      fr: Une comédie inconnue de Lope de Vega a été découverte dans les collections de la Bibliothèque nationale d’Espagne, suite à une étude suggérant qu’elle appartient à la période de maturité du dramaturge et contient des références voilées au contexte politique de son époque.
      pt: Uma comédia desconhecida de Lope de Vega foi descoberta nas coleções da Biblioteca Nacional de Espanha, na sequência de um estudo que sugere que pertence ao período de maturidade do dramaturgo e contém referências veladas ao contexto político da sua época.
      it: Una commedia sconosciuta di Lope de Vega è stata scoperta nelle collezioni della Biblioteca Nazionale di Spagna, in seguito a uno studio che suggerisce che appartenga al periodo maturo del drammaturgo e contenga velati riferimenti al contesto politico del suo tempo.
      de: Eine unbekannte Komödie von Lope de Vega wurde in den Sammlungen der spanischen Nationalbibliothek entdeckt. Eine Studie ergab, dass sie zur Reifezeit des Dramatikers gehört und verschleierte Bezüge zum politischen Kontext seiner Zeit enthält.
      zh: 西班牙国家图书馆的藏品中发现了洛佩·德·维加创作的一部不知名的喜剧，一项研究表明该剧属于这位剧作家的成熟时期，并且隐含着对当时政治背景的提及。
      ja: ロペ・デ・ベガの未知の喜劇が、劇作家の円熟期に属し、当時の政治的文脈へのベールに包まれた言及が含まれていることが研究により示唆され、スペイン国立図書館のコレクションで発見された。
      ko: 로페 데 베가(Lope de Vega)의 알려지지 않은 희극이 스페인 국립 도서관의 소장품에서 발견되었습니다. 연구에 따르면 이 희극은 극작가의 성숙기에 속하며 당시의 정치적 맥락에 대한 은밀한 언급이 포함되어 있습니다.
      ru: Неизвестная комедия Лопе де Веги была обнаружена в фондах Национальной библиотеки Испании после исследования, показавшего, что она принадлежит зрелому периоду творчества драматурга и содержит завуалированные отсылки к политическому контексту своего времени.
      ar: تم اكتشاف مسرحية كوميدية غير معروفة للكاتب المسرحي لوبي دي فيغا ضمن مجموعات المكتبة الوطنية الإسبانية، بعد دراسة تشير إلى أنها تنتمي إلى فترة نضج الكاتب المسرحي وتحتوي على إشارات مستترة إلى السياق السياسي في عصره.
  - id: "press01"
    title:
      es: "Descubren una comedia desconocida de Lope de Vega"
      en: "They discover an unknown comedy by Lope de Vega"
