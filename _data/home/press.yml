      ja: La Provincia は、人工知能と文書遺産の保存に特化した El Museo Canario の会議について報じています。この記事では、アルバロ・クエヤル・ゴンサレス氏が開会講演を行い、歴史アーカイブの研究と保存における AI の可能性について議論したことを強調しています。
