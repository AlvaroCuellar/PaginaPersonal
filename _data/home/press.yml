    summary:
      es: "El diario hongkonés Oriental Daily News informó que un equipo internacional utilizó inteligencia artificial para transcribir 1.300 manuscritos anónimos conservados en la Biblioteca Nacional de España, descubriendo entre ellos una obra inédita de Lope de Vega titulada La francesa Laura. El artículo detalla que investigadores de las universidades de Viena y Valladolid confirmaron la autoría del dramaturgo a partir del análisis del vocabulario y el estilo, destacando el valor de la pieza como ejemplo de su producción tardía."
      en: "The Hong Kong newspaper Oriental Daily News reported that an international team used artificial intelligence to transcribe 1,300 anonymous manuscripts from Spain’s National Library, discovering among them an unpublished play by Lope de Vega titled La Francesa Laura. The article notes that researchers from the Universities of Vienna and Valladolid confirmed the playwright’s authorship through stylistic and lexical analysis, highlighting the play’s importance as a mature work from his later period."



      fr: Le journal de Hong Kong Oriental Daily News a rapporté qu'une équipe internationale a utilisé l'intelligence artificielle pour transcrire 1 300 manuscrits anonymes de la Bibliothèque nationale espagnole, découvrant parmi eux une pièce inédite de Lope de Vega intitulée La Francesa Laura. L’article note que des chercheurs des universités de Vienne et de Valladolid ont confirmé la paternité du dramaturge à travers une analyse stylistique et lexicale, soulignant l’importance de la pièce en tant qu’œuvre de maturité de sa période ultérieure.
      pt: O jornal Oriental Daily News de Hong Kong informou que uma equipa internacional utilizou inteligência artificial para transcrever 1.300 manuscritos anónimos da Biblioteca Nacional de Espanha, descobrindo entre eles uma peça inédita de Lope de Vega intitulada La Francesa Laura. O artigo observa que investigadores das Universidades de Viena e Valladolid confirmaram a autoria do dramaturgo através de análises estilísticas e lexicais, destacando a importância da peça como uma obra madura do seu período posterior.
      it: Il quotidiano di Hong Kong Oriental Daily News ha riferito che un team internazionale ha utilizzato l’intelligenza artificiale per trascrivere 1.300 manoscritti anonimi dalla Biblioteca nazionale spagnola, scoprendo tra questi un’opera inedita di Lope de Vega intitolata La Francesa Laura. L’articolo rileva che ricercatori delle Università di Vienna e Valladolid hanno confermato la paternità del drammaturgo attraverso un’analisi stilistica e lessicale, evidenziando l’importanza dell’opera come opera matura del suo periodo successivo.
      de: Die Hongkonger Zeitung Oriental Daily News berichtete, dass ein internationales Team mithilfe künstlicher Intelligenz 1.300 anonyme Manuskripte aus der spanischen Nationalbibliothek transkribiert und dabei ein unveröffentlichtes Theaterstück von Lope de Vega mit dem Titel „La Francesa Laura“ entdeckt habe. In dem Artikel wird darauf hingewiesen, dass Forscher der Universitäten Wien und Valladolid die Urheberschaft des Dramatikers durch stilistische und lexikalische Analysen bestätigten und die Bedeutung des Stücks als reifes Werk aus seiner späteren Schaffenszeit hervorhoben.
      zh: 香港《东方日报》报道称，一支国际团队利用人工智能抄写了西班牙国家图书馆的 1300 份匿名手稿，其中发现了洛佩·德·维加未出版的戏剧《弗朗西斯·劳拉》。文章指出，维也纳大学和巴利亚多利德大学的研究人员通过文体和词汇分析确认了剧作家的作者身份，强调了该剧作为他后期成熟作品的重要性。
      ja: 香港の新聞オリエンタル・デイリー・ニュースは、国際チームが人工知能を利用してスペイン国立図書館から1,300件の匿名原稿を転記し、その中にロペ・デ・ベガの「ラ・フランセサ・ローラ」というタイトルの未発表戯曲を発見したと報じた。記事は、ウィーン大学とバリャドリード大学の研究者らが文体と語彙の分析を通じてこの劇作家の著作者であることを確認し、後期の成熟した作品としてのこの劇の重要性を強調していると述べている。
      ko: 홍콩 신문인 오리엔탈 데일리 뉴스(Oriental Daily News)는 국제 팀이 인공 지능을 사용하여 스페인 국립 도서관의 익명 원고 1,300개를 필사했으며 그중에서 로페 데 베가의 미발표 희곡 <라 프란체사 라우라(La Francesa Laura)>를 발견했다고 보도했습니다. 기사는 비엔나 대학과 바야돌리드 대학의 연구자들이 문체 및 어휘 분석을 통해 극작가의 저자임을 확인했으며, 후기 시대의 성숙한 작품으로서 이 극의 중요성을 강조했다고 지적합니다.
      ru: Гонконгская газета Oriental Daily News сообщила, что международная команда использовала искусственный интеллект для расшифровки 1300 анонимных рукописей из Национальной библиотеки Испании, обнаружив среди них неопубликованную пьесу Лопе де Веги под названием «La Francesa Laura». В статье отмечается, что исследователи университетов Вены и Вальядолида посредством стилистического и лексического анализа подтвердили авторство драматурга, подчеркнув значение пьесы как зрелого произведения его позднего периода.
      ar: وذكرت صحيفة أورينتال ديلي نيوز في هونج كونج أن فريقًا دوليًا استخدم الذكاء الاصطناعي لنسخ 1300 مخطوطة مجهولة المصدر من المكتبة الوطنية الإسبانية، واكتشف من بينها مسرحية غير منشورة للوب دي فيجا بعنوان لا فرانسيسا لورا. ويشير المقال إلى أن باحثين من جامعتي فيينا وبلد الوليد أكدوا تأليف الكاتب المسرحي من خلال التحليل الأسلوبي والمعجمي، مما سلط الضوء على أهمية المسرحية كعمل ناضج من فترة لاحقة له.
