      es: "Julio Bravo publica en ABC una crítica sobre el estreno de 'La francesa Laura', comedia inédita de Lope de Vega atribuida mediante inteligencia artificial. Destaca la dirección de Marta Poveda y el equilibrio entre fidelidad al texto áureo y mirada contemporánea, con una puesta en escena inspirada en el Corral de Comedias de Almagro."
      en: "Julio Bravo reviews in ABC the premiere of 'La francesa Laura', an unpublished play by Lope de Vega attributed through artificial intelligence. He highlights Marta Poveda’s direction and the balance between fidelity to Golden Age theatre and a modern perspective, with staging inspired by Almagro’s Corral de Comedias."



      fr: Julio Bravo revient sur ABC sur la première de "La francesa Laura", une pièce inédite de Lope de Vega attribuée grâce à l'intelligence artificielle. Il met en valeur la mise en scène de Marta Poveda et l’équilibre entre la fidélité au théâtre du Siècle d’Or et une perspective moderne, avec une mise en scène inspirée du Corral de Comedias d’Almagro.
      pt: Julio Bravo analisa na ABC a estreia de 'La francesa Laura', peça inédita de Lope de Vega atribuída por meio de inteligência artificial. Destaca a direção de Marta Poveda e o equilíbrio entre a fidelidade ao teatro da Idade de Ouro e uma perspectiva moderna, com encenação inspirada no Corral de Comedias de Almagro.
      it: Julio Bravo recensisce su ABC la prima di 'La francesa Laura', un'opera inedita di Lope de Vega attribuita all'intelligenza artificiale. Mette in risalto la regia di Marta Poveda e l’equilibrio tra fedeltà al teatro dell’Età dell’Oro e una prospettiva moderna, con una messa in scena ispirata al Corral de Comedias di Almagro.
      de: Julio Bravo rezensiert in ABC die Premiere von „La francesa Laura“, einem unveröffentlichten Stück von Lope de Vega, das auf künstlicher Intelligenz basiert. Er hebt Marta Povedas Regie und die Balance zwischen der Treue zum Theater des Goldenen Zeitalters und einer modernen Perspektive hervor, mit einer Inszenierung, die von Almagros Corral de Comedias inspiriert ist.
      zh: 胡里奥·布拉沃 (Julio Bravo) 在美国广播公司 (ABC) 上评论了《法国劳拉》(La francesa Laura) 的首映式，该剧是洛佩·德·维加 (Lope de Vega) 未出版的戏剧，由人工智能创作。他强调了 Marta Poveda 的方向以及对黄金时代戏剧的忠诚与现代视角之间的平衡，其舞台表演灵感来自阿尔马格罗的 Corral de Comedias。
      ja: フリオ・ブラボーがABCで、人工知能によるものとされるロペ・デ・ベガの未発表劇「ラ・フランセサ・ローラ」の初演を批評する。彼は、マルタ ポベダの演出と、アルマグロのコメディ劇場にインスピレーションを得た演出で、黄金時代の演劇への忠実さと現代的な視点とのバランスを強調しています。
      ko: Julio Bravo는 인공 지능을 활용한 Lope de Vega의 미발표 희곡 'La francesa Laura'의 초연을 ABC에서 리뷰합니다. 그는 Almagro의 Corral de Comedias에서 영감을 받은 무대를 통해 Marta Poveda의 방향과 황금 시대 극장에 대한 충실도와 현대적인 관점 사이의 균형을 강조합니다.
      ru: Хулио Браво рецензирует на канале ABC премьеру «Французской Лауры», неопубликованной пьесы Лопе де Веги, приписываемой искусственному интеллекту. Он подчеркивает направление Марты Поведы и баланс между верностью театру Золотого века и современной перспективой, с постановкой, вдохновленной «Корралем комедий» Альмагро.
      ar: يستعرض خوليو برافو على قناة ABC العرض الأول لمسرحية "La francesa Laura"، وهي مسرحية غير منشورة للكاتب Lope de Vega تُعزى إلى الذكاء الاصطناعي. وهو يسلط الضوء على اتجاه مارتا بوفيدا والتوازن بين الإخلاص لمسرح العصر الذهبي والمنظور الحديث، مع عرض مسرحي مستوحى من كورال دي كوميدياس لألماغرو.
