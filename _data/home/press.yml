    thumbnail: "/assets/images/press/83.png"
    type: "news"
    summary:
      es: "Europa Press cubre las III Jornadas de Patrimonio Documental de El Museo Canario, celebradas bajo el título «Recursos y procedimientos digitales». La pieza subraya que Álvaro Cuéllar González, especialista en inteligencia artificial y lingüística computacional de la UAB, abrió el programa con una ponencia sobre la relación entre patrimonio documental y tecnología."
      en: "Europa Press covers El Museo Canario's 3rd Documentary Heritage Conference, held under the title 'Digital Resources and Procedures'. The article notes that Álvaro Cuéllar González, a specialist in artificial intelligence and computational linguistics at the UAB, opened the program with a lecture on the relationship between documentary heritage and technology."


      fr: Europa Press couvre la IIIe Conférence sur le patrimoine documentaire du Musée Canario, organisée sous le titre « Ressources et procédures numériques ». L'article souligne qu'Álvaro Cuéllar González, spécialiste en intelligence artificielle et linguistique informatique à l'UAB, a ouvert le programme par une conférence sur la relation entre patrimoine documentaire et technologie.
      pt: Europa Press cobre a 3ª Conferência do Património Documental do El Museo Canario, realizada sob o título 'Recursos e Procedimentos Digitais'. O artigo destaca que Álvaro Cuéllar González, especialista em inteligência artificial e linguística computacional da UAB, abriu o programa com uma palestra sobre a relação entre patrimônio documental e tecnologia.
      it: Europa Press copre la terza conferenza sul patrimonio documentario del Museo Canario, intitolata "Risorse e procedure digitali". L'articolo rileva che Álvaro Cuéllar González, specialista in intelligenza artificiale e linguistica computazionale presso l'UAB, ha aperto il programma con una conferenza sul rapporto tra patrimonio documentario e tecnologia.
      de: Europa Press berichtet über die 3. Konferenz zum Dokumentarischen Erbe des Museo Canario, die unter dem Titel „Digitale Ressourcen und Verfahren“ stattfand. In dem Artikel heißt es, dass Álvaro Cuéllar González, Spezialist für künstliche Intelligenz und Computerlinguistik an der UAB, das Programm mit einem Vortrag über die Beziehung zwischen dokumentarischem Erbe und Technologie eröffnete.
      zh: Europa Press 报道了 El Museo Canario 举办的第三届纪录片遗产会议，该会议的标题是“数字资源和程序”。文章指出，阿拉巴马大学人工智能和计算语言学专家阿尔瓦罗·奎利亚尔·冈萨雷斯 (Álvaro Cuéllar González) 以关于文献遗产与技术之间关系的讲座拉开了该项目的序幕。
      ja: Europa Press は、「デジタル リソースと手順」というタイトルで開催された El Museo Canario の第 3 回ドキュメンタリー遺産カンファレンスを取り上げています。記事は、UABの人工知能と計算言語学の専門家であるアルバロ・クエヤル・ゴンサレス氏がドキュメンタリー遺産とテクノロジーの関係についての講義でプログラムの冒頭を務めたと述べている。
      ko: Europa Press는 '디지털 자원 및 절차'라는 제목으로 개최된 El Museo Canario의 제3차 다큐멘터리 유산 컨퍼런스를 다루고 있습니다. 기사에서는 UAB의 인공 지능 및 컴퓨터 언어학 전문가인 Álvaro Cuéllar González가 다큐멘터리 유산과 기술의 관계에 대한 강의로 프로그램을 시작했다고 언급합니다.
      ru: Europa Press освещает 3-ю конференцию по документальному наследию El Museo Canario, проходящую под названием «Цифровые ресурсы и процедуры». В статье отмечается, что Альваро Куэльяр Гонсалес, специалист по искусственному интеллекту и компьютерной лингвистике UAB, открыл программу лекцией о взаимосвязи между документальным наследием и технологиями.
      ar: تغطي أوروبا برس مؤتمر التراث الوثائقي الثالث لمتحف كناريو، والذي عقد تحت عنوان "الموارد والإجراءات الرقمية". ويشير المقال إلى أن ألفارو كويلار غونزاليس، المتخصص في الذكاء الاصطناعي واللغويات الحاسوبية في UAB، افتتح البرنامج بمحاضرة حول العلاقة بين التراث الوثائقي والتكنولوجيا.
