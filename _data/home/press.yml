      es: "El diario francés Le Figaro publicó un artículo de Mathieu de Taillac sobre el hallazgo de La francesa Laura, una comedia inédita de Lope de Vega identificada gracias a la inteligencia artificial. El texto explica cómo los investigadores Álvaro Cuéllar y Germán Vega aplicaron análisis estilométricos mediante los programas Transkribus y Stylo dentro del proyecto ETSO, en colaboración con la Biblioteca Nacional de España. El reportaje destaca el valor de la IA como herramienta para la investigación filológica y la recuperación de textos perdidos del Siglo de Oro."
      en: "The French newspaper Le Figaro published an article by Mathieu de Taillac on the discovery of La Francesa Laura, an unpublished comedy by Lope de Vega identified through artificial intelligence. The report explains how researchers Álvaro Cuéllar and Germán Vega used stylometric analysis with the Transkribus and Stylo programs within the ETSO project, in collaboration with Spain’s National Library. The article emphasizes the role of AI as a key tool for philological research and the recovery of lost Golden Age texts."


      fr: Le journal français Le Figaro a publié un article de Mathieu de Taillac sur la découverte de La Francesa Laura, une comédie inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. Le rapport explique comment les chercheurs Álvaro Cuéllar et Germán Vega ont utilisé l’analyse stylométrique avec les programmes Transkribus et Stylo du projet ETSO, en collaboration avec la Bibliothèque nationale espagnole. L’article met l’accent sur le rôle de l’IA en tant qu’outil clé pour la recherche philologique et la récupération des textes perdus de l’âge d’or.
      pt: O jornal francês Le Figaro publicou um artigo de Mathieu de Taillac sobre a descoberta de La Francesa Laura, comédia inédita de Lope de Vega identificada através de inteligência artificial. O relatório explica como os investigadores Álvaro Cuéllar e Germán Vega utilizaram a análise estilométrica com os programas Transkribus e Stylo no âmbito do projecto ETSO, em colaboração com a Biblioteca Nacional de Espanha. O artigo enfatiza o papel da IA ​​como ferramenta fundamental para a pesquisa filológica e a recuperação de textos perdidos da Idade de Ouro.
      it: Il quotidiano francese Le Figaro ha pubblicato un articolo di Mathieu de Taillac sulla scoperta de La Francesa Laura, una commedia inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. Il rapporto spiega come i ricercatori Álvaro Cuéllar e Germán Vega hanno utilizzato l’analisi stilometrica con i programmi Transkribus e Stylo nell’ambito del progetto ETSO, in collaborazione con la Biblioteca nazionale spagnola. L’articolo sottolinea il ruolo dell’intelligenza artificiale come strumento chiave per la ricerca filologica e il recupero dei testi perduti dell’Età dell’Oro.
      de: Die französische Zeitung Le Figaro veröffentlichte einen Artikel von Mathieu de Taillac über die Entdeckung von La Francesa Laura, einer unveröffentlichten Komödie von Lope de Vega, die durch künstliche Intelligenz identifiziert wurde. Der Bericht erklärt, wie die Forscher Álvaro Cuéllar und Germán Vega stilometrische Analysen mit den Programmen Transkribus und Stylo im Rahmen des ETSO-Projekts in Zusammenarbeit mit der spanischen Nationalbibliothek verwendeten. Der Artikel betont die Rolle der KI als Schlüsselinstrument für die philologische Forschung und die Wiederherstellung verlorener Texte des Goldenen Zeitalters.
      zh: 法国《费加罗报》发表了马蒂厄·德·塔拉克 (Mathieu de Taillac) 的一篇文章，内容涉及通过人工智能识别洛普·德·维加 (Lope de Vega) 未出版的喜剧《弗朗西斯·劳拉》(La Francesa Laura) 的发现。该报告解释了研究人员 Álvaro Cuéllar 和 Germán Vega 如何与西班牙国家图书馆合作，通过 ETSO 项目中的 Transkribus 和 Stylo 程序使用文体测量分析。文章强调了人工智能作为语言学研究和恢复丢失的黄金时代文本的关键工具的作用。
      ja: フランスの新聞ル・フィガロは、人工知能によって特定されたロペ・デ・ベガの未発表コメディ「ラ・フランセサ・ローラ」の発見に関するマシュー・ド・タイラックの記事を掲載した。この報告書では、研究者のアルバロ・クエヤル氏とゲルマン・ベガ氏が、スペイン国立図書館と協力して、ETSO プロジェクト内の Transkribus および Stylo プログラムでスタイロメトリック分析をどのように使用したかについて説明しています。この記事は、文献学研究と失われた黄金時代の文書の回復のための重要なツールとしての AI の役割を強調しています。
      ko: 프랑스 신문 르 피가로(Le Figaro)는 인공지능을 통해 확인된 로페 드 베가(Lope de Vega)의 미발표 코미디인 라 프란체사 로라(La Francesa Laura)의 발견에 대한 마티외 드 타일락(Mathieu de Taillac)의 기사를 게재했습니다. 이 보고서는 연구원 Álvaro Cuéllar와 Germán Vega가 스페인 국립 도서관과 협력하여 ETSO 프로젝트 내에서 Transkribus 및 Stylo 프로그램과 함께 스타일 측정 분석을 사용한 방법을 설명합니다. 이 기사는 문헌학 연구와 잃어버린 황금기 텍스트 복구를 위한 핵심 도구로서 AI의 역할을 강조합니다.
      ru: Французская газета Le Figaro опубликовала статью Матье де Тайлака об открытии La Francesa Laura, неопубликованной комедии Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В отчете объясняется, как исследователи Альваро Куэльяр и Херман Вега использовали стилометрический анализ с программами Transkribus и Stylo в рамках проекта ETSO в сотрудничестве с Национальной библиотекой Испании. В статье подчеркивается роль ИИ как ключевого инструмента филологических исследований и восстановления утерянных текстов Золотого века.
      ar: نشرت صحيفة لوفيجارو الفرنسية مقالا لماتيو دي تيلاك حول اكتشاف لا فرانسيسا لورا، وهي كوميديا ​​غير منشورة للوب دي فيجا تم التعرف عليها من خلال الذكاء الاصطناعي. يشرح التقرير كيف استخدم الباحثان ألفارو كويلار وجيرمان فيجا التحليل الأسلوبي مع برنامجي Transkribus وStylo ضمن مشروع ETSO، بالتعاون مع المكتبة الوطنية الإسبانية. يؤكد المقال على دور الذكاء الاصطناعي كأداة رئيسية للبحث اللغوي واستعادة نصوص العصر الذهبي المفقودة.
