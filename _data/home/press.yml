      es: "Adrián Velasco escribe en El Norte de Castilla sobre la representación de 'La francesa Laura' en el Festival de Teatro Clásico de Olmedo. La Fundación Siglo de Oro recupera esta comedia atribuida a Lope de Vega, dirigida y protagonizada por Marta Poveda, en una puesta en escena que combina rigor filológico y vitalidad teatral."
      en: "Adrián Velasco reports in El Norte de Castilla on the performance of 'La francesa Laura' at the Olmedo Classical Theatre Festival. The Fundación Siglo de Oro revives this play attributed to Lope de Vega, directed and performed by Marta Poveda, in a staging that blends philological rigor with theatrical vitality."


      fr: Adrián Velasco rapporte dans El Norte de Castilla la représentation de "La francesa Laura" au Festival de Théâtre Classique d'Olmedo. La Fundación Siglo de Oro fait revivre cette pièce attribuée à Lope de Vega, mise en scène et interprétée par Marta Poveda, dans une mise en scène qui allie rigueur philologique et vitalité théâtrale.
      pt: Adrián Velasco reporta no El Norte de Castilla a apresentação de 'La francesa Laura' no Festival de Teatro Clássico de Olmedo. A Fundación Siglo de Oro revive esta peça atribuída a Lope de Vega, dirigida e interpretada por Marta Poveda, numa encenação que mistura o rigor filológico com a vitalidade teatral.
      it: Adrián Velasco racconta su El Norte de Castilla la rappresentazione di 'La francesa Laura' al Festival del Teatro Classico di Olmedo. La Fundación Siglo de Oro ripropone quest'opera attribuita a Lope de Vega, diretta e rappresentata da Marta Poveda, in un allestimento che fonde rigore filologico e vitalità teatrale.
      de: Adrián Velasco berichtet in El Norte de Castilla über die Aufführung von „La francesa Laura“ beim Olmedo Classical Theatre Festival. Die Fundación Siglo de Oro lässt dieses Lope de Vega zugeschriebene Stück unter der Regie und Aufführung von Marta Poveda in einer Inszenierung wieder aufleben, die philologische Strenge mit theatralischer Vitalität verbindet.
      zh: 阿德里安·贝拉斯科 (Adrián Velasco) 在《北卡斯蒂利亚》报道奥尔梅多古典戏剧节上《法国劳拉》的演出。黄金世纪基金会重演了这部由玛尔塔·波韦达 (Marta Poveda) 执导和表演的洛佩·德·维加 (Lope de Vega) 创作的戏剧，其舞台表演融合了语言学的严谨性和戏剧的活力。
      ja: アドリアン・ベラスコがオルメド古典演劇祭での「ラ・フランセサ・ラウラ」の公演についてエル・ノルテ・デ・カスティーリャ紙で報じた。シグロ・デ・オロ財団は、マルタ・ポベダが演出・出演したロペ・デ・ベガ作とされるこの劇を、文献学的厳密さと演劇の活力を融合させた演出で復活させます。
      ko: Adrián Velasco는 El Norte de Castilla에서 Olmedo Classical Theatre Festival의 'La francesa Laura' 공연에 대해 보고합니다. Fundación Siglo de Oro는 마르타 포베다(Marta Poveda)가 감독하고 공연한 로페 데 베가(Lope de Vega)의 작품으로 이 연극을 문학적 엄격함과 연극적 활력을 혼합한 무대에서 되살립니다.
      ru: Адриан Веласко сообщает в El Norte de Castilla о представлении «Французской Лауры» на Фестивале классического театра в Ольмедо. Фонд «Сигло де Оро» возрождает пьесу, приписываемую Лопе де Веге, поставленную и исполненную Мартой Поведа, в постановке, сочетающей филологическую строгость с театральной жизненной силой.
      ar: تقرير أدريان فيلاسكو في El Norte de Castilla عن أداء "La francesa Laura" في مهرجان أولميدو للمسرح الكلاسيكي. تعيد مؤسسة Siglo de Oro إحياء هذه المسرحية المنسوبة إلى Lope de Vega، من إخراج وأداء مارتا بوفيدا، في عرض مسرحي يمزج بين الصرامة اللغوية والحيوية المسرحية.
