      ru: Almagro Noticias сообщает об открытии «La Francesa Laura», неопубликованной пьесы Лопе де Веги, обнаруженной в Национальной библиотеке Испании с помощью искусственного интеллекта. В проекте, возглавляемом Альваро Куэльяром и Херманом Вегой, для подтверждения авторства использовались стилометрические методы и система Transkribus. Фонд «Сигло де Оро» под руководством Марты Поведа репетировал спектакль в «Коррал де Комедиас» Альмагро перед его премьерой в Мадриде.
