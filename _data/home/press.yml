    summary:
      es: "El periodista Luis Alemany informa del hallazgo de La francesa Laura, comedia anónima conservada en la Biblioteca Nacional de España, atribuida ahora a Lope de Vega gracias a técnicas de inteligencia artificial. La investigación, dirigida por Álvaro Cuéllar y Germán Vega, combina el uso de Transkribus y Stylo para transcribir manuscritos y analizar su estilo lingüístico."
      en: "Journalist Luis Alemany reports on the discovery of La francesa Laura, an anonymous comedy held at Spain’s National Library, now attributed to Lope de Vega through artificial-intelligence methods. The research, led by Álvaro Cuéllar and Germán Vega, combines Transkribus and Stylo to transcribe manuscripts and analyze linguistic style."



      fr: Le journaliste Luis Alemany rapporte la découverte de La francesa Laura, une comédie anonyme conservée à la Bibliothèque nationale d'Espagne, désormais attribuée à Lope de Vega grâce à des méthodes d'intelligence artificielle. La recherche, dirigée par Álvaro Cuéllar et Germán Vega, combine Transkribus et Stylo pour transcrire des manuscrits et analyser le style linguistique.
      pt: O jornalista Luis Alemany relata a descoberta de La francesa Laura, uma comédia anônima mantida na Biblioteca Nacional da Espanha, agora atribuída a Lope de Vega através de métodos de inteligência artificial. A pesquisa, liderada por Álvaro Cuéllar e Germán Vega, combina Transkribus e Stylo para transcrever manuscritos e analisar o estilo linguístico.
      it: Il giornalista Luis Alemany riferisce della scoperta di La francesa Laura, una commedia anonima conservata presso la Biblioteca Nazionale spagnola, ora attribuita a Lope de Vega attraverso metodi di intelligenza artificiale. La ricerca, guidata da Álvaro Cuéllar e Germán Vega, combina Transkribus e Stylo per trascrivere manoscritti e analizzare lo stile linguistico.
      de: Der Journalist Luis Alemany berichtet über die Entdeckung von La francesa Laura, einer anonymen Komödie aus der spanischen Nationalbibliothek, die nun mithilfe künstlicher Intelligenz Lope de Vega zugeschrieben wird. Die von Álvaro Cuéllar und Germán Vega geleitete Forschung kombiniert Transkribus und Stylo, um Manuskripte zu transkribieren und den Sprachstil zu analysieren.
      zh: 记者路易斯·阿勒曼尼 (Luis Alemany) 报道了西班牙国家图书馆收藏的一部匿名喜剧《法国劳拉》(La francesa Laura) 的发现，现在通过人工智能方法将其确认为洛佩·德·维加 (Lope de Vega) 的作品。这项研究由 Álvaro Cuéllar 和 Germán Vega 领导，结合 Transkribus 和 Stylo 来转录手稿并分析语言风格。
      ja: ジャーナリストのルイス・アレマニーは、スペインの国立図書館に所蔵されている匿名の喜劇『ラ・フランセサ・ローラ』の発見について報告している。現在は人工知能の手法によってロペ・デ・ベガの作とされている。アルバロ・クエヤル氏とゲルマン・ベガ氏が主導するこの研究では、Transkribus と Stylo を組み合わせて写本を転写し、言語スタイルを分析しています。
      ko: 언론인 Luis Alemany는 스페인 국립 도서관에서 개최된 익명의 코미디인 La francesa Laura의 발견에 대해 보고합니다. 이 코미디는 이제 인공 지능 방법을 통해 Lope de Vega의 작품으로 간주됩니다. Álvaro Cuéllar와 Germán Vega가 주도한 연구에서는 Transkribus와 Stylo를 결합하여 원고를 필사하고 언어 스타일을 분석했습니다.
      ru: Журналист Луис Алемани сообщает об открытии анонимной комедии «Французская Лаура», хранящейся в Национальной библиотеке Испании, которую теперь приписывают Лопе де Веге с помощью методов искусственного интеллекта. Исследование, проводимое Альваро Куэльяром и Херманом Вегой, объединяет Transkribus и Stylo для расшифровки рукописей и анализа лингвистического стиля.
      ar: تقرير الصحفي لويس أليماني عن اكتشاف La francesa Laura، وهي كوميديا ​​مجهولة المصدر محفوظة في المكتبة الوطنية بإسبانيا، وتُنسب الآن إلى لوبي دي فيجا من خلال أساليب الذكاء الاصطناعي. يجمع البحث، الذي أجراه ألفارو كويلار وجيرمان فيجا، بين Transkribus وStylo لنسخ المخطوطات وتحليل الأسلوب اللغوي.
