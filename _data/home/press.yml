    outlet: "heise online"
    author: "Stefan Krempl"
    date: "2023-02-07"
    url: "https://www.heise.de/news/Maschineller-Stilvergleich-KI-entdeckt-Komoedie-von-Lope-de-Vega-7486980.html"
    thumbnail: "/assets/images/press/64.png"
    type: "press"
    summary:
      es: "El portal tecnológico alemán heise online informó sobre el descubrimiento de La francesa Laura, una comedia anónima atribuida a Lope de Vega gracias al uso de inteligencia artificial. El artículo explica cómo los investigadores Álvaro Cuéllar (Universidad de Viena) y Germán Vega García-Luengos (Universidad de Valladolid) emplearon la herramienta Transkribus para transcribir automáticamente más de 1.300 manuscritos del Siglo de Oro, y posteriormente usaron las plataformas ETSO y Stylo para comparar los textos y confirmar la autoría. El hallazgo, respaldado por análisis filológicos tradicionales, representa un importante avance en la aplicación de la IA a la investigación literaria."
      en: "The German technology magazine heise online reported on the discovery of La Francesa Laura, an anonymous comedy attributed to Lope de Vega through artificial intelligence. The article explains how researchers Álvaro Cuéllar (University of Vienna) and Germán Vega García-Luengos (University of Valladolid) used the Transkribus tool to automatically transcribe over 1,300 Golden Age manuscripts, and later employed the ETSO and Stylo platforms to compare the texts and confirm the authorship. The finding, supported by traditional philological analyses, represents a major advancement in applying AI to literary research."



      fr: Le magazine technologique allemand heise online a fait état de la découverte de La Francesa Laura, une comédie anonyme attribuée à Lope de Vega grâce à l'intelligence artificielle. L'article explique comment les chercheurs Álvaro Cuéllar (Université de Vienne) et Germán Vega García-Luengos (Université de Valladolid) ont utilisé l'outil Transkribus pour transcrire automatiquement plus de 1 300 manuscrits de l'Âge d'or, puis ont utilisé les plateformes ETSO et Stylo pour comparer les textes et confirmer la paternité. Cette découverte, étayée par des analyses philologiques traditionnelles, représente une avancée majeure dans l’application de l’IA à la recherche littéraire.
      pt: A revista alemã de tecnologia heise online noticiou a descoberta de La Francesa Laura, uma comédia anônima atribuída a Lope de Vega por meio de inteligência artificial. O artigo explica como os pesquisadores Álvaro Cuéllar (Universidade de Viena) e Germán Vega García-Luengos (Universidade de Valladolid) utilizaram a ferramenta Transkribus para transcrever automaticamente mais de 1.300 manuscritos da Idade de Ouro, e posteriormente utilizaram as plataformas ETSO e Stylo para comparar os textos e confirmar a autoria. A descoberta, apoiada por análises filológicas tradicionais, representa um grande avanço na aplicação da IA ​​à pesquisa literária.
      it: La rivista tecnologica tedesca heise online ha riferito della scoperta di La Francesa Laura, una commedia anonima attribuita a Lope de Vega attraverso l'intelligenza artificiale. L'articolo spiega come i ricercatori Álvaro Cuéllar (Università di Vienna) e Germán Vega García-Luengos (Università di Valladolid) hanno utilizzato lo strumento Transkribus per trascrivere automaticamente oltre 1.300 manoscritti dell'Età dell'Oro, e successivamente hanno utilizzato le piattaforme ETSO e Stylo per confrontare i testi e confermarne la paternità. La scoperta, supportata dalle analisi filologiche tradizionali, rappresenta un importante progresso nell’applicazione dell’intelligenza artificiale alla ricerca letteraria.
      de: Das deutsche Technikmagazin heise online berichtete über die Entdeckung von La Francesa Laura, einer anonymen Komödie, die Lope de Vega durch künstliche Intelligenz zugeschrieben wird. Der Artikel erklärt, wie die Forscher Álvaro Cuéllar (Universität Wien) und Germán Vega García-Luengos (Universität Valladolid) das Transkribus-Tool nutzten, um über 1.300 Manuskripte des Goldenen Zeitalters automatisch zu transkribieren, und später die Plattformen ETSO und Stylo nutzten, um die Texte zu vergleichen und die Urheberschaft zu bestätigen. Der durch traditionelle philologische Analysen gestützte Befund stellt einen großen Fortschritt bei der Anwendung von KI in der Literaturforschung dar.
      zh: 德国科技杂志heise在线报道了通过人工智能发现的一部匿名喜剧《La Francesa Laura》，该喜剧归因于洛普·德·维加(Lope de Vega)。文章解释了研究人员 Álvaro Cuéllar（维也纳大学）和 Germán Vega García-Luengos（巴利亚多利德大学）如何使用 Transkribus 工具自动转录 1,300 多份黄金时代手稿，然后使用 ETSO 和 Stylo 平台来比较文本并确认作者身份。这一发现得到了传统语言学分析的支持，代表着人工智能应用于文学研究的重大进步。
      ja: ドイツのテクノロジー雑誌 heise online は、人工知能によるロペ・デ・ベガ作とされる匿名コメディ「ラ・フランセサ・ローラ」の発見について報じた。この記事では、研究者のアルバロ・クエヤル氏（ウィーン大学）とゲルマン・ベガ・ガルシア＝ルエンゴス氏（バリャドリッド大学）が、Transkribus ツールを使用して 1,300 を超える黄金時代の写本を自動的に転記し、その後、テキストを比較して著者を確認するために ETSO と Stylo プラットフォームを使用した方法について説明しています。この発見は、従来の文献学的分析によって裏付けられており、文学研究への AI の適用における大きな進歩を示しています。
      ko: 독일 기술 잡지 하이제(heise)는 인공지능을 통해 로페 데 베가가 쓴 익명의 코미디인 라 프란체사 로라(La Francesa Laura)의 발견에 대해 온라인으로 보도했습니다. 이 기사에서는 연구원인 Álvaro Cuéllar(비엔나 대학교)와 Germán Vega García-Luengos(바야돌리드 대학교)가 Transkribus 도구를 사용하여 1,300개 이상의 황금기 사본을 자동으로 필사하고 나중에 ETSO 및 Stylo 플랫폼을 사용하여 텍스트를 비교하고 저자임을 확인하는 방법을 설명합니다. 전통적인 문헌학 분석에 의해 뒷받침되는 이번 발견은 AI를 문학 연구에 적용하는 데 있어 큰 발전을 나타냅니다.
      ru: Немецкий технологический журнал Heise Online сообщил об открытии La Francesa Laura, анонимной комедии, приписываемой Лопе де Веге с помощью искусственного интеллекта. В статье объясняется, как исследователи Альваро Куэльяр (Венский университет) и Херман Вега Гарсиа-Луэнгос (Университет Вальядолида) использовали инструмент Transkribus для автоматической расшифровки более 1300 рукописей Золотого века, а позже использовали платформы ETSO и Stylo для сравнения текстов и подтверждения авторства. Это открытие, подкрепленное традиционным филологическим анализом, представляет собой крупный прогресс в применении ИИ в литературных исследованиях.
      ar: أفادت مجلة التكنولوجيا الألمانية هايز على الإنترنت عن اكتشاف لا فرانسيسا لورا، وهي كوميديا ​​مجهولة المصدر منسوبة إلى لوبي دي فيغا من خلال الذكاء الاصطناعي. يشرح المقال كيف استخدم الباحثان ألفارو كويلار (جامعة فيينا) وجيرمان فيجا غارسيا-لونجوس (جامعة بلد الوليد) أداة Transkribus للنسخ التلقائي لأكثر من 1300 مخطوطة من العصر الذهبي، ثم استخدما لاحقًا منصات ETSO وStylo لمقارنة النصوص وتأكيد المؤلف. تمثل هذه النتيجة، المدعومة بالتحليلات اللغوية التقليدية، تقدمًا كبيرًا في تطبيق الذكاء الاصطناعي على البحث الأدبي.
