    outlet: "El Debate"
    date: "2023-11-12"
    url: "https://www.eldebate.com/cultura/teatro-y-artes-escenicas/20231112/francesa-laura-obra-inedita-lope-vega-ensaya-corral-comedias-almagro_151942.html"
    thumbnail: "/assets/images/press/26.png"
    type: "news"
    summary:
      es: "El Debate anuncia el próximo estreno de 'La Francesa Laura', obra inédita de Lope de Vega descubierta en la Biblioteca Nacional de España mediante inteligencia artificial. El artículo describe el hallazgo realizado por Álvaro Cuéllar y Germán Vega, así como el montaje dirigido por Marta Poveda, ensayado en el Corral de Comedias de Almagro antes de su estreno en los Teatros del Canal."
      en: "El Debate reports on the upcoming premiere of 'La Francesa Laura', an unpublished play by Lope de Vega discovered at the National Library of Spain through artificial intelligence. The article details the research by Álvaro Cuéllar and Germán Vega, and the stage production directed by Marta Poveda, rehearsed at the Corral de Comedias de Almagro before its debut at Teatros del Canal."


      fr: El Debate rapporte la première prochaine de « La Francesa Laura », une pièce inédite de Lope de Vega découverte à la Bibliothèque nationale d'Espagne grâce à l'intelligence artificielle. L'article détaille les recherches d'Álvaro Cuéllar et Germán Vega, ainsi que la mise en scène dirigée par Marta Poveda, répétée au Corral de Comedias de Almagro avant ses débuts au Teatros del Canal.
      pt: El Debate informa sobre a próxima estreia de 'La Francesa Laura', peça inédita de Lope de Vega descoberta na Biblioteca Nacional da Espanha por meio de inteligência artificial. O artigo detalha a pesquisa de Álvaro Cuéllar e Germán Vega e a encenação dirigida por Marta Poveda, ensaiada no Corral de Comedias de Almagro antes de sua estreia nos Teatros del Canal.
      it: El Debate riferisce della prossima prima di 'La Francesa Laura', un'opera inedita di Lope de Vega scoperta presso la Biblioteca Nazionale di Spagna attraverso l'intelligenza artificiale. L'articolo descrive in dettaglio la ricerca di Álvaro Cuéllar e Germán Vega e la produzione teatrale diretta da Marta Poveda, provata al Corral de Comedias de Almagro prima del suo debutto al Teatros del Canal.
      de: El Debate berichtet über die bevorstehende Premiere von „La Francesa Laura“, einem unveröffentlichten Stück von Lope de Vega, das mithilfe künstlicher Intelligenz in der spanischen Nationalbibliothek entdeckt wurde. Der Artikel beschreibt die Recherchen von Álvaro Cuéllar und Germán Vega sowie die Bühnenproduktion unter der Regie von Marta Poveda, die vor ihrem Debüt im Teatros del Canal im Corral de Comedias de Almagro geprobt wurde.
      zh: El Debate 报道了西班牙国家图书馆通过人工智能发现的洛佩·德·维加 (Lope de Vega) 未出版的戏剧《La Francesa Laura》即将首映的情况。这篇文章详细介绍了 Álvaro Cuéllar 和 Germán Vega 的研究，以及 Marta Poveda 导演的舞台制作，在运河剧院首演之前，在 Corral de Comedias de Almagro 进行了排练。
      ja: El Debateは、人工知能によってスペイン国立図書館で発見されたロペ・デ・ベガの未発表劇『ラ・フランセサ・ラウラ』の近日初演について報じている。この記事では、アルバロ・クエヤルとジェルマン・ベガによる研究と、テアトロス・デル・カナルでのデビュー前にコラル・デ・コメディアス・デ・アルマグロでリハーサルが行われたマルタ・ポベダ監督の舞台作品について詳しく説明しています。
      ko: 엘 디베이트(El Debate)는 스페인 국립도서관에서 인공지능을 통해 발견한 로페 데 베가(Lope de Vega)의 미발표 희곡 '라 프란체사 라우라(La Francesa Laura)'의 초연을 보도합니다. 이 기사에서는 Álvaro Cuéllar와 Germán Vega의 연구와 Teatros del Canal에서 데뷔하기 전에 Corral de Comedias de Almagro에서 리허설한 Marta Poveda가 감독한 무대 제작에 대해 자세히 설명합니다.
      ru: El Debate сообщает о предстоящей премьере «La Francesa Laura», неопубликованной пьесы Лопе де Веги, обнаруженной в Национальной библиотеке Испании с помощью искусственного интеллекта. В статье подробно описаны исследования Альваро Куэльяра и Хермана Веги, а также постановка Марты Поведа, репетировавшаяся в Коррал де Комедиас де Альмагро перед ее дебютом в Театрос дель Канал.
      ar: تتحدث صحيفة El Debate عن العرض الأول القادم لمسرحية "La Francesa Laura"، وهي مسرحية غير منشورة للكاتب Lope de Vega تم اكتشافها في المكتبة الوطنية الإسبانية من خلال الذكاء الاصطناعي. يعرض المقال تفاصيل البحث الذي أجراه ألفارو كويلار وجيرمان فيجا، والإنتاج المسرحي الذي أخرجته مارتا بوفيدا، والذي تم التدرب عليه في Corral de Comedias de Almagro قبل ظهوره لأول مرة في Teatros del Canal.
