      fr: Toledodiario rapporte l'arrivée de 'La Francesa Laura', la dernière pièce inédite de Lope de Vega, au Teatro de Rojas. L’article met en lumière les recherches d’Álvaro Cuéllar et Germán Vega, la contribution du groupe PROLOPE et le double rôle de Marta Poveda en tant que réalisatrice et actrice principale, marquant ses adieux dans le rôle de Laura.
