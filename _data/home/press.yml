    summary:
      es: "El diario japonés The Japan News, del grupo Yomiuri Shimbun, informó sobre el hallazgo de La francesa Laura en un artículo de Reuters. El texto destaca cómo la inteligencia artificial permitió descubrir una obra desconocida de Lope de Vega en la Biblioteca Nacional de España. Explica el proceso de transcripción y análisis estilométrico realizado por Álvaro Cuéllar y Germán Vega, así como la próxima publicación de la edición crítica a cargo de la editorial Gredos."
      en: "Japan’s major newspaper The Japan News, part of The Yomiuri Shimbun group, reported on the discovery of La Francesa Laura in a Reuters article. The piece explains how artificial intelligence revealed a previously unknown play by Lope de Vega in Spain’s National Library, outlining the transcription and stylometric analysis carried out by Álvaro Cuéllar and Germán Vega, and noting the forthcoming critical edition published by Gredos."

      fr: Le principal journal japonais The Japan News, qui fait partie du groupe Yomiuri Shimbun, a rendu compte de la découverte de La Francesa Laura dans un article de Reuters. L’article explique comment l’intelligence artificielle a révélé une pièce jusqu’alors inconnue de Lope de Vega à la Bibliothèque nationale d’Espagne, en décrivant la transcription et l’analyse stylométrique réalisées par Álvaro Cuéllar et Germán Vega, et en faisant référence à la prochaine édition critique publiée par Gredos.
      pt: O principal jornal japonês, The Japan News, parte do grupo Yomiuri Shimbun, noticiou a descoberta de La Francesa Laura num artigo da Reuters. A peça explica como a inteligência artificial revelou uma peça até então desconhecida de Lope de Vega na Biblioteca Nacional de Espanha, delineando a transcrição e análise estilométrica realizadas por Álvaro Cuéllar e Germán Vega, e destacando a próxima edição crítica publicada por Gredos.
      it: Il principale quotidiano giapponese The Japan News, parte del gruppo The Yomiuri Shimbun, ha riferito della scoperta di La Francesa Laura in un articolo di Reuters. L'articolo spiega come l'intelligenza artificiale ha rivelato un'opera precedentemente sconosciuta di Lope de Vega nella Biblioteca Nazionale spagnola, delineando la trascrizione e l'analisi stilometrica effettuata da Álvaro Cuéllar e Germán Vega, e menzionando la prossima edizione critica pubblicata da Gredos.
      de: Japans größte Zeitung The Japan News, Teil der Yomiuri Shimbun-Gruppe, berichtete in einem Reuters-Artikel über die Entdeckung von La Francesa Laura. Der Artikel erklärt, wie künstliche Intelligenz ein bisher unbekanntes Stück von Lope de Vega in der spanischen Nationalbibliothek enthüllte, skizziert die von Álvaro Cuéllar und Germán Vega durchgeführte Transkription und stilometrische Analyse und weist auf die bevorstehende kritische Ausgabe von Gredos hin.
      zh: 日本主要报纸《读卖新闻》旗下的《日本新闻》在路透社的一篇文章中报道了拉弗兰西萨·劳拉的发现。这篇文章解释了人工智能如何在西班牙国家图书馆揭示了洛佩·德·维加 (Lope de Vega) 的一部前所未知的戏剧，概述了阿尔瓦罗·奎利亚尔 (Álvaro Cuéllar) 和格尔曼·维加 (Germán Vega) 进行的转录和文体分析，并指出了格雷多斯 (Gredos) 即将出版的批评版本。
      ja: 読売新聞グループの日本の大手新聞ジャパン・ニュースは、ロイターの記事でラ・フランセサ・ローラの発見を報じた。この記事では、スペインの国立図書館にあるこれまで知られていなかったロペ・デ・ベガの戯曲を人工知能がどのようにして明らかにしたのかを説明し、アルバロ・クエヤルとジェルマン・ベガが行った筆写と筆圧分析の概要を説明し、グレドスが出版する近々の批評版についても言及している。
      ko: 일본의 주요 신문인 요미우리 신문 그룹의 일부인 일본 뉴스는 로이터 기사에서 라 프란체사 로라의 발견에 대해 보도했습니다. 이 작품은 인공 지능이 스페인 국립 도서관에서 이전에 알려지지 않은 Lope de Vega의 희곡을 어떻게 밝혀냈는지 설명하고, Álvaro Cuéllar와 Germán Vega가 수행한 전사 및 문체 분석을 간략히 설명하고 Gredos가 곧 출판할 비평판에 대해 언급합니다.
      ru: Крупнейшая японская газета The Japan News, входящая в группу The Yomiuri Shimbun, сообщила об открытии La Francesa Laura в статье Reuters. В статье объясняется, как искусственный интеллект обнаружил ранее неизвестную пьесу Лопе де Веги в Национальной библиотеке Испании, описывается транскрипция и стилометрический анализ, проведенный Альваро Куэльяром и Херманом Вегой, а также отмечается предстоящее критическое издание, опубликованное Gredos.
      ar: ذكرت صحيفة اليابان نيوز الكبرى، وهي جزء من مجموعة يوميوري شيمبون، عن اكتشاف لا فرانسيسا لورا في مقال لرويترز. يشرح المقال كيف كشف الذكاء الاصطناعي عن مسرحية لم تكن معروفة من قبل للوب دي فيجا في المكتبة الوطنية بإسبانيا، والتي توضح الخطوط العريضة للنسخ والتحليل الأسلوبي الذي أجراه ألفارو كويلار وجيرمان فيجا، وتشير إلى الطبعة النقدية القادمة التي نشرها جريدوس.
