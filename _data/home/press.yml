      it: La piattaforma internazionale Devdiscourse, focalizzata sullo sviluppo e sulla tecnologia, ha caratterizzato la scoperta di La Francesa Laura nella sua carrellata globale di notizie strane. Basato su un rapporto Reuters, l’articolo evidenzia come i ricercatori di Vienna e Valladolid abbiano utilizzato l’intelligenza artificiale per attribuire a Lope de Vega un manoscritto anonimo conservato presso la Biblioteca Nazionale spagnola, sottolineando il potenziale dell’intelligenza artificiale nella ricerca storica.
      de: Die internationale Plattform Devdiscourse, die sich auf Entwicklung und Technologie konzentriert, stellte die Entdeckung von La Francesa Laura in ihrer globalen Zusammenfassung seltsamer Neuigkeiten vor. Basierend auf einem Reuters-Bericht beleuchtet der Artikel, wie Forscher aus Wien und Valladolid künstliche Intelligenz nutzten, um ein anonymes Manuskript in der spanischen Nationalbibliothek Lope de Vega zuzuordnen, und betonte das Potenzial von KI in der historischen Forschung.
      zh: 专注于开发和技术的国际平台 Devdiscourse 在其全球奇怪新闻综述中重点介绍了 La Francesa Laura 的发现。根据路透社的报道，该文章重点介绍了维也纳和巴利亚多利德的研究人员如何利用人工智能将西班牙国家图书馆保存的一份匿名手稿归因于洛佩·德·维加，强调了人工智能在历史研究中的潜力。
      ja: 開発とテクノロジーに焦点を当てた国際プラットフォーム Devdiscourse は、奇妙なニュースの世界的なまとめで La Francesa Laura の発見を特集しました。ロイターの報道に基づいたこの記事は、ウィーンとバリャドリッドの研究者がどのように人工知能を利用してスペイン国立図書館に所蔵されている匿名原稿をロペ・デ・ベガのものと特定したかを強調し、歴史研究におけるAIの可能性を強調している。
      ko: 개발과 기술에 초점을 맞춘 국제 플랫폼 Devdiscourse는 전 세계적으로 이상한 뉴스를 모아서 La Francesa Laura의 발견을 소개했습니다. 로이터 보고서를 기반으로 한 이 기사는 비엔나와 바야돌리드의 연구자들이 인공 지능을 사용하여 스페인 국립 도서관에 보관된 익명의 원고를 로페 데 베가의 것으로 돌리는 방법을 강조하고 역사 연구에서 AI의 잠재력을 강조했습니다.
      ru: Международная платформа Devdiscourse, ориентированная на развитие и технологии, включила открытие La Francesa Laura в свой глобальный обзор странных новостей. В статье, основанной на отчете Reuters, рассказывается, как исследователи из Вены и Вальядолида использовали искусственный интеллект, чтобы приписать анонимную рукопись, хранящуюся в Национальной библиотеке Испании, Лопе де Веге, подчеркивая потенциал ИИ в исторических исследованиях.
      ar: منصة Devdiscourse الدولية، التي تركز على التطوير والتكنولوجيا، عرضت اكتشاف La Francesa Laura في تقريرها العالمي للأخبار الغريبة. واستنادًا إلى تقرير لرويترز، يسلط المقال الضوء على كيفية استخدام باحثين من فيينا وبلد الوليد للذكاء الاصطناعي لإسناد مخطوطة مجهولة المصدر محفوظة في المكتبة الوطنية الإسبانية إلى لوبي دي فيجا، مع التركيز على إمكانات الذكاء الاصطناعي في البحث التاريخي.
  - id: "press55"
    title:
      es: "8 things you need to know about AI this month"
      en: "8 things you need to know about AI this month"
      fr: 8 choses que vous devez savoir sur l'IA ce mois-ci
      pt: 8 coisas que você precisa saber sobre IA este mês
      it: 8 cose che devi sapere sull'intelligenza artificiale questo mese
      de: 8 Dinge, die Sie diesen Monat über KI wissen müssen
      zh: 本月你需要了解的有关人工智能的 8 件事
      ja: 今月 AI について知っておくべき 8 つのこと
      ko: 이번 달 AI에 대해 알아야 할 8가지
      ru: 8 вещей, которые вам нужно знать об ИИ в этом месяце
      ar: 8 أشياء تحتاج لمعرفتها حول الذكاء الاصطناعي هذا الشهر
    outlet: "World Economic Forum"
    author: "Kay Firth-Butterfield"
    date: "2023-02-08"
    url: "https://www.weforum.org/stories/2023/02/ai-artificial-intelligence-news-february-2023/"
    thumbnail: "/assets/images/press/55.png"
    type: "press"
    summary:
      es: "El Foro Económico Mundial incluyó el descubrimiento de La francesa Laura entre las principales noticias sobre inteligencia artificial de febrero de 2023. El artículo, firmado por Kay Firth-Butterfield, destaca cómo las herramientas de IA aplicadas en la Biblioteca Nacional de España permitieron atribuir a Lope de Vega una obra desconocida, reconociendo el hallazgo como un ejemplo relevante del uso responsable de la tecnología en el ámbito cultural y académico."
      en: "The World Economic Forum featured the discovery of La Francesa Laura among the key artificial intelligence stories of February 2023. Written by Kay Firth-Butterfield, the article highlights how AI tools applied at Spain’s National Library enabled the attribution of a previously unknown play to Lope de Vega, recognizing the finding as a significant example of the responsible use of technology in cultural and academic research."


      fr: Le Forum économique mondial a présenté la découverte de La Francesa Laura parmi les principales histoires d'intelligence artificielle de février 2023. Écrit par Kay Firth-Butterfield, l'article souligne comment les outils d'IA appliqués à la Bibliothèque nationale d'Espagne ont permis d'attribuer une pièce jusqu'alors inconnue à Lope de Vega, reconnaissant cette découverte comme un exemple significatif de l'utilisation responsable de la technologie dans la recherche culturelle et universitaire.
      pt: O Fórum Económico Mundial destacou a descoberta de La Francesa Laura entre as principais histórias de inteligência artificial de fevereiro de 2023. Escrito por Kay Firth-Butterfield, o artigo destaca como as ferramentas de IA aplicadas na Biblioteca Nacional de Espanha permitiram a atribuição de uma peça até então desconhecida a Lope de Vega, reconhecendo a descoberta como um exemplo significativo do uso responsável da tecnologia na investigação cultural e académica.
      it: Il World Economic Forum ha inserito la scoperta di La Francesa Laura tra le principali storie di intelligenza artificiale del febbraio 2023. Scritto da Kay Firth-Butterfield, l'articolo evidenzia come gli strumenti di intelligenza artificiale applicati alla Biblioteca nazionale spagnola abbiano consentito di attribuire a Lope de Vega un'opera precedentemente sconosciuta, riconoscendo la scoperta come un esempio significativo dell'uso responsabile della tecnologia nella ricerca culturale e accademica.
      de: Das Weltwirtschaftsforum zählte die Entdeckung von La Francesa Laura zu den wichtigsten Geschichten über künstliche Intelligenz im Februar 2023. Der von Kay Firth-Butterfield verfasste Artikel beleuchtet, wie in der spanischen Nationalbibliothek eingesetzte KI-Tools die Zuschreibung eines bisher unbekannten Theaterstücks an Lope de Vega ermöglichten, und würdigt die Entdeckung als bedeutendes Beispiel für den verantwortungsvollen Einsatz von Technologie in der kulturellen und akademischen Forschung.
      zh: 世界经济论坛将 La Francesa Laura 的发现列为 2023 年 2 月的关键人工智能故事之一。这篇文章由 Kay Firth-Butterfield 撰写，重点介绍了西班牙国家图书馆应用的人工智能工具如何将一部以前未知的戏剧归属于 Lope de Vega，并认为这一发现是在文化和学术研究中负责任地使用技术的一个重要例子。
      ja: 世界経済フォーラムは、2023年2月の主要な人工知能の話題の中で、『ラ・フランセサ・ローラ』の発見を特集した。ケイ・ファース＝バターフィールドが執筆したこの記事は、スペインの国立図書館に適用されたAIツールがどのようにしてこれまで知られていなかった戯曲の帰属をロペ・デ・ベガのものとすることができたかを強調し、この発見を文化的および学術的研究におけるテクノロジーの責任ある利用の重要な例として認めている。
      ko: 세계경제포럼(World Economic Forum)은 2023년 2월 주요 인공지능 이야기 중 라 프란세사 로라(La Francesa Laura)의 발견을 다루었습니다. Kay Firth-Butterfield가 작성한 이 기사는 스페인 국립도서관에 적용된 AI 도구가 어떻게 이전에 알려지지 않은 연극을 로페 데 베가(Lope de Vega)의 작품으로 귀속시킬 수 있었는지 강조하며, 이번 발견이 문화 및 학문 연구에서 기술을 책임감 있게 사용하는 중요한 사례로 인식되었습니다.
      ru: Всемирный экономический форум включил открытие «Французы Лауры» в число ключевых историй об искусственном интеллекте в феврале 2023 года. В статье, написанной Кей Ферт-Баттерфилд, показано, как инструменты искусственного интеллекта, примененные в Национальной библиотеке Испании, позволили приписать Лопе де Веге ранее неизвестную пьесу, признав это открытие важным примером ответственного использования технологий в культурных и академических исследованиях.
      ar: أدرج المنتدى الاقتصادي العالمي اكتشاف لا فرانسيسا لورا ضمن قصص الذكاء الاصطناعي الرئيسية في فبراير 2023. ويسلط المقال الذي كتبه كاي فيرث باترفيلد، الضوء على كيف مكنت أدوات الذكاء الاصطناعي المطبقة في المكتبة الوطنية الإسبانية من إسناد مسرحية لم تكن معروفة من قبل إلى لوبي دي فيجا، مع الاعتراف بالنتيجة كمثال مهم على الاستخدام المسؤول للتكنولوجيا في البحث الثقافي والأكاديمي.
