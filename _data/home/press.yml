      es: "El Periódico publicó la noticia del hallazgo de La francesa Laura, una comedia inédita de Lope de Vega identificada por medio de inteligencia artificial. El artículo explica que el descubrimiento se realizó en la Biblioteca Nacional de España gracias al proyecto ETSO, dirigido por Álvaro Cuéllar y Germán Vega, en colaboración con el grupo PROLOPE de la Universitat Autònoma de Barcelona, empleando la herramienta Transkribus y análisis filológicos para confirmar la autoría del dramaturgo."
      en: "El Periódico reported the discovery of La Francesa Laura, an unpublished play by Lope de Vega identified through artificial intelligence. The article explains that the discovery was made at Spain’s National Library thanks to the ETSO project, directed by Álvaro Cuéllar and Germán Vega, in collaboration with the PROLOPE group at the Autonomous University of Barcelona, using Transkribus and philological analysis to confirm the playwright’s authorship."


      fr: El Periódico a rapporté la découverte de La Francesa Laura, une pièce inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique que la découverte a été réalisée à la Bibliothèque nationale d’Espagne grâce au projet ETSO, dirigé par Álvaro Cuéllar et Germán Vega, en collaboration avec le groupe PROLOPE de l’Université autonome de Barcelone, en utilisant Transkribus et des analyses philologiques pour confirmer la paternité du dramaturge.
      pt: El Periódico noticiou a descoberta de La Francesa Laura, peça inédita de Lope de Vega identificada por meio de inteligência artificial. O artigo explica que a descoberta foi feita na Biblioteca Nacional de Espanha graças ao projeto ETSO, dirigido por Álvaro Cuéllar e Germán Vega, em colaboração com o grupo PROLOPE da Universidade Autónoma de Barcelona, ​​recorrendo ao Transkribus e à análise filológica para confirmar a autoria do dramaturgo.
      it: El Periódico ha segnalato la scoperta di La Francesa Laura, un'opera inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. L'articolo spiega che la scoperta è stata effettuata presso la Biblioteca Nazionale di Spagna grazie al progetto ETSO, diretto da Álvaro Cuéllar e Germán Vega, in collaborazione con il gruppo PROLOPE dell'Università Autonoma di Barcellona, ​​utilizzando Transkribus e analisi filologiche per confermare la paternità del drammaturgo.
      de: El Periódico berichtete über die Entdeckung von La Francesa Laura, einem unveröffentlichten Stück von Lope de Vega, das durch künstliche Intelligenz identifiziert wurde. Der Artikel erklärt, dass die Entdeckung in der spanischen Nationalbibliothek dank des ETSO-Projekts unter der Leitung von Álvaro Cuéllar und Germán Vega in Zusammenarbeit mit der PROLOPE-Gruppe an der Autonomen Universität Barcelona gemacht wurde, wobei Transkribus und philologische Analysen zur Bestätigung der Urheberschaft des Dramatikers eingesetzt wurden.
      zh: 《El Periódico》报道了《La Francesa Laura》的发现，这是一部通过人工智能识别的洛佩·德·维加未出版的戏剧。文章解释说，这一发现是在西班牙国家图书馆发现的，这要归功于 ETSO 项目，该项目由 Álvaro Cuéllar 和 Germán Vega 领导，与巴塞罗那自治大学的 PROLOPE 小组合作，使用 Transkribus 和语言学分析来确认剧作家的作者身份。
      ja: El Periódico は、人工知能によって識別されたロペ・デ・ベガの未発表戯曲「ラ・フランセサ・ローラ」の発見を報じた。記事では、この発見は、バルセロナ自治大学のPROLOPEグループと協力し、アルバロ・クエヤルとジェルマン・ベガが監督したETSOプロジェクトのおかげでスペイン国立図書館で行われ、劇作家の作者であることを確認するためにトランスクリバスと文献学的分析を使用して行われたと説明している。
      ko: El Periódico는 인공 지능을 통해 확인된 Lope de Vega의 미출판 희곡인 La Francesa Laura의 발견을 보고했습니다. 이 기사에서는 Álvaro Cuéllar와 Germán Vega가 감독한 ETSO 프로젝트 덕분에 스페인 국립도서관에서 바르셀로나 자치대학교의 PROLOPE 그룹과 협력하여 극작가의 저작자를 확인하기 위해 Transkribus와 문헌학 분석을 사용하여 발견이 이루어졌다고 설명합니다.
      ru: El Periódico сообщил об открытии неопубликованной пьесы Лопе де Веги «La Francesa Laura», идентифицированной с помощью искусственного интеллекта. В статье поясняется, что открытие было сделано в Национальной библиотеке Испании благодаря проекту ETSO, которым руководили Альваро Куэльяр и Херман Вега в сотрудничестве с группой PROLOPE в Автономном университете Барселоны, используя Transkribus и филологический анализ для подтверждения авторства драматурга.
      ar: ذكرت El Periódico اكتشاف La Francesa Laura، وهي مسرحية غير منشورة من تأليف Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. ويوضح المقال أن هذا الاكتشاف تم في المكتبة الوطنية بإسبانيا بفضل مشروع ETSO، الذي أداره ألفارو كويلار وجيرمان فيجا، بالتعاون مع مجموعة PROLOPE في جامعة برشلونة المستقلة، باستخدام Transkribus والتحليل الفلسفي لتأكيد تأليف الكاتب المسرحي.
