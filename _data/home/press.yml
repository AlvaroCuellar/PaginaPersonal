      zh: 英国报纸《橄榄报》报道了西班牙国家图书馆通过人工智能发现的洛佩·德·维加创作的一部此前不为人知的喜剧《弗朗西斯·劳拉》。这篇文章由 Alex Trelinski 撰写，重点介绍了研究人员如何转录和分析 1,300 多份手稿，揭示了这位黄金时代剧作家的新作品。
      ja: 英国の新聞「オリーブ・プレス」は、スペイン国立図書館で人工知能によって発掘された、これまで知られていなかったロペ・デ・ベガの喜劇「ラ・フランセサ・ローラ」の発見について報じた。アレックス・トレリンスキーが執筆したこの記事は、研究者たちが1,300以上の原稿をどのように書き写し分析したかを強調し、黄金時代の劇作家による新作を明らかにしている。
      ko: 영국 신문 올리브 프레스(The Olive Press)는 로페 데 베가(Lope de Vega)의 이전에 알려지지 않았던 코미디 <라 프란체사 로라(La Francesa Laura)>가 스페인 국립도서관에서 인공지능을 통해 발굴됐다고 보도했습니다. Alex Trelinski가 작성한 이 기사는 연구자들이 1,300개 이상의 원고를 필사하고 분석한 방법을 강조하여 황금 시대 극작가의 새로운 작품을 공개합니다.
