      es: "La revista portuguesa SÁBADO informó sobre el hallazgo de La francesa Laura, una comedia anónima de Lope de Vega descubierta mediante inteligencia artificial. El artículo explica que investigadores de Viena y Valladolid utilizaron un programa de IA para transcribir más de mil manuscritos de la Biblioteca Nacional de España, confirmando luego la autoría de Lope a través del análisis estilístico y filológico. La pieza será publicada por la editorial Gredos."
      en: "The Portuguese magazine SÁBADO reported on the discovery of La Francesa Laura, an anonymous comedy by Lope de Vega uncovered through artificial intelligence. The article explains that researchers from Vienna and Valladolid used an AI program to transcribe over a thousand manuscripts from Spain’s National Library, later confirming Lope’s authorship through stylistic and philological analysis. The play will be published by Gredos."


      fr: Le magazine portugais SÁBADO a rapporté la découverte de La Francesa Laura, une comédie anonyme de Lope de Vega découverte grâce à l'intelligence artificielle. L’article explique que des chercheurs de Vienne et de Valladolid ont utilisé un programme d’IA pour transcrire plus d’un millier de manuscrits de la Bibliothèque nationale d’Espagne, confirmant plus tard la paternité de Lope par une analyse stylistique et philologique. La pièce sera publiée par Gredos.
      pt: A revista portuguesa SÁBADO noticiou a descoberta de La Francesa Laura, uma comédia anónima de Lope de Vega descoberta através de inteligência artificial. O artigo explica que investigadores de Viena e Valladolid utilizaram um programa de IA para transcrever mais de mil manuscritos da Biblioteca Nacional de Espanha, confirmando posteriormente a autoria de Lope através de análises estilísticas e filológicas. A peça será publicada pela Gredos.
      it: La rivista portoghese SÁBADO ha riferito della scoperta di La Francesa Laura, una commedia anonima di Lope de Vega scoperta grazie all'intelligenza artificiale. L’articolo spiega che i ricercatori di Vienna e Valladolid hanno utilizzato un programma di intelligenza artificiale per trascrivere oltre mille manoscritti dalla Biblioteca nazionale spagnola, confermando successivamente la paternità di Lope attraverso un’analisi stilistica e filologica. Lo spettacolo sarà pubblicato da Gredos.
      de: Das portugiesische Magazin SÁBADO berichtete über die Entdeckung von La Francesa Laura, einer anonymen Komödie von Lope de Vega, die durch künstliche Intelligenz entdeckt wurde. Der Artikel erklärt, dass Forscher aus Wien und Valladolid ein KI-Programm verwendeten, um über tausend Manuskripte aus der spanischen Nationalbibliothek zu transkribieren und später Lopes Urheberschaft durch stilistische und philologische Analysen zu bestätigen. Das Stück wird von Gredos veröffentlicht.
      zh: 葡萄牙杂志《SÁBADO》报道了洛佩·德·维加通过人工智能发现的一部匿名喜剧《La Francesa Laura》的发现。文章解释说，维也纳和巴利亚多利德的研究人员使用人工智能程序抄录了西班牙国家图书馆的一千多份手稿，后来通过文体和语言学分析确认了洛普的作者身份。该剧将由格雷多斯出版。
      ja: ポルトガルの雑誌 SÁBADO は、人工知能によって発見されたロペ・デ・ベガの匿名コメディー『ラ・フランセサ・ローラ』の発見について報じた。この記事では、ウィーンとバリャドリッドの研究者らが AI プログラムを使用してスペイン国立図書館から 1,000 冊以上の写本を転記し、後に文体および文献学的分析を通じてロペの著者であることを確認したと説明しています。この戯曲はグレドス社から出版される予定だ。
      ko: 포르투갈 잡지 SÁBADO는 인공지능을 통해 밝혀낸 로페 데 베가의 익명 코미디인 라 프란체사 라우라(La Francesa Laura)의 발견에 대해 보도했습니다. 기사에서는 비엔나와 바야돌리드의 연구자들이 AI 프로그램을 사용하여 스페인 국립 도서관의 수천 권이 넘는 사본을 필사했으며 나중에 문체 및 언어학적 분석을 통해 로페의 저자임을 확인했다고 설명합니다. 이 연극은 Gredos에서 출판될 예정입니다.
      ru: Португальский журнал SÁBADO сообщил об открытии «La Francesa Laura», анонимной комедии Лопе де Веги, обнаруженной с помощью искусственного интеллекта. В статье объясняется, что исследователи из Вены и Вальядолида использовали программу искусственного интеллекта для расшифровки более тысячи рукописей из Национальной библиотеки Испании, позже подтвердив авторство Лопе посредством стилистического и филологического анализа. Пьесу издаст издательство Gredos.
      ar: أفادت المجلة البرتغالية SÁBADO عن اكتشاف La Francesa Laura، وهي كوميديا ​​مجهولة المصدر من تأليف Lope de Vega تم اكتشافها من خلال الذكاء الاصطناعي. يوضح المقال أن باحثين من فيينا وبلد الوليد استخدموا برنامج الذكاء الاصطناعي لنسخ أكثر من ألف مخطوطة من المكتبة الوطنية الإسبانية، وأكدوا لاحقًا تأليف لوبي من خلال التحليل الأسلوبي واللغوي. سيتم نشر المسرحية من قبل جريدوس.
