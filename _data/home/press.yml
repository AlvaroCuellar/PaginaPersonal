      es: "El Romanistik-Blog del Fachinformationsdienst Romanistik publicó un artículo de Markus Trapp que reflexiona sobre el uso combinado de técnicas forenses y de inteligencia artificial en el estudio de Lope de Vega. A partir de un reportaje de RTVE, el texto destaca las investigaciones de Álvaro Cuéllar y el descubrimiento de La francesa Laura mediante análisis estilométricos y aprendizaje automático, situando el hallazgo en el marco de las nuevas metodologías de las humanidades digitales en España."
      en: "The Romanistik-Blog of the Fachinformationsdienst Romanistik published an article by Markus Trapp reflecting on the combined use of forensic and AI techniques in the study of Lope de Vega. Drawing from a RTVE report, it highlights Álvaro Cuéllar’s research and the discovery of La Francesa Laura through stylometric and machine-learning analysis, situating the finding within the broader context of digital humanities research in Spain."



      fr: Le blog Romanistik du Fachinformationsdienst Romanistik a publié un article de Markus Trapp réfléchissant à l'utilisation combinée de techniques médico-légales et d'IA dans l'étude de Lope de Vega. S'appuyant sur un reportage de RTVE, il met en lumière les recherches d'Álvaro Cuéllar et la découverte de La Francesa Laura grâce à une analyse stylométrique et d'apprentissage automatique, situant les résultats dans le contexte plus large de la recherche en humanités numériques en Espagne.
      pt: O Romanistik-Blog do Fachinformationsdienst Romanistik publicou um artigo de Markus Trapp refletindo sobre o uso combinado de técnicas forenses e de IA no estudo de Lope de Vega. Com base num relatório da RTVE, destaca a investigação de Álvaro Cuéllar e a descoberta de La Francesa Laura através de análises estilométricas e de aprendizagem automática, situando a descoberta no contexto mais amplo da investigação em humanidades digitais em Espanha.
      it: Il Romanistik-Blog del Fachinformationsdienst Romanistik ha pubblicato un articolo di Markus Trapp che riflette sull'uso combinato di tecniche forensi e di intelligenza artificiale nello studio di Lope de Vega. Prendendo spunto da un rapporto RTVE, mette in evidenza la ricerca di Álvaro Cuéllar e la scoperta di La Francesa Laura attraverso l'analisi stilometrica e di apprendimento automatico, situando la scoperta nel contesto più ampio della ricerca sulle discipline umanistiche digitali in Spagna.
      de: Im Romanistik-Blog des Fachinformationsdienstes Romanistik wurde ein Artikel von Markus Trapp veröffentlicht, in dem er über den kombinierten Einsatz forensischer und KI-Techniken bei der Erforschung von Lope de Vega nachdenkt. Basierend auf einem RTVE-Bericht beleuchtet es die Forschung von Álvaro Cuéllar und die Entdeckung von La Francesa Laura durch stilometrische und maschinelle Lernanalysen und stellt die Entdeckung in den breiteren Kontext der Digital Humanities-Forschung in Spanien.
      zh: Fachinformationsdienst Romanistik 的 Romanistik 博客发表了 Markus Trapp 的一篇文章，反思了法医和人工智能技术在洛佩·德·维加研究中的结合使用。它借鉴 RTVE 的报告，重点介绍了 Álvaro Cuéllar 的研究以及通过风格测量和机器学习分析发现的 La Francesa Laura，并将这一发现置于西班牙数字人文研究的更广泛背景下。
      ja: Fachinformationsdienst Romanistik の Romanistik-Blog は、ロペ・デ・ベガの研究における法医学と AI 技術の組み合わせを反映したマルクス・トラップによる記事を掲載しました。 RTVE レポートを基に、アルバロ・クエヤル氏の研究と、スタイロメトリーおよび機械学習分析によるラ・フランセサ・ローラの発見に焦点を当て、その発見をスペインにおけるデジタル人文科学研究のより広範な文脈の中に位置づけています。
      ko: Fachinformationsdienst Romanistik의 Romanistik-Blog는 Lope de Vega 연구에서 법의학 및 AI 기술의 결합 사용을 반영하는 Markus Trapp의 기사를 게시했습니다. RTVE 보고서를 바탕으로 문체 분석 및 기계 학습 분석을 통해 Álvaro Cuéllar의 연구와 La Francesa Laura의 발견을 강조하고 스페인의 디지털 인문학 연구라는 더 넓은 맥락에서 발견한 내용을 설명합니다.
      ru: Блог Romanistik Fachinformationsdienst Romanistik опубликовал статью Маркуса Траппа, в которой он размышляет о совместном использовании методов судебной экспертизы и искусственного интеллекта в исследовании Лопе де Веги. Опираясь на отчет RTVE, в нем освещаются исследования Альваро Куэльяра и открытие Ла Франческа Лаура с помощью стилометрического анализа и анализа машинного обучения, помещая результаты в более широкий контекст цифровых гуманитарных исследований в Испании.
      ar: نشرت مدونة Romanistik التابعة لـ Fachinformationsdienst Romanistik مقالًا بقلم ماركوس تراب يعكس الاستخدام المشترك لتقنيات الطب الشرعي والذكاء الاصطناعي في دراسة Lope de Vega. وبالاستناد إلى تقرير RTVE، فإنه يسلط الضوء على بحث ألفارو كويلار واكتشاف La Francesa Laura من خلال تحليل قياس الأسلوب والتعلم الآلي، ووضع النتائج ضمن السياق الأوسع لأبحاث العلوم الإنسانية الرقمية في إسبانيا.
