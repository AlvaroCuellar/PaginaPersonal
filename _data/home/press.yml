      zh: 机器风格比较：人工智能发现喜剧 作者：Lope de Vega
      ja: 'マシン スタイルの比較: AI がコメディを発見 by ロペ デ ベガ'
      ko: '기계 스타일 비교: AI가 Lope de Vega의 코미디를 발견합니다'
      ru: 'Сравнение стилей машин: искусственный интеллект открывает комедию Лопе де Веги'
