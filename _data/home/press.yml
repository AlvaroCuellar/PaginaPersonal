    title:
      pt: "Inteligência artificial revela peça desconhecida de autor espanhol em biblioteca"
      es: "La inteligencia artificial revela una obra desconocida de un autor español en una biblioteca"
      en: "Artificial Intelligence Reveals Unknown Play by Spanish Author in Library"
      fr: L'intelligence artificielle révèle une pièce inconnue d'un auteur espagnol dans une bibliothèque
      it: L'intelligenza artificiale rivela un'opera sconosciuta di un autore spagnolo in biblioteca
      de: Künstliche Intelligenz enthüllt unbekanntes Stück eines spanischen Autors in Bibliothek
      zh: 人工智能揭示西班牙作家在图书馆中的未知游戏
      ja: 図書館にあるスペイン人作家の未知の遊びを人工知能が解明
      ko: 인공 지능, 도서관에서 스페인 작가의 알려지지 않은 연극 공개
      ru: Искусственный интеллект обнаружил в библиотеке неизвестную пьесу испанского автора
