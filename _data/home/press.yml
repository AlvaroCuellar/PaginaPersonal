      fr: L'agence de presse officielle indonésienne ANTARA News a fait état de la découverte de La Francesa Laura, une pièce jusqu'alors inconnue de Lope de Vega identifiée grâce à l'intelligence artificielle à la Bibliothèque nationale d'Espagne. Basé sur des informations de Reuters, l'article décrit comment les chercheurs Álvaro Cuéllar et Germán Vega ont utilisé des techniques de transcription automatique et d'analyse philologique pour confirmer la paternité du dramaturge espagnol du Siècle d'or.
      pt: A agência de notícias oficial da Indonésia, ANTARA News, informou sobre a descoberta de La Francesa Laura, uma peça até então desconhecida de Lope de Vega, identificada através de inteligência artificial na Biblioteca Nacional da Espanha. Com base em informações da Reuters, o artigo descreve como os pesquisadores Álvaro Cuéllar e Germán Vega utilizaram técnicas de transcrição automática e análise filológica para confirmar a autoria do dramaturgo espanhol da Idade de Ouro.
      it: L'agenzia di stampa ufficiale indonesiana ANTARA News ha riferito della scoperta di La Francesa Laura, un'opera precedentemente sconosciuta di Lope de Vega identificata attraverso l'intelligenza artificiale presso la Biblioteca Nazionale spagnola. Basato su informazioni Reuters, l'articolo descrive come i ricercatori Álvaro Cuéllar e Germán Vega abbiano utilizzato tecniche di trascrizione automatica e analisi filologica per confermare la paternità del drammaturgo spagnolo del Secolo d'oro.
      de: Indonesiens offizielle Nachrichtenagentur ANTARA News berichtete über die Entdeckung von La Francesa Laura, einem bisher unbekannten Stück von Lope de Vega, das durch künstliche Intelligenz in der spanischen Nationalbibliothek identifiziert wurde. Basierend auf Reuters-Informationen beschreibt der Artikel, wie die Forscher Álvaro Cuéllar und Germán Vega automatische Transkription und philologische Analysetechniken verwendeten, um die Urheberschaft des spanischen Dramatikers des Goldenen Zeitalters zu bestätigen.
      zh: 印度尼西亚官方通讯社 ANTARA News 报道了西班牙国家图书馆通过人工智能识别出的《La Francesa Laura》的发现情况，这是洛佩·德·维加 (Lope de Vega) 创作的一部此前不为人知的戏剧。根据路透社的信息，文章描述了研究人员 Álvaro Cuéllar 和 Germán Vega 如何使用自动转录和语言学分析技术来确认西班牙黄金时代剧作家的作者身份。
      ja: インドネシアの国営通信社アンタラ・ニュースは、スペイン国立図書館で人工知能によって特定された、これまで知られていなかったロペ・デ・ベガの戯曲『ラ・フランセサ・ラウラ』の発見について報じた。ロイターの情報に基づいて、この記事は、研究者のアルバロ・クエヤル氏とゲルマン・ベガ氏が、スペイン黄金時代の劇作家の著作者であることを確認するために自動転写と文献学的分析技術をどのように使用したかについて説明しています。
      ko: 인도네시아 관영 통신사 안타라 뉴스(ANTARA News)는 스페인 국립도서관에서 인공지능을 통해 확인된 로페 데 베가의 이전에 알려지지 않았던 희곡 '라 프란체사 라우라(La Francesa Laura)'를 발견했다고 보도했습니다. Reuters 정보를 바탕으로 이 기사에서는 연구원 Álvaro Cuéllar와 Germán Vega가 자동 필사 및 문헌 분석 기술을 사용하여 스페인 황금기 극작가의 저자임을 확인하는 방법을 설명합니다.
      ru: Официальное информационное агентство Индонезии ANTARA News сообщило об обнаружении ранее неизвестной пьесы Лопе де Веги «La Francesa Laura», идентифицированной с помощью искусственного интеллекта в Национальной библиотеке Испании. На основе информации Reuters в статье описывается, как исследователи Альваро Куэльяр и Херман Вега использовали методы автоматической транскрипции и филологического анализа для подтверждения авторства испанского драматурга Золотого века.
      ar: أفادت وكالة الأنباء الإندونيسية الرسمية أنتارا نيوز عن اكتشاف مسرحية لا فرانشيسا لورا، وهي مسرحية لم تكن معروفة من قبل للوب دي فيغا تم التعرف عليها من خلال الذكاء الاصطناعي في المكتبة الوطنية الإسبانية. استنادًا إلى معلومات رويترز، يصف المقال كيف استخدم الباحثان ألفارو كويلار وجيرمان فيجا تقنيات النسخ التلقائي والتحليل اللغوي للتأكد من تأليف الكاتب المسرحي الإسباني من العصر الذهبي.
