      es: "El programa 'El ojo crítico' de Radio Nacional de España dedica un segmento al descubrimiento de 'La francesa Laura' en la Biblioteca Nacional de España. Germán Vega, catedrático de la Universidad de Valladolid, explica cómo la inteligencia artificial permitió atribuir la obra a Lope de Vega."
      en: "The radio program 'El ojo crítico' on Radio Nacional de España covers the discovery of 'La francesa Laura' at the National Library of Spain. Professor Germán Vega from the University of Valladolid explains how artificial intelligence enabled the attribution of the play to Lope de Vega."


      fr: L'émission de radio « El ojo critico » de Radio Nacional de España couvre la découverte de « La francesa Laura » à la Bibliothèque nationale d'Espagne. Le professeur Germán Vega de l'Université de Valladolid explique comment l'intelligence artificielle a permis d'attribuer la pièce à Lope de Vega.
      pt: O programa de rádio 'El ojo crítico' da Rádio Nacional de España cobre a descoberta de 'La francesa Laura' na Biblioteca Nacional de Espanha. O professor Germán Vega, da Universidade de Valladolid, explica como a inteligência artificial permitiu atribuir a peça a Lope de Vega.
      it: Il programma radiofonico "El ojo crítico" su Radio Nacional de España racconta la scoperta di "La francesa Laura" presso la Biblioteca Nazionale di Spagna. Il professor Germán Vega dell'Università di Valladolid spiega come l'intelligenza artificiale ha permesso di attribuire l'opera a Lope de Vega.
      de: Die Radiosendung „El ojo crítico“ auf Radio Nacional de España berichtet über die Entdeckung von „La francesa Laura“ in der spanischen Nationalbibliothek. Professor Germán Vega von der Universität Valladolid erklärt, wie künstliche Intelligenz die Zuschreibung des Stücks an Lope de Vega ermöglichte.
      zh: 西班牙国家广播电台的广播节目“El ojo crítico”报道了西班牙国家图书馆发现“La francesa Laura”的情况。巴利亚多利德大学的 Germán Vega 教授解释了人工智能如何确定该剧的作者是洛佩·德·维加 (Lope de Vega)。
      ja: スペインラジオ放送のラジオ番組「El ojo crítico」は、スペイン国立図書館での「La francesa Laura」の発見を取り上げています。バリャドリード大学のゲルマン・ベガ教授は、人工知能がどのようにしてこの劇の作者がロペ・デ・ベガであるかを説明します。
      ko: Radio Nacional de España의 라디오 프로그램 'El ojo crítico'에서는 스페인 국립도서관에서 발견된 'La francesa Laura'에 대해 다루고 있습니다. 바야돌리드 대학의 Germán Vega 교수는 인공 지능이 어떻게 연극의 Lope de Vega에 대한 귀속을 가능하게 했는지 설명합니다.
      ru: Радиопрограмма «El ojo crítico» на Radio Nacional de España рассказывает об открытии «La francesa Laura» в Национальной библиотеке Испании. Профессор Херман Вега из Университета Вальядолида объясняет, как искусственный интеллект позволил приписать пьесу Лопе де Веге.
      ar: يغطي البرنامج الإذاعي "El ojo crítico" على راديو Nacional de España اكتشاف "La francesa Laura" في مكتبة إسبانيا الوطنية. يشرح البروفيسور جيرمان فيجا من جامعة بلد الوليد كيف مكن الذكاء الاصطناعي من إسناد المسرحية إلى لوبي دي فيجا.
