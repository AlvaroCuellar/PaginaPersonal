      en: "La Voz Canaria covers the event organized by El Museo Canario to discuss the role of artificial intelligence in the conservation and analysis of historical archives. The article notes the opening lecture by Álvaro Cuéllar González, from the Autonomous University of Barcelona, on the possibilities of AI for documentary heritage."


      fr: La Voz Canaria couvre l'événement organisé par El Museo Canario pour discuter du rôle de l'intelligence artificielle dans la conservation et l'analyse des archives historiques. L'article fait référence à la conférence d'ouverture d'Álvaro Cuéllar González, de l'Université autonome de Barcelone, sur les possibilités de l'IA pour le patrimoine documentaire.
      pt: La Voz Canaria cobre o evento organizado pelo El Museo Canario para discutir o papel da inteligência artificial na conservação e análise de arquivos históricos. O artigo destaca a palestra de abertura de Álvaro Cuéllar González, da Universidade Autônoma de Barcelona, ​​sobre as possibilidades da IA ​​para o patrimônio documental.
      it: La Voz Canaria copre l'evento organizzato da El Museo Canario per discutere il ruolo dell'intelligenza artificiale nella conservazione e nell'analisi degli archivi storici. L'articolo prende spunto dalla conferenza di apertura di Álvaro Cuéllar González, dell'Università Autonoma di Barcellona, ​​sulle possibilità dell'intelligenza artificiale per il patrimonio documentario.
      de: La Voz Canaria berichtet über die vom El Museo Canario organisierte Veranstaltung, bei der die Rolle der künstlichen Intelligenz bei der Konservierung und Analyse historischer Archive diskutiert wird. Der Artikel erwähnt den Eröffnungsvortrag von Álvaro Cuéllar González von der Autonomen Universität Barcelona über die Möglichkeiten der KI für das dokumentarische Erbe.
      zh: La Voz Canaria 报道了 El Museo Canario 组织的活动，讨论人工智能在历史档案保护和分析中的作用。文章提到了巴塞罗那自治大学的 Álvaro Cuéllar González 的开幕演讲，主题是人工智能在文献遗产方面的可能性。
      ja: La Voz Canaria は、歴史的アーカイブの保存と分析における人工知能の役割について議論するために El Museo Canario が主催したイベントを取り上げています。この記事では、バルセロナ自治大学のアルバロ・クエヤル・ゴンサレス氏によるドキュメンタリー遺産に対するAIの可能性についての冒頭講義について言及している。
      ko: La Voz Canaria는 역사 기록 보관소의 보존 및 분석에서 인공 지능의 역할을 논의하기 위해 El Museo Canario가 주최한 이벤트를 다룹니다. 이 기사는 다큐멘터리 유산에 대한 AI의 가능성에 관해 바르셀로나 자치대학교의 Álvaro Cuéllar González의 개회 강연을 언급합니다.
      ru: La Voz Canaria освещает мероприятие, организованное El Museo Canario для обсуждения роли искусственного интеллекта в сохранении и анализе исторических архивов. В статье отмечается вступительная лекция Альваро Куэльяра Гонсалеса из Автономного университета Барселоны о возможностях искусственного интеллекта для документального наследия.
      ar: يغطي La Voz Canaria الحدث الذي نظمه El Museo Canario لمناقشة دور الذكاء الاصطناعي في حفظ وتحليل المحفوظات التاريخية. ويشير المقال إلى المحاضرة الافتتاحية التي ألقاها ألفارو كوييار غونزاليس، من جامعة برشلونة المستقلة، حول إمكانيات الذكاء الاصطناعي في التراث الوثائقي.
  - id: "press81"
    title:
      es: "«Recursos y procedimientos digitales», título de las III Jornadas de Patrimonio Documental de El Museo Canario"
      en: "'Digital Resources and Procedures', the Title of El Museo Canario's 3rd Documentary Heritage Conference"
      fr: « Ressources et procédures numériques », titre de la IIIe Conférence sur le patrimoine documentaire d'El Museo Canario
      pt: "'Recursos e Procedimentos Digitais', o título da 3ª Conferência do Patrimônio Documental do El Museo Canario"
      it: '"Risorse e procedure digitali", il titolo della terza conferenza sul patrimonio documentario del Museo Canario'
      de: „Digitale Ressourcen und Verfahren“, der Titel der 3. Konferenz zum Dokumentarischen Erbe im El Museo Canario
      zh: “数字资源和程序”，卡纳里奥博物馆第三届文献遗产会议的标题
      ja: 「デジタル リソースと手順」、エル ムセオ カナリオの第 3 回ドキュメンタリー遺産会議のタイトル
      ko: El Museo Canario의 제3회 다큐멘터리 유산 컨퍼런스의 제목은 '디지털 자원 및 절차'입니다.
      ru: «Цифровые ресурсы и процедуры» — так называется 3-я конференция по документальному наследию El Museo Canario.
      ar: '"الموارد والإجراءات الرقمية"، عنوان مؤتمر التراث الوثائقي الثالث لمتحف كناريو'
    outlet: "El Museo Canario"
    date: "2026-05-14"
    url: "https://www.elmuseocanario.com/recursos-y-procedimientos-digitales-sera-el-titulo-de-las-iii-jornadas-de-patrimonio-documental-que-celebrara-en-junio-el-museo-canario/"
    thumbnail: "/assets/images/press/81.jpg"
    type: "news"
    summary:
      es: "El Museo Canario anunció sus III Jornadas de Patrimonio Documental, dedicadas a «Recursos y procedimientos digitales» y celebradas los días 8 y 9 de junio de 2026. El programa incluyó la conferencia inaugural de Álvaro Cuéllar González, «Patrimonio documental e inteligencia artificial: una mirada tecnoptimista», así como su participación en una mesa redonda sobre innovación, tecnología y documentos."
      en: "El Museo Canario announced its 3rd Documentary Heritage Conference, devoted to 'Digital Resources and Procedures' and held on June 8 and 9, 2026. The program included the opening lecture by Álvaro Cuéllar González, 'Documentary Heritage and Artificial Intelligence: A Techno-Optimistic View', as well as his participation in a round table on innovation, technology, and documents."


      fr: "El Museo Canario a annoncé sa 3e Conférence sur le patrimoine documentaire, consacrée aux « Ressources et procédures numériques » et qui s'est tenue les 8 et 9 juin 2026. Le programme comprenait la conférence d'ouverture d'Álvaro Cuéllar González, « Patrimoine documentaire et intelligence artificielle: une vision techno-optimiste », ainsi que sa participation à une table ronde sur l'innovation, la technologie et les documents."
      pt: "El Museo Canario anunciou a sua 3ª Conferência sobre Património Documental, dedicada a 'Recursos e Procedimentos Digitais' e realizada nos dias 8 e 9 de junho de 2026. O programa incluiu a palestra de abertura de Álvaro Cuéllar González, 'Património Documental e Inteligência Artificial: Uma Visão Tecno-Otimista', bem como a sua participação numa mesa redonda sobre inovação, tecnologia e documentos."
      it: "El Museo Canario ha annunciato la sua terza Conferenza sul patrimonio documentario, dedicata a \"Risorse e procedure digitali\", che si terrà l'8 e 9 giugno 2026. Il programma prevedeva la conferenza di apertura di Álvaro Cuéllar González, \"Patrimonio documentario e intelligenza artificiale: una visione tecno-ottimistica\", nonché la sua partecipazione a una tavola rotonda su innovazione, tecnologia e documenti."
      de: 'El Museo Canario kündigte seine 3. Konferenz zum Dokumentarischen Erbe an, die sich dem Thema „Digitale Ressourcen und Verfahren“ widmet und am 8. und 9. Juni 2026 stattfindet. Das Programm umfasste den Eröffnungsvortrag von Álvaro Cuéllar González, „Dokumentarisches Erbe und künstliche Intelligenz: Eine technologisch-optimistische Sichtweise“, sowie seine Teilnahme an einem Runden Tisch zu Innovation, Technologie und Dokumenten.'
      zh: 卡纳里奥博物馆宣布将于 2026 年 6 月 8 日至 9 日举行第三届文献遗产会议，主题为“数字资源和程序”。该会议包括阿尔瓦罗·奎利亚尔·冈萨雷斯 (Álvaro Cuéllar González) 的开幕演讲“文献遗产与人工智能：技术乐观的观点”，以及他参加的关于创新、技术和文献的圆桌会议。
      ja: El Museo Canarioは、「デジタルリソースと手順」をテーマとし、2026年6月8日と9日に開催される第3回ドキュメンタリー遺産会議を発表した。このプログラムには、アルバロ・クエヤル・ゴンサレス氏による「ドキュメンタリー遺産と人工知能：技術楽観的な見方」という開会講演と、イノベーション、テクノロジー、文書に関するラウンドテーブルへの参加が含まれていた。
      ko: "El Museo Canario는 '디지털 자원 및 절차'를 주제로 2026년 6월 8일과 9일에 개최되는 제3차 다큐멘터리 유산 컨퍼런스를 발표했습니다. 이 프로그램에는 Álvaro Cuéllar González의 '다큐멘터리 유산과 인공 지능: 기술 낙관적 관점'의 개회 강연과 혁신, 기술 및 문서에 관한 원탁 회의 참여가 포함되었습니다."
      ru: 'El Museo Canario объявил о своей третьей конференции по документальному наследию, посвященной «Цифровым ресурсам и процедурам», которая пройдет 8 и 9 июня 2026 года. Программа включала вступительную лекцию Альваро Куэльяра Гонсалеса «Документальное наследие и искусственный интеллект: техно-оптимистический взгляд», а также его участие в круглом столе, посвященном инновациям, технологиям и документам.'
      ar: 'أعلن متحف كناريو عن مؤتمره الثالث للتراث الوثائقي، المخصص لـ "الموارد والإجراءات الرقمية" والذي انعقد يومي 8 و9 يونيو 2026. وتضمن البرنامج المحاضرة الافتتاحية التي ألقاها ألفارو كويلار غونزاليس، "التراث الوثائقي والذكاء الاصطناعي: رؤية تكنولوجية متفائلة"، بالإضافة إلى مشاركته في مائدة مستديرة حول الابتكار والتكنولوجيا والوثائق.'
