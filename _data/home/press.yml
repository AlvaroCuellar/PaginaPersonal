      ja: 批評家ホセ・ミゲル・ビラは、マルタ・ポベダ監督、人工知能によるロペ・デ・ベガの未発表コメディ「ラ・フランセサ・ローラ」についてディアリオクリティコに書いている。彼はその演出、テキストの詩的な構造、そしてシェイラ・ニーニョとアグス・ルイスの力強い演技を称賛した。
