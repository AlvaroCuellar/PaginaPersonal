      es: "Raúl Losánez relata en La Razón el estreno mundial de La francesa Laura, una comedia de Lope de Vega identificada mediante inteligencia artificial por Álvaro Cuéllar y Germán Vega. La obra, dirigida por Marta Poveda y puesta en escena por la Fundación Siglo de Oro, revela la vigencia dramática y emocional del Fénix de los Ingenios cuatro siglos después."
      en: "Raúl Losánez reports in La Razón on the world premiere of La Francesa Laura, a comedy by Lope de Vega identified through artificial intelligence by Álvaro Cuéllar and Germán Vega. Directed by Marta Poveda and staged by Fundación Siglo de Oro, the play demonstrates the dramatic and emotional vitality of the Phoenix of Wits four centuries later."





      fr: Raúl Losánez rapporte dans La Razón la première mondiale de La Francesa Laura, une comédie de Lope de Vega identifiée grâce à l'intelligence artificielle d'Álvaro Cuéllar et Germán Vega. Mise en scène par Marta Poveda et mise en scène par la Fundación Siglo de Oro, la pièce démontre la vitalité dramatique et émotionnelle du Phénix de l'esprit quatre siècles plus tard.
      pt: Raúl Losánez reporta no La Razón a estreia mundial de La Francesa Laura, comédia de Lope de Vega identificada através da inteligência artificial de Álvaro Cuéllar e Germán Vega. Dirigida por Marta Poveda e encenada pela Fundación Siglo de Oro, a peça demonstra a vitalidade dramática e emocional da Fênix da Razão quatro séculos depois.
      it: Raúl Losánez racconta su La Razón la prima mondiale di La Francesa Laura, commedia di Lope de Vega identificata attraverso l'intelligenza artificiale da Álvaro Cuéllar e Germán Vega. Diretto da Marta Poveda e messo in scena dalla Fundación Siglo de Oro, lo spettacolo dimostra la vitalità drammatica ed emotiva della Fenice dell'ingegno quattro secoli dopo.
      de: Raúl Losánez berichtet in La Razón über die Weltpremiere von La Francesa Laura, einer Komödie von Lope de Vega, die durch künstliche Intelligenz von Álvaro Cuéllar und Germán Vega identifiziert wurde. Unter der Regie von Marta Poveda und inszeniert von der Fundación Siglo de Oro demonstriert das Stück die dramatische und emotionale Vitalität des Phönix der Geister vier Jahrhunderte später.
      zh: 劳尔·洛萨内斯 (Raúl Losánez) 在 La Razón 报道了《弗朗西斯·劳拉》(La Francesa Laura) 的全球首映，这部喜剧由洛佩·德·维加 (Lope de Vega) 创作，由阿尔瓦罗·奎利亚尔 (Álvaro Cuéllar) 和杰曼·维加 (Germán Vega) 通过人工智能识别。该剧由玛尔塔·波韦达 (Marta Poveda) 执导，黄金黄金基金会 (Fundación Siglo de Oro) 演出，展现了四个世纪后智慧凤凰的戏剧性和情感活力。
      ja: ラウル・ロサネスは、アルバロ・クエヤルとジェルマン・ベガが人工知能を通じて識別したロペ・デ・ベガのコメディー『ラ・フランセサ・ローラ』の世界初演についてラ・ラソン紙で報告している。マルタ ポベダが監督し、シグロ デ オロ財団が演出したこの劇は、4 世紀後の知力の火の鳥の劇的かつ感情的な活力を示しています。
      ko: Raúl Losánez는 La Razón에서 Álvaro Cuéllar와 Germán Vega의 인공 지능을 통해 식별된 Lope de Vega의 코미디인 La Francesa Laura의 세계 초연에 대해 보고합니다. 마르타 포베다(Marta Poveda)가 감독하고 Fundación Siglo de Oro가 연출한 이 연극은 4세기 후 재치의 불사조(Phoenix of Wits)의 극적이고 감정적인 활력을 보여줍니다.
      ru: Рауль Лосанес сообщает в La Razón о мировой премьере комедии «Франческа Лаура» Лопе де Веги, идентифицированной с помощью искусственного интеллекта Альваро Куэльяра и Хермана Веги. Спектакль, поставленный Мартой Поведой и поставленный Fundación Siglo de Oro, демонстрирует драматическую и эмоциональную жизненную силу Феникса Остроумия четыре столетия спустя.
      ar: تقرير راؤول لوسانيز في لا رازون عن العرض العالمي الأول لفيلم La Francesa Laura، وهو فيلم كوميدي من تأليف Lope de Vega تم التعرف عليه من خلال الذكاء الاصطناعي بواسطة ألفارو كويلار وجيرمان فيجا. تُظهر المسرحية، التي أخرجتها مارتا بوفيدا وأخرجتها مؤسسة Fundación Siglo de Oro، الحيوية الدرامية والعاطفية لطائر الفينيق أوف ويتس بعد أربعة قرون.
