      es: "La periodista Begoña Corzo informa en La Vanguardia del descubrimiento de La francesa Laura, una comedia desconocida de Lope de Vega hallada en la Biblioteca Nacional de España. El hallazgo, realizado por Álvaro Cuéllar y Germán Vega mediante técnicas de inteligencia artificial y transcripción automática, ha sido publicado en el Anuario Lope de Vega."
      en: "Journalist Begoña Corzo reports in La Vanguardia on the discovery of La francesa Laura, an unknown comedy by Lope de Vega found in Spain’s National Library. The finding, achieved by Álvaro Cuéllar and Germán Vega through artificial intelligence and automated transcription, was published in the Anuario Lope de Vega."


      fr: La journaliste Begoña Corzo rapporte dans La Vanguardia la découverte de La francesa Laura, une comédie méconnue de Lope de Vega trouvée à la Bibliothèque nationale d'Espagne. La découverte, réalisée par Álvaro Cuéllar et Germán Vega grâce à l'intelligence artificielle et à la transcription automatisée, a été publiée dans l'Anuario Lope de Vega.
      pt: A jornalista Begoña Corzo relata no La Vanguardia a descoberta de La francesa Laura, uma comédia desconhecida de Lope de Vega encontrada na Biblioteca Nacional da Espanha. A descoberta, alcançada por Álvaro Cuéllar e Germán Vega através de inteligência artificial e transcrição automatizada, foi publicada no Anuario Lope de Vega.
      it: La giornalista Begoña Corzo racconta su La Vanguardia la scoperta di La francesa Laura, una commedia sconosciuta di Lope de Vega ritrovata nella Biblioteca Nazionale spagnola. La scoperta, ottenuta da Álvaro Cuéllar e Germán Vega attraverso l'intelligenza artificiale e la trascrizione automatizzata, è stata pubblicata sull'Anuario Lope de Vega.
      de: Die Journalistin Begoña Corzo berichtet in La Vanguardia über die Entdeckung von La francesa Laura, einer unbekannten Komödie von Lope de Vega, die in der spanischen Nationalbibliothek gefunden wurde. Die von Álvaro Cuéllar und Germán Vega mithilfe künstlicher Intelligenz und automatisierter Transkription erzielten Erkenntnisse wurden im Anuario Lope de Vega veröffentlicht.
      zh: 记者 Begoña Corzo 在 La Vanguardia 上报道了 La francesa Laura 的发现，这是一部由洛佩·德·维加 (Lope de Vega) 创作的不知名喜剧，在西班牙国家图书馆发现。这一发现由 Álvaro Cuéllar 和 Germán Vega 通过人工智能和自动转录实现，并发表在《Anuario Lope de Vega》上。
      ja: ジャーナリストのベゴーニャ・コルソは、スペインの国立図書館で発見されたロペ・デ・ベガの未知の喜劇『ラ・フランセサ・ローラ』の発見について『ラ・ヴァングアルディア』誌に報告している。この発見は、アルバロ・クエヤル氏とゲルマン・ベガ氏が人工知能と自動文字起こしを通じて達成したもので、アヌアリオ・ロペ・デ・ベガ紙に掲載された。
      ko: 저널리스트 Begoña Corzo는 스페인 국립 도서관에서 발견된 Lope de Vega의 알려지지 않은 희극인 La francesa Laura의 발견에 대해 La Vanguardia에 보도합니다. Álvaro Cuéllar와 Germán Vega가 인공 지능과 자동 전사를 통해 달성한 이 발견은 Anuario Lope de Vega에 게재되었습니다.
      ru: Журналистка Бегонья Корсо сообщает в La Vanguardia об открытии «Французской Лауры», неизвестной комедии Лопе де Веги, найденной в Национальной библиотеке Испании. Открытие, достигнутое Альваро Куэльяром и Херманом Вегой с помощью искусственного интеллекта и автоматической транскрипции, было опубликовано в журнале Anuario Lope de Vega.
      ar: تقرير الصحفي بيجونيا كورزو في صحيفة لا فانجارديا عن اكتشاف فيلم La francesa Laura، وهو فيلم كوميدي غير معروف من تأليف Lope de Vega تم العثور عليه في المكتبة الوطنية الإسبانية. تم نشر هذه النتيجة، التي توصل إليها ألفارو كويلار وجيرمان فيجا من خلال الذكاء الاصطناعي والنسخ الآلي، في Anuario Lope de Vega.
