      fr: La revue littéraire Letralia décrit comment les chercheurs Álvaro Cuéllar et Germán Vega, à travers le projet ETSO et l'utilisation du Transkribus et de l'analyse stylométrique, ont attribué à Lope de Vega la comédie jusqu'alors inconnue La Francesa Laura. L'article détaille le processus de transcription automatique, l'analyse philologique ultérieure et la publication des résultats dans l'Anuario Lope de Vega de l'Universitat Autònoma de Barcelona.
      pt: A revista literária Letralia descreve como os investigadores Álvaro Cuéllar e Germán Vega, através do projecto ETSO e do recurso ao Transkribus e à análise estilométrica, atribuíram a Lope de Vega a até então desconhecida comédia La Francesa Laura. O artigo detalha o processo de transcrição automática, posterior análise filológica e publicação dos resultados no Anuario Lope de Vega da Universitat Autònoma de Barcelona.
      it: La rivista letteraria Letralia descrive come i ricercatori Álvaro Cuéllar e Germán Vega, attraverso il progetto ETSO e l'uso di Transkribus e dell'analisi stilometrica, hanno attribuito a Lope de Vega la commedia precedentemente sconosciuta La Francesa Laura. L'articolo descrive dettagliatamente il processo di trascrizione automatica, la successiva analisi filologica e la pubblicazione dei risultati nell'Anuario Lope de Vega dell'Universitat Autònoma de Barcelona.
      de: Das Literaturmagazin Letralia beschreibt, wie die Forscher Álvaro Cuéllar und Germán Vega durch das ETSO-Projekt und den Einsatz von Transkribus und stilometrischer Analyse die bisher unbekannte Komödie La Francesa Laura Lope de Vega zuschrieben. Der Artikel beschreibt den automatischen Transkriptionsprozess, die anschließende philologische Analyse und die Veröffentlichung der Ergebnisse im Anuario Lope de Vega der Universitat Autònoma de Barcelona.
      zh: 文学杂志 Letralia 描述了研究人员 Álvaro Cuéllar 和 Germán Vega 如何通过 ETSO 项目并使用 Transkribus 和文体分析，将之前不为人知的喜剧《La Francesa Laura》归因于 Lope de Vega。文章详细介绍了自动转录过程、随后的语言学分析以及在巴塞罗那自治大学 Anuario Lope de Vega 上发表的结果。
      ja: 文芸誌『レトラリア』は、研究者のアルバロ・クエヤルとジェルマン・ベガが、ETSOプロジェクトとトランスクリバスとスタイロメトリー分析の利用を通じて、これまで知られていなかった喜劇『ラ・フランセサ・ローラ』をロペ・デ・ベガの作であると特定した経緯を説明している。この記事では、自動転写プロセス、その後の文献学的分析、およびバルセロナ自治大学のアヌリオ ロペ デ ベガでの結果の出版について詳しく説明しています。
      ko: 문학 잡지 Letralia는 연구원 Álvaro Cuéllar와 Germán Vega가 ETSO 프로젝트와 Transkribus 및 문체 분석을 통해 이전에 알려지지 않은 코미디 La Francesa Laura를 Lope de Vega의 작품으로 간주한 방법을 설명합니다. 이 기사에서는 자동 전사 과정, 후속 문헌학적 분석, Universitat Autònoma de Barcelona의 Anuario Lope de Vega 결과 발표에 대해 자세히 설명합니다.
      ru: Литературный журнал Letralia описывает, как исследователи Альваро Куэльяр и Херман Вега с помощью проекта ETSO и использования Transkribus и стилометрического анализа приписали Лопе де Веге ранее неизвестную комедию La Francesa Laura. В статье подробно описан процесс автоматической транскрипции, последующий филологический анализ и публикация результатов в «Ануарио Лопе де Вега» Автономного университета Барселоны.
      ar: تصف المجلة الأدبية Letralia كيف نسب الباحثون ألفارو كويلار وجيرمان فيجا، من خلال مشروع ETSO واستخدام Transkribus والتحليل الأسلوبي، الكوميديا ​​غير المعروفة سابقًا La Francesa Laura إلى Lope de Vega. تتناول المقالة تفاصيل عملية النسخ التلقائي، والتحليل اللغوي اللاحق، ونشر النتائج في Anuario Lope de Vega التابعة لجامعة برشلونة المستقلة.
