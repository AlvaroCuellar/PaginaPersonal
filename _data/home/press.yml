      zh: 人工智能发现丢失的游戏 作者：Félix Lope de Vega
      ja: AI が失われたプレーを発見 by フェリックス・ロペ・デ・ベガ
      ko: AI가 잃어버린 플레이를 발견하다 - Félix Lope de Vega
