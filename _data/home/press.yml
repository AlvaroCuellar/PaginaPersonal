    summary:
      es: "La Real Sociedad Menéndez Pelayo informa sobre el estreno en los Teatros del Canal de 'La francesa Laura', comedia de Lope de Vega identificada mediante inteligencia artificial por Álvaro Cuéllar y Germán Vega. El artículo detalla el papel del proyecto ETSO, la colaboración del grupo PROLOPE y la edición publicada por Gredos."
      en: "The Real Sociedad Menéndez Pelayo reports on the premiere of 'La francesa Laura' at Madrid’s Teatros del Canal, a Lope de Vega comedy identified through artificial intelligence by Álvaro Cuéllar and Germán Vega. The article highlights the ETSO project, the collaboration with the PROLOPE group, and the edition published by Gredos."


      fr: La Real Sociedad Menéndez Pelayo rapporte la première de "La francesa Laura" au Teatros del Canal de Madrid, une comédie de Lope de Vega identifiée grâce à l'intelligence artificielle d'Álvaro Cuéllar et Germán Vega. L'article met en avant le projet ETSO, la collaboration avec le groupe PROLOPE et l'édition publiée par Gredos.
      pt: A Real Sociedad Menéndez Pelayo informa sobre a estreia de 'La francesa Laura' nos Teatros del Canal de Madrid, uma comédia de Lope de Vega identificada através da inteligência artificial por Álvaro Cuéllar e Germán Vega. O artigo destaca o projeto ETSO, a colaboração com o grupo PROLOPE e a edição publicada pela Gredos.
      it: La Real Sociedad Menéndez Pelayo riporta la prima di 'La francesa Laura' al Teatros del Canal di Madrid, una commedia di Lope de Vega identificata attraverso l'intelligenza artificiale da Álvaro Cuéllar e Germán Vega. L'articolo mette in evidenza il progetto ETSO, la collaborazione con il gruppo PROLOPE e l'edizione pubblicata da Gredos.
      de: Die Real Sociedad Menéndez Pelayo berichtet über die Premiere von „La francesa Laura“ im Teatros del Canal in Madrid, einer Lope de Vega-Komödie, die von Álvaro Cuéllar und Germán Vega mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel beleuchtet das ETSO-Projekt, die Zusammenarbeit mit der PROLOPE-Gruppe und die von Gredos veröffentlichte Ausgabe.
      zh: 皇家社会梅内德斯·佩拉约报道了马德里运河剧院首映的《法国劳拉》，这是一部洛佩·德·维加喜剧，由阿尔瓦罗·奎利亚尔和杰尔曼·维加通过人工智能识别。本文重点介绍了 ETSO 项目、与 PROLOPE 小组的合作以及 Gredos 发布的版本。
      ja: レアル・ソシエダ・メネンデス・ペラヨは、アルバロ・クエヤルとジェルマン・ベガが人工知能によって特定したロペ・デ・ベガのコメディー、マドリッドの運河劇場での「ラ・フランセサ・ローラ」の初演について報じた。この記事では、ETSO プロジェクト、PROLOPE グループとのコラボレーション、および Gredos によって発行されたエディションに焦点を当てています。
      ko: Real Sociedad Menéndez Pelayo는 마드리드의 Teatros del Canal에서 열린 'La francesa Laura' 초연에 대해 보도합니다. 이 코미디는 Álvaro Cuéllar와 Germán Vega가 인공 지능을 통해 확인한 Lope de Vega 코미디입니다. 이 기사에서는 ETSO 프로젝트, PROLOPE 그룹과의 협력, Gredos에서 출판한 에디션을 강조합니다.
      ru: Газета Real Sociedad Menéndez Pelayo сообщает о премьере «Французской Лауры» в мадридском Театре дель Канал, комедии Лопе де Веги, идентифицированной с помощью искусственного интеллекта Альваро Куэльяра и Хермана Веги. В статье освещается проект ETSO, сотрудничество с группой PROLOPE, а также издание, издаваемое Gredos.
      ar: تقرير ريال سوسيداد مينينديز بيلايو عن العرض الأول لفيلم "La francesa Laura" في مسرح تياتروس ديل كانال بمدريد، وهو فيلم كوميدي من نوع Lope de Vega تم التعرف عليه من خلال الذكاء الاصطناعي بواسطة ألفارو كويلار وجيرمان فيجا. يسلط المقال الضوء على مشروع ETSO والتعاون مع مجموعة PROLOPE والإصدار الذي نشرته Gredos.
  - id: "press26"
    title:
      es: "«La Francesa Laura», una obra inédita de Lope de Vega que estrenará la compañía teatral Fundación Siglo de Oro"
      en: "'La Francesa Laura', an Unpublished Play by Lope de Vega to Be Premiered by Fundación Siglo de Oro"
      fr: « La Francesa Laura », une pièce inédite de Lope de Vega sera créée par la Fundación Siglo de Oro
      pt: "'La Francesa Laura', peça inédita de Lope de Vega será estreada pela Fundación Siglo de Oro"
      it: "'La Francesa Laura', un'opera inedita di Lope de Vega sarà rappresentata in prima assoluta dalla Fundación Siglo de Oro"
      de: „La Francesa Laura“, ein unveröffentlichtes Stück von Lope de Vega, wird von der Fundación Siglo de Oro uraufgeführt
      zh: 洛佩·德·维加未出版的戏剧《La Francesa Laura》将由黄金基金会首演
      ja: ロペ・デ・ベガの未発表劇『ラ・フランセサ・ローラ』がシグロ・デ・オロ財団で初演される
      ko: Lope de Vega의 미출판 희곡 'La Francesa Laura'가 Fundación Siglo de Oro에서 초연됩니다.
