      ja: ABCトレドは、シグロ・デ・オロ財団との1年間にわたるツアーを経て、ロハス劇場で行われた「ラ・フランセサ・ローラ」の公演について報じている。マルタ・ポベダが監督・出演したこの劇は、アルバロ・クエヤルとジェルマン・ベガが人工知能を通じてロペ・デ・ベガのものとされる原稿に基づいて、嫉妬とジェンダー暴力をテーマにしている。
      ko: ABC Toledo는 Fundación Siglo de Oro와 함께 1년간의 투어를 ​​마친 후 Teatro de Rojas에서 열린 'La Francesa Laura' 공연에 대해 보도합니다. Marta Poveda가 감독하고 공연한 이 연극은 Álvaro Cuéllar와 Germán Vega가 인공 지능을 통해 Lope de Vega가 쓴 원고를 바탕으로 질투와 성폭력을 탐구합니다.
      ru: ABC Toledo сообщает о представлении «Франсезы Лауры» в Театре Рохас после годичного тура с Fundación Siglo de Oro. Спектакль, поставленный и поставленный Мартой Поведа, исследует ревность и гендерное насилие и основан на рукописи, приписываемой Лопе де Веге с помощью искусственного интеллекта Альваро Куэльяра и Хермана Веги.
      ar: تقرير ABC Toledo عن أداء "La Francesa Laura" في مسرح Teatro de Rojas بعد جولة استمرت لمدة عام مع Fundación Siglo de Oro. تستكشف المسرحية، من إخراج وأداء مارتا بوفيدا، الغيرة والعنف الجنسي، استنادًا إلى مخطوطة منسوبة إلى لوبي دي فيغا من خلال الذكاء الاصطناعي ألفارو كويلار وجيرمان فيغا.
