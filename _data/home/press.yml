    summary:
      es: "El periódico ruso Аргументы и Факты (Arguments and Facts) publicó una nota basada en Reuters sobre el hallazgo de La francesa Laura, una obra inédita de Lope de Vega identificada mediante inteligencia artificial. El artículo explica que la Biblioteca Nacional de España conservaba una copia manuscrita del siglo XVII y que el análisis computacional, tras comparar cientos de comedias del Siglo de Oro, confirmó su autoría pocos años antes de la muerte del dramaturgo."
      en: "The Russian newspaper Arguments and Facts (Aif.ru) published a Reuters-based article reporting the discovery of La Francesa Laura, an unpublished play by Lope de Vega identified through artificial intelligence. The piece explains that Spain’s National Library preserved a 17th-century manuscript copy, and that computational analysis comparing hundreds of Golden Age plays confirmed its authorship a few years before the playwright’s death."



      fr: Le journal russe Arguments and Facts (Aif.ru) a publié un article basé sur Reuters faisant état de la découverte de La Francesa Laura, une pièce inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique que la Bibliothèque nationale espagnole a conservé une copie manuscrite du XVIIe siècle et qu’une analyse informatique comparant des centaines de pièces de l’âge d’or a confirmé sa paternité quelques années avant la mort du dramaturge.
      pt: O jornal russo Arguments and Facts (Aif.ru) publicou um artigo baseado na Reuters relatando a descoberta de La Francesa Laura, uma peça inédita de Lope de Vega identificada através de inteligência artificial. A peça explica que a Biblioteca Nacional de Espanha preservou uma cópia manuscrita do século XVII e que a análise computacional comparando centenas de peças da Idade de Ouro confirmou a sua autoria alguns anos antes da morte do dramaturgo.
      it: Il quotidiano russo Arguments and Facts (Aif.ru) ha pubblicato un articolo basato sulla Reuters in cui raccontava la scoperta di La Francesa Laura, un'opera inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. L’articolo spiega che la Biblioteca Nazionale spagnola conservava una copia manoscritta del XVII secolo e che l’analisi computazionale che confrontava centinaia di opere teatrali dell’Età dell’Oro ne confermava la paternità pochi anni prima della morte del drammaturgo.
      de: Die russische Zeitung Arguments and Facts (Aif.ru) veröffentlichte einen auf Reuters basierenden Artikel über die Entdeckung von La Francesa Laura, einem unveröffentlichten Stück von Lope de Vega, das durch künstliche Intelligenz identifiziert wurde. Der Artikel erklärt, dass die spanische Nationalbibliothek eine Manuskriptkopie aus dem 17. Jahrhundert aufbewahrte und dass eine Computeranalyse, die Hunderte von Stücken des Goldenen Zeitalters vergleicht, deren Urheberschaft einige Jahre vor dem Tod des Dramatikers bestätigte.
      zh: 俄罗斯报纸 Arguments and Facts (Aif.ru) 发表了一篇基于路透社的文章，报道了通过人工智能识别的洛佩·德·维加 (Lope de Vega) 未出版的戏剧《La Francesa Laura》的发现。这篇文章解释说，西班牙国家图书馆保存了一份 17 世纪的手稿副本，并且通过比较数百部黄金时代戏剧的计算分析，在这位剧作家去世前几年证实了其作者身份。
      ja: ロシアの新聞「議論と事実」（Aif.ru）は、人工知能によって特定されたロペ・デ・ベガの未発表戯曲「ラ・フランセサ・ローラ」の発見を報じるロイターベースの記事を掲載した。この記事では、スペインの国立図書館が 17 世紀の写本を保存しており、数百もの黄金時代の戯曲を比較したコンピューター分析により、劇作家の死の数年前にその作者であることが確認されたと説明しています。
      ko: 러시아 신문 Arguments and Facts(Aif.ru)는 인공 지능을 통해 식별된 Lope de Vega의 미출판 희곡인 La Francesa Laura의 발견을 보도하는 로이터 기반 기사를 게재했습니다. 이 작품은 스페인 국립도서관이 17세기 원고 사본을 보관하고 있으며 수백 편의 황금기 희곡을 비교한 컴퓨터 분석을 통해 극작가가 사망하기 몇 년 전에 그 작품의 저자임을 확인했다고 설명합니다.
      ru: Российская газета «Аргументы и факты» (Aif.ru) опубликовала на сайте Reuters статью, в которой сообщается об открытии «Франсезы Лауры» — неопубликованной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье объясняется, что в Национальной библиотеке Испании сохранилась копия рукописи 17-го века, и что компьютерный анализ, сравнивающий сотни пьес Золотого века, подтвердил ее авторство за несколько лет до смерти драматурга.
      ar: نشرت صحيفة Arguments and Facts الروسية (Aif.ru) مقالا نقلته وكالة رويترز عن اكتشاف مسرحية La Francesa Laura، وهي مسرحية غير منشورة للكاتب Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. توضح المقالة أن المكتبة الوطنية الإسبانية احتفظت بنسخة مخطوطة تعود إلى القرن السابع عشر، وأن التحليل الحسابي الذي قارن مئات مسرحيات العصر الذهبي أكد مؤلفها قبل سنوات قليلة من وفاة الكاتب المسرحي.
