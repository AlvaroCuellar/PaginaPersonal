      zh: Toledodiario 报道了洛佩·德·维加 (Lope de Vega) 最新未出版的戏剧《La Francesa Laura》即将在罗哈斯剧院上演。文章重点介绍了 Álvaro Cuéllar 和 Germán Vega 的研究、PROLOPE 小组的贡献，以及 Marta Poveda 担任导演和主演的双重角色，标志着她告别劳拉的表演。
      ja: Toledodiario は、ロペ・デ・ベガの最新未発表戯曲『ラ・フランセサ・ローラ』がロハス劇場に到着したことを報じています。この記事では、アルバロ・クエヤルとジェルマン・ベガによる研究、PROLOPEグループの貢献、そしてマルタ・ポベダの監督と主演女優の二役を取り上げ、ローラ役の別れの公演をマークしている。
      ko: Toledodiario는 Lope de Vega의 최신 미발표 희곡인 'La Francesa Laura'가 Teatro de Rojas에 도착했다고 보고합니다. 이 기사에서는 Álvaro Cuéllar와 Germán Vega의 연구, PROLOPE 그룹의 공헌, Marta Poveda의 감독이자 주연 배우로서의 이중 역할을 강조하여 Laura로서의 작별 인사를 기록했습니다.
      ru: Толедодиарио сообщает о прибытии в Театро де Рохас «Франческа Лаура», последней неопубликованной пьесы Лопе де Веги. В статье освещаются исследования Альваро Куэльяра и Хермана Веги, вклад группы PROLOPE и двойная роль Марты Поведы как режиссера и главной актрисы, знаменующая ее прощальное выступление в роли Лауры.
