      es: "El diario argentino Página/12 publicó una nota sobre el hallazgo de La francesa Laura, una comedia anónima atribuida a Lope de Vega mediante inteligencia artificial. El artículo detalla la colaboración entre las universidades de Valladolid, Viena y la Autónoma de Barcelona, así como el uso de la herramienta Transkribus y los análisis estilométricos del proyecto ETSO, dirigidos por Álvaro Cuéllar y Germán Vega. El texto también resalta la defensa de la mujer presente en la obra y su contexto político en la Francia del siglo XVII."
      en: "The Argentine newspaper Página/12 published a piece on the discovery of La Francesa Laura, an anonymous comedy attributed to Lope de Vega through artificial intelligence. The article details the collaboration between the universities of Valladolid, Vienna, and the Autonomous University of Barcelona, as well as the use of the Transkribus tool and the stylometric analyses of the ETSO project, led by Álvaro Cuéllar and Germán Vega. It also highlights the play’s defense of women and its political context in seventeenth-century France."


      fr: Le journal argentin Página/12 a publié un article sur la découverte de La Francesa Laura, une comédie anonyme attribuée à Lope de Vega grâce à l'intelligence artificielle. L'article détaille la collaboration entre les universités de Valladolid, Vienne et l'Université autonome de Barcelone, ainsi que l'utilisation de l'outil Transkribus et les analyses stylométriques du projet ETSO, dirigé par Álvaro Cuéllar et Germán Vega. Il met également en lumière la défense des femmes dans la pièce et son contexte politique dans la France du XVIIe siècle.
      pt: O jornal argentino Página/12 publicou matéria sobre a descoberta de La Francesa Laura, comédia anônima atribuída a Lope de Vega por meio de inteligência artificial. O artigo detalha a colaboração entre as universidades de Valladolid, Viena e a Universidade Autônoma de Barcelona, ​​bem como o uso da ferramenta Transkribus e as análises estilométricas do projeto ETSO, liderado por Álvaro Cuéllar e Germán Vega. Também destaca a defesa das mulheres na peça e o seu contexto político na França do século XVII.
      it: Il quotidiano argentino Página/12 ha pubblicato un articolo sulla scoperta de La Francesa Laura, una commedia anonima attribuita a Lope de Vega attraverso l'intelligenza artificiale. L'articolo descrive nel dettaglio la collaborazione tra le università di Valladolid, Vienna e l'Università Autonoma di Barcellona, ​​nonché l'utilizzo dello strumento Transkribus e le analisi stilometriche del progetto ETSO, guidato da Álvaro Cuéllar e Germán Vega. Evidenzia anche la difesa delle donne da parte dell'opera e il suo contesto politico nella Francia del diciassettesimo secolo.
      de: Die argentinische Zeitung Página/12 veröffentlichte einen Artikel über die Entdeckung von La Francesa Laura, einer anonymen Komödie, die Lope de Vega durch künstliche Intelligenz zugeschrieben wird. Der Artikel beschreibt die Zusammenarbeit zwischen den Universitäten Valladolid, Wien und der Autonomen Universität Barcelona sowie die Verwendung des Transkribus-Tools und die stilometrischen Analysen des ETSO-Projekts unter der Leitung von Álvaro Cuéllar und Germán Vega. Es beleuchtet auch die Verteidigung der Frauen im Stück und seinen politischen Kontext im Frankreich des 17. Jahrhunderts.
      zh: 阿根廷报纸 Página/12 发表了一篇关于发现 La Francesa Laura 的文章，这是一部通过人工智能归因于洛佩·德·维加 (Lope de Vega) 的匿名喜剧。该文章详细介绍了巴利亚多利德大学、维也纳大学和巴塞罗那自治大学之间的合作，以及 Transkribus 工具的使用以及由 Álvaro Cuéllar 和 Germán Vega 领导的 ETSO 项目的样式分析。它还强调了该剧对女性的捍卫及其在 17 世纪法国的政治背景。
      ja: アルゼンチンの新聞 Página/12 は、人工知能によるロペ・デ・ベガ作とされる匿名コメディ「ラ・フランセサ・ローラ」の発見に関する記事を掲載しました。この記事では、バリャドリード大学、ウィーン大学、バルセロナ自治大学間の連携、Transkribus ツールの使用およびアルバロ クエヤル氏とジェルマン ベガ氏が主導する ETSO プロジェクトのスタイロメトリー分析について詳しく説明しています。また、この劇による女性の擁護と、17 世紀フランスにおける政治的背景にも焦点を当てています。
      ko: 아르헨티나 신문 Página/12는 인공 지능을 통해 Lope de Vega가 쓴 익명의 코미디인 La Francesa Laura의 발견에 관한 기사를 게재했습니다. 이 기사에서는 비엔나 바야돌리드 대학교와 바르셀로나 자치 대학교 간의 협력, Transkribus 도구 사용 및 Álvaro Cuéllar와 Germán Vega가 이끄는 ETSO 프로젝트의 스타일 분석에 대해 자세히 설명합니다. 또한 이 작품의 여성 옹호와 17세기 프랑스의 정치적 맥락을 강조합니다.
      ru: Аргентинская газета «Пагина/12» опубликовала статью об открытии «Франсеса Лаура», анонимной комедии, приписываемой Лопе де Веге с помощью искусственного интеллекта. В статье подробно описывается сотрудничество между университетами Вальядолида, Вены и Автономным университетом Барселоны, а также использование инструмента Transkribus и стилометрический анализ проекта ETSO, возглавляемого Альваро Куэльяром и Херманом Вега. В нем также подчеркивается защита женщин в пьесе и ее политический контекст во Франции семнадцатого века.
      ar: نشرت صحيفة Página/12 الأرجنتينية مقالاً عن اكتشاف La Francesa Laura، وهي كوميديا ​​مجهولة المصدر منسوبة إلى Lope de Vega من خلال الذكاء الاصطناعي. يعرض المقال تفاصيل التعاون بين جامعات بلد الوليد وفيينا وجامعة برشلونة المستقلة، بالإضافة إلى استخدام أداة Transkribus والتحليلات الأسلوبية لمشروع ETSO، بقيادة ألفارو كويلار وجيرمان فيجا. كما تسلط الضوء على دفاع المسرحية عن المرأة وسياقها السياسي في فرنسا في القرن السابع عشر.
