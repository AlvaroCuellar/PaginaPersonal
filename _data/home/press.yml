    thumbnail: "/assets/images/press/siete.png"
    type: "news"
    summary:
      es: "Investigadores de las universidades de Valladolid y Viena, Germán Vega y Álvaro Cuéllar, han identificado en la Biblioteca Nacional de España una comedia inédita de Lope de Vega titulada La francesa Laura. El hallazgo, publicado en el Anuario Lope de Vega, ha sido posible gracias al uso de inteligencia artificial y herramientas de transcripción automática de manuscritos."
      en: "Researchers from the Universities of Valladolid and Vienna, Germán Vega and Álvaro Cuéllar, have identified an unpublished comedy by Lope de Vega titled La francesa Laura in the holdings of Spain’s National Library. Published in the Anuario Lope de Vega, the discovery was made possible through artificial intelligence and automated manuscript transcription tools."



      fr: Des chercheurs des universités de Valladolid et de Vienne, Germán Vega et Álvaro Cuéllar, ont identifié une comédie inédite de Lope de Vega intitulée La francesa Laura dans les fonds de la Bibliothèque nationale d'Espagne. Publiée dans l'Anuario Lope de Vega, la découverte a été rendue possible grâce à l'intelligence artificielle et à des outils automatisés de transcription de manuscrits.
      pt: Pesquisadores das Universidades de Valladolid e Viena, Germán Vega e Álvaro Cuéllar, identificaram uma comédia inédita de Lope de Vega intitulada La francesa Laura no acervo da Biblioteca Nacional da Espanha. Publicada no Anuário Lope de Vega, a descoberta foi possível por meio de inteligência artificial e ferramentas automatizadas de transcrição de manuscritos.
      it: I ricercatori delle Università di Valladolid e Vienna, Germán Vega e Álvaro Cuéllar, hanno identificato una commedia inedita di Lope de Vega intitolata La francesa Laura nel patrimonio della Biblioteca Nazionale spagnola. Pubblicata sull'Anuario Lope de Vega, la scoperta è stata resa possibile attraverso l'intelligenza artificiale e strumenti di trascrizione automatizzata dei manoscritti.
      de: Forscher der Universitäten Valladolid und Wien, Germán Vega und Álvaro Cuéllar, haben in den Beständen der spanischen Nationalbibliothek eine unveröffentlichte Komödie von Lope de Vega mit dem Titel „La francesa Laura“ identifiziert. Die im Anuario Lope de Vega veröffentlichte Entdeckung wurde durch künstliche Intelligenz und automatisierte Manuskript-Transkriptionstools ermöglicht.
      zh: 来自巴利亚多利德大学和维也纳大学的研究人员 Germán Vega 和 Álvaro Cuéllar 在西班牙国家图书馆藏有一部洛佩·德·维加未出版的喜剧《法国劳拉》。这一发现是通过人工智能和自动手稿转录工具实现的，该发现发表在《Anuario Lope de Vega》上。
      ja: バリャドリード大学とウィーン大学のゲルマン・ベガ大学とアルバロ・クエヤル大学の研究者らは、スペイン国立図書館の所蔵品にロペ・デ・ベガの未発表コメディ『ラ・フランセサ・ローラ』があることを確認した。アヌアリオ・ロペ・デ・ベガに掲載されたこの発見は、人工知能と自動原稿転写ツールによって可能になった。
      ko: 바야돌리드 대학과 비엔나 대학의 연구원인 Germán Vega와 Álvaro Cuéllar는 스페인 국립 도서관 소장품에서 La francesa Laura라는 제목의 Lope de Vega의 미출판 코미디를 확인했습니다. Anuario Lope de Vega에 게재된 이 발견은 인공 지능과 자동화된 원고 필사 도구를 통해 가능해졌습니다.
      ru: Исследователи из университетов Вальядолида и Вены Херман Вега и Альваро Куэльяр обнаружили в фондах Национальной библиотеки Испании неопубликованную комедию Лопе де Веги под названием «Французская Лаура». Открытие, опубликованное в журнале Anuario Lope de Vega, стало возможным благодаря искусственному интеллекту и инструментам автоматической транскрипции рукописей.
      ar: اكتشف باحثون من جامعتي بلد الوليد وفيينا، جيرمان فيجا وألفارو كويلار، كوميديا ​​غير منشورة للوبي دي فيجا بعنوان La francesa Laura في مقتنيات المكتبة الوطنية الإسبانية. تم نشر هذا الاكتشاف في Anuario Lope de Vega، وقد أصبح هذا الاكتشاف ممكنًا من خلال الذكاء الاصطناعي وأدوات نسخ المخطوطات الآلية.
