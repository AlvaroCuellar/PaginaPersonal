    outlet: "RTVE.es"
    date: "2023-01-31"
    url: "https://www.rtve.es/noticias/20230131/inteligencia-artificial-descubre-obra-desconocida-lope-vega-biblioteca-nacional/2419227.shtml"
    thumbnail: "/assets/images/press/34.png"
    type: "news"
    summary:
      es: "RTVE.es informa sobre el descubrimiento de La francesa Laura, una comedia desconocida de Lope de Vega identificada en la Biblioteca Nacional de España gracias a herramientas de inteligencia artificial. El hallazgo, liderado por Álvaro Cuéllar y Germán Vega en el marco del proyecto ETSO, se apoya en análisis estilométricos y filológicos que confirman la autoría del Fénix de los Ingenios."
      en: "RTVE.es reports on the discovery of La Francesa Laura, an unknown comedy by Lope de Vega identified in the Spanish National Library using artificial intelligence tools. The finding, led by Álvaro Cuéllar and Germán Vega within the ETSO project, relies on stylometric and philological analyses confirming the authorship of the Phoenix of Wits."



      fr: RTVE.es rapporte la découverte de La Francesa Laura, une comédie inconnue de Lope de Vega identifiée à la Bibliothèque nationale espagnole grâce à des outils d'intelligence artificielle. La découverte, menée par Álvaro Cuéllar et Germán Vega dans le cadre du projet ETSO, s'appuie sur des analyses stylométriques et philologiques confirmant la paternité du Phénix de l'esprit.
      pt: RTVE.es relata a descoberta de La Francesa Laura, comédia desconhecida de Lope de Vega identificada na Biblioteca Nacional Espanhola por meio de ferramentas de inteligência artificial. A descoberta, liderada por Álvaro Cuéllar e Germán Vega no âmbito do projeto ETSO, baseia-se em análises estilométricas e filológicas que confirmam a autoria da Fênix do Raciocínio.
      it: RTVE.es riporta la scoperta di La Francesa Laura, una commedia sconosciuta di Lope de Vega identificata nella Biblioteca Nazionale Spagnola grazie a strumenti di intelligenza artificiale. La scoperta, condotta da Álvaro Cuéllar e Germán Vega nell'ambito del progetto ETSO, si basa su analisi stilometriche e filologiche che confermano la paternità della Fenice dell'Ingegno.
      de: RTVE.es berichtet über die Entdeckung von La Francesa Laura, einer unbekannten Komödie von Lope de Vega, die mithilfe künstlicher Intelligenz in der spanischen Nationalbibliothek identifiziert wurde. Die von Álvaro Cuéllar und Germán Vega im Rahmen des ETSO-Projekts durchgeführte Entdeckung stützt sich auf stilometrische und philologische Analysen, die die Urheberschaft des Phönix des Geistes bestätigen.
      zh: RTVE.es 报道了西班牙国家图书馆使用人工智能工具发现的洛佩·德·维加 (Lope de Vega) 创作的一部不知名喜剧《弗朗西斯·劳拉》(La Francesa Laura)。这项发现由 ETSO 项目中的 Álvaro Cuéllar 和 Germán Vega 领导，依靠文体测量学和语言学分析证实了《智慧之凤凰》的作者身份。
      ja: RTVE.es は、人工知能ツールを使用してスペイン国立図書館で確認されたロペ・デ・ベガの未知のコメディ「ラ・フランセサ・ローラ」の発見について報告しています。 ETSO プロジェクト内のアルバロ・クエヤル氏とゲルマン・ベガ氏が主導したこの発見は、『機知のフェニックス』の作者であることを確認する、スタイロメトリーと文献学的分析に基づいている。
      ko: RTVE.es는 인공 지능 도구를 사용하여 스페인 국립 도서관에서 식별된 Lope de Vega의 알려지지 않은 코미디인 La Francesa Laura의 발견에 대해 보고합니다. ETSO 프로젝트 내에서 Álvaro Cuéllar와 Germán Vega가 주도한 이번 발견은 Phoenix of Wits의 저자임을 확인하는 문체학적 및 문헌학적 분석에 의존합니다.
      ru: RTVE.es сообщает об открытии La Francesa Laura, неизвестной комедии Лопе де Веги, обнаруженной в Национальной библиотеке Испании с помощью инструментов искусственного интеллекта. Открытие, проведенное Альваро Куэльяром и Херманом Вегой в рамках проекта ETSO, основано на стилометрическом и филологическом анализе, подтверждающем авторство Феникса Остроумного.
      ar: تتحدث قناة RTVE.es عن اكتشاف فيلم La Francesa Laura، وهو فيلم كوميدي غير معروف من تأليف Lope de Vega تم العثور عليه في المكتبة الوطنية الإسبانية باستخدام أدوات الذكاء الاصطناعي. يعتمد هذا الاكتشاف، الذي قاده ألفارو كويلار وجيرمان فيجا ضمن مشروع ETSO، على التحليلات الأسلوبية واللغوية التي تؤكد تأليف كتاب Phoenix of Wits.
