    summary:
      es: "El sitio oficial de Transkribus publicó una extensa entrevista con Álvaro Cuéllar sobre el hallazgo de La francesa Laura. El artículo describe el proceso técnico y filológico que permitió atribuir la obra a Lope de Vega mediante herramientas de inteligencia artificial y estilometría dentro del proyecto ETSO. Cuéllar explica cómo entrenaron modelos de transcripción y modernización ortográfica en Transkribus, y cómo la combinación de estos con el análisis estilométrico confirmó la autoría del dramaturgo."
      en: "The official Transkribus website published an in-depth interview with Álvaro Cuéllar about the discovery of La Francesa Laura. The article details the technical and philological process that led to the attribution of the play to Lope de Vega through artificial intelligence and stylometric methods within the ETSO project. Cuéllar explains how transcription and spelling-modernization models were trained in Transkribus, and how their combination with stylometric analysis confirmed the playwright’s authorship."

      fr: Le site officiel de Transkribus a publié une interview approfondie avec Álvaro Cuéllar sur la découverte de La Francesa Laura. L'article détaille le processus technique et philologique qui a conduit à l'attribution de la pièce à Lope de Vega grâce à l'intelligence artificielle et aux méthodes stylométriques du projet ETSO. Cuéllar explique comment les modèles de transcription et de modernisation orthographique ont été formés dans Transkribus, et comment leur combinaison avec l'analyse stylométrique a confirmé la paternité du dramaturge.
      pt: O site oficial da Transkribus publicou uma entrevista aprofundada com Álvaro Cuéllar sobre a descoberta de La Francesa Laura. O artigo detalha o processo técnico e filológico que levou à atribuição da peça a Lope de Vega através de inteligência artificial e métodos estilométricos no âmbito do projeto ETSO. Cuéllar explica como os modelos de transcrição e modernização ortográfica foram treinados no Transkribus e como sua combinação com a análise estilométrica confirmou a autoria do dramaturgo.
      it: Il sito ufficiale Transkribus ha pubblicato un'intervista approfondita con Álvaro Cuéllar sulla scoperta di La Francesa Laura. L'articolo descrive in dettaglio il processo tecnico e filologico che ha portato all'attribuzione dell'opera a Lope de Vega attraverso l'intelligenza artificiale e metodi stilometrici nell'ambito del progetto ETSO. Cuéllar spiega come i modelli di trascrizione e di modernizzazione dell’ortografia siano stati formati in Transkribus e come la loro combinazione con l’analisi stilometrica abbia confermato la paternità del drammaturgo.
      de: Auf der offiziellen Transkribus-Website wurde ein ausführliches Interview mit Álvaro Cuéllar über die Entdeckung von La Francesa Laura veröffentlicht. Der Artikel beschreibt detailliert den technischen und philologischen Prozess, der mithilfe künstlicher Intelligenz und stilometrischer Methoden im Rahmen des ETSO-Projekts zur Zuschreibung des Stücks an Lope de Vega führte. Cuéllar erklärt, wie Transkriptions- und Rechtschreibmodernisierungsmodelle in Transkribus trainiert wurden und wie ihre Kombination mit stilometrischen Analysen die Autorschaft des Dramatikers bestätigte.
      zh: Transkribus 官方网站发表了对 Álvaro Cuéllar 关于 La Francesa Laura 发现的深度采访。文章详细介绍了通过 ETSO 项目中的人工智能和文体测量方法将该剧归属于洛佩·德·维加 (Lope de Vega) 的技术和语言过程。 Cuéllar 解释了如何在 Transkribus 中训练转录和拼写现代化模型，以及它们与文体分析的结合如何确认剧作家的作者身份。
      ja: トランスクリバスの公式ウェブサイトは、ラ・フランセサ・ローラの発見に関するアルバロ・クエヤル氏の詳細なインタビューを掲載した。この記事では、ETSO プロジェクト内で人工知能とスタイロメトリー手法を使用して、この劇がロペ・デ・ベガのものであると認定されるに至った技術的および文献学的プロセスについて詳しく説明しています。クエヤル氏は、転写モデルとスペル現代化モデルが Transkribus でどのようにトレーニングされたか、またそれらとスタイロメーター分析との組み合わせによって劇作家の著作者であることがどのように確認されたかについて説明します。
      ko: 공식 Transkribus 웹사이트는 La Francesa Laura의 발견에 관해 Álvaro Cuéllar와의 심층 인터뷰를 게시했습니다. 이 기사는 ETSO 프로젝트 내에서 인공 지능과 문체 분석 방법을 통해 연극을 Lope de Vega에 귀속시키는 기술적, 문학적 과정을 자세히 설명합니다. Cuéllar는 Transkribus에서 전사 및 철자 현대화 모델이 어떻게 훈련되었는지, 그리고 문체 분석과 결합하여 극작가의 저작성을 어떻게 확인했는지 설명합니다.
      ru: Официальный сайт Transkribus опубликовал подробное интервью с Альваро Куэльяром об открытии La Francesa Laura. В статье подробно описан технический и филологический процесс, который привел к атрибуции пьесы Лопе де Вега с помощью искусственного интеллекта и стилометрических методов в рамках проекта ETSO. Куэльяр объясняет, как модели транскрипции и модернизации орфографии обучались в Transkribus и как их сочетание со стилометрическим анализом подтвердило авторство драматурга.
      ar: نشر موقع Transkribus الرسمي مقابلة متعمقة مع ألفارو كويلار حول اكتشاف La Francesa Laura. يعرض المقال بالتفصيل العملية الفنية واللغوية التي أدت إلى إسناد المسرحية إلى لوبي دي فيغا من خلال الذكاء الاصطناعي وأساليب قياس الأسلوب ضمن مشروع ETSO. يشرح كويلار كيف تم تدريب نماذج النسخ وتحديث التهجئة في ترانسكريبوس، وكيف أكد دمجها مع التحليل الأسلوبي على تأليف الكاتب المسرحي.
