    outlet: "Antena 3 Noticias"
    author: "Eva Navarro"
    date: "2023-01-31"
    url: "https://www.antena3.com/noticias/cultura/inteligencia-artificial-descubre-nueva-obra-lope-vega_2023013163d96c43fa7e600001ba8238.html"
    thumbnail: "/assets/images/press/61.png"
    type: "press"
    summary:
      es: "Antena 3 Noticias informó sobre el descubrimiento de La francesa Laura, una obra inédita de Lope de Vega identificada mediante inteligencia artificial. El artículo detalla cómo la Biblioteca Nacional de España, junto con los investigadores Álvaro Cuéllar y Germán Vega a través del proyecto ETSO, utilizó los programas Transkribus y Stylo para atribuir el texto al dramaturgo, destacando que el hallazgo podría ser el primero de muchos futuros descubrimientos gracias a la IA."
      en: "Antena 3 News reported on the discovery of La Francesa Laura, an unpublished play by Lope de Vega identified through artificial intelligence. The article details how Spain’s National Library, together with researchers Álvaro Cuéllar and Germán Vega through the ETSO project, used the Transkribus and Stylo programs to attribute the text to the playwright, highlighting that this finding may be the first of many future discoveries enabled by AI."


      fr: Antena 3 News a rapporté la découverte de La Francesa Laura, une pièce inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article détaille comment la Bibliothèque nationale espagnole, en collaboration avec les chercheurs Álvaro Cuéllar et Germán Vega, dans le cadre du projet ETSO, a utilisé les programmes Transkribus et Stylo pour attribuer le texte au dramaturge, soulignant que cette découverte pourrait être la première des nombreuses découvertes futures permises par l’IA.
      pt: A Antena 3 News noticiou a descoberta de La Francesa Laura, peça inédita de Lope de Vega identificada através de inteligência artificial. O artigo detalha como a Biblioteca Nacional de Espanha, em conjunto com os investigadores Álvaro Cuéllar e Germán Vega através do projeto ETSO, utilizou os programas Transkribus e Stylo para atribuir o texto ao dramaturgo, destacando que esta descoberta pode ser a primeira de muitas descobertas futuras possibilitadas pela IA.
      it: Antena 3 News ha riportato la scoperta di La Francesa Laura, un'opera inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. L'articolo descrive in dettaglio come la Biblioteca nazionale spagnola, insieme ai ricercatori Álvaro Cuéllar e Germán Vega attraverso il progetto ETSO, abbia utilizzato i programmi Transkribus e Stylo per attribuire il testo al drammaturgo, sottolineando che questa scoperta potrebbe essere la prima di molte scoperte future rese possibili dall'intelligenza artificiale.
      de: Antena 3 News berichtete über die Entdeckung von La Francesa Laura, einem unveröffentlichten Stück von Lope de Vega, das durch künstliche Intelligenz identifiziert wurde. Der Artikel beschreibt, wie die spanische Nationalbibliothek zusammen mit den Forschern Álvaro Cuéllar und Germán Vega im Rahmen des ETSO-Projekts die Programme Transkribus und Stylo nutzte, um den Text dem Dramatiker zuzuordnen, und betont, dass dieser Fund möglicherweise die erste von vielen zukünftigen Entdeckungen ist, die durch KI ermöglicht werden.
      zh: Antena 3 News 报道了通过人工智能识别的洛佩·德·维加 (Lope de Vega) 未出版的戏剧《La Francesa Laura》的发现。文章详细介绍了西班牙国家图书馆如何与 ETSO 项目的研究人员 Álvaro Cuéllar 和 Germán Vega 一起使用 Transkribus 和 Stylo 程序将文本归属于剧作家，并强调这一发现可能是人工智能在未来实现的众多发现中的第一个。
      ja: Antena 3 News は、人工知能によって特定されたロペ・デ・ベガの未発表戯曲『ラ・フランセサ・ローラ』の発見について報じました。この記事では、スペイン国立図書館がETSOプロジェクトを通じて研究者のアルバロ・クエヤル氏とゲルマン・ベガ氏と協力して、TranskribusおよびStyloプログラムを使用してテキストを劇作家のものとする方法を詳細に説明しており、この発見がAIによって可能になる将来の多くの発見の最初のものである可能性があることを強調しています。
      ko: Antena 3 News는 인공 지능을 통해 식별 된 Lope de Vega의 미발표 희곡 La Francesa Laura의 발견에 대해 보도했습니다. 이 기사에서는 스페인 국립도서관이 ETSO 프로젝트를 통해 연구자인 Álvaro Cuéllar 및 Germán Vega와 함께 Transkribus 및 Stylo 프로그램을 사용하여 극작가의 텍스트를 귀속시키는 방법을 자세히 설명하며, 이 발견이 AI가 가능하게 하는 많은 미래 발견 중 첫 번째 발견일 수 있음을 강조합니다.
      ru: Antena 3 News сообщила об открытии La Francesa Laura, неопубликованной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье подробно рассказывается, как Национальная библиотека Испании вместе с исследователями Альваро Куэльяром и Херманом Вега в рамках проекта ETSO использовала программы Transkribus и Stylo, чтобы приписать текст драматургу, подчеркивая, что это открытие может стать первым из многих будущих открытий, сделанных ИИ.
      ar: أفادت قناة Antena 3 News عن اكتشاف La Francesa Laura، وهي مسرحية غير منشورة من تأليف Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. يشرح المقال بالتفصيل كيف استخدمت المكتبة الوطنية الإسبانية، بالتعاون مع الباحثين ألفارو كويلار وجيرمان فيجا من خلال مشروع ETSO، برامج Transkribus وStylo لإسناد النص إلى الكاتب المسرحي، مع تسليط الضوء على أن هذا الاكتشاف قد يكون الأول من بين العديد من الاكتشافات المستقبلية التي تمكن الذكاء الاصطناعي من تحقيقها.
