    summary:
      es: "Un artículo de The Times informa sobre el descubrimiento por Abraham Madroñal de una obra perdida de Lope de Vega, titulada “Yo he hecho lo que he podido y Fortuna lo que ha querido”, que habría sido escrita alrededor de 1634-1635 y atribuida a Lope mediante el análisis filológico y reforzada con las pruebas de Álvaro Cuéllar y Germán Vega."
      en: "An article in The Times reports on the discovery by Abraham Madroñal of a lost play by Lope de Vega, titled “I Did What I Could, Fortune What She Wanted”, believed to have been written around 1634–1635 and attributed to Lope through philological analysis, later reinforced by the evidence provided by Álvaro Cuéllar and Germán Vega."


      fr: Un article du Times rapporte la découverte par Abraham Madroñal d'une pièce perdue de Lope de Vega, intitulée « J'ai fait ce que je pouvais, Fortune ce qu'elle voulait », qui aurait été écrite vers 1634-1635 et attribuée à Lope par une analyse philologique, renforcée plus tard par les preuves fournies par Álvaro Cuéllar et Germán Vega.
      pt: Um artigo no The Times relata a descoberta por Abraham Madroñal de uma peça perdida de Lope de Vega, intitulada “I Did What I Could, Fortune What She Wanted”, que se acredita ter sido escrita por volta de 1634-1635 e atribuída a Lope através de análise filológica, posteriormente reforçada pelas evidências fornecidas por Álvaro Cuéllar e Germán Vega.
      it: Un articolo del Times riporta la scoperta da parte di Abraham Madroñal di un'opera perduta di Lope de Vega, intitolata "I Did What I Could, Fortune What She Wanted", che si ritiene sia stata scritta intorno al 1634-1635 e attribuita a Lope attraverso un'analisi filologica, successivamente rafforzata dalle prove fornite da Álvaro Cuéllar e Germán Vega.
      de: Ein Artikel in der Times berichtet über die Entdeckung eines verlorenen Theaterstücks von Lope de Vega durch Abraham Madroñal mit dem Titel „Ich tat, was ich konnte, Glück, was sie wollte“, vermutlich um 1634–1635 geschrieben und durch philologische Analysen Lope zugeschrieben, was später durch die Beweise von Álvaro Cuéllar und Germán Vega untermauert wurde.
      zh: 《泰晤士报》上的一篇文章报道了亚伯拉罕·马德罗纳尔 (Abraham Madroñal) 发现了洛佩·德·维加 (Lope de Vega) 一部失传的戏剧，题为《我做了我能做的事，财富她想要的》(I Did What I Could, Fortune What She Wanted)，据信该剧作于 1634 年至 1635 年左右，通过语言学分析归因于洛佩，后来由阿尔瓦罗·奎利亚尔 (Álvaro Cuéllar) 和杰尔曼·维加 (Germán Vega) 提供的证据证实了这一点。
      ja: タイムズ紙の記事は、ロペ・デ・ベガの失われた戯曲「私はできることをした、彼女が望むことを幸運に」をアブラハム・マドロニャルが発見したことを報じている。この劇は1634年から1635年頃に書かれたものと考えられており、文献学的分析によってロペのものとされ、後にアルバロ・クエヤルとジェルマン・ベガによって提供された証拠によって裏付けられた。
      ko: The Times의 한 기사는 "I Did What I Can, Fortune What She Wanted"라는 제목의 Lope de Vega의 잃어버린 희곡을 Abraham Madroñal이 발견한 것에 대해 보고합니다. 이 희곡은 1634~1635년경에 쓰여진 것으로 추정되며 문헌학 분석을 통해 Lope가 쓴 것으로 추정되며 나중에 Álvaro Cuéllar와 Germán Vega가 제공한 증거에 의해 강화되었습니다.
      ru: В статье в «Таймс» сообщается об открытии Абрахамом Мадроньялем утраченной пьесы Лопе де Веги под названием «Я сделал, что мог, удача, что она хотела», предположительно написанной примерно в 1634–1635 годах и приписываемой Лопе посредством филологического анализа, позже подкрепленного доказательствами, предоставленными Альваро Куэльяром и Херманом Вега.
      ar: مقال في صحيفة التايمز يتحدث عن اكتشاف أبراهام مادرونال لمسرحية مفقودة من تأليف لوبي دي فيغا، بعنوان "لقد فعلت ما بوسعي، وأحصل على ما أرادت"، ويعتقد أنها كتبت حوالي 1634-1635 ونسبت إلى لوبي من خلال التحليل اللغوي، وتم تعزيزها لاحقًا بالأدلة التي قدمها ألفارو كويلار وجيرمان فيغا.
  - id: "press68"
    title:
      es: "Descubren con IA nueva comedia de Lope de Vega en la Biblioteca Nacional"
