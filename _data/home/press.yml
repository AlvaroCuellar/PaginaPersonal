    outlet: "Sky News Arabia (الإمارات العربية المتحدة)"
    author: "وكالات - أبوظبي"
    date: "2023-02-01"
    url: "https://www.skynewsarabia.com/technology/1593052-%D8%A7%D9%84%D8%B0%D9%83%D8%A7%D8%A1-%D8%A7%D9%84%D8%A7%D8%B5%D8%B7%D9%86%D8%A7%D8%B9%D9%8A-%D9%8A%D9%83%D8%B4%D9%81-%D9%85%D8%B3%D8%B1%D8%AD%D9%8A%D8%A9-%D9%85%D8%AC%D9%87%D9%88%D9%84%D8%A9-%D9%84%D9%83%D8%A7%D8%AA%D8%A8-%D8%A7%D9%95%D8%B3%D8%A8%D8%A7%D9%86%D9%8A-%D8%B4%D9%87%D9%8A%D8%B1"
    thumbnail: "/assets/images/press/80.png"
    type: "press"
    summary:
      es: "El canal internacional Sky News Arabia informó sobre el descubrimiento de La francesa Laura, una obra inédita de Lope de Vega identificada mediante inteligencia artificial. El artículo explica que la Biblioteca Nacional de España y un equipo de las universidades de Viena y Valladolid transcribieron más de 1.300 manuscritos anónimos con IA, confirmando la autoría del dramaturgo barroco. El texto será publicado por la editorial Gredos en los meses siguientes."
      en: "The international outlet Sky News Arabia reported on the discovery of La Francesa Laura, an unpublished play by Lope de Vega identified through artificial intelligence. The article explains that Spain’s National Library and a team from the Universities of Vienna and Valladolid used AI to transcribe over 1,300 anonymous manuscripts, confirming the authorship of the Baroque playwright. The play is set to be published by Gredos in the coming months."



      fr: Le média international Sky News Arabia a fait état de la découverte de La Francesa Laura, une pièce inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique que la Bibliothèque nationale espagnole et une équipe des universités de Vienne et de Valladolid ont utilisé l’IA pour transcrire plus de 1 300 manuscrits anonymes, confirmant ainsi la paternité du dramaturge baroque. La pièce devrait être publiée chez Gredos dans les mois à venir.
      pt: O canal internacional Sky News Arabia noticiou a descoberta de La Francesa Laura, peça inédita de Lope de Vega identificada por meio de inteligência artificial. O artigo explica que a Biblioteca Nacional de Espanha e uma equipa das Universidades de Viena e Valladolid utilizaram IA para transcrever mais de 1.300 manuscritos anónimos, confirmando a autoria do dramaturgo barroco. A peça será publicada pela Gredos nos próximos meses.
      it: La testata internazionale Sky News Arabia ha riferito della scoperta di La Francesa Laura, un'opera inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. L’articolo spiega che la Biblioteca Nazionale spagnola e un team delle Università di Vienna e Valladolid hanno utilizzato l’intelligenza artificiale per trascrivere oltre 1.300 manoscritti anonimi, confermando la paternità del drammaturgo barocco. Lo spettacolo sarà pubblicato da Gredos nei prossimi mesi.
      de: Der internationale Sender Sky News Arabia berichtete über die Entdeckung von La Francesa Laura, einem unveröffentlichten Stück von Lope de Vega, das mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel erklärt, dass die spanische Nationalbibliothek und ein Team der Universitäten Wien und Valladolid mithilfe von KI über 1.300 anonyme Manuskripte transkribiert haben, was die Urheberschaft des barocken Dramatikers bestätigt. Das Stück soll in den kommenden Monaten bei Gredos erscheinen.
      zh: 国际媒体《阿拉伯天空新闻》报道了通过人工智能识别出的洛佩·德·维加未出版的戏剧《La Francesa Laura》的发现。文章解释说，西班牙国家图书馆以及维也纳大学和巴利亚多利德大学的一个团队使用人工智能转录了 1,300 多份匿名手稿，确认了这位巴洛克剧作家的作者身份。该剧将于未来几个月由格雷多斯出版。
      ja: 国際放送局スカイニュースアラビアは、人工知能によって特定されたロペ・デ・ベガの未発表戯曲『ラ・フランセサ・ローラ』の発見について報じた。この記事では、スペイン国立図書館とウィーン大学とバリャドリード大学のチームがAIを利用して1,300以上の匿名原稿を書き写し、バロック劇作家の作者であることを確認したと説明している。この戯曲は今後数か月以内にグレドス社から出版される予定だ。
      ko: 국제 매체 스카이뉴스아라비아는 인공지능을 통해 확인된 로페 데 베가의 미발표 희곡 '라 프란체사 로라'의 발견을 보도했다. 이 기사에서는 스페인 국립도서관과 비엔나 대학교 및 바야돌리드 대학교 팀이 AI를 사용하여 1,300개 이상의 익명 원고를 필사하여 바로크 극작가의 저자임을 확인했다고 설명합니다. 이 연극은 앞으로 몇 달 안에 Gredos에서 출판될 예정입니다.
      ru: Международное издание Sky News Arabia сообщило об открытии «La Francesa Laura», неопубликованной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье объясняется, что Национальная библиотека Испании и команда университетов Вены и Вальядолида использовали искусственный интеллект для расшифровки более 1300 анонимных рукописей, подтвердив авторство драматурга эпохи барокко. Пьеса будет опубликована издательством Gredos в ближайшие месяцы.
      ar: أفادت قناة سكاي نيوز عربية الدولية عن اكتشاف مسرحية لا فرانشيسا لورا، وهي مسرحية غير منشورة للوب دي فيغا تم التعرف عليها من خلال الذكاء الاصطناعي. يوضح المقال أن المكتبة الوطنية الإسبانية وفريق من جامعتي فيينا وبلد الوليد استخدموا الذكاء الاصطناعي لنسخ أكثر من 1300 مخطوطة مجهولة المصدر، مما يؤكد تأليف الكاتب المسرحي الباروكي. ومن المقرر أن تنشر جريدوس المسرحية في الأشهر المقبلة.
