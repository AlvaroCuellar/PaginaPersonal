    type: "press"
    summary:
      es: "El medio mexicano CDMX en la Red destaca la investigación dirigida por Álvaro Cuéllar y Germán Vega que permitió atribuir a Lope de Vega la comedia inédita La francesa Laura. El artículo explica el uso combinado de Transkribus y Stylo para transcribir manuscritos, analizar su léxico y fechar la obra en 1628, confirmando su autoría con apoyo de especialistas en literatura del Siglo de Oro."
      en: "The Mexican outlet CDMX en la Red highlights the research led by Álvaro Cuéllar and Germán Vega that attributed the previously anonymous comedy La Francesa Laura to Lope de Vega. The article explains how Transkribus and Stylo were used to transcribe manuscripts, analyze their lexicon, and date the play to 1628, confirming authorship with the support of Spanish Golden Age literature experts."



      fr: Le média mexicain CDMX en la Red met en lumière les recherches menées par Álvaro Cuéllar et Germán Vega qui attribuent à Lope de Vega la comédie jusqu'alors anonyme La Francesa Laura. L'article explique comment Transkribus et Stylo ont été utilisés pour transcrire des manuscrits, analyser leur lexique et dater la pièce de 1628, confirmant ainsi la paternité avec le soutien d'experts en littérature espagnole de l'âge d'or.
      pt: O canal mexicano CDMX en la Red destaca a pesquisa liderada por Álvaro Cuéllar e Germán Vega que atribuiu a Lope de Vega a até então anônima comédia La Francesa Laura. O artigo explica como Transkribus e Stylo foram usados ​​para transcrever manuscritos, analisar seu léxico e datar a peça em 1628, confirmando a autoria com o apoio de especialistas em literatura espanhola da Idade de Ouro.
      it: La testata messicana CDMX en la Red mette in risalto la ricerca condotta da Álvaro Cuéllar e Germán Vega che attribuiva a Lope de Vega la commedia precedentemente anonima La Francesa Laura. L'articolo spiega come Transkribus e Stylo furono utilizzati per trascrivere manoscritti, analizzarne il lessico e datare l'opera al 1628, confermandone la paternità con il supporto di esperti di letteratura spagnola del Secolo d'oro.
      de: Der mexikanische Sender CDMX en la Red hebt die von Álvaro Cuéllar und Germán Vega durchgeführten Untersuchungen hervor, die die zuvor anonyme Komödie La Francesa Laura Lope de Vega zuschrieben. Der Artikel erklärt, wie Transkribus und Stylo verwendet wurden, um Manuskripte zu transkribieren, ihren Lexikon zu analysieren und das Stück auf das Jahr 1628 zu datieren, wodurch die Urheberschaft mit Unterstützung spanischer Literaturexperten des Goldenen Zeitalters bestätigt wurde.
      zh: 墨西哥媒体 CDMX en la Red 重点介绍了 Álvaro Cuéllar 和 Germán Vega 领导的研究，该研究将之前匿名的喜剧《弗朗西斯·劳拉》归功于洛佩·德·维加。文章解释了如何使用 Transkribus 和 Stylo 抄写手稿、分析其词典，并将该剧的日期追溯到 1628 年，并在西班牙黄金时代文学专家的支持下确认作者身份。
      ja: メキシコのメディア「CDMX en la Red」は、アルバロ・クエヤルとジェルマン・ベガが主導し、以前は無名だったコメディ「ラ・フランセサ・ローラ」をロペ・デ・ベガの作品とする研究を強調している。この記事では、写本を転写し、辞書を分析し、スペイン黄金時代の文学専門家の支援を受けて劇の作者が 1628 年であることを確認するためにどのようにトランスクリバスとスタイロが使用されたかを説明しています。
      ko: 멕시코 매체 CDMX en la Red는 Álvaro Cuéllar와 Germán Vega가 주도한 연구를 강조하여 이전에 익명의 코미디 La Francesa Laura를 Lope de Vega의 작품으로 여겼습니다. 이 기사에서는 Transkribus와 Stylo를 사용하여 원고를 필사하고, 어휘를 분석하고, 극본의 연대를 1628년으로 지정하고, 스페인 황금기 문학 전문가의 지원을 받아 저자임을 확인하는 방법을 설명합니다.
      ru: Мексиканское издание CDMX en la Red освещает исследование, проведенное Альваро Куэльяром и Херманом Вегой, согласно которому Лопе де Вега приписывает ранее анонимную комедию «Франческа Лаура». В статье объясняется, как Транскрибус и Стило использовались для расшифровки рукописей, анализируется их лексика и датируется пьеса 1628 годом, подтверждая авторство при поддержке экспертов по литературе Золотого века Испании.
      ar: يسلط المنفذ المكسيكي CDMX en la Red الضوء على البحث الذي أجراه ألفارو كويلار وجيرمان فيجا والذي نسب الكوميديا ​​​​المجهولة سابقًا La Francesa Laura إلى Lope de Vega. يشرح المقال كيف تم استخدام Transkribus وStylo لنسخ المخطوطات، وتحليل معجمها، وتاريخ المسرحية إلى عام 1628، مما يؤكد تأليفها بدعم من خبراء أدب العصر الذهبي الإسباني.
