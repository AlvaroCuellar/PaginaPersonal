      zh: 《阿尔马格罗新闻报》报道了西班牙国家图书馆通过人工智能识别出的洛佩·德·维加未出版的戏剧《弗朗西斯·劳拉》的发现情况。该项目由 Álvaro Cuéllar 和 Germán Vega 领导，使用文体测量方法和 Transkribus 系统来确认作者身份。该剧由玛尔塔·波维达 (Marta Poveda) 执导，在马德里首演前在阿尔马格罗的 Corral de Comedias 排练。
      ja: Almagro Noticias は、人工知能によってスペイン国立図書館で特定されたロペ・デ・ベガの未発表戯曲『ラ・フランセサ・ラウラ』の発見について報告しています。アルバロ・クエヤルとゲルマン・ベガが主導したこのプロジェクトでは、スタイロメトリー法とトランスクリバス・システムを使用して著者を確認しました。マルタ・ポベダ監督のシグロ・デ・オロ財団は、マドリードでの初演前にアルマグロのコラル・デ・コメディアスでこの劇のリハーサルを行った。
