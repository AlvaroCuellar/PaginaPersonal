    summary:
      es: "La revista australiana Sight Magazine incluyó el hallazgo de La francesa Laura dentro de su sección StrangeSights, dedicada a noticias curiosas del mundo. Basado en una nota de Reuters, el artículo informa sobre la atribución de una obra inédita de Lope de Vega mediante inteligencia artificial y explica cómo los investigadores de Viena y Valladolid identificaron el texto entre más de 1.300 manuscritos anónimos conservados en la Biblioteca Nacional de España."
      en: "The Australian publication Sight Magazine featured the discovery of La Francesa Laura in its StrangeSights section, devoted to unusual stories from around the world. Based on a Reuters report, the article describes how artificial intelligence was used to attribute a previously unknown play by Lope de Vega, detailing how researchers from Vienna and Valladolid identified the work among more than 1,300 anonymous manuscripts preserved at Spain’s National Library."


      fr: La publication australienne Sight Magazine a présenté la découverte de La Francesa Laura dans sa section StrangeSights, consacrée aux histoires insolites du monde entier. Basé sur un rapport de Reuters, l'article décrit comment l'intelligence artificielle a été utilisée pour attribuer une pièce jusqu'alors inconnue de Lope de Vega, détaillant comment des chercheurs de Vienne et de Valladolid ont identifié l'œuvre parmi plus de 1 300 manuscrits anonymes conservés à la Bibliothèque nationale d'Espagne.
      pt: A publicação australiana Sight Magazine destacou a descoberta de La Francesa Laura em sua seção StrangeSights, dedicada a histórias inusitadas de todo o mundo. Com base num relatório da Reuters, o artigo descreve como a inteligência artificial foi usada para atribuir uma peça até então desconhecida de Lope de Vega, detalhando como investigadores de Viena e Valladolid identificaram a obra entre mais de 1.300 manuscritos anónimos preservados na Biblioteca Nacional de Espanha.
      it: La pubblicazione australiana Sight Magazine ha presentato la scoperta di La Francesa Laura nella sua sezione StrangeSights, dedicata a storie insolite da tutto il mondo. Basato su un rapporto della Reuters, l'articolo descrive come l'intelligenza artificiale è stata utilizzata per attribuire un'opera precedentemente sconosciuta di Lope de Vega, descrivendo in dettaglio come i ricercatori di Vienna e Valladolid hanno identificato l'opera tra oltre 1.300 manoscritti anonimi conservati presso la Biblioteca Nazionale spagnola.
      de: Die australische Publikation Sight Magazine berichtete über die Entdeckung von La Francesa Laura in der Rubrik StrangeSights, die ungewöhnlichen Geschichten aus der ganzen Welt gewidmet ist. Basierend auf einem Reuters-Bericht beschreibt der Artikel, wie künstliche Intelligenz verwendet wurde, um ein bisher unbekanntes Stück von Lope de Vega zuzuordnen, und beschreibt detailliert, wie Forscher aus Wien und Valladolid das Werk unter mehr als 1.300 anonymen Manuskripten identifizierten, die in der spanischen Nationalbibliothek aufbewahrt wurden.
      zh: 澳大利亚出版物 Sight 杂志在其 StrangeSights 版块中重点介绍了 La Francesa Laura 的发现，该版块专门介绍来自世界各地的不寻常故事。根据路透社的报道，该文章描述了如何使用人工智能来鉴定洛佩·德·维加 (Lope de Vega) 一部此前未知的戏剧，并详细介绍了维也纳和巴利亚多利德的研究人员如何从西班牙国家图书馆保存的 1,300 多份匿名手稿中识别出这部作品。
      ja: オーストラリアの出版物サイト マガジンの StrangeSights セクションでは、世界中の珍しい物語に特化したラ フランセサ ローラの発見が特集されました。ロイターの報道に基づいたこの記事は、人工知能がこれまで知られていなかったロペ・デ・ベガの戯曲の帰属を特定するためにどのように使用されたかを説明し、ウィーンとバリャドリードの研究者がスペインの国立図書館に保存されている1,300以上の匿名原稿の中からどのようにしてその作品を特定したかを詳述している。
      ko: 호주 간행물 Sight Magazine은 전 세계의 특이한 이야기를 다루는 StrangeSights 섹션에서 La Francesa Laura의 발견을 특집으로 다루었습니다. 로이터 보고서에 기초한 이 기사는 이전에 알려지지 않은 로페 데 베가(Lope de Vega)의 희곡의 속성을 지정하기 위해 인공 지능이 어떻게 사용되었는지 설명하고, 비엔나와 바야돌리드의 연구자들이 스페인 국립 도서관에 보존된 1,300개 이상의 익명 원고 중에서 이 작품을 식별한 방법을 자세히 설명합니다.
      ru: Австралийское издание Sight Magazine рассказало об открытии La Francesa Laura в разделе StrangeSights, посвященном необычным историям со всего мира. В статье, основанной на сообщении Reuters, описывается, как искусственный интеллект был использован для приписывания ранее неизвестной пьесы Лопе де Веги, и подробно описывается, как исследователи из Вены и Вальядолида идентифицировали это произведение среди более чем 1300 анонимных рукописей, хранящихся в Национальной библиотеке Испании.
      ar: عرضت مجلة Sight Magazine الأسترالية اكتشاف La Francesa Laura في قسم StrangeSights المخصص للقصص غير العادية من جميع أنحاء العالم. واستنادًا إلى تقرير لرويترز، يصف المقال كيف تم استخدام الذكاء الاصطناعي في إسناد مسرحية غير معروفة سابقًا للوب دي فيجا، ويوضح بالتفصيل كيف حدد باحثون من فيينا وبلد الوليد العمل من بين أكثر من 1300 مخطوطة مجهولة محفوظة في المكتبة الوطنية الإسبانية.
