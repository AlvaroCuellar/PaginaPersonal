    title:
      es: "الذكاء الاصطناعي يكشف مسرحية مجهولة لكاتب إسباني شهير"
      en: "Artificial Intelligence Uncovers an Unknown Play by a Famous Spanish Writer"
      fr: L'intelligence artificielle découvre une pièce inconnue d'un célèbre écrivain espagnol
      pt: Inteligência Artificial revela uma peça desconhecida de um famoso escritor espanhol
      it: L'intelligenza artificiale scopre un'opera sconosciuta di un famoso scrittore spagnolo
      de: Künstliche Intelligenz deckt ein unbekanntes Stück eines berühmten spanischen Schriftstellers auf
      zh: 人工智能揭开了西班牙著名作家的一部不为人知的戏剧
      ja: 人工知能がスペインの有名作家の知られざる戯曲を解明
      ko: 인공 지능으로 유명한 스페인 작가의 알려지지 않은 희곡 발견
