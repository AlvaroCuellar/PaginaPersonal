    summary:
      es: "CNN informó, a través de Reuters, sobre el descubrimiento de La francesa Laura, una obra desconocida de Lope de Vega identificada gracias al uso de inteligencia artificial. El artículo explica que investigadores de las universidades de Viena y Valladolid emplearon IA para transcribir más de 1.300 manuscritos anónimos de la Biblioteca Nacional de España, confirmando la autoría del dramaturgo mediante análisis filológicos posteriores."
      en: "CNN, via Reuters, reported the discovery of La Francesa Laura, a previously unknown play by Lope de Vega identified using artificial intelligence. The article explains that researchers from the universities of Vienna and Valladolid used AI to transcribe over 1,300 anonymous manuscripts from Spain’s National Library, later confirming the playwright’s authorship through traditional philological analysis."


      fr: CNN, via Reuters, a rapporté la découverte de La Francesa Laura, une pièce jusqu'alors inconnue de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique que des chercheurs des universités de Vienne et de Valladolid ont utilisé l’IA pour transcrire plus de 1 300 manuscrits anonymes de la Bibliothèque nationale d’Espagne, confirmant ensuite la paternité du dramaturge grâce à une analyse philologique traditionnelle.
      pt: A CNN, via Reuters, noticiou a descoberta de La Francesa Laura, peça até então desconhecida de Lope de Vega identificada por meio de inteligência artificial. O artigo explica que investigadores das universidades de Viena e Valladolid utilizaram IA para transcrever mais de 1.300 manuscritos anónimos da Biblioteca Nacional de Espanha, confirmando posteriormente a autoria do dramaturgo através da análise filológica tradicional.
      it: La CNN, tramite Reuters, ha riferito della scoperta di La Francesa Laura, un'opera precedentemente sconosciuta di Lope de Vega identificata utilizzando l'intelligenza artificiale. L’articolo spiega che i ricercatori delle università di Vienna e Valladolid hanno utilizzato l’intelligenza artificiale per trascrivere oltre 1.300 manoscritti anonimi dalla Biblioteca nazionale spagnola, confermando successivamente la paternità del drammaturgo attraverso la tradizionale analisi filologica.
      de: CNN berichtete über Reuters über die Entdeckung von La Francesa Laura, einem bisher unbekannten Stück von Lope de Vega, das mithilfe künstlicher Intelligenz identifiziert wurde. Der Artikel erklärt, dass Forscher der Universitäten Wien und Valladolid mithilfe von KI über 1.300 anonyme Manuskripte aus der spanischen Nationalbibliothek transkribierten und später die Urheberschaft des Dramatikers durch traditionelle philologische Analyse bestätigten.
      zh: 美国有线电视新闻网 (CNN) 通过路透社报道了《La Francesa Laura》的发现，这是洛佩·德·维加 (Lope de Vega) 使用人工智能识别出的一部此前不为人知的戏剧。文章解释说，维也纳大学和巴利亚多利德大学的研究人员使用人工智能转录了西班牙国家图书馆的 1,300 多份匿名手稿，随后通过传统的语言学分析确认了剧作家的作者身份。
      ja: CNNはロイター経由で、これまで知られていなかったロペ・デ・ベガの戯曲「ラ・フランセサ・ローラ」が人工知能を使って特定されたと報じた。この記事では、ウィーン大学とバリャドリッド大学の研究者らが AI を使用してスペイン国立図書館から 1,300 冊以上の匿名原稿を転記し、その後伝統的な文献学的分析を通じて劇作家の作者であることを確認したと説明しています。
      ko: CNN은 로이터를 통해 이전에 알려지지 않았던 로페 데 베가의 희곡인 라 프란체사 로라(La Francesa Laura)의 발견을 인공지능을 통해 확인했다고 보도했습니다. 기사에서는 비엔나 대학과 바야돌리드 대학의 연구자들이 AI를 사용하여 스페인 국립 도서관에서 가져온 1,300개 이상의 익명 원고를 필사했으며 나중에 전통적인 문헌학 분석을 통해 극작가의 저자임을 확인했다고 설명합니다.
      ru: CNN через агентство Reuters сообщило об открытии «Ла Франческа Лаура», ранее неизвестной пьесы Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье поясняется, что исследователи из университетов Вены и Вальядолида использовали искусственный интеллект для расшифровки более 1300 анонимных рукописей из Национальной библиотеки Испании, позже подтвердив авторство драматурга посредством традиционного филологического анализа.
      ar: أفادت شبكة سي إن إن، عبر رويترز، عن اكتشاف مسرحية لا فرانشيسا لورا، وهي مسرحية غير معروفة من قبل للوب دي فيغا تم تحديدها باستخدام الذكاء الاصطناعي. يوضح المقال أن باحثين من جامعتي فيينا وبلد الوليد استخدموا الذكاء الاصطناعي لنسخ أكثر من 1300 مخطوطة مجهولة المصدر من المكتبة الوطنية الإسبانية، وأكدوا لاحقًا تأليف الكاتب المسرحي من خلال التحليل اللغوي التقليدي.
