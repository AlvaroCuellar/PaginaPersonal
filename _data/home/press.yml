      fr: Le média international Infobae, à travers sa section culturelle Leamos, a fait état de la découverte de La Francesa Laura, une comédie inédite de Lope de Vega identifiée grâce à l'intelligence artificielle. L’article explique comment les chercheurs Álvaro Cuéllar et Germán Vega, en collaboration avec la Bibliothèque nationale d’Espagne, ont utilisé l’outil Transkribus et les techniques d’apprentissage automatique dans le cadre du projet ETSO pour transcrire et analyser des milliers de manuscrits de l’âge d’or, confirmant ainsi la paternité du dramaturge.
      pt: O veículo internacional Infobae, por meio de sua seção cultural Leamos, informou sobre a descoberta de La Francesa Laura, comédia inédita de Lope de Vega identificada por meio de inteligência artificial. O artigo explica como os investigadores Álvaro Cuéllar e Germán Vega, em colaboração com a Biblioteca Nacional de Espanha, utilizaram a ferramenta Transkribus e técnicas de aprendizagem automática no âmbito do projeto ETSO para transcrever e analisar milhares de manuscritos da Idade de Ouro, confirmando a autoria do dramaturgo.
      it: La testata internazionale Infobae, attraverso la sua sezione culturale Leamos, ha riferito della scoperta di La Francesa Laura, una commedia inedita di Lope de Vega identificata attraverso l'intelligenza artificiale. L’articolo spiega come i ricercatori Álvaro Cuéllar e Germán Vega, in collaborazione con la Biblioteca nazionale spagnola, hanno utilizzato lo strumento Transkribus e le tecniche di apprendimento automatico nell’ambito del progetto ETSO per trascrivere e analizzare migliaia di manoscritti dell’Età dell’Oro, confermando la paternità del drammaturgo.
      de: Das internationale Magazin Infobae berichtete über seine Kulturabteilung Leamos über die Entdeckung von La Francesa Laura, einer unveröffentlichten Komödie von Lope de Vega, die durch künstliche Intelligenz identifiziert wurde. Der Artikel erklärt, wie die Forscher Álvaro Cuéllar und Germán Vega in Zusammenarbeit mit der spanischen Nationalbibliothek das Transkribus-Tool und maschinelle Lerntechniken im Rahmen des ETSO-Projekts nutzten, um Tausende von Manuskripten des Goldenen Zeitalters zu transkribieren und zu analysieren und so die Urheberschaft des Dramatikers zu bestätigen.
      zh: 国际媒体 Infobae 通过其文化版块 Leamos 报道了《La Francesa Laura》的发现，这是洛佩·德·维加 (Lope de Vega) 通过人工智能识别的一部未出版的喜剧。该文章解释了研究人员 Álvaro Cuéllar 和 Germán Vega 如何与西班牙国家图书馆合作，使用 ETSO 项目中的 Transkribus 工具和机器学习技术来转录和分析数千份黄金时代手稿，从而确认剧作家的作者身份。
      ja: 国際報道機関 Infobae は、文化部門 Leamos を通じて、人工知能によって識別されたロペ・デ・ベガの未発表コメディ「ラ・フランセサ・ローラ」の発見について報じた。この記事では、研究者のアルバロ・クエヤル氏とゲルマン・ベガ氏が、スペイン国立図書館と協力して、ETSO プロジェクト内で Transkribus ツールと機械学習技術を使用して何千もの黄金時代の写本を転写、分析し、劇作家の著作者であることを確認した方法について説明しています。
      ko: 국제 매체 인포배(Infobae)는 문화섹션 레모스(Leamos)를 통해 인공지능을 통해 확인한 로페 데 베가의 미발표 코미디 <라 프란체사 로라(La Francesa Laura)>의 발견을 보도했다. 이 기사에서는 연구원인 Álvaro Cuéllar와 Germán Vega가 스페인 국립 도서관과 협력하여 ETSO 프로젝트 내에서 Transkribus 도구와 기계 학습 기술을 사용하여 수천 개의 황금 시대 원고를 필사하고 분석하여 극작가의 저자임을 확인한 방법을 설명합니다.
      ru: Международное издание Infobae через свой культурный раздел Leamos сообщило об открытии «La Francesa Laura», неопубликованной комедии Лопе де Веги, идентифицированной с помощью искусственного интеллекта. В статье объясняется, как исследователи Альваро Куэльяр и Херман Вега в сотрудничестве с Национальной библиотекой Испании использовали инструмент Transkribus и методы машинного обучения в рамках проекта ETSO для расшифровки и анализа тысяч рукописей Золотого века, подтвердив авторство драматурга.
      ar: أفاد المنفذ الدولي Infobae، من خلال قسمه الثقافي Leamos، عن اكتشاف La Francesa Laura، وهي كوميديا ​​غير منشورة من تأليف Lope de Vega تم التعرف عليها من خلال الذكاء الاصطناعي. يشرح المقال كيف استخدم الباحثان ألفارو كويلار وجيرمان فيجا، بالتعاون مع المكتبة الوطنية الإسبانية، أداة ترانسكريبوس وتقنيات التعلم الآلي ضمن مشروع ETSO لنسخ وتحليل الآلاف من مخطوطات العصر الذهبي، مما يؤكد تأليف الكاتب المسرحي.
  - id: "press64"
    title:
      es: "Maschineller Stilvergleich: KI entdeckt Komödie von Lope de Vega"
