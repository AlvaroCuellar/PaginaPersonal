      pt: Modelo de IA treinado em 3.250.116 palavras, capaz de transcrever e modernizar manuscritos da Idade de Ouro espanhola com 90,8% de precisão. Recurso amplamente utilizado pela comunidade acadêmica e citado em pelo menos quatro publicações.
      it: Modello AI addestrato su 3.250.116 parole, in grado di trascrivere e modernizzare i manoscritti spagnoli dell'età dell'oro con una precisione del 90,8%. Una risorsa ampiamente utilizzata dalla comunità accademica e citata in almeno quattro pubblicazioni.
      de: Auf 3.250.116 Wörtern trainiertes KI-Modell, das spanische Manuskripte des Goldenen Zeitalters mit einer Genauigkeit von 90,8 % transkribieren und modernisieren kann. Eine von der akademischen Gemeinschaft weit verbreitete Ressource, die in mindestens vier Veröffentlichungen zitiert wird.
      zh: AI 模型接受了 3,250,116 个单词的训练，能够以 90.8% 的准确率转录和现代化西班牙黄金时代手稿。学术界广泛使用的资源，并在至少四份出版物中引用。
      ja: 3,250,116 語でトレーニングされた AI モデルは、スペイン黄金時代の写本を 90.8% の精度で転写および現代化することができます。学術コミュニティで広く使用されており、少なくとも 4 つの出版物で引用されているリソース。
      ko: 3,250,116개 단어로 훈련된 AI 모델은 스페인어 황금기 사본을 90.8%의 정확도로 전사하고 현대화할 수 있습니다. 학계에서 널리 사용되며 최소 4개 이상의 출판물에서 인용된 자료입니다.
      ru: Модель искусственного интеллекта, обученная на 3 250 116 словах, способна расшифровывать и модернизировать рукописи Золотого века Испании с точностью 90,8%. Ресурс, широко используемый академическим сообществом и цитируемый как минимум в четырех публикациях.
      ar: نموذج ذكاء اصطناعي تم تدريبه على 3,250,116 كلمة، وهو قادر على نسخ وتحديث مخطوطات العصر الذهبي الإسباني بدقة تصل إلى 90.8%. مصدر يستخدم على نطاق واسع من قبل المجتمع الأكاديمي وتم الاستشهاد به في أربعة منشورات على الأقل.
