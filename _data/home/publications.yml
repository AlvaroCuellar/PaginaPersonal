  - id: "texoro"
    type: "database"
    title: "TEXORO: Textos del Siglo de Oro"
    authors: ["Álvaro Cuéllar", "Germán Vega García-Luengos"]
    year: "2022–actualidad"
    url: "https://etso.es/texoro"
    thumbnail: "/assets/images/pubs/texoro.png"
    abstract:
      es: "Sistema de búsqueda en abierto del corpus del teatro del Siglo de Oro, compuesto por más de 3.000 obras y 400 dramaturgos, con un total de 37 millones de palabras. Es utilizado diariamente por especialistas para realizar consultas lingüísticas y filológicas."
      en: "Open-access search system for the corpus of Spanish Golden Age theatre, comprising more than 3,000 works and 400 playwrights, with a total of 37 million words. It is used daily by specialists for linguistic and philological queries."
      fr: Système de recherche en libre accès du corpus du théâtre espagnol du Siècle d'Or, composé de plus de 3 000 œuvres et 400 dramaturges, avec un total de 37 millions de mots. Il est utilisé quotidiennement par les spécialistes pour des requêtes linguistiques et philologiques.
      pt: Sistema de busca de acesso aberto para o corpus do teatro espanhol da Idade de Ouro, composto por mais de 3.000 obras e 400 dramaturgos, com um total de 37 milhões de palavras. É utilizado diariamente por especialistas para consultas linguísticas e filológicas.
      it: Sistema di ricerca ad accesso aperto per il corpus del teatro spagnolo del Secolo d'Oro, che comprende più di 3.000 opere e 400 drammaturghi, per un totale di 37 milioni di parole. Viene utilizzato quotidianamente dagli specialisti per quesiti linguistici e filologici.
      de: Open-Access-Suchsystem für das Korpus des spanischen Theaters des Goldenen Zeitalters, das mehr als 3.000 Werke und 400 Dramatiker mit insgesamt 37 Millionen Wörtern umfasst. Es wird täglich von Fachleuten für sprachliche und philologische Fragestellungen genutzt.
      zh: 西班牙黄金时代戏剧语料库的开放获取搜索系统，包含3000多部作品和400位剧作家，总计3700万字。专家每天都使用它来进行语言和语言学查询。
      ja: スペイン黄金時代演劇のコーパスのオープンアクセス検索システム。3,000 以上の作品と 400 人の劇作家で構成され、合計 3,700 万語が収録されています。これは言語学的および文献学的クエリのために専門家によって日常的に使用されています。
      ko: 3,000개 이상의 작품과 400명의 극작가, 총 3,700만 단어로 구성된 스페인 황금기 연극 자료에 대한 공개 검색 시스템입니다. 언어 및 문학적 질문을 위해 전문가가 매일 사용합니다.
      ru: Система поиска открытого доступа для корпуса испанского театра Золотого века, включающего более 3000 произведений и 400 драматургов, общим объемом 37 миллионов слов. Он ежедневно используется специалистами для лингвистических и филологических запросов.
      ar: نظام بحث مفتوح الوصول لمجموعة مسرح العصر الذهبي الإسباني، الذي يضم أكثر من 3000 عمل و400 كاتب مسرحي، بإجمالي 37 مليون كلمة. ويستخدم يوميا من قبل المتخصصين للاستفسارات اللغوية والفلولوجية.
