  - id: "cetso"
    type: "database"
    title: "CETSO: Corpus de Estilometría aplicada al Teatro del Siglo de Oro"
    authors: ["Álvaro Cuéllar", "Germán Vega García-Luengos"]
    year: "2017–actualidad"
    url: "https://etso.es/cetso"
    thumbnail: "/assets/images/pubs/cetso.png"
    abstract:
      es: "CETSO es el corpus base de ETSO, con unas 3.000 obras teatrales del Siglo de Oro modernizadas y normalizadas para análisis estilométricos. Reúne textos públicos, de investigación y transcritos automáticamente con Transkribus. Constituye el mayor corpus comparativo del teatro aurisecular en lengua española."
      en: "CETSO is ETSO's base corpus, with around 3,000 Spanish Golden Age plays modernized and normalized for stylometric analysis. It brings together public, research, and automatically transcribed texts produced with Transkribus. It constitutes the largest comparative corpus of early modern Spanish theatre in Spanish."


      fr: CETSO est le corpus de base de l'ETSO, avec environ 3 000 pièces espagnoles de l'âge d'or modernisées et normalisées pour l'analyse stylométrique. Il rassemble des textes publics, de recherche et transcrits automatiquement produits avec Transkribus. Il constitue le plus grand corpus comparatif du théâtre espagnol moderne en langue espagnole.
      pt: CETSO é o corpus base do ETSO, com cerca de 3.000 peças espanholas da Idade de Ouro modernizadas e normalizadas para análise estilométrica. Reúne textos públicos, de pesquisa e transcritos automaticamente produzidos com Transkribus. Constitui o maior corpus comparativo do teatro espanhol moderno em espanhol.
      it: CETSO è il corpus di base dell'ETSO, con circa 3.000 opere teatrali spagnole del Secolo d'Oro modernizzate e normalizzate per l'analisi stilometrica. Riunisce testi pubblici, di ricerca e trascritti automaticamente prodotti con Transkribus. Costituisce il più grande corpus comparativo del teatro spagnolo della prima età moderna in spagnolo.
      de: CETSO ist das Basiskorpus von ETSO mit rund 3.000 spanischen Stücken des Goldenen Zeitalters, die für die stilometrische Analyse modernisiert und normalisiert wurden. Es vereint öffentliche, wissenschaftliche und automatisch transkribierte Texte, die mit Transkribus erstellt wurden. Es stellt das größte vergleichende Korpus des frühneuzeitlichen spanischen Theaters auf Spanisch dar.
      zh: CETSO 是 ETSO 的基础语料库，其中包含约 3,000 个西班牙黄金时代戏剧，经过现代化和规范化以进行风格分析。它汇集了使用 Transkribus 生成的公共文本、研究文本和自动转录文本。它构成了西班牙早期现代西班牙戏剧最大的比较语料库。
      ja: CETSO は ETSO のベース コーパスであり、約 3,000 のスペイン黄金時代の演劇がスタイロメトリー分析用に現代化および正規化されています。 Transkribus で作成された公開テキスト、研究テキスト、および自動転写されたテキストがまとめられています。これは、スペイン語による近世スペイン演劇の最大の比較コーパスを構成します。
      ko: CETSO는 ETSO의 기본 자료로, 약 3,000개의 스페인 황금기 희곡이 현대화되고 문체 분석을 위해 정규화되었습니다. 이는 Transkribus로 생성된 공개, 연구 및 자동 복사된 텍스트를 통합합니다. 이는 스페인어로 된 근대 초기 스페인 연극의 가장 큰 비교 자료를 구성합니다.
      ru: CETSO - это базовый корпус ETSO, включающий около 3000 пьес Золотого века Испании, модернизированных и нормализованных для стилометрического анализа. Он объединяет общедоступные, исследовательские и автоматически расшифрованные тексты, созданные с помощью Transkribus. Он представляет собой крупнейший сравнительный корпус испанского театра раннего Нового времени на испанском языке.
      ar: CETSO هي المجموعة الأساسية لـ ETSO، مع حوالي 3000 مسرحية من العصر الذهبي الإسباني تم تحديثها وتطبيعها للتحليل الأسلوبي. فهو يجمع بين النصوص العامة والبحثية والنصوص المكتوبة تلقائيًا والتي تم إنتاجها باستخدام Transkribus. وهو يشكل أكبر مجموعة مقارنة للمسرح الإسباني الحديث المبكر باللغة الإسبانية.
