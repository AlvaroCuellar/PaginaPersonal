  - id: "etso"
    type: "database"
    title: "ETSO: Estilometría aplicada al Teatro del Siglo de Oro"
    authors: ["Álvaro Cuéllar", "Germán Vega García-Luengos"]
    year: "2017–actualidad"
    url: "https://etso.es/"
    thumbnail: "/assets/images/pubs/etso.png"
    abstract:
      es: "Portal digital que ofrece en abierto los análisis estilométricos de más de 3.000 obras del teatro del Siglo de Oro. Es el proyecto al que el autor ha dedicado más tiempo en los últimos años y se ha consolidado como uno de los recursos más utilizados por los investigadores del ámbito áureo."
      en: "Digital portal that provides open access to stylometric analyses of more than 3,000 Spanish Golden Age plays. It is the project to which the author has devoted the most time in recent years and has become one of the most widely used resources among researchers in the field."





      fr: Portail numérique offrant un accès ouvert aux analyses stylométriques de plus de 3 000 pièces de théâtre du Siècle d'or espagnol. C'est le projet auquel l'auteur a consacré le plus de temps ces dernières années et est devenu l'une des ressources les plus utilisées par les chercheurs dans le domaine.
      pt: Portal digital que oferece acesso aberto a análises estilométricas de mais de 3.000 peças da Idade de Ouro espanhola. É o projeto ao qual o autor mais se dedicou nos últimos anos e se tornou um dos recursos mais utilizados pelos pesquisadores da área.
      it: Portale digitale che fornisce accesso aperto alle analisi stilometriche di oltre 3.000 opere teatrali spagnole del Secolo d'oro. È il progetto a cui l'autore ha dedicato più tempo negli ultimi anni ed è diventato una delle risorse più utilizzate dai ricercatori del settore.
      de: Digitales Portal, das offenen Zugang zu stilometrischen Analysen von mehr als 3.000 spanischen Stücken des Goldenen Zeitalters bietet. Es ist das Projekt, dem der Autor in den letzten Jahren die meiste Zeit gewidmet hat und das sich zu einer der am häufigsten genutzten Ressourcen unter Forschern auf diesem Gebiet entwickelt hat.
      zh: 数字门户，提供对 3,000 多部西班牙黄金时代戏剧的风格分析的开放访问。这是作者近年来投入最多时间的项目，已成为该领域研究人员使用最广泛的资源之一。
      ja: 3,000 以上のスペイン黄金時代の演劇のスタイロメトリー分析へのオープン アクセスを提供するデジタル ポータル。これは、著者が近年最も多くの時間を費やしたプロジェクトであり、この分野の研究者の間で最も広く使用されているリソースの 1 つとなっています。
      ko: 3,000개 이상의 스페인 황금기 희곡에 대한 문체 분석에 대한 공개 액세스를 제공하는 디지털 포털입니다. 이는 저자가 최근 몇 년 동안 가장 많은 시간을 투자한 프로젝트이며 해당 분야 연구자들 사이에서 가장 널리 사용되는 자료 중 하나가 되었습니다.
      ru: Цифровой портал, предоставляющий открытый доступ к стилометрическому анализу более 3000 пьес Золотого века Испании. Это проект, которому автор посвятил больше всего времени в последние годы, и который стал одним из наиболее широко используемых ресурсов среди исследователей в этой области.
      ar: بوابة رقمية توفر وصولاً مفتوحًا إلى التحليلات الأسلوبية لأكثر من 3000 مسرحية من العصر الذهبي الإسباني. إنه المشروع الذي خصص له المؤلف معظم وقته في السنوات الأخيرة وأصبح أحد المصادر الأكثر استخدامًا بين الباحثين في هذا المجال.
