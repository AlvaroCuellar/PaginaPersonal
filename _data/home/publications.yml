  - id: "rhythmiccorpus100"
    type: "dataset"
    title: "Rhythmic Corpus of 100 Spanish Golden Age Plays"
    authors: ["Álvaro Cuéllar"]
    publication: "Zenodo"
    year: 2025
    url: "https://doi.org/10.5281/zenodo.17537343"
    thumbnail: "/assets/images/pubs/r100.png"
    abstract:
      es: "Conjunto de datos que acompaña el artículo From Atoms to Waves: Rhythmic Stylometry for Authorship Studies of Early Modern Spanish Theatre. Incluye cien comedias de autoría segura de nueve dramaturgos del Siglo de Oro, en dos versiones: texto original y escansión rítmica automática corregida. El corpus permite replicar los experimentos del estudio y avanzar en la investigación estilométrica rítmica, la atribución de autoría y el análisis métrico computacional del teatro áureo."
      en: "Dataset accompanying the article From Atoms to Waves: Rhythmic Stylometry for Authorship Studies of Early Modern Spanish Theatre. It includes one hundred securely attributed plays by nine Spanish Golden Age playwrights in two versions: original text and corrected automatic rhythmic scansion. The corpus makes it possible to replicate the study's experiments and advance research on rhythmic stylometry, authorship attribution, and computational metrical analysis of Golden Age theatre."




      fr: "Ensemble de données accompagnant l'article Des atomes aux vagues: la stylométrie rythmique pour les études sur la paternité du théâtre espagnol moderne. Il comprend cent pièces de neuf dramaturges espagnols du Siècle d'Or, attribuées de manière sécurisée, en deux versions: texte original et scansion rythmique automatique corrigée. Le corpus permet de reproduire les expériences de l'étude et de faire progresser la recherche sur la stylométrie rythmique, l'attribution de la paternité et l'analyse métrique informatique du théâtre de l'âge d'or."
      pt: 'Conjunto de dados que acompanha o artigo From Atoms to Waves: Rhythmic Stylometry for Authorship Studies of Early Modern Spanish Theatre. Inclui cem peças atribuídas com segurança por nove dramaturgos espanhóis da Idade de Ouro em duas versões: texto original e escansão rítmica automática corrigida. O corpus permite replicar os experimentos do estudo e avançar nas pesquisas sobre estilometria rítmica, atribuição de autoria e análise métrica computacional do teatro da Idade de Ouro.'
      it: "Set di dati che accompagna l'articolo Dagli atomi alle onde: stilometria ritmica per studi d'autore del teatro spagnolo della prima età moderna. Comprende un centinaio di opere teatrali attribuite in modo sicuro di nove drammaturghi spagnoli del Secolo d'oro in due versioni: testo originale e scansione ritmica automatica corretta. Il corpus consente di replicare gli esperimenti dello studio e di far avanzare la ricerca sulla stilometria ritmica, sull'attribuzione della paternità e sull'analisi metrica computazionale del teatro dell'Età dell'Oro."
      de: 'Datensatz zum Artikel „From Atoms to Waves: Rhythmic Stylometry for Authorship Studies of Early Modern Spanish Theatre“. Es enthält einhundert sicher zugeschriebene Stücke von neun spanischen Dramatikern des Goldenen Zeitalters in zwei Versionen: Originaltext und korrigierte automatische rhythmische Scansion. Das Korpus ermöglicht es, die Experimente der Studie zu reproduzieren und die Forschung zu rhythmischer Stilometrie, Autorenzuschreibung und rechnergestützter metrischer Analyse des Theaters des Goldenen Zeitalters voranzutreiben.'
      zh: 文章《从原子到波浪：早期现代西班牙戏剧作者研究的节奏风格测量》一文附带的数据集。它包括由九位西班牙黄金时代剧作家创作的一百部安全归属的戏剧，有两个版本：原始文本和更正的自动节奏扫描。该语料库使得复制该研究的实验成为可能，并推进黄金时代戏剧的节奏风格测量、作者归属和计算计量分析的研究。
      ja: '記事「From Atoms to Waves: Rhythmic Stylometry for Authorship Studies of Early Modern Spain Theatre」に付随するデータセット。この本には、スペイン黄金時代の劇作家 9 人による確実に帰属が確認された 100 の戯曲が、オリジナルのテキストと修正された自動リズミカル スキャンの 2 つのバージョンで含まれています。このコーパスにより、研究の実験を再現し、リズムスタイロメトリー、著者帰属、黄金時代劇場の計算による計量分析に関する研究を進めることが可能になります。'
      ko: '원자에서 파동까지: 초기 현대 스페인 연극의 저자 연구를 위한 리듬 스타일로메트리 기사와 함께 제공되는 데이터세트입니다. 여기에는 9명의 스페인 황금기 극작가가 쓴 안전하게 귀속된 100개의 희곡이 원본 텍스트와 수정된 자동 리듬 스캔의 두 가지 버전으로 포함되어 있습니다. 코퍼스를 통해 연구의 실험을 재현하고 황금시대 극장의 리듬 스타일로메트리, 저작자 귀속 및 전산 측정 분석에 대한 사전 연구를 수행할 수 있습니다.'
      ru: 'Набор данных, сопровождающий статью «От атомов к волнам: ритмическая стилометрия для авторских исследований испанского театра раннего Нового времени». В него вошли сто пьес девяти испанских драматургов Золотого века с достоверной атрибуцией в двух версиях: оригинальном тексте и исправленном автоматическом ритмическом сканировании. Корпус позволяет воспроизводить эксперименты исследования и продвигать исследования в области ритмической стилометрии, установления авторства и компьютерно-метрического анализа театра Золотого века.'
      ar: 'مجموعة البيانات المصاحبة للمقالة من الذرات إلى الأمواج: قياس الأسلوب الإيقاعي لدراسات التأليف في المسرح الإسباني الحديث المبكر. يتضمن مائة مسرحية منسوبة بشكل موثوق لتسعة كتاب مسرحيين إسبان من العصر الذهبي في نسختين: النص الأصلي والمسح الإيقاعي التلقائي المصحح. تتيح المجموعة إمكانية تكرار تجارب الدراسة وتطوير الأبحاث حول قياس الأسلوب الإيقاعي، وإسناد التأليف، والتحليل المتري الحسابي لمسرح العصر الذهبي.'
  - id: "resumenes"
    type: "inpress"
    title: "Resúmenes asistidos por modelos de lenguaje para un vasto corpus de obras literarias del Siglo de Oro"
    authors: ["Álvaro Cuéllar"]
    publication: "El teatro del Siglo de Oro en el horizonte de las humanidades digitales"
    publisher: "Peter Lang"
    place: "Berlín"
    year: 2026
    pages:
    isbn:
    url:
    thumbnail: "/assets/images/pubs/prensa.png"
    abstract:
      es: "El trabajo explica la generación a gran escala de miles de resúmenes automáticos de obras del Siglo de Oro con modelos de lenguaje y su publicación, junto con síntesis de personajes, espacios y temas para facilitar la exploración y la comparación del corpus."
      en: "The work explains the large-scale generation of thousands of automatic summaries of Spanish Golden Age plays with language models, and their publication together with syntheses of characters, spaces, and themes to facilitate corpus exploration and comparison."

   
      fr: L'ouvrage explique la génération à grande échelle de milliers de résumés automatiques de pièces de théâtre de l'âge d'or espagnol avec des modèles linguistiques, et leur publication accompagnée de synthèses de personnages, d'espaces et de thèmes pour faciliter l'exploration et la comparaison du corpus.
      pt: O trabalho explica a geração em larga escala de milhares de resumos automáticos de peças da Idade de Ouro espanhola com modelos de linguagem e sua publicação juntamente com sínteses de personagens, espaços e temas para facilitar a exploração e comparação do corpus.
      it: Il lavoro spiega la generazione su larga scala di migliaia di riassunti automatici di opere teatrali spagnole del Secolo d'oro con modelli linguistici e la loro pubblicazione insieme a sintesi di personaggi, spazi e temi per facilitare l'esplorazione e il confronto del corpus.
      de: Die Arbeit erklärt die groß angelegte Erstellung Tausender automatischer Zusammenfassungen spanischer Stücke des Goldenen Zeitalters mit Sprachmodellen und deren Veröffentlichung zusammen mit Synthesen von Charakteren, Räumen und Themen, um die Erkundung und den Vergleich des Korpus zu erleichtern.
      zh: 该作品解释了使用语言模型大规模生成西班牙黄金时代戏剧的数千个自动摘要，以及它们的发布以及人物、空间和主题的综合，以促进语料库探索和比较。
      ja: この研究では、言語モデルを使用したスペイン黄金時代劇の何千もの自動要約の大規模な生成と、コーパスの探索と比較を容易にするための文字、スペース、テーマの合成とともにその出版について説明しています。
      ko: 이 작품은 언어 모델을 사용하여 스페인 황금기 연극의 수천 개의 자동 요약을 대규모로 생성하고, 코퍼스 탐색 및 비교를 용이하게 하기 위해 문자, 공간 및 테마를 종합하여 출판하는 방법을 설명합니다.
      ru: В работе объясняется крупномасштабное создание тысяч автоматических обзоров пьес Золотого века Испании с использованием языковых моделей и их публикация вместе с синтезом персонажей, пространств и тем для облегчения исследования и сравнения корпуса.
      ar: يشرح العمل الإنتاج واسع النطاق لآلاف الملخصات التلقائية لمسرحيات العصر الذهبي الإسباني باستخدام نماذج اللغة، ونشرها مع توليفات من الشخصيات والمساحات والموضوعات لتسهيل استكشاف المجموعة ومقارنتها.
  - id: "redesneuronales"
    type: "incollection"
    title: "Redes neuronales convolucionales al servicio del teatro áureo"
    authors: "Álvaro Cuéllar"
    publication: "En José Romera Castillo (ed.), Literatura, teatro e inteligencia artificial"
    publisher: "Editorial Verbum"
    place: "Madrid"
    pages: "78–82"
    year: 2025
    url: "https://www.academia.edu/144758174/Redes_neuronales_convolucionales_al_servicio_del_teatro_%C3%A1ureo"
    thumbnail: "/assets/images/pubs/redes.png"
    abstract:
      es: "El teatro del Siglo de Oro afronta retos filológicos difíciles de abordar desde la investigación analógica. Las redes neuronales convolucionales (CNN) ofrecen soluciones potentes para la transcripción automática y la identificación caligráfica, así como para la generación de escritura sintética que amplía los datos y fortalece el entrenamiento de los modelos."
      en: "Spanish Golden Age theatre poses philological challenges that are difficult to address through analogue research alone. Convolutional neural networks (CNNs) offer powerful solutions for automatic transcription and handwriting identification, as well as for generating synthetic writing that expands data and strengthens model training."
      fr: Le théâtre espagnol du Siècle d’Or pose des défis philologiques difficiles à relever par la seule recherche analogique. Les réseaux de neurones convolutifs (CNN) offrent des solutions puissantes pour la transcription automatique et l'identification de l'écriture manuscrite, ainsi que pour générer une écriture synthétique qui élargit les données et renforce la formation des modèles.
      pt: O teatro espanhol da Idade de Ouro apresenta desafios filológicos que são difíceis de resolver apenas através da investigação analógica. As redes neurais convolucionais (CNNs) oferecem soluções poderosas para transcrição automática e identificação de caligrafia, bem como para geração de escrita sintética que expande dados e fortalece o treinamento de modelos.
      it: Il teatro spagnolo del Secolo d’oro pone sfide filologiche difficili da affrontare attraverso la sola ricerca analogica. Le reti neurali convoluzionali (CNN) offrono potenti soluzioni per la trascrizione automatica e l'identificazione della grafia, nonché per la generazione di scrittura sintetica che espande i dati e rafforza l'addestramento del modello.
      de: Das spanische Theater des Goldenen Zeitalters stellt philologische Herausforderungen dar, die durch analoge Forschung allein nur schwer zu bewältigen sind. Convolutional Neural Networks (CNNs) bieten leistungsstarke Lösungen für die automatische Transkription und Handschrifterkennung sowie für die Generierung synthetischer Schrift, die Daten erweitert und das Modelltraining stärkt.
      zh: 西班牙黄金时代戏剧提出了仅通过模拟研究难以解决的语言学挑战。卷积神经网络 (CNN) 为自动转录和手写识别以及生成可扩展数据和加强模型训练的合成书写提供了强大的解决方案。
      ja: スペイン黄金時代の演劇は、アナログ研究だけでは対処するのが難しい文献学的課題を提起しています。畳み込みニューラル ネットワーク (CNN) は、自動転写と手書き識別、さらにはデータを拡張してモデル トレーニングを強化する合成書き込みを生成するための強力なソリューションを提供します。
      ko: 스페인 황금기 연극은 아날로그 연구만으로는 해결하기 어려운 문학적 과제를 제기합니다. CNN(컨벌루션 신경망)은 자동 전사 및 필기 식별은 물론 데이터를 확장하고 모델 훈련을 강화하는 합성 글쓰기 생성을 위한 강력한 솔루션을 제공합니다.
      ru: Испанский театр Золотого века ставит перед собой филологические проблемы, которые трудно решить только с помощью аналоговых исследований. Сверточные нейронные сети (CNN) предлагают мощные решения для автоматической транскрипции и идентификации почерка, а также для создания синтетического письма, которое расширяет данные и усиливает обучение моделей.
      ar: يطرح مسرح العصر الذهبي الإسباني تحديات فقهية يصعب معالجتها من خلال البحث التناظري وحده. توفر الشبكات العصبية التلافيفية (CNNs) حلولاً قوية للنسخ التلقائي وتحديد خط اليد، فضلاً عن توليد الكتابة الاصطناعية التي تعمل على توسيع البيانات وتعزيز التدريب النموذجي.
  - id: "scansiondataset326"
    type: "dataset"
    title: "Rhythmic Scansion Dataset of 326 Spanish Golden Age Plays for Authorship Attribution"
    authors: ["Álvaro Cuéllar"]
    publication: "Zenodo"
    year: 2026
    url: "https://doi.org/10.5281/zenodo.19418278"
    thumbnail: "/assets/images/pubs/scansiondataset.png"
    abstract:
      es: "Dataset de escansión rítmica de 326 comedias del Siglo de Oro utilizado en el artículo La estilometría rítmica a examen en un corpus de comedias seguras de Lope de Vega. Reúne materiales de recursos previos y datos adicionales preparados por el autor para facilitar la replicación de los experimentos de atribución y el estudio computacional del ritmo en el teatro áureo."
      en: "Rhythmic scansion dataset of 326 Spanish Golden Age plays used in the article La estilometría rítmica a examen en un corpus de comedias seguras de Lope de Vega. It brings together materials from previous resources and additional data prepared by the author to facilitate replication of attribution experiments and the computational study of rhythm in Golden Age theatre."
      fr: Ensemble de données de scansion rythmique de 326 pièces de théâtre de l'âge d'or espagnol utilisées dans l'article La estilometría rítmica a examen en un corpus de comedias seguras de Lope de Vega. Il rassemble des matériaux provenant de ressources antérieures et des données supplémentaires préparées par l'auteur pour faciliter la réplication des expériences d'attribution et l'étude informatique du rythme dans le théâtre de l'âge d'or.
      pt: Conjunto de dados de escansão rítmica de 326 peças da Idade de Ouro espanhola usadas no artigo La estilometría rítmica a examen en un corpus de comedias seguras de Lope de Vega. Reúne materiais de recursos anteriores e dados adicionais preparados pelo autor para facilitar a replicação de experimentos de atribuição e o estudo computacional do ritmo no teatro da Idade de Ouro.
      it: Set di dati di scansione ritmica di 326 drammi spagnoli del Secolo d'Oro utilizzati nell'articolo La estilometría rítmica a examen en un corpus de comedias seguras de Lope de Vega. Riunisce materiali provenienti da risorse precedenti e dati aggiuntivi preparati dall'autore per facilitare la replica degli esperimenti di attribuzione e lo studio computazionale del ritmo nel teatro dell'Età dell'Oro.
      de: Rhythmischer Scansion-Datensatz von 326 spanischen Theaterstücken des Goldenen Zeitalters, der im Artikel „La estilometría rítmica a examen en un corpus de comedias seguras de Lope de Vega“ verwendet wird. Es vereint Materialien aus früheren Ressourcen und zusätzliche vom Autor erstellte Daten, um die Replikation von Attributionsexperimenten und die rechnerische Untersuchung des Rhythmus im Theater des Goldenen Zeitalters zu erleichtern.
      zh: 《La estilometría rítmica a examen en un corpus de comedias seguras de Lope de Vega》一文中使用了 326 个西班牙黄金时代戏剧的节奏扫描数据集。它汇集了以前资源中的材料和作者准备的附加数据，以促进黄金时代戏剧中归因实验和节奏计算研究的复制。
      ja: 「La estilometría rítmica a Examen en un corpus de Comedias seguras de Lope de Vega」の記事で使用されている 326 のスペイン黄金時代劇のリズミカル スキャン データセット。これには、以前のリソースからの資料と、黄金時代の劇場におけるリズムの帰属実験の再現とコンピュータによる研究を容易にするために著者が準備した追加データがまとめられています。
      ko: La estilometría rítmica a Examen en un corpus de 코미디 seguras de Lope de Vega 기사에 사용된 326개의 스페인 황금기 희곡에 대한 리듬 스캔 데이터세트입니다. 이전 리소스의 자료와 저자가 준비한 추가 데이터를 결합하여 귀속 실험의 복제와 황금 시대 극장의 리듬에 대한 컴퓨터 연구를 용이하게 합니다.
      ru: Набор данных ритмического сканирования 326 пьес Золотого века Испании, использованный в статье «La estilometría rítmica a Exemen en un Corpus de Comedias Seguras de Lope de Vega». Он объединяет материалы из предыдущих ресурсов и дополнительные данные, подготовленные автором для облегчения воспроизведения экспериментов по атрибуции и компьютерного исследования ритма в театре Золотого века.
      ar: مجموعة بيانات المسح الإيقاعي لـ 326 مسرحية من العصر الذهبي الإسباني المستخدمة في المقالة La estilometría rítmica a examen en un corpus de commedias seguras de Lope de Vega. فهو يجمع مواد من الموارد السابقة والبيانات الإضافية التي أعدها المؤلف لتسهيل تكرار تجارب الإسناد والدراسة الحسابية للإيقاع في مسرح العصر الذهبي.
  - id: "writersonia"
    type: "article"
    title: "Artificial Intelligence for Calligraphic Writer Identification: The Case of Lope de Vega’s Autographs"
    authors: ["Álvaro Cuéllar, Sònia Boadas"]
    publication: "Hipogrifo: Revista de Literatura y Cultura del Siglo de Oro"
    year: 2025
    volume: "XIII"
    number: "1"
    pages: "517-532"
    isbn:
    url: "https://doi.org/10.13035/H.2025.13.01.36"
    thumbnail: "/assets/images/pubs/writersonia.png"
    abstract:
      es: "Se presenta una vía computacional para detectar la huella caligráfica de un escriba en grandes conjuntos documentales mediante técnicas de HTR aplicadas a la identificación de manos autorales. En un experimento con la escritura autógrafa de Lope de Vega, el modelo alcanzó métricas cercanas a 0.95–1.00, demostrando su potencial para reconocer autores, copistas o censores y descubrir testimonios inéditos de alto valor histórico y literario."
      en: "A computational approach is presented for detecting the handwriting trace of a scribe in large documentary collections through HTR techniques applied to hand identification. In an experiment with Lope de Vega's autograph handwriting, the model reached metrics close to 0.95–1.00, demonstrating its potential to recognize authors, copyists, or censors and to discover unpublished witnesses of high historical and literary value."
      fr: Une approche informatique est présentée pour détecter la trace d'écriture manuscrite d'un scribe dans de grandes collections documentaires grâce à des techniques HTR appliquées à l'identification des mains. Dans une expérience avec l'écriture autographe de Lope de Vega, le modèle a atteint des mesures proches de 0,95 à 1,00, démontrant son potentiel pour reconnaître les auteurs, les copistes ou les censeurs et pour découvrir des témoins inédits de haute valeur historique et littéraire.
      pt: É apresentada uma abordagem computacional para detecção do traço de caligrafia de um escriba em grandes acervos documentais através de técnicas de HTR aplicadas à identificação de mãos. Numa experiência com a caligrafia autografada de Lope de Vega, o modelo atingiu métricas próximas de 0,95–1,00, demonstrando o seu potencial para reconhecer autores, copistas ou censores e para descobrir testemunhas inéditas de elevado valor histórico e literário.
      it: Viene presentato un approccio computazionale per rilevare la traccia della grafia di uno scriba in grandi raccolte documentarie attraverso tecniche HTR applicate all'identificazione della mano. In un esperimento con la grafia autografa di Lope de Vega, il modello ha raggiunto metriche vicine a 0,95–1,00, dimostrando il suo potenziale nel riconoscere autori, copisti o censori e nella scoperta di testimoni inediti di alto valore storico e letterario.
      de: Es wird ein rechnerischer Ansatz zur Erkennung der Handschriftspur eines Schreibers in großen Dokumentensammlungen mithilfe von HTR-Techniken zur Handidentifizierung vorgestellt. In einem Experiment mit der Autogrammhandschrift von Lope de Vega erreichte das Modell Werte nahe 0,95–1,00 und demonstrierte damit sein Potenzial, Autoren, Kopisten oder Zensoren zu erkennen und unveröffentlichte Zeugen von hohem historischen und literarischen Wert zu entdecken.
      zh: 提出了一种计算方法，用于通过应用于手部识别的 HTR 技术来检测大型文献集中抄写员的笔迹痕迹。在对洛普·德·维加 (Lope de Vega) 亲笔签名进行的实验中，该模型达到了接近 0.95-1.00 的指标，展示了其识别作者、抄写员或审查员以及发现具有较高历史和文学价值的未发表证人的潜力。
      ja: 手の識別に適用される HTR 技術を通じて、大規模なドキュメンタリー コレクション内の筆記者の手書きの痕跡を検出するための計算的アプローチが提示されます。ロペ・デ・ベガの直筆サインを用いた実験では、このモデルは 0.95 ～ 1.00 に近い指標に達し、著者、写本家、検閲官を認識し、歴史的および文学的価値の高い未発表の証人を発見できる可能性を実証しました。
      ko: 손 식별에 적용된 HTR 기술을 통해 대규모 다큐멘터리 컬렉션에서 서기의 필기 흔적을 탐지하기 위한 컴퓨터 접근 방식이 제시됩니다. Lope de Vega의 사인 손글씨를 사용한 실험에서 모델은 0.95~1.00에 가까운 측정항목에 도달하여 작가, 필사자 또는 검열관을 인식하고 역사적, 문학적 가치가 높은 미출판 증인을 발견할 수 있는 잠재력을 보여주었습니다.
      ru: Представлен вычислительный подход к обнаружению следов почерка писца в больших документальных коллекциях с помощью методов HTR, применяемых для идентификации руки. В эксперименте с автографом Лопе де Веги модель достигла показателей, близких к 0,95–1,00, продемонстрировав свою способность распознавать авторов, переписчиков или цензоров, а также обнаруживать неопубликованные свидетельства, имеющие высокую историческую и литературную ценность.
      ar: تم تقديم نهج حسابي للكشف عن أثر الكتابة اليدوية للكاتب في المجموعات الوثائقية الكبيرة من خلال تقنيات HTR المطبقة على التعرف على اليد. في تجربة للكتابة اليدوية لتوقيع لوبي دي فيغا، وصل النموذج إلى مقاييس قريبة من 0.95-1.00، مما يدل على قدرته على التعرف على المؤلفين أو الناسخين أو الرقباء واكتشاف الشهود غير المنشورين ذوي القيمة التاريخية والأدبية العالية.
    cited_by:



      - "Velasco Sainz, Adrián. “Aproximación a los rasgos de escritura de Pedro Francisco de Lanini y Sagredo en sus autógrafos teatrales: «El ángel de las escuelas, Santo Tomás de Aquino».” Anuario Lope de Vega. Texto, literatura, cultura, vol. 32, 2026."

      - "Nižníková, Lucia, y Michaela Mikušková. Digitálny príbeh Komenského učebnice Orbis pictus (1798). Banská Bystrica: Univerzitná knižnica Univerzity Mateja Bela v Banskej Bystrici, 2025. DOI: https://doi.org/10.24040/123456789-1266."

      - "Al-Jarf, R. Calligraphic Text Recognition by Gemini, Ernie ViLG and Google Translate: A Comparative Study of Arabic, Japanese and Chinese. Journal of Computer Science and Technology, 2025."

      - "Boadas, Sònia, y Marco Presotto. “La escritura teatral del Siglo de Oro a través de los manuscritos autógrafos.” Anuario Lope de Vega. Texto, literatura, cultura, vol. 32, 2026."


  - id: "FrancesaLaura"
    type: "article"
    title: "«La francesa Laura». El hallazgo de una nueva comedia del Lope de Vega último"
    authors: ["Álvaro Cuéllar", "Germán Vega García-Luengos"]
    publication: "Anuario Lope de Vega"
    volume: "XXIX"
    number:
    pages: "131-198"
    year: 2023
    url: "https://revistes.uab.cat/anuariolopedevega/article/view/v29-cuellar-vega-garcia-luengos"
    thumbnail: "/assets/images/pubs/francesalaura.png"
    abstract:
      es: "Se propone incorporar La francesa Laura al repertorio de Lope de Vega a partir de un manuscrito anónimo de la BNE. Los análisis con Transkribus y ETSO muestran una clara afinidad léxica con las obras del Fénix, reforzada por evidencias filológicas, métricas e históricas. El estudio confirma el potencial de las herramientas digitales para la investigación del teatro aurisecular."
      en: "The study proposes adding La francesa Laura to Lope de Vega's repertory on the basis of an anonymous manuscript held at the BNE. Analyses with Transkribus and ETSO show a clear lexical affinity with Lope's works, reinforced by philological, metrical, and historical evidence. The study confirms the potential of digital tools for research on early modern Spanish theatre."
      fr: L'étude propose d'ajouter La francesa Laura au répertoire de Lope de Vega sur la base d'un manuscrit anonyme conservé au BNE. Les analyses avec Transkribus et ETSO montrent une nette affinité lexicale avec les œuvres de Lope, renforcée par des preuves philologiques, métriques et historiques. L'étude confirme le potentiel des outils numériques pour la recherche sur le théâtre espagnol de l'époque moderne.
      pt: O estudo propõe acrescentar La francesa Laura ao repertório de Lope de Vega a partir de um manuscrito anônimo mantido no BNE. Análises com Transkribus e ETSO mostram uma clara afinidade lexical com as obras de Lope, reforçada por evidências filológicas, métricas e históricas. O estudo confirma o potencial das ferramentas digitais para a investigação do teatro espanhol da era moderna.
      it: Lo studio propone di aggiungere La francesa Laura al repertorio di Lope de Vega sulla base di un manoscritto anonimo conservato alla BNE. Le analisi con Transkribus ed ETSO mostrano una chiara affinità lessicale con le opere di Lope, rafforzata da prove filologiche, metriche e storiche. Lo studio conferma il potenziale degli strumenti digitali per la ricerca sul teatro spagnolo della prima età moderna.
      de: Die Studie schlägt vor, La francesa Laura auf der Grundlage eines anonymen Manuskripts, das im BNE aufbewahrt wird, in das Repertoire von Lope de Vega aufzunehmen. Analyses with Transkribus and ETSO show a clear lexical affinity with Lope's works, reinforced by philological, metrical, and historical evidence. Die Studie bestätigt das Potenzial digitaler Werkzeuge für die Erforschung des frühneuzeitlichen spanischen Theaters.
      zh: 该研究建议根据 BNE 保存的一份匿名手稿，将《法国劳拉》添加到洛佩·德·维加的剧目中。 Transkribus 和 ETSO 的分析表明，与洛普的作品在词汇上有明显的亲和力，并得到语言学、韵律和历史证据的强化。该研究证实了数字工具在早期现代西班牙戏剧研究中的潜力。
      ja: この研究は、BNEに保管されている匿名の原稿に基づいて、「La francesa Laura」をロペ・デ・ベガのレパートリーに追加することを提案しています。 Transkribus と ETSO による分析では、ロペの作品との語彙上の明確な親和性が示されており、これは文献学的、計量的、歴史的証拠によって裏付けられています。この研究は、スペイン近世演劇の研究におけるデジタルツールの可能性を裏付けています。
      ko: 이 연구는 BNE에 보관된 익명의 원고를 기반으로 Lope de Vega의 레퍼토리에 La francesa Laura를 추가할 것을 제안합니다. Transkribus 및 ETSO를 사용한 분석은 문헌학적, 운율적, 역사적 증거에 의해 강화된 Lope의 작품과 명확한 어휘적 유사성을 보여줍니다. 이 연구는 초기 현대 스페인 연극 연구를 위한 디지털 도구의 잠재력을 확인합니다.
      ru: В исследовании предлагается добавить «Французскую Лауру» в репертуар Лопе де Веги на основе анонимной рукописи, хранящейся в BNE. Анализы Transkribus и ETSO показывают явное лексическое сходство с произведениями Лопе, подкрепленное филологическими, метрическими и историческими свидетельствами. Исследование подтверждает потенциал цифровых инструментов для исследования испанского театра раннего Нового времени.
      ar: تقترح الدراسة إضافة La francesa Laura إلى مرجع Lope de Vega على أساس مخطوطة مجهولة المصدر محفوظة في BNE. تُظهر التحليلات التي أجريت مع Transkribus وETSO تقاربًا معجميًا واضحًا مع أعمال Lope، معززة بالأدلة اللغوية والمترية والتاريخية. تؤكد الدراسة إمكانات الأدوات الرقمية للبحث في المسرح الإسباني الحديث المبكر.
