  - id: "claramonte"
    type: "article"
    title: "Un nuevo repertorio dramático para Andrés de Claramonte"
    authors: ["Álvaro Cuéllar, Germán Vega García-Luengos"]
    publication: "Hipogrifo: Revista de Literatura y Cultura del Siglo de Oro"
    year: 2023
    volume: "XI"
    number: "1"
    pages: "117-172"
    isbn:
    url: "https://doi.org/10.13035/H.2023.11.01.09"
    thumbnail: "/assets/images/pubs/claramonte.png"
    abstract:
      es: "Se analizan 2.800 comedias del Siglo de Oro mediante técnicas estilométricas para aislar la huella autoral de Claramonte y definir un repertorio fiable. Los resultados vinculan al dramaturgo con 39 comedias y 7 autos, confirman autorías seguras (De lo vivo a lo pintado, Deste agua no beberé, La infelice Dorotea…) y respaldan atribuciones recientes como La estrella de Sevilla o Tan largo me lo fiáis."
      en: "A corpus of 2,800 Spanish Golden Age plays is analyzed with stylometric techniques to isolate Claramonte's authorial fingerprint and define a reliable repertory. The results link the playwright to 39 plays and 7 autos, confirm secure authorships (De lo vivo a lo pintado, Deste agua no beberé, La infelice Dorotea, among others), and support recent attributions such as La estrella de Sevilla and Tan largo me lo fiáis."
      fr: Un corpus de 2 800 pièces de théâtre espagnoles du Siècle d'Or est analysé à l'aide de techniques stylométriques afin d'isoler l'empreinte auctoriale de Claramonte et de définir un répertoire fiable. Les résultats associent le dramaturge à 39 pièces et 7 autos, confirment des paternités sûres (De lo vivo a lo pintado, Deste agua no beberé, La infelice Dorotea, entre autres) et soutiennent des attributions récentes telles que La estrella de Sevilla et Tan largo me lo fiáis.
      pt: Um corpus de 2.800 peças da Idade de Ouro espanhola é analisado com técnicas estilométricas para isolar a impressão digital autoral de Claramonte e definir um repertório confiável. Os resultados vinculam o dramaturgo a 39 peças e 7 automóveis, confirmam autorias seguras (De lo vivo a lo pintado, Deste agua no beberé, La infelice Dorotea, entre outras) e corroboram atribuições recentes como La estrella de Sevilla e Tan largo me lo fiáis.
      it: Un corpus di 2.800 opere teatrali spagnole del Secolo d'Oro viene analizzato con tecniche stilometriche per isolare l'impronta autoriale di Claramonte e definire un repertorio attendibile. I risultati collegano il drammaturgo a 39 opere teatrali e 7 autos, confermano paternità sicure (De lo vivo a lo pintado, Deste agua no beberé, La infelice Dorotea, tra gli altri) e supportano attribuzioni recenti come La estrella de Sevilla e Tan largo me lo fiáis.
      de: Ein Korpus von 2.800 spanischen Stücken des Goldenen Zeitalters wird mit stilometrischen Techniken analysiert, um Claramontes Autoren-Fingerabdruck zu isolieren und ein zuverlässiges Repertoire zu definieren. Die Ergebnisse bringen den Dramatiker mit 39 Theaterstücken und 7 Autoren in Verbindung, bestätigen sichere Autorenschaften (unter anderem „De lo vivo a lo pintado“, „Deste agua no beberé“, „La infelice Dorotea“) und stützen neuere Zuschreibungen wie „La estrella de Sevilla“ und „Tan largo me lo fiáis“.
      zh: 使用文体测量技术对包含 2,800 部西班牙黄金时代戏剧的语料库进行分析，以分离出克拉拉蒙特的作者指纹并定义可靠的剧目。结果将剧作家与 39 部戏剧和 7 部汽车联系起来，确认了可靠的作者身份（De lo vivo a lo pintado、Deste agua no beberé、La infelice Dorotea 等），并支持最近的归属，例如 La estrella de Sevilla 和 Tan largo me lo fiáis。
      ja: 2,800 のスペイン黄金時代の演劇のコーパスが、クララモンテの作者の指紋を分離し、信頼できるレパートリーを定義するために、スタイロメトリー技術を使用して分析されました。その結果、この劇作家と 39 の戯曲と 7 つの脚本が関連付けられ、確実な原作者であることが確認され (とりわけ、『デ・ロ・ヴィヴォ・ア・ロ・ピンタード』、『デステ・アグア・ノ・ベベレ』、『ラ・インフェリーチェ・ドロテア』など)、『ラ・エストレラ・デ・セビージャ』や『タン・ラルゴ・メ・ロ・フィアイス』などの最近の帰属も裏付けられています。
      ko: 2,800편의 스페인 황금기 희곡 모음집은 클라라몬테의 작가 지문을 분리하고 신뢰할 수 있는 레퍼토리를 정의하기 위해 문체 분석 기술을 사용하여 분석되었습니다. 결과는 극작가를 39개의 희곡과 7개의 자동차에 연결하고 안전한 저자임을 확인하며(De lo vivo a lo pintado, Deste agua no beberé, La infelice Dorotea 등) La estrella de Sevilla 및 Tan largo me lo fiáis와 같은 최근 속성을 뒷받침합니다.
      ru: С помощью стилометрических методов анализируется корпус из 2800 пьес Золотого века Испании, чтобы выделить авторский отпечаток Кларамонте и определить надежный репертуар. Результаты связывают драматурга с 39 пьесами и 7 автомобилями, подтверждают надежное авторство («De lo vivo a lo pintado», «Deste agua no beberé», «La infelice Dorotea» и др.) и подтверждают недавние авторства, такие как «La estrella de Sevilla» и «Tan largo me lo fiáis».
      ar: تم تحليل مجموعة مكونة من 2800 مسرحية من العصر الذهبي الإسباني باستخدام تقنيات قياس الأسلوب لعزل بصمة تأليف كلارامونتي وتحديد مرجع موثوق. تربط النتائج الكاتب المسرحي بـ 39 مسرحية و7 سيارات، وتؤكد التأليف الآمن (De lo vivo a lo pintado، Deste agua no beberé، La infelice Dorotea، من بين آخرين)، وتدعم الإسنادات الحديثة مثل La estrella de Sevilla وTan largo me lo fiáis.
