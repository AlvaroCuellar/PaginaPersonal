  - id: "crono"
    type: "article"
    title: "Cronología y estilometría: datación automática de comedias de Lope de Vega"
    authors: ["Álvaro Cuéllar"]
    publication: "Anuario Lope de Vega"
    volume: "XXIX"
    number:
    pages: "97-130"
    year: 2023
    url: "https://doi.org/10.5565/rev/anuariolopedevega.483"
    thumbnail: "/assets/images/pubs/crono.png"
    abstract:
      es: "Se aplica la estilometría a la datación de comedias del Siglo de Oro, empleando autógrafos de Lope de Vega con fecha conocida. El análisis de palabras, lemas y categorías gramaticales muestra una correlación entre estilo y cronología, con un error medio de ±5 años, reducido a ±4 en un corpus más amplio, lo que confirma el potencial de esta técnica para estimar fechas de composición."
      en: "Stylometry is applied to the dating of Spanish Golden Age plays, using dated autograph manuscripts by Lope de Vega. The analysis of words, lemmas, and grammatical categories shows a correlation between style and chronology, with an average error of ±5 years, reduced to ±4 in a larger corpus, confirming the potential of this technique for estimating dates of composition."
      fr: La stylométrie est appliquée à la datation des pièces de théâtre espagnoles de l'âge d'or, à l'aide de manuscrits autographes datés de Lope de Vega. L'analyse des mots, des lemmes et des catégories grammaticales montre une corrélation entre style et chronologie, avec une erreur moyenne de ±5 ans, réduite à ±4 dans un corpus plus large, confirmant le potentiel de cette technique pour estimer les dates de composition.
      pt: A estilometria é aplicada à datação de peças da Idade de Ouro espanhola, usando manuscritos autógrafos datados de Lope de Vega. A análise de palavras, lemas e categorias gramaticais mostra correlação entre estilo e cronologia, com erro médio de ±5 anos, reduzido para ±4 em um corpus maior, confirmando o potencial desta técnica para estimar datas de composição.
      it: La stilometria viene applicata alla datazione delle opere teatrali spagnole del Secolo d'oro, utilizzando manoscritti autografi datati di Lope de Vega. L'analisi di parole, lemmi e categorie grammaticali mostra una correlazione tra stile e cronologia, con un errore medio di ±5 anni, ridotto a ±4 in un corpus più ampio, confermando il potenziale di questa tecnica per la stima delle date di composizione.
      de: Stilometrie wird auf die Datierung spanischer Theaterstücke aus dem Goldenen Zeitalter angewendet, wobei datierte Autogrammmanuskripte von Lope de Vega verwendet werden. Die Analyse von Wörtern, Lemmata und grammatikalischen Kategorien zeigt eine Korrelation zwischen Stil und Chronologie mit einem durchschnittlichen Fehler von ±5 Jahren, der in einem größeren Korpus auf ±4 reduziert wird, was das Potenzial dieser Technik zur Schätzung von Kompositionsdaten bestätigt.
      zh: 文体测量法被应用于西班牙黄金时代戏剧的年代测定，使用的是洛普·德·维加（Lope de Vega）注明日期的亲笔手稿。对单词、引理和语法类别的分析显示了风格和年代之间的相关性，平均误差为±5年，在较大的语料库中减少到±4年，证实了该技术在估计作文日期方面的潜力。
      ja: スタイロメトリーは、ロペ・デ・ベガによる日付の記載されたサイン原稿を使用して、スペイン黄金時代の演劇の年代測定に適用されます。単語、補題、および文法カテゴリーの分析では、スタイルと編年の間に相関関係があることが示され、平均誤差は±5 年でしたが、より大きなコーパスでは±4 年に減少し、この手法が作曲日を推定する可能性があることが確認されました。
      ko: 날짜가 표시된 Lope de Vega의 자필 원고를 사용하여 스페인 황금기 연극의 연대 측정에 스타일로메트리를 적용했습니다. 단어, 기본형 및 문법 범주 분석에서는 문체와 연대기 사이의 상관관계가 ±5년의 평균 오류로 나타났으며, 더 큰 자료에서는 ±4로 감소하여 작성 날짜를 추정하기 위한 이 기술의 잠재력을 확인했습니다.
      ru: Стилометрия применяется для датировки пьес Золотого века Испании с использованием датированных рукописей с автографом Лопе де Веги. Анализ слов, лемм и грамматических категорий показывает корреляцию между стилем и хронологией со средней ошибкой ± 5 лет, уменьшающейся до ± 4 в более крупном корпусе, что подтверждает потенциал этого метода для оценки дат составления.
      ar: يتم تطبيق قياس الأسلوب على تأريخ مسرحيات العصر الذهبي الإسباني، وذلك باستخدام مخطوطات توقيع مؤرخة من تأليف لوبي دي فيغا. يُظهر تحليل الكلمات والمفردات والفئات النحوية وجود علاقة بين الأسلوب والتسلسل الزمني، مع متوسط ​​خطأ يبلغ ±5 سنوات، وقد تم تخفيضه إلى ±4 في مجموعة أكبر، مما يؤكد إمكانية هذه التقنية في تقدير تواريخ التكوين.
