  - id: "stylo100"
    type: "incollection"
    title: "Stylometry and Spanish Golden Age Theatre. An Evaluation of Authorship Attribution in a Control Group of One Hundred Undisputed Plays"
    authors:
      - "Álvaro Cuéllar"
    year: 2024
    url: "https://heiup.uni-heidelberg.de/catalog/book/1157/chapter/19368"
    publication: "Digital Stylistics in Romance Studies and Beyond"
    editor:
      - "Robert Hesselbach"
      - "José Calvo Tello"
      - "y otros"
    pages: "101-117"
    place: "Heidelberg"
    publisher: "Heidelberg University Publishing"
