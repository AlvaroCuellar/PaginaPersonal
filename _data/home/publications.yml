  - id: "tesis2022"
    type: "phdthesis"
    title: "Propuestas de autoría y datación en el teatro de Lope de Vega a la luz de la Inteligencia Artificial"
    authors: ["Álvaro Cuéllar"]
    year: 2022
    publisher: "University of Kentucky"
    place:
    isbn:
    url: "https://doi.org/10.13023/etd.2022.428"
    thumbnail: "/assets/images/pubs/tesis.png"
    abstract:
      es: "La tesis desarrolla métodos de inteligencia artificial y estilometría para analizar la autoría y cronología de las comedias de Lope de Vega. A partir de un corpus de miles de textos, propone nuevas atribuciones y dataciones automáticas, demostrando la eficacia de los modelos computacionales en la investigación filológica."
      en: "The dissertation develops artificial-intelligence and stylometric methods to analyze the authorship and chronology of Lope de Vega's plays. Based on a corpus of thousands of texts, it proposes new attributions and automatic datings, demonstrating the effectiveness of computational models in philological research."
      fr: La thèse développe des méthodes d'intelligence artificielle et stylométriques pour analyser la paternité et la chronologie des pièces de Lope de Vega. S'appuyant sur un corpus de milliers de textes, il propose de nouvelles attributions et datations automatiques, démontrant l'efficacité des modèles informatiques dans la recherche philologique.
      pt: A dissertação desenvolve métodos de inteligência artificial e estilométricos para analisar a autoria e a cronologia das peças de Lope de Vega. A partir de um corpus de milhares de textos, propõe novas atribuições e datações automáticas, demonstrando a eficácia dos modelos computacionais na pesquisa filológica.
      it: La tesi sviluppa metodi di intelligenza artificiale e stilometrici per analizzare la paternità e la cronologia delle opere di Lope de Vega. Basato su un corpus di migliaia di testi, propone nuove attribuzioni e datazioni automatiche, dimostrando l'efficacia dei modelli computazionali nella ricerca filologica.
      de: Die Dissertation entwickelt künstliche Intelligenz und stilometrische Methoden zur Analyse der Urheberschaft und Chronologie der Stücke von Lope de Vega. Basierend auf einem Korpus aus Tausenden von Texten schlägt es neue Zuschreibungen und automatische Datierungen vor und demonstriert die Wirksamkeit von Computermodellen in der philologischen Forschung.
      zh: 该论文开发了人工智能和文体计量学方法，用于分析洛佩·德·维加戏剧的作者身份和年代。它基于数千个文本的语料库，提出了新的归属判断和自动断代，证明了计算模型在文献学研究中的有效性。
      ja: この論文では、ロペ・デ・ベガの戯曲の作者と年代を分析するための人工知能とスタイロメトリーの手法を開発しています。数千のテキストのコーパスに基づいて、新しい帰属と自動年代測定を提案し、文献学研究における計算モデルの有効性を実証します。
      ko: 논문은 Lope de Vega 희곡의 저자와 연대기를 분석하기 위해 인공 지능과 문체 분석 방법을 개발합니다. 수천 개의 텍스트 모음을 기반으로 새로운 속성과 자동 연대 측정을 제안하여 문헌학 연구에서 컴퓨터 모델의 효율성을 보여줍니다.
      ru: В диссертации развиваются искусственный интеллект и стилометрические методы анализа авторства и хронологии пьес Лопе де Веги. На основе тысяч текстов он предлагает новые атрибуции и автоматические датировки, демонстрируя эффективность компьютерных моделей в филологических исследованиях.
      ar: تعمل الأطروحة على تطوير الذكاء الاصطناعي وأساليب قياس الأسلوب لتحليل التأليف والتسلسل الزمني لمسرحيات لوبي دي فيغا. استنادًا إلى مجموعة من آلاف النصوص، يقترح إسنادًا جديدًا وتواريخًا تلقائية، مما يدل على فعالية النماذج الحسابية في البحث اللغوي.
    cited_by:

