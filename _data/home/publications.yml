  - id: "PropuestasVelez"
    type: "inpress"
    title: "Propuestas novedosas para incrementar y depurar el repertorio dramático de Luis Vélez de Guevara"
    authors: ["Álvaro Cuéllar", "Javier J. González Martínez", "Germán Vega García-Luengos"]
    publication: "Revista de Literatura"
    volume:
    number:
    pages:
    year: 2026
    url:
    thumbnail: "/assets/images/pubs/prensa.png"
    abstract:
      es: "Este artículo aplica métodos de estilometría e inteligencia artificial para revisar el repertorio dramático de Luis Vélez de Guevara. Mediante modelos computacionales de atribución de autoría y análisis de similitud textual sobre un amplio corpus del teatro del Siglo de Oro, se proponen nuevas adscripciones y exclusiones dentro de su obra. Los resultados contribuyen a redefinir los límites del canon véleziano desde una perspectiva empírica y automatizada."
      en: "This article applies stylometric and artificial-intelligence methods to revise the dramatic repertory of Luis Vélez de Guevara. Through computational authorship-attribution models and textual-similarity analysis on a broad corpus of Spanish Golden Age theatre, it proposes new inclusions and exclusions within his oeuvre. The results help redefine the boundaries of the Velezian canon from an empirical and automated perspective."
      fr: Cet article applique des méthodes stylométriques et d’intelligence artificielle pour réviser le répertoire dramatique de Luis Vélez de Guevara. Grâce à des modèles informatiques d'attribution de paternité et à une analyse de similarité textuelle sur un large corpus du théâtre espagnol de l'âge d'or, il propose de nouvelles inclusions et exclusions au sein de son œuvre. Les résultats aident à redéfinir les limites du canon vélézien d'un point de vue empirique et automatisé.
      pt: Este artigo aplica métodos estilométricos e de inteligência artificial para revisar o repertório dramático de Luis Vélez de Guevara. Através de modelos computacionais de atribuição de autoria e de análises de similaridade textual num amplo corpus do teatro espanhol da Idade de Ouro, propõe novas inclusões e exclusões na sua obra. Os resultados ajudam a redefinir os limites do cânone veleziano a partir de uma perspectiva empírica e automatizada.
      it: Questo articolo applica metodi stilometrici e di intelligenza artificiale per rivedere il repertorio drammatico di Luis Vélez de Guevara. Attraverso modelli computazionali di attribuzione della paternità e analisi di similarità testuale su un ampio corpus di teatro spagnolo del Secolo d'Oro, propone nuove inclusioni ed esclusioni all'interno della sua opera. I risultati aiutano a ridefinire i confini del canone veleziano da una prospettiva empirica e automatizzata.
      de: Dieser Artikel wendet stilometrische und künstliche Intelligenzmethoden an, um das dramatische Repertoire von Luis Vélez de Guevara zu überarbeiten. Durch rechnergestützte Autorenschaftszuordnungsmodelle und Textähnlichkeitsanalysen an einem breiten Korpus des spanischen Theaters des Goldenen Zeitalters schlägt es neue Ein- und Ausschlüsse in seinem Oeuvre vor. Die Ergebnisse tragen dazu bei, die Grenzen des Vélezian-Kanons aus empirischer und automatisierter Perspektive neu zu definieren.
      zh: 本文应用文体测量和人工智能方法来修改路易斯·贝莱斯·德·格瓦拉的戏剧剧目。通过对西班牙黄金时代戏剧的广泛语料库进行计算作者归属模型和文本相似性分析，它提出了他的作品中新的包含和排除。结果有助于从经验和自动化的角度重新定义 Velezian 规范的边界。
      ja: この記事では、筆圧測定法と人工知能の手法を適用して、ルイス ベレス デ ゲバラの劇的なレパートリーを改訂します。スペイン黄金時代演劇の広範なコーパスに対する計算による作者帰属モデルとテキストの類似性分析を通じて、彼の作品内に新たな包含と除外を提案します。その結果は、経験的かつ自動化された観点からヴェレツィアの規範の境界を再定義するのに役立ちます。
      ko: 이 글은 루이스 벨레스 데 게바라(Luis Vélez de Guevara)의 극 레퍼토리를 수정하기 위해 문체분석법과 인공지능 방법을 적용했습니다. 스페인 황금기 연극의 광범위한 자료에 대한 계산적 저작자 귀속 모델과 텍스트 유사성 분석을 통해 그의 작품에 새로운 포함과 제외를 제안합니다. 결과는 경험적이고 자동화된 관점에서 Velezian 캐논의 경계를 재정의하는 데 도움이 됩니다.
      ru: В данной статье стилометрические методы и методы искусственного интеллекта применяются для пересмотра драматического репертуара Луиса Велеса де Гевары. С помощью вычислительных моделей атрибуции авторства и анализа текстового сходства на широком корпусе испанского театра Золотого века он предлагает новые включения и исключения в его творчестве. Результаты помогают переопределить границы велесианского канона с эмпирической и автоматизированной точки зрения.
      ar: تطبق هذه المقالة أساليب القياس الأسلوبي والذكاء الاصطناعي لمراجعة المخزون الدرامي للويس فيليز دي جيفارا. ومن خلال نماذج إسناد التأليف الحسابية وتحليل التشابه النصي على مجموعة واسعة من مسرح العصر الذهبي الإسباني، فإنه يقترح إدراجات واستثناءات جديدة في أعماله. تساعد النتائج في إعادة تعريف حدود القانون الفليزي من منظور تجريبي وآلي.
  - id: "writerid2026"
    type: "article"
    title: "Simple handwritten text recognition techniques for highly accurate writer identification"
    authors:
      - "Alejandro H. Toselli"
      - "Álvaro Cuéllar"
      - "Sònia Boadas"
      - "Enrique Vidal"
      - "Joan Andreu Sánchez"
    publication: "Pattern Analysis and Applications"
    volume: "29"
    number:
    pages: "144"
    year: 2026
    url: "https://doi.org/10.1007/s10044-026-01718-8"
    thumbnail: "/assets/images/pubs/writerid2026.png"
    abstract:
      es: "El artículo propone un sistema de identificación de escribas basado en técnicas simplificadas de reconocimiento automático de texto manuscrito. Los resultados muestran una elevada precisión en la diferenciación entre manuscritos autógrafos de Lope de Vega y copias de otras manos."
      en: "The article proposes a writer-identification system based on simplified handwritten text recognition techniques. The results show high accuracy in distinguishing between Lope de Vega's autograph manuscripts and copies written by other hands."

    




      fr: L'article propose un système d'identification des écrivains basé sur des techniques simplifiées de reconnaissance de textes manuscrits. Les résultats montrent une grande précision dans la distinction entre les manuscrits autographes de Lope de Vega et les copies écrites par d'autres mains.
      pt: O artigo propõe um sistema de identificação de escritor baseado em técnicas simplificadas de reconhecimento de texto manuscrito. Os resultados mostram alta precisão na distinção entre manuscritos autógrafos de Lope de Vega e cópias escritas por outras mãos.
      it: L'articolo propone un sistema di identificazione dello scrittore basato su tecniche semplificate di riconoscimento del testo scritto a mano. I risultati mostrano un'elevata precisione nel distinguere tra i manoscritti autografi di Lope de Vega e le copie scritte da altre mani.
      de: Der Artikel schlägt ein System zur Identifizierung von Autoren vor, das auf vereinfachten Techniken zur Erkennung handschriftlicher Texte basiert. Die Ergebnisse zeigen eine hohe Genauigkeit bei der Unterscheidung zwischen autographen Manuskripten von Lope de Vega und von anderen Händen verfassten Kopien.
      zh: 本文提出了一种基于简化手写文本识别技术的作者识别系统。结果表明，区分洛普·德·维加的亲笔手稿和其他人手写的抄本具有很高的准确性。
      ja: この記事では、簡略化された手書きテキスト認識技術に基づいた書き込み者識別システムを提案しています。その結果、ロペ・デ・ベガの直筆原稿と他の人が書いたコピーを高い精度で区別できることがわかりました。
      ko: 이 기사에서는 단순화된 필기 텍스트 인식 기술을 기반으로 한 작성자 식별 시스템을 제안합니다. 결과는 로페 데 베가의 자필 원고와 다른 사람이 쓴 사본을 구별하는 데 있어 높은 정확성을 보여줍니다.
      ru: В статье предлагается система идентификации писателей, основанная на упрощенных методиках распознавания рукописного текста. Результаты показывают высокую точность различия рукописей с автографом Лопе де Веги и копий, написанных другими руками.
      ar: تقترح المقالة نظامًا لتحديد هوية الكاتب يعتمد على تقنيات مبسطة للتعرف على النص المكتوب بخط اليد. أظهرت النتائج دقة عالية في التمييز بين مخطوطات توقيع لوبي دي فيغا والنسخ المكتوبة بأيدٍ أخرى.
  - id: "examenautorías"
    type: "inpress"
    title: "Examen de autorías en el teatro del Siglo de Oro"
    authors: ["Álvaro Cuéllar", "Germán Vega García-Luengos"]
    Publisher: "Edition Reichenberger"
    pages:
    year: 2026
    url:
    thumbnail: "/assets/images/pubs/prensa.png"
    abstract:
      es: "Monografía dedicada al análisis de la autoría en el teatro del Siglo de Oro mediante métodos filológicos y computacionales. Se ofrecen estudios sobre más de 3.000 obras, tanto completas como por jornadas, con atribuciones inéditas y resultados novedosos en la identificación de dramaturgos."
      en: "A monograph devoted to the analysis of authorship in Spanish Golden Age theatre through philological and computational methods. It offers studies of more than 3,000 works, both complete plays and individual jornadas, with unpublished attributions and new results in playwright identification."
      fr: Une monographie consacrée à l'analyse de la paternité dans le théâtre espagnol du Siècle d'Or à travers des méthodes philologiques et informatiques. Il propose des études de plus de 3 000 œuvres, tant des pièces complètes que des jornadas individuelles, avec des attributions inédites et de nouveaux résultats dans l'identification des auteurs dramatiques.
      pt: Monografia dedicada à análise da autoria no teatro espanhol da Idade de Ouro através de métodos filológicos e computacionais. Oferece estudos de mais de 3.000 obras, tanto peças completas quanto jornadas individuais, com atribuições inéditas e novos resultados na identificação de dramaturgos.
      it: Una monografia dedicata all'analisi della paternità nel teatro spagnolo del Secolo d'Oro attraverso metodi filologici e computazionali. Offre studi su oltre 3.000 opere, sia opere complete che singole jornadas, con attribuzioni inedite e nuovi risultati nell'identificazione del drammaturgo.
      de: Eine Monographie, die sich der Analyse der Autorenschaft im spanischen Theater des Goldenen Zeitalters mit philologischen und rechnerischen Methoden widmet. Es bietet Studien zu mehr als 3.000 Werken, sowohl vollständigen Theaterstücken als auch einzelnen Jornadas, mit unveröffentlichten Zuschreibungen und neuen Ergebnissen bei der Identifizierung von Dramatikern.
      zh: 一本致力于通过语言学和计算方法分析西班牙黄金时代戏剧作者身份的专着。它提供了 3,000 多部作品的研究，包括完整的戏剧和个人短剧，以及未发表的归属和剧作家鉴定的新结果。
      ja: スペイン黄金時代の演劇における作家性を文献学的および計算的手法を通じて分析することに特化したモノグラフ。完全な劇と個々のジョルナダの両方を含む 3,000 を超える作品の研究が提供され、未発表の帰属と劇作家の特定に関する新しい結果が提供されます。
      ko: 문헌학적, 컴퓨터적 방법을 통해 스페인 황금기 연극의 저작자 분석을 다룬 논문입니다. 이는 전편과 개별 조나다를 포함한 3,000개 이상의 작품에 대한 연구를 제공하며, 미발표 속성과 극작가 식별에 대한 새로운 결과를 제공합니다.
      ru: Монография, посвященная анализу авторства в театре Золотого века Испании с помощью филологических и компьютерных методов. Он предлагает исследования более 3000 произведений, как полных пьес, так и отдельных хорнад, с неопубликованными авторствами и новыми результатами в идентификации драматургов.
      ar: دراسة مخصصة لتحليل التأليف في مسرح العصر الذهبي الإسباني من خلال الأساليب اللغوية والحسابية. ويقدم دراسات لأكثر من 3000 عمل، سواء مسرحيات كاملة أو فردية، مع إسناد غير منشور ونتائج جديدة في تحديد هوية الكاتب المسرحي.
    cited_by:
      - "Kroll, Simón, y Fernando Sanz-Lázaro. “Ritmo e inteligencia artificial: nuevas perspectivas sobre teatro lopesco desde las Humanidades Digitales.” Anuario Lope de Vega. Texto, literatura, cultura, vol. 29, 2023, pp. 351–375."
      - "Albrecht, Jane W. “An Overview of Stylometry and Its Application to the Comedia.” Bulletin of the Comediantes, vol. 74, no. 1, 2022, pp. 351–372."






  - id: "writervalencia"
    type: "incollection"
    title: "Writer Identification Using Simplified Handwritten Text Recognition Models"
    authors: ["Alejandro H.Toselli", "Álvaro Cuéllar", "Sònia Boadas", "Enrique Vidal", "Joan Andreu Sánchez"]
    publication: "Pattern Recognition and Image Analysis. IbPRIA"
    place:
    year: 2025
    volume: "15937"
    number:
    pages: "254-267"
    isbn:
    url: "https://doi.org/10.1007/978-3-031-99565-1_20"
    thumbnail: "/assets/images/pubs/writervalencia.png"
    abstract:
      es: "En este artículo se presenta un enfoque automático de identificación de escribas que combina redes neuronales profundas convolucionales y recurrentes con modelos de lenguaje n-grama en un marco probabilístico de clasificación. Los experimentos preliminares muestran la eficacia del método para distinguir entre manuscritos autógrafos de Lope de Vega y copias de otras manos."
      en: "This article presents an automatic approach to writer identification that combines deep convolutional and recurrent neural networks with n-gram language models in a probabilistic classification framework. Preliminary experiments show the effectiveness of the method for distinguishing between Lope de Vega's autograph manuscripts and copies written by other hands."
      fr: Cet article présente une approche automatique de l'identification des écrivains qui combine des réseaux neuronaux convolutifs et récurrents profonds avec des modèles de langage n-gram dans un cadre de classification probabiliste. Des expériences préliminaires montrent l'efficacité de la méthode permettant de distinguer les manuscrits autographes de Lope de Vega des copies écrites par d'autres mains.
      pt: Este artigo apresenta uma abordagem automática para identificação de escritores que combina redes neurais convolucionais profundas e recorrentes com modelos de linguagem n-gram em uma estrutura de classificação probabilística. Experimentos preliminares mostram a eficácia do método para distinguir entre manuscritos autógrafos de Lope de Vega e cópias escritas por outras mãos.
      it: Questo articolo presenta un approccio automatico all'identificazione dello scrittore che combina reti neurali convoluzionali e ricorrenti profonde con modelli linguistici n-gram in un quadro di classificazione probabilistica. Esperimenti preliminari mostrano l'efficacia del metodo per distinguere tra i manoscritti autografi di Lope de Vega e le copie scritte da altre mani.
      de: In diesem Artikel wird ein automatischer Ansatz zur Autorenidentifizierung vorgestellt, der tiefe Faltungs- und wiederkehrende neuronale Netze mit N-Gramm-Sprachmodellen in einem probabilistischen Klassifizierungsrahmen kombiniert. Vorläufige Experimente zeigen die Wirksamkeit der Methode zur Unterscheidung zwischen autographen Manuskripten von Lope de Vega und von anderen Händen verfassten Kopien.
      zh: 本文提出了一种自动识别作者的方法，该方法将深度卷积和循环神经网络与概率分类框架中的 n-gram 语言模型相结合。初步实验表明该方法在区分洛佩·德·维加的亲笔手稿和其他人手写的抄本方面是有效的。
      ja: この記事では、深層畳み込みニューラル ネットワークとリカレント ニューラル ネットワークを確率的分類フレームワークの N グラム言語モデルと組み合わせて、ライターを識別するための自動アプローチを紹介します。予備実験では、ロペ・デ・ベガの直筆原稿と他の人が書いたコピーを区別する方法の有効性が示された。
      ko: 이 기사에서는 확률적 분류 프레임워크에서 심층 컨벌루션 및 순환 신경망을 n-gram 언어 모델과 결합하는 작가 식별에 대한 자동 접근 방식을 제시합니다. 예비 실험에서는 로페 데 베가의 친필 원고와 다른 사람이 쓴 사본을 구별하는 방법의 효율성이 입증되었습니다.
      ru: В этой статье представлен автоматический подход к идентификации писателей, который сочетает в себе глубокие сверточные и рекуррентные нейронные сети с n-граммными языковыми моделями в рамках вероятностной классификации. Предварительные эксперименты показывают эффективность метода отличия рукописей с автографом Лопе де Веги от копий, написанных другими руками.
      ar: تقدم هذه المقالة طريقة تلقائية لتحديد هوية الكاتب تجمع بين الشبكات العصبية التلافيفية العميقة والمتكررة ونماذج لغة n-gram في إطار تصنيف احتمالي. تظهر التجارب الأولية فعالية طريقة التمييز بين مخطوطات توقيع لوبي دي فيغا والنسخ المكتوبة بأيدٍ أخرى.
    cited_by:
  - id: "bandolero"
    type: "article"
    title: "Crece el repertorio de Calderón con «El bandolero Solposto», una nueva comedia en colaboración"
    authors:
      - "Álvaro Cuéllar"
      - "Germán Vega García-Luengos"
    publication: "Anuario Calderoniano"
    volume: "18"
    number:
    pages: "59–83"
    year: 2025
    url: "https://recyt.fecyt.es/index.php/acal/article/view/115157"
    thumbnail: "/assets/images/pubs/astro.jpg"
    abstract:
      es: "Las herramientas digitales han proporcionado los primeros indicios de que al repertorio calderoniano habría que sumarle una comedia colaborada más. Calderón sería el verdadero responsable de la primera jornada de «El bandolero Solposto», atribuida a Cáncer, Rosete y Rojas Zorrilla en la edición de la Parte XXXII de Nuevas escogidas (1669). Los resultados de estilometría léxica confirman la afinidad con sus pautas de escritura, sus usos métricos y su sistema expresivo, destacando el elevado número de estilemas calderonianos detectados."
      en: "Digital tools have provided the first indications that one more collaborative play should be added to the Calderonian repertory. Calderón appears to be the true author of the first jornada of El bandolero Solposto, attributed to Cáncer, Rosete, and Rojas Zorrilla in the edition of Parte XXXII de Nuevas escogidas (1669). Lexical stylometry confirms its affinity with his writing patterns, metrical habits, and expressive system, highlighting the large number of Calderonian style markers detected."



      fr: Les outils numériques ont fourni les premières indications selon lesquelles une pièce collaborative supplémentaire devrait être ajoutée au répertoire calderonien. Calderón semble être le véritable auteur de la première jornada d'El bandolero Solposto, attribuée à Cáncer, Rosete et Rojas Zorrilla dans l'édition de la Part XXXII de Nuevas escogidas (1669). La stylométrie lexicale confirme son affinité avec ses modèles d'écriture, ses habitudes métriques et son système expressif, mettant en évidence le grand nombre de marqueurs de style calderonien détectés.
      pt: As ferramentas digitais deram os primeiros indícios de que mais uma peça colaborativa deveria ser acrescentada ao repertório calderoniano. Calderón parece ser o verdadeiro autor da primeira jornada de El bandolero Solposto, atribuída a Cáncer, Rosete e Rojas Zorrilla na edição da Parte XXXII de Nuevas escogidas (1669). A estilometria lexical confirma sua afinidade com seus padrões de escrita, hábitos métricos e sistema expressivo, destacando o grande número de marcadores de estilo calderonianos detectados.
      it: Gli strumenti digitali hanno fornito le prime indicazioni che un altro spettacolo collaborativo dovrebbe essere aggiunto al repertorio calderoniano. Calderón sembra essere il vero autore della prima jornada di El bandolero Solposto, attribuita a Cáncer, Rosete e Rojas Zorrilla nell'edizione della Parte XXXII de Nuevas escogidas (1669). La stilometria lessicale conferma la sua affinità con i suoi modelli di scrittura, le abitudini metriche e il sistema espressivo, evidenziando il gran numero di indicatori di stile calderoniano rilevati.
      de: Digitale Tools haben erste Hinweise darauf geliefert, dass das Calderon-Repertoire um ein weiteres gemeinschaftliches Stück erweitert werden sollte. Calderón scheint der wahre Autor der ersten Jornada von El bandolero Solposto zu sein, die Cáncer, Rosete und Rojas Zorrilla in der Ausgabe von Parte XXXII de Nuevas escogidas (1669) zugeschrieben wird. Die lexikalische Stilometrie bestätigt ihre Affinität zu seinen Schreibmustern, metrischen Gewohnheiten und seinem Ausdruckssystem und unterstreicht die große Anzahl der entdeckten calderonischen Stilmerkmale.
      zh: 数字工具已经初步表明，应该在卡尔德隆的剧目中添加更多的合作剧目。卡尔德隆似乎是《El bandolero Solposto》第一部 jornada 的真正作者，该作品由 Cancer、Rosete 和 Rojas Zorrilla 在 Parte XXXII de Nuevas escogidas (1669) 版本中创作。词汇文体测定法证实了其与他的写作模式、韵律习惯和表达系统的密切关系，突出了检测到的大量卡尔德隆风格标记。
      ja: デジタル ツールは、カルデロニアのレパートリーにもう 1 つの共同劇を追加する必要があるという最初の兆候を提供しました。カルデロンは、第 32 部ヌエバス・エスコギダス版 (1669 年) の中で、カンセル、ロステ、​​ロハス・ソリーリャの作とされている、『バンドレロ・ソルポスト』の最初のジョルナダの真の作者であるようです。語彙スタイロメトリーは、彼の筆記パターン、韻律の習慣、および表現システムとの親和性を確認し、検出された多数のカルデロン様式のマーカーを強調しています。
      ko: 디지털 도구는 칼데로니안 레퍼토리에 공동 극이 하나 더 추가되어야 한다는 첫 번째 징후를 제공했습니다. Calderón은 Parte XXXII de Nuevas escogidas(1669) 판에서 Cáncer, Rosete 및 Rojas Zorrilla가 쓴 El bandolero Solposto의 첫 번째 jornada의 진정한 저자인 것으로 보입니다. 어휘 스타일로메트리는 그의 글쓰기 패턴, 운율 습관 및 표현 시스템과의 유사성을 확인하여 감지된 수많은 칼데로니안 스타일 마커를 강조합니다.
      ru: Цифровые инструменты дали первые признаки того, что в репертуар Кальдерона следует добавить еще одну совместную пьесу. Кальдерон, по-видимому, является истинным автором первой хорнады Elbandolero Solposto, приписываемой Раку, Розете и Рохасу Соррилье в издании Parte XXXII de Nuevas escogidas (1669). Лексическая стилометрия подтверждает свою близость к его образцам письма, метрическим привычкам и выразительной системе, подчеркивая большое количество обнаруженных маркеров кальдеронского стиля.
      ar: لقد قدمت الأدوات الرقمية المؤشرات الأولى التي تشير إلى ضرورة إضافة مسرحية تعاونية أخرى إلى ذخيرة كالديرون. يبدو أن كالديرون هو المؤلف الحقيقي للكتاب الأول من El bandolero Solposto، المنسوب إلى كانسر وروزيتي وروجاس زوريلا في طبعة الجزء الثاني والثلاثين من نويفاس إسكوجيداس (1669). يؤكد قياس الأسلوب المعجمي تقاربه مع أنماط كتابته، وعاداته الوزنية، ونظامه التعبيري، مما يسلط الضوء على العدد الكبير من علامات الأسلوب الكالديروني المكتشفة.
  - id: "xviicatalanprints"
    type: "model"
    title: "XVII Catalan Prints"
    publication: "Transkribus"

    authors: ["Anaïs Freixes Castells", "Álvaro Cuéllar"]
    year: 2025
    url:
    thumbnail: "/assets/images/pubs/model.png"
    abstract:
      es: "Modelo de inteligencia artificial entrenado para la transcripción automática de impresos catalanes del siglo XVII en letra redonda. Entrenado con 137.338 palabras (18.519 líneas), alcanza una tasa de error del 1,63 % y permite conservar la ortografía original de los textos, facilitando la digitalización del patrimonio documental catalán."
      en: "Artificial-intelligence model trained for the automatic transcription of seventeenth-century Catalan prints in roman type. Trained on 137,338 words (18,519 lines), it achieves an error rate of 1.63% and preserves the original spelling of the texts, facilitating the digitization of Catalan documentary heritage."

      fr: Modèle d'intelligence artificielle formé pour la transcription automatique d'estampes catalanes du XVIIe siècle en caractères romains. Formé sur 137.338 mots (18.519 lignes), il atteint un taux d'erreur de 1,63% et préserve l'orthographe originale des textes, facilitant la numérisation du patrimoine documentaire catalan.
      pt: Modelo de inteligência artificial treinado para a transcrição automática de gravuras catalãs do século XVII em tipo romano. Treinado em 137.338 palavras (18.519 linhas), atinge uma taxa de erro de 1,63% e preserva a grafia original dos textos, facilitando a digitalização do patrimônio documental catalão.
      it: Modello di intelligenza artificiale addestrato per la trascrizione automatica di stampe catalane del XVII secolo in caratteri romani. Formato su 137.338 parole (18.519 righe), raggiunge un tasso di errore dell'1,63% e preserva l'ortografia originale dei testi, facilitando la digitalizzazione del patrimonio documentario catalano.
      de: Künstliches Intelligenzmodell, das für die automatische Transkription katalanischer Drucke des 17. Jahrhunderts in römischer Schrift trainiert wurde. Basierend auf 137.338 Wörtern (18.519 Zeilen) erreicht es eine Fehlerquote von 1,63 % und behält die ursprüngliche Schreibweise der Texte bei, was die Digitalisierung des katalanischen Dokumentationserbes erleichtert.
      zh: 人工智能模型经过训练，可以自动转录 17 世纪加泰罗尼亚印刷品的罗马字体。经过 137,338 个单词（18,519 行）的训练，错误率达到 1.63%，并保留了文本的原始拼写，促进了加泰罗尼亚文献遗产的数字化。
      ja: 17 世紀のカタルーニャ語版画をローマ字で自動転写するためにトレーニングされた人工知能モデル。 137,338 単語 (18,519 行) でトレーニングされ、エラー率 1.63% を達成し、テキストの元のスペルが保存されるため、カタルーニャ語のドキュメンタリー遺産のデジタル化が容易になります。
      ko: 17세기 카탈로니아어 인쇄물을 로마자로 자동 전사하도록 훈련된 인공 지능 모델입니다. 137,338개 단어(18,519줄)로 훈련되어 1.63%의 오류율을 달성하고 텍스트의 원래 철자를 보존하여 카탈로니아 기록유산의 디지털화를 촉진합니다.
      ru: Модель искусственного интеллекта, обученная автоматической транскрипции каталонских гравюр семнадцатого века латинским шрифтом. Обученный на 137 338 словах (18 519 строк), он достигает уровня ошибок 1,63% и сохраняет оригинальное написание текстов, что облегчает оцифровку каталонского документального наследия.
      ar: نموذج الذكاء الاصطناعي الذي تم تدريبه على النسخ التلقائي للمطبوعات الكاتالونية في القرن السابع عشر بالخط الروماني. تم تدريبه على 137,338 كلمة (18,519 سطرًا)، ويحقق معدل خطأ قدره 1.63% ويحافظ على التهجئة الأصلية للنصوص، مما يسهل رقمنة التراث الوثائقي الكاتالوني.
  - id: "xviicatalanprintsmodern"
    type: "model"
    publication: "Transkribus"

    title: "XVII Catalan Prints (Spelling modernization)"
    authors: ["Anaïs Freixes Castells", "Álvaro Cuéllar"]
    year: 2025
    url:
    thumbnail: "/assets/images/pubs/model.png"
    abstract:
      es: "Modelo de transcripción automática con modernización ortográfica para impresos catalanes del siglo XVII. Entrenado con 165.096 palabras (22.219 líneas), alcanza un error del 3,41 %. Permite obtener versiones normalizadas de los textos antiguos, optimizando su lectura y análisis filológico."
      en: "Automatic transcription model with spelling modernization for seventeenth-century Catalan prints. Trained on 165,096 words (22,219 lines), it achieves an error rate of 3.41%. It produces normalized versions of early texts, optimizing their reading and philological analysis."




      fr: Modèle de transcription automatique avec modernisation orthographique des estampes catalanes du XVIIe siècle. Formé sur 165 096 mots (22 219 lignes), il atteint un taux d'erreur de 3,41 %. Il produit des versions normalisées des premiers textes, optimisant leur lecture et leur analyse philologique.
      pt: Modelo de transcrição automática com modernização ortográfica para gravuras catalãs do século XVII. Treinado em 165.096 palavras (22.219 linhas), atinge uma taxa de erro de 3,41%. Produz versões normalizadas de textos antigos, otimizando sua leitura e análise filológica.
      it: Modello di trascrizione automatica con ammodernamento ortografico per le stampe catalane del XVII secolo. Addestrato su 165.096 parole (22.219 righe), raggiunge un tasso di errore del 3,41%. Produce versioni normalizzate dei primi testi, ottimizzandone la lettura e l'analisi filologica.
      de: Automatisches Transkriptionsmodell mit Rechtschreibmodernisierung für katalanische Drucke des 17. Jahrhunderts. Auf 165.096 Wörtern (22.219 Zeilen) trainiert, erreicht es eine Fehlerquote von 3,41 %. Es erstellt normalisierte Versionen früher Texte und optimiert deren Lektüre und philologische Analyse.
      zh: 自动转录模型，具有十七世纪加泰罗尼亚印刷品的拼写现代化。经过 165,096 个单词（22,219 行）的训练，其错误率为 3.41%。它生成早期文本的标准化版本，优化它们的阅读和语言学分析。
      ja: 17 世紀のカタルーニャ語版画のスペルを最新化した自動転写モデル。 165,096 ワード (22,219 行) でトレーニングされた結果、エラー率は 3.41% に達しました。初期のテキストの正規化されたバージョンを生成し、その読み取りと文献学的分析を最適化します。
      ko: 17세기 카탈로니아어 판화에 대한 철자 현대화를 갖춘 자동 전사 모델입니다. 165,096단어(22,219줄)를 학습하여 3.41%의 오류율을 달성합니다. 초기 텍스트의 정규화된 버전을 생성하여 읽기 및 언어학적 분석을 최적화합니다.
      ru: Модель автоматической транскрипции с модернизацией орфографии для каталонских гравюр семнадцатого века. Обученный на 165 096 словах (22 219 строк), он достигает уровня ошибок 3,41%. Он создает нормализованные версии ранних текстов, оптимизируя их чтение и филологический анализ.
      ar: نموذج النسخ التلقائي مع التحديث الإملائي للمطبوعات الكاتالونية في القرن السابع عشر. تم تدريبه على 165,096 كلمة (22,219 سطرًا)، وحقق معدل خطأ قدره 3.41%. وينتج نسخًا طبيعية من النصوص المبكرة، مما يؤدي إلى تحسين قراءتها وتحليلها اللغوي.
  - id: "modernisa"
    type: "article"
    title: "The Moderniſa Project: orthographic modernization of Spanish golden age dramas with language models"
    authors: ["Javier de la Rosa, Álvaro Cuéllar, Jörg Lehmann"]
    publication: "Anuario Lope de Vega Texto literatura cultura"
    year: 2024
    volume: "XXX"
    number:
    pages: "410-425"
    isbn:
    url: "https://doi.org/10.5565/rev/anuariolopedevega.530"
    thumbnail: "/assets/images/pubs/modernisa.jpg"
    abstract:
      es: "Se presenta el primer uso de técnicas de PLN para modernizar automáticamente textos del Siglo de Oro (ca. 1590–1680) hacia un español normalizado (RAE 2010). Mediante modelos transformadores entrenados con comedias, se obtiene un buen desempeño en dependencias contextuales y signos tipográficos, con limitaciones en nombres propios y variantes ortográficas. La herramienta demuestra un alto potencial para la filología y las humanidades digitales."
      en: "The article presents the first use of NLP techniques to automatically modernize Spanish Golden Age texts (ca. 1590–1680) into normalized Spanish (RAE 2010). Using transformer models trained on comedias, it achieves good performance with contextual dependencies and typographical signs, with limitations regarding proper names and spelling variants. The tool shows strong potential for philology and the digital humanities."
      fr: L'article présente la première utilisation des techniques de PNL pour moderniser automatiquement les textes espagnols de l'âge d'or (vers 1590-1680) en espagnol normalisé (RAE 2010). En utilisant des modèles de transformateurs formés sur des comédies, il obtient de bonnes performances avec les dépendances contextuelles et les signes typographiques, avec des limitations concernant les noms propres et les variantes orthographiques. L’outil présente un fort potentiel pour la philologie et les humanités numériques.
      pt: O artigo apresenta o primeiro uso de técnicas de PNL para modernizar automaticamente textos espanhóis da Idade de Ouro (ca. 1590–1680) para espanhol normalizado (RAE 2010). Utilizando modelos transformadores treinados em comédias, obtém bom desempenho com dependências contextuais e sinais tipográficos, com limitações quanto a nomes próprios e variantes ortográficas. A ferramenta mostra um forte potencial para a filologia e as humanidades digitais.
      it: L'articolo presenta il primo utilizzo di tecniche di PNL per modernizzare automaticamente i testi spagnoli dell'età dell'oro (1590–1680 circa) in spagnolo normalizzato (RAE 2010). Utilizzando modelli di trasformazione addestrati sulle commedie, ottiene buone prestazioni con dipendenze contestuali e segni tipografici, con limitazioni relative ai nomi propri e alle varianti ortografiche. Lo strumento mostra un forte potenziale per la filologia e le discipline umanistiche digitali.
      de: Der Artikel stellt den ersten Einsatz von NLP-Techniken zur automatischen Modernisierung spanischer Texte des Goldenen Zeitalters (ca. 1590–1680) in normalisiertes Spanisch vor (RAE 2010). Mithilfe von auf Komödien trainierten Transformatormodellen erreicht es eine gute Leistung bei kontextuellen Abhängigkeiten und typografischen Zeichen, mit Einschränkungen hinsichtlich Eigennamen und Schreibvarianten. Das Tool zeigt großes Potenzial für die Philologie und die Digital Humanities.
      zh: 本文首次使用 NLP 技术自动将西班牙黄金时代文本（约 1590-1680 年）现代化为规范化西班牙语（RAE 2010）。使用在喜剧上训练的 Transformer 模型，它在上下文依赖性和印刷符号方面取得了良好的性能，但在专有名称和拼写变体方面存在限制。该工具显示出语言学和数字人文的强大潜力。
      ja: この記事では、スペイン語黄金時代のテキスト (約 1590 ～ 1680 年) を標準化されたスペイン語に自動的に現代化するための NLP 技術の最初の使用法を紹介しています (RAE 2010)。コメディーでトレーニングされたトランスフォーマー モデルを使用することで、固有名と綴りのバリエーションに関する制限はありますが、文脈依存性と活字記号で優れたパフォーマンスを実現します。このツールは、文献学とデジタル人文科学にとって大きな可能性を示しています。
      ko: 이 기사에서는 스페인어 황금기 텍스트(약 1590~1680년)를 정규화된 스페인어(RAE 2010)로 자동 현대화하기 위한 NLP 기술의 첫 번째 사용을 제시합니다. 코미디언에 대해 훈련된 변환기 모델을 사용하여 고유명사 및 철자 변형에 관한 제한 사항을 포함하여 문맥적 종속성 및 인쇄 기호로 우수한 성능을 달성합니다. 이 도구는 문헌학과 디지털 인문학에 대한 강력한 잠재력을 보여줍니다.
      ru: В статье представлено первое использование техник НЛП для автоматической модернизации текстов испанского Золотого века (ок. 1590–1680) в нормализованный испанский язык (RAE 2010). Используя модели-трансформеры, обученные на комедиях, достигается хорошая производительность с контекстными зависимостями и типографскими знаками, с ограничениями по именам собственным и вариантам написания. Инструмент демонстрирует большой потенциал для филологии и цифровых гуманитарных наук.
      ar: يعرض هذا المقال أول استخدام لتقنيات البرمجة اللغوية العصبية لتحديث نصوص العصر الذهبي الإسباني (حوالي 1590-1680) تلقائيًا إلى اللغة الإسبانية الطبيعية (RAE 2010). باستخدام نماذج المحولات المدربة على الأفلام الكوميدية، فإنه يحقق أداءً جيدًا مع التبعيات السياقية والعلامات المطبعية، مع قيود تتعلق بالأسماء الصحيحة ومتغيرات التهجئة. تُظهر الأداة إمكانات قوية لعلم فقه اللغة والعلوم الإنسانية الرقمية.
    cited_by:
      - "Bengoetxea, Jaione, Itziar Gonzalez-Dios, and Rodrigo Agerri. “Lost in Variation? Evaluating NLI Performance in Basque and Spanish Geographical Variants.” arXiv preprint arXiv:2506.15239, 2025."
      - "Guzenko, Sofía Oleksandrivna. Papel de los tropos en la creación del retrato del personaje en la obra artística española. Trabajo Final de Máster, Departamento de Filología Hispánica, Neogriega y Traducción, Universidad Nacional Lingüística de Kyiv, Ministerio de Educación y Ciencia de Ucrania, 2024. Tutora académica: Skrobot Alla Ivanivna. Jefe de departamento: Zalesnova O. V."





      - "Ehrmanntraut, Anton. “Historical German Text Normalization Using Type- and Token-Based Language Modeling.” arXiv preprint arXiv:2409.02841, 2024."
      - "Hatzel, Hans Ole, Haimo Stiemer, Chris Biemann, and Evelyn Gius. “Machine Learning in Computational Literary Studies.” it-Information Technology, vol. 65, no. 4-5, 2023, pp. 200-217."

  - id: "queridogerman2024"
    type: "incollection"
    title: "Querido Germán: un experimento estilométrico sobre el tamaño de los textos en un corpus de correspondencia digital"
    authors:
      - "Álvaro Cuéllar"
    year: 2024
    publication: "Un caballero para Olmedo. Homenaje al profesor Germán Vega García-Luengos"
    editor:
      - "Gema Cienfuegos Antelo"
      - "Javier J. González Martínez"
      - "y otros"
    publisher: "Ediciones de la Universidad de Valladolid"
    pages: "277–286"
    isbn:
    url: "https://www.academia.edu/122478284/Querido_Germ%C3%A1n_un_experimento_estilom%C3%A9trico_sobre_el_tama%C3%B1o_de_los_textos_en_un_corpus_de_correspondencia_digital"
    thumbnail: "/assets/images/pubs/german.png"
    abstract:
      es: "El capítulo presenta un experimento estilométrico sobre la correspondencia digital entre Álvaro Cuéllar y Germán Vega, con el objetivo de comprobar si la estilometría puede identificar la autoría de mensajes breves. A pesar de la reducida extensión de los correos, los resultados muestran una notable capacidad clasificatoria de ciertos algoritmos de inteligencia artificial aplicados al estilo individual."
      en: "The chapter presents a stylometric experiment on the digital correspondence between Álvaro Cuéllar and Germán Vega, aimed at testing whether stylometry can identify the authorship of short messages. Despite the limited length of the emails, the results show a notable classificatory capacity in certain artificial-intelligence algorithms applied to individual style."

    

     
      fr: Le chapitre présente une expérience stylométrique sur la correspondance numérique entre Álvaro Cuéllar et Germán Vega, visant à tester si la stylométrie peut identifier la paternité de messages courts. Malgré la longueur limitée des emails, les résultats montrent une capacité classificatoire notable de certains algorithmes d’intelligence artificielle appliqués au style individuel.
      pt: O capítulo apresenta um experimento estilométrico sobre a correspondência digital entre Álvaro Cuéllar e Germán Vega, com o objetivo de testar se a estilometria pode identificar a autoria de mensagens curtas. Apesar da extensão limitada dos e-mails, os resultados mostram uma notável capacidade classificatória em determinados algoritmos de inteligência artificial aplicados ao estilo individual.
      it: Il capitolo presenta un esperimento stilometrico sulla corrispondenza digitale tra Álvaro Cuéllar e Germán Vega, volto a verificare se la stilometria può identificare la paternità di brevi messaggi. Nonostante la lunghezza limitata delle email, i risultati mostrano una notevole capacità classificatoria in alcuni algoritmi di intelligenza artificiale applicati allo stile individuale.
      de: Das Kapitel präsentiert ein stilometrisches Experiment zur digitalen Korrespondenz zwischen Álvaro Cuéllar und Germán Vega, mit dem Ziel zu testen, ob die Stilometrie die Urheberschaft von Kurznachrichten identifizieren kann. Trotz der begrenzten Länge der E-Mails zeigen die Ergebnisse eine bemerkenswerte Klassifizierungsfähigkeit bestimmter Algorithmen der künstlichen Intelligenz, die auf den individuellen Stil angewendet werden.
      zh: 本章介绍了 Álvaro Cuéllar 和 Germán Vega 之间的数字通信的文体测量实验，旨在测试文体测量是否可以识别短信的作者。尽管电子邮件的长度有限，但结果显示某些人工智能算法应用于个人风格具有显着的分类能力。
      ja: この章では、アルバロ・クエヤルとジェルマン・ベガの間のデジタル通信に関するスタイロメトリーの実験を紹介します。これは、スタイロメトリーがショートメッセージの作者を特定できるかどうかをテストすることを目的としています。電子メールの長さは限られているにもかかわらず、結果は、個々のスタイルに適用された特定の人工知能アルゴリズムの顕著な分類能力を示しています。
      ko: 이 장에서는 스타일로메트리가 단문 메시지의 작성자를 식별할 수 있는지 여부를 테스트하기 위한 목적으로 Álvaro Cuéllar와 Germán Vega 간의 디지털 통신에 대한 스타일로메트릭 실험을 제시합니다. 이메일의 제한된 길이에도 불구하고 결과는 개인 스타일에 적용된 특정 인공 지능 알고리즘에서 주목할만한 분류 능력을 보여줍니다.
      ru: В главе представлен стилометрический эксперимент по цифровой переписке между Альваро Куэльяром и Херманом Вегой, направленный на проверку того, может ли стилометрия идентифицировать авторство коротких сообщений. Несмотря на ограниченную длину писем, результаты показывают заметную классификационную способность некоторых алгоритмов искусственного интеллекта, применяемых к индивидуальному стилю.
      ar: يعرض هذا الفصل تجربة قياس الأسلوب على المراسلات الرقمية بين ألفارو كويلار وجيرمان فيغا، بهدف اختبار ما إذا كان قياس الأسلوب يمكنه تحديد هوية مؤلف الرسائل القصيرة. على الرغم من الطول المحدود لرسائل البريد الإلكتروني، تظهر النتائج قدرة تصنيفية ملحوظة في بعض خوارزميات الذكاء الاصطناعي المطبقة على الأسلوب الفردي.
  - id: "moreto2023"
    type: "incollection"
    title: "El periodo final de la dramaturgia moretiana (1655–1659): apuntes desde la estilometría"
    authors:
      - "Elena Martínez Carro"
      - "Álvaro Cuéllar"
    year: 2023
    publication: "Bajo la égida calderoniana: Calderón y los dramaturgos de la segunda mitad del siglo XVII"
    editor: "Juan Manuel Escudero Baztán"
    place: "Madrid / Frankfurt am Main"
    publisher: "Iberoamericana / Vervuert"
    pages: "165–198"
    isbn: "978-84-9192-322-5"
    url: "https://www.academia.edu/114162230/El_periodo_final_de_la_dramaturgia_moretiana_1655_1699_Apuntes_desde_la_estilometr%C3%ADa"
    thumbnail: "/assets/images/pubs/moreto.png"
    abstract:
      es: "El capítulo examina la etapa final de la producción dramática de Agustín Moreto (1655–1659) mediante análisis estilométricos. A partir del estudio cuantitativo del léxico y los patrones autorales, se exploran rasgos que distinguen este periodo tardío y su relación con la influencia calderoniana. Disponible también en la editorial Iberoamericana Vervuert: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida."
      en: "The chapter examines the final stage of Agustín Moreto's dramatic production (1655–1659) through stylometric analyses. Based on the quantitative study of vocabulary and authorial patterns, it explores features that distinguish this late period and its relationship with Calderonian influence. Also available from Iberoamericana Vervuert: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida."

    
     
      
      fr: "Le chapitre examine la dernière étape de la production dramatique d'Agustín Moreto (1655-1659) à travers des analyses stylométriques. Basé sur l'étude quantitative du vocabulaire et des modèles d'auteur, il explore les caractéristiques qui distinguent cette période tardive et sa relation avec l'influence calderonienne. Également disponible auprès d'Iberoamericana Vervuert: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida."
      pt: 'O capítulo examina a fase final da produção dramática de Agustín Moreto (1655-1659) através de análises estilométricas. A partir do estudo quantitativo do vocabulário e dos padrões autorais, explora características que distinguem este período tardio e sua relação com a influência calderoniana. Também disponível na Iberoamericana Vervuert: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida.'
      it: "Il capitolo esamina attraverso analisi stilometriche la fase finale della produzione drammatica di Agustín Moreto (1655–1659). Basandosi sullo studio quantitativo del vocabolario e dei modelli autoriali, esplora le caratteristiche che contraddistinguono questo periodo tardo e il suo rapporto con l'influenza calderoniana. Disponibile anche da Iberoamericana Vervuert: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida."
      de: 'Das Kapitel untersucht die letzte Phase von Agustín Moretos dramatischer Produktion (1655–1659) anhand stilometrischer Analysen. Basierend auf der quantitativen Untersuchung des Vokabulars und der Autorenmuster werden Merkmale untersucht, die diese späte Periode und ihre Beziehung zum calderonischen Einfluss auszeichnen. Auch erhältlich bei Iberoamericana Vervuert: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida.'
      zh: 本章通过风格分析考察了奥古斯丁·莫雷托戏剧作品的最后阶段（1655-1659）。基于对词汇和作者模式的定量研究，它探讨了这一晚期的特征及其与卡尔德隆影响的关系。也可从 Iberoamericana Vervuert 获取：https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida。
      ja: 'この章では、スタイロメーター分析を通じて、アグスティン モレトの劇的な作品の最終段階 (1655 ～ 1659 年) を検証します。語彙と著作パターンの定量的研究に基づいて、この後期を区別する特徴とカルデロニアの影響との関係を探ります。 Iberoamericana Vervuert からも入手できます: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida。'
      ko: '이 장에서는 문체 분석을 통해 Agustín Moreto의 연극 제작(1655~1659)의 마지막 단계를 조사합니다. 어휘와 저자 패턴에 대한 정량적 연구를 바탕으로 이 후기 시기를 구별하는 특징과 칼데로니안 영향과의 관계를 탐구합니다. Iberoamericana Vervuert에서도 이용 가능합니다: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida.'
      ru: 'В главе с помощью стилометрического анализа рассматривается заключительный этап драматической постановки Агустина Морето (1655–1659). На основе количественного изучения словарного запаса и авторских моделей он исследует особенности, отличающие этот поздний период, и его связь с кальдеронским влиянием. Также доступен на сайте Iberoamericana Vervuert: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida.'
      ar: 'يتناول الفصل المرحلة الأخيرة من الإنتاج الدرامي لأجوستين موريتو (1655–1659) من خلال التحليلات الأسلوبية. واستنادا إلى الدراسة الكمية للمفردات وأنماط التأليف، فإنه يستكشف السمات التي تميز هذه الفترة المتأخرة وعلاقتها بالتأثير الكالديروني. متاح أيضًا من Iberoamericana Vervuert: https://www.iberoamericana-vervuert.es/BuscaTotal.aspx?C1=%C3%A9gida.'
  - id: "francesalaura"
    type: "book"
    title: "La francesa Laura"
    authors: ["Álvaro Cuéllar", "Germán Vega García-Luengos"]
    year: 2023
    publisher: "RBA - Gredos"
    isbn: "9788424940621"
    url: "https://www.rbalibros.com/gredos/la-francesa-laura_7132"
    thumbnail: "/assets/images/pubs/francesalibro.png"
    abstract:
      es: "Edición crítica de la comedia La francesa Laura, atribuida a Lope de Vega. La publicación, realizada en la prestigiosa editorial RBA - Gredos, ha tenido un notable impacto tanto en el ámbito académico como en la sociedad, consolidando la autoría propuesta y difundiendo los resultados de la investigación estilométrica y filológica."
      en: "Critical edition of the comedy La francesa Laura, attributed to Lope de Vega. Published by the prestigious RBA - Gredos imprint, it has had a notable impact both in academia and society, consolidating the proposed authorship and disseminating the results of stylometric and philological research."
      fr: Édition critique de la comédie La francesa Laura, attribuée à Lope de Vega. Publié par la prestigieuse maison d'édition RBA - Gredos, il a eu un impact notable tant dans le monde universitaire que dans la société, en consolidant la paternité proposée et en diffusant les résultats de la recherche stylométrique et philologique.
      pt: Edição crítica da comédia La francesa Laura, atribuída a Lope de Vega. Publicado pelo prestigiado selo RBA - Gredos, teve notável impacto tanto no meio acadêmico como na sociedade, consolidando a autoria proposta e divulgando os resultados das pesquisas estilométricas e filológicas.
      it: Edizione critica della commedia La francesa Laura, attribuita a Lope de Vega. Pubblicato dalla prestigiosa casa editrice RBA - Gredos, ha avuto un notevole impatto sia nel mondo accademico che nella società, consolidando la paternità proposta e diffondendo i risultati delle ricerche stilometriche e filologiche.
      de: Kritische Ausgabe der Komödie La francesa Laura, die Lope de Vega zugeschrieben wird. Es wurde vom renommierten RBA-Gredos-Verlag herausgegeben und hatte sowohl in der Wissenschaft als auch in der Gesellschaft einen bemerkenswerten Einfluss, indem es die vorgeschlagene Autorschaft festigte und die Ergebnisse stilometrischer und philologischer Forschung verbreitete.
      zh: 喜剧《法国劳拉》的评论版，作者为洛佩·德·维加。该书由著名的 RBA - Gredos 出版社出版，在学术界和社会上产生了显着影响，巩固了拟议的作者身份并传播了文体计量学和语言学研究的成果。
      ja: ロペ・デ・ベガ作とされるコメディ『ラ・フランセサ・ローラ』の批評版。権威ある RBA - グレドスの出版物によって出版されたこの本は、学術界と社会の両方に顕著な影響を与え、提案された著者の立場を強化し、筆圧測定および文献学的研究の結果を広めました。
      ko: Lope de Vega의 작품인 코미디 La francesa Laura의 비평판입니다. 권위 있는 RBA - Gredos 출판사에서 출판된 이 책은 제안된 저자권을 통합하고 문체학 및 문헌학 연구 결과를 전파하는 등 학계와 사회 모두에 주목할만한 영향을 미쳤습니다.
      ru: Критическое издание комедии «Французская Лаура», приписываемой Лопе де Веге. Опубликованный престижным издательством RBA - Gredos, он оказал заметное влияние как в академических кругах, так и в обществе, закрепив предполагаемое авторство и распространив результаты стилометрических и филологических исследований.
      ar: طبعة نقدية من الكوميديا ​​La francesa Laura، المنسوبة إلى Lope de Vega. تم نشره من قبل RBA - Gredos بصمة مرموقة، وكان له تأثير ملحوظ في كل من الأوساط الأكاديمية والمجتمع، وتعزيز التأليف المقترح ونشر نتائج البحوث الأسلوبية واللغوية.
    cited_by:


      - "Fernández García, Laura. “Testimonio único y voluntad de autor. A propósito de algunas comedias póstumas de Lope de Vega.” En Luigi Giuliani y Victoria Pineda (eds.), «No tendrás otros textos»: editar testimonios únicos del teatro del Siglo de Oro. Actas del XVIII Taller Internacional de Estudios Textuales. Rassegna iberistica, vol. 45, 2025."

      - "Sobrón Tauber, Guadalupe. “Un nuevo Lope que nos sigue hablando: sobre la puesta escénica de La francesa Laura.” Reseñas/CeLeHis, año 11, no. 31, agosto 2024, ISSN 2362-5031, pp. 99–105."
      - "Lope de Vega. El saber puede dañar. Edición de Pedro Conde Parrado. En Comedias. Parte XXIII (2 vols.). Coord. Fernando Rodríguez-Gallego. Madrid: Gredos, 2024. ISBN 978-84-249-4113-0."
      - "Vega García-Luengos, Germán. “La mujer por fuerza”, una comedia atribuida a Tirso de Molina que reclama la incorporación al repertorio de Lope de Vega. Anuario Lope de Vega. Texto, literatura, cultura, vol. 32, 2026."





      - "Bracciale, Milena. “Reseñas en Proscenio XVII. Teatro del Mundo.” Reseñas/CeLeHis, año 11, no. 31, agosto 2024, ISSN 2362-5031, pp. 60–62."
