  - id: "atoms2waves"
    type: "article"
    title: "From Atoms to Waves: Rhythmic Stylometry for Authorship Studies of Early Modern Spanish Theatre"
    authors: ["Álvaro Cuéllar"]
    publication: "Janus. Estudios sobre el Siglo de Oro"
    volume:
    number: "14"
    pages:
    year: 2025
    url: "https://doi.org/10.17979/janus.2025.14.12653"
    thumbnail: "/assets/images/pubs/ritmos.png"
    abstract:
      es: "El estudio explora la aplicación de la estilometría rítmica al teatro del Siglo de Oro, analizando patrones de sílabas tónicas y átonas para identificar la huella autorial. Los resultados muestran un enfoque prometedor y complementario a la estilometría léxica tradicional."
      en: "The study explores the application of rhythmic stylometry to Spanish Golden Age theatre, analyzing patterns of stressed and unstressed syllables to identify authorial fingerprints. The results show a promising approach that complements traditional lexical stylometry."

      fr: L'étude explore l'application de la stylométrie rythmique au théâtre espagnol de l'âge d'or, en analysant les modèles de syllabes accentuées et non accentuées pour identifier les empreintes digitales de l'auteur. Les résultats montrent une approche prometteuse qui complète la stylométrie lexicale traditionnelle.
      pt: O estudo explora a aplicação da estilometria rítmica ao teatro espanhol da Idade de Ouro, analisando padrões de sílabas tônicas e átonas para identificar impressões digitais autorais. Os resultados mostram uma abordagem promissora que complementa a estilometria lexical tradicional.
      it: Lo studio esplora l'applicazione della stilometria ritmica al teatro spagnolo del Secolo d'oro, analizzando modelli di sillabe accentate e non accentate per identificare le impronte digitali dell'autore. I risultati mostrano un approccio promettente che integra la stilometria lessicale tradizionale.
      de: Die Studie untersucht die Anwendung der rhythmischen Stilometrie auf das spanische Theater des Goldenen Zeitalters und analysiert Muster betonter und unbetonter Silben, um Autoren-Fingerabdrücke zu identifizieren. Die Ergebnisse zeigen einen vielversprechenden Ansatz, der die traditionelle lexikalische Stilometrie ergänzt.
      zh: 该研究探索了节奏文体测量法在西班牙黄金时代戏剧中的应用，分析重读和非重读音节的模式以识别作者指纹。结果表明，这是一种有前途的方法，可以补充传统的词汇文体测量法。
      ja: この研究では、リズミック・スタイロメトリーをスペイン黄金時代の劇場に応用し、強調された音節と強調されていない音節のパターンを分析して作者の指紋を特定することを検討しています。この結果は、従来の語彙スタイロメトリーを補完する有望なアプローチを示しています。
      ko: 이 연구는 스페인 황금기 극장에 리듬 스타일로메트리를 적용하는 방법을 탐구하고 강세가 있는 음절과 강세가 없는 음절의 패턴을 분석하여 저자의 지문을 식별합니다. 결과는 전통적인 어휘 스타일로메트리를 보완하는 유망한 접근 방식을 보여줍니다.
      ru: В исследовании изучается применение ритмической стилометрии в театре Золотого века Испании, анализируются закономерности ударных и безударных слогов для выявления авторских отпечатков пальцев. Результаты показывают многообещающий подход, дополняющий традиционную лексическую стилометрию.
      ar: تستكشف الدراسة تطبيق قياس الأسلوب الإيقاعي على مسرح العصر الذهبي الإسباني، وتحليل أنماط المقاطع المشددة وغير المجهدة لتحديد بصمات المؤلف. تظهر النتائج نهجا واعدا يكمل قياس الأسلوب المعجمي التقليدي.
    cited_by:

      - "Ruiz Fabo, Pablo, Anxo Alonso Pérez, Pablo Rodríguez Fernández y Pablo Gamallo. “Automatic Metrical Scansion of Poetry in a Low-Resource Setting.” LLMs4SSH @LREC 2026: Shaping Multilingual, Multimodal AI for the Social Sciences and Humanities, 2026."



  - id: "indig"
    type: "article"
    title: "For the Indignity of the Text: Measuring Stylometric Robustness in Authorship Attribution under Textual Corruption"
    authors: ["Álvaro Cuéllar"]
    publication: "Arte Nuevo. Revista de Estudios Áureos"
    volume: "13"
    number:
    pages: "123–144"
    year: 2026
    url: "https://doi.org/10.14603/13E2026"
    thumbnail: "/assets/images/pubs/artenuevo.png"
    abstract:
      es: "El artículo cuantifica la robustez de la atribución estilométrica ante la corrupción textual. Concluye que el rendimiento se mantiene alto incluso con degradación notable, pero disminuye de forma progresiva cuando la corrupción pasa a ser dominante, especialmente si afecta al texto que se desea atribuir."
      en: "The article quantifies the robustness of stylometric attribution under textual corruption. It concludes that performance remains high even under substantial degradation, but declines progressively when corruption becomes dominant, especially when it affects the text to be attributed."
      fr: L'article quantifie la robustesse de l'attribution stylométrique en cas de corruption textuelle. Il conclut que les performances restent élevées même en cas de dégradation substantielle, mais diminuent progressivement lorsque la corruption devient dominante, en particulier lorsqu'elle affecte le texte à attribuer.
      pt: O artigo quantifica a robustez da atribuição estilométrica sob corrupção textual. Conclui que o desempenho permanece elevado mesmo sob degradação substancial, mas diminui progressivamente quando a corrupção se torna dominante, especialmente quando afecta o texto a ser atribuído.
      it: L'articolo quantifica la robustezza dell'attribuzione stilometrica in condizioni di corruzione testuale. Si conclude che la performance rimane elevata anche in caso di sostanziale degrado, ma diminuisce progressivamente quando la corruzione diventa dominante, soprattutto quando colpisce il testo da attribuire.
      de: Der Artikel quantifiziert die Robustheit der stilometrischen Zuschreibung bei Textverfälschung. Es kommt zu dem Schluss, dass die Leistung auch bei erheblicher Verschlechterung hoch bleibt, jedoch zunehmend abnimmt, wenn Korruption vorherrscht, insbesondere wenn sie den zuzuordnenden Text betrifft.
      zh: 该文章量化了文本损坏情况下风格归因的稳健性。它的结论是，即使在严重退化的情况下，性能仍然很高，但当腐败占主导地位时，尤其是当它影响要归因的文本时，性能会逐渐下降。
      ja: この記事では、テキスト破損時のスタイロメトリの帰属の堅牢性を定量化しています。それは、パフォーマンスが大幅に低下してもパフォーマンスは高いままであるが、破損が優勢になると、特に属性が帰属するテキストに影響を与えると、徐々に低下すると結論付けています。
      ko: 이 기사는 텍스트 손상 시 문체 속성의 견고성을 정량화합니다. 상당한 성능 저하가 발생하더라도 성능은 여전히 ​​높게 유지되지만 부패가 지배적일 때, 특히 해당 텍스트에 영향을 미칠 때 성능이 점진적으로 저하된다는 결론을 내립니다.
      ru: В статье количественно оценивается надежность стилометрической атрибуции при текстовой искажении. В заключении делается вывод, что эффективность остается высокой даже при существенном ухудшении ситуации, но постепенно снижается, когда коррупция становится доминирующей, особенно когда она затрагивает приписываемый текст.
      ar: تحدد المقالة مدى قوة الإسناد الأسلوبي في ظل الفساد النصي. ويخلص إلى أن الأداء يظل مرتفعا حتى في ظل التدهور الكبير، ولكنه يتراجع تدريجيا عندما يصبح الفساد هو السائد، وخاصة عندما يؤثر على النص المنسوب.
    cited_by:
  - id: "sizematters"
    type: "article"
    title: "Size Does Matter, But Asymmetrically: Training and Test Length Effects on Stylometric Authorship Attribution"
    authors: ["Álvaro Cuéllar"]
    publication: "Studia Aurea"
    volume:
    number:
    pages:
    year: "en prensa"
    url:
    thumbnail: "/assets/images/pubs/prensa.png"
    abstract:
      es: "El artículo analiza cómo la longitud textual afecta a la atribución estilométrica en teatro del Siglo de Oro. Muestra que acortar el texto que se desea atribuir perjudica más que reducir el corpus de entrenamiento, por lo que los textos muy breves resultan especialmente problemáticos."
      en: "The article analyzes how text length affects stylometric attribution in Spanish Golden Age theatre. It shows that shortening the text to be attributed is more harmful than reducing the training corpus, making very short texts especially problematic."
      fr: L'article analyse comment la longueur du texte affecte l'attribution stylométrique dans le théâtre espagnol du Siècle d'Or. Il montre que raccourcir le texte à attribuer est plus néfaste que réduire le corpus de formation, rendant les textes très courts particulièrement problématiques.
      pt: O artigo analisa como o comprimento do texto afeta a atribuição estilométrica no teatro espanhol da Idade de Ouro. Mostra que encurtar o texto a atribuir é mais prejudicial do que reduzir o corpus de formação, tornando especialmente problemáticos textos muito curtos.
      it: L'articolo analizza come la lunghezza del testo influisca sull'attribuzione stilometrica nel teatro spagnolo del Secolo d'Oro. Ciò dimostra che abbreviare il testo da attribuire è più dannoso che ridurre il corpus formativo, rendendo particolarmente problematici i testi molto brevi.
      de: Der Artikel analysiert, wie sich die Textlänge auf die stilometrische Zuschreibung im spanischen Theater des Goldenen Zeitalters auswirkt. Es zeigt sich, dass eine Kürzung des zu attribuierenden Textes schädlicher ist als eine Kürzung des Trainingskorpus, weshalb sehr kurze Texte besonders problematisch sind.
      zh: 本文分析了文本长度如何影响西班牙黄金时代戏剧的风格归因。它表明，缩短要归因的文本比减少训练语料库更有害，使得非常短的文本尤其成问题。
      ja: この記事では、テキストの長さがスペイン黄金時代の劇場におけるスタイロメトリーの帰属にどのような影響を与えるかを分析しています。これは、帰属されるテキストを短くすることは、トレーニング コーパスを減らすよりも有害であり、非常に短いテキストが特に問題になることを示しています。
      ko: 이 기사는 텍스트 길이가 스페인 황금기 극장의 문체 속성에 어떻게 영향을 미치는지 분석합니다. 이는 귀속될 텍스트를 줄이는 것이 훈련 코퍼스를 줄이는 것보다 더 해롭다는 것을 보여 주며 매우 짧은 텍스트는 특히 문제가 됩니다.
      ru: В статье анализируется влияние длины текста на стилометрическую атрибуцию в театре Золотого века Испании. Это показывает, что сокращение приписываемого текста более вредно, чем сокращение обучающего корпуса, что делает очень короткие тексты особенно проблематичными.
      ar: يحلل المقال كيفية تأثير طول النص على الإسناد الأسلوبي في مسرح العصر الذهبي الإسباني. ويظهر أن تقصير النص المنسوب أكثر ضررًا من تقليل مجموعة التدريب، مما يجعل النصوص القصيرة جدًا إشكالية بشكل خاص.
    cited_by:
  - id: "transcri"
    type: "article"
    title: "La Inteligencia Artificial al rescate del Siglo de Oro: transcripción y modernización automática de mil trescientos impresos y manuscritos teatrales"
    authors: "Álvaro Cuéllar"
    publication: "Hipogrifo: Revista de Literatura y Cultura del Siglo de Oro"
    year: 2023
    volume: "XI"
    number: "1"
    pages: "101-115"
    isbn:
    url: "https://doi.org/10.13035/H.2023.11.01.08"
    thumbnail: "/assets/images/pubs/transcri.png"
    abstract:
      es: "Se han entrenado, mediante inteligencia artificial y técnicas de HTR (Transkribus), tres modelos públicos capaces de transcribir y modernizar textos teatrales del Siglo de Oro con alta precisión (≈97 % en impresos, 91 % en manuscritos). Gracias a ellos se han procesado unas 1.300 obras, integradas en los proyectos ETSO y TEXORO, que proporcionan una base sólida para la edición filológica y los estudios estilométricos de autoría."
      en: "Using artificial intelligence and HTR techniques (Transkribus), three public models were trained to transcribe and modernize Spanish Golden Age theatrical texts with high accuracy (approximately 97% for prints and 91% for manuscripts). They enabled the processing of around 1,300 plays, integrated into the ETSO and TEXORO projects, providing a solid basis for philological editing and stylometric authorship studies."
      fr: Grâce à l'intelligence artificielle et aux techniques HTR (Transkribus), trois modèles publics ont été formés pour transcrire et moderniser des textes théâtraux espagnols de l'âge d'or avec une grande précision (environ 97 % pour les imprimés et 91 % pour les manuscrits). Ils ont permis le traitement d'environ 1 300 pièces, intégrées aux projets ETSO et TEXORO, fournissant une base solide pour l'édition philologique et les études de paternité stylométrique.
      pt: Usando inteligência artificial e técnicas HTR (Transkribus), três modelos públicos foram treinados para transcrever e modernizar textos teatrais da Idade de Ouro espanhola com alta precisão (aproximadamente 97% para impressões e 91% para manuscritos). Permitiram o processamento de cerca de 1.300 peças, integradas nos projetos ETSO e TEXORO, proporcionando uma base sólida para edição filológica e estudos de autoria estilométrica.
      it: Utilizzando l'intelligenza artificiale e le tecniche HTR (Transkribus), tre modelli pubblici sono stati addestrati a trascrivere e modernizzare i testi teatrali del Secolo d'oro spagnolo con elevata precisione (circa il 97% per le stampe e il 91% per i manoscritti). Hanno consentito l'elaborazione di circa 1.300 opere teatrali, integrate nei progetti ETSO e TEXORO, fornendo una solida base per l'editing filologico e gli studi sulla paternità stilometrica.
      de: Mithilfe künstlicher Intelligenz und HTR-Techniken (Transkribus) wurden drei öffentliche Modelle darauf trainiert, spanische Theatertexte aus dem Goldenen Zeitalter mit hoher Genauigkeit zu transkribieren und zu modernisieren (ungefähr 97 % für Drucke und 91 % für Manuskripte). Sie ermöglichten die Bearbeitung von rund 1.300 Theaterstücken, integriert in die Projekte ETSO und TEXORO und bildeten eine solide Grundlage für philologische Redaktion und stilometrische Autorenstudien.
      zh: 使用人工智能和 HTR 技术 (Transkribus)，训练了三个公共模型，以高精度转录和现代化西班牙黄金时代戏剧文本（印刷品的准确率约为 97%，手稿的准确率约为 91%）。它们能够处理大约 1,300 个戏剧，并集成到 ETSO 和 TEXORO 项目中，为语言学编辑和文体作者研究提供了坚实的基础。
      ja: 人工知能と HTR 技術 (Transkribus) を使用して、3 つの公開モデルがスペイン黄金時代の演劇テキストを高精度 (版画で約 97%、写本で 91%) で転写および現代化するようにトレーニングされました。これらにより、ETSO および TEXORO プロジェクトに統合された約 1,300 の演劇の処理が可能になり、文献学的な編集と筆圧測定による著者調査のための強固な基盤が提供されました。
      ko: 인공 지능과 HTR 기술(Transkribus)을 사용하여 세 가지 공개 모델을 훈련하여 스페인 황금기 연극 텍스트를 높은 정확도(인쇄물의 경우 약 97%, 원고의 경우 91%)로 필사하고 현대화했습니다. 이를 통해 ETSO 및 TEXORO 프로젝트에 통합된 약 1,300개의 희곡을 처리할 수 있었고, 이는 문헌학 편집 및 문체 저작 연구를 위한 견고한 기반을 제공했습니다.
      ru: С помощью методов искусственного интеллекта и HTR (Transkribus) три публичные модели были обучены расшифровывать и модернизировать театральные тексты Золотого века Испании с высокой точностью (примерно 97% для гравюр и 91% для рукописей). Они позволили обработать около 1300 пьес, интегрированных в проекты ETSO и TEXORO, обеспечив прочную основу для филологического редактирования и стилометрических исследований авторства.
      ar: وباستخدام الذكاء الاصطناعي وتقنيات HTR (Transkribus)، تم تدريب ثلاثة نماذج عامة على نسخ وتحديث النصوص المسرحية للعصر الذهبي الإسباني بدقة عالية (حوالي 97% للمطبوعات و91% للمخطوطات). لقد أتاحت معالجة حوالي 1300 مسرحية، تم دمجها في مشروعي ETSO وTEXORO، مما يوفر أساسًا متينًا للتحرير اللغوي ودراسات التأليف الأسلوبي.
