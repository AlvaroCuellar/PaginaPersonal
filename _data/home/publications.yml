  - id: "discernir"
    type: "article"
    title: "Discernir entre original y refundición en el teatro del Siglo de Oro a través de la estilometría: el caso de El mejor amigo, el muerto"
    authors: ["Miguel Campión Larumbe", "Álvaro Cuéllar"]
    publisher: "Talía. Revista de estudios teatrales"
    place:
    year: 2021
    volume: "3"
    number:
    pages: "56-69"
    isbn:
    url: "https://doi.org/10.5209/tret.74021"
    thumbnail: "/assets/images/pubs/discernir.png"
    abstract:
      es: "Se aplica un protocolo estilométrico para distinguir entre original y refundición en El mejor amigo, el muerto, obra transmitida en dos versiones. El análisis sugiere que la versión manuscrita atribuida a Belmonte, Rojas y Calderón corresponde al texto original y que la segunda jornada fue escrita por Francisco de Rojas Zorrilla."
      en: "A stylometric protocol is applied to distinguish between original and reworking in El mejor amigo, el muerto, a play transmitted in two versions. The analysis suggests that the manuscript version attributed to Belmonte, Rojas, and Calderón corresponds to the original text, and that the second jornada was written by Francisco de Rojas Zorrilla."
      fr: Un protocole stylométrique est appliqué pour distinguer l'original de la refonte dans El mejor amigo, el muerto, une pièce transmise en deux versions. L'analyse suggère que la version manuscrite attribuée à Belmonte, Rojas et Calderón correspond au texte original et que la deuxième jornada a été écrite par Francisco de Rojas Zorrilla.
      pt: Um protocolo estilométrico é aplicado para distinguir entre original e reelaboração em El mejor amigo, el muerto, peça transmitida em duas versões. A análise sugere que a versão manuscrita atribuída a Belmonte, Rojas e Calderón corresponde ao texto original e que a segunda jornada foi escrita por Francisco de Rojas Zorrilla.
      it: Un protocollo stilometrico viene applicato per distinguere tra originale e rielaborazione in El mejor amigo, el muerto, un'opera trasmessa in due versioni. L'analisi suggerisce che la versione manoscritta attribuita a Belmonte, Rojas e Calderón corrisponde al testo originale e che la seconda jornada è stata scritta da Francisco de Rojas Zorrilla.
      de: In El mejor amigo, el muerto, einem Stück, das in zwei Versionen übertragen wird, wird ein stilometrisches Protokoll angewendet, um zwischen Original und Überarbeitung zu unterscheiden. Die Analyse legt nahe, dass die Manuskriptversion, die Belmonte, Rojas und Calderón zugeschrieben wird, dem Originaltext entspricht und dass die zweite Jornada von Francisco de Rojas Zorrilla geschrieben wurde.
      zh: 在《El mejor amigo, el muerto》这部以两个版本传播的戏剧中，采用了一种风格测量协议来区分原创和改编。分析表明，贝尔蒙特、罗哈斯和卡尔德隆的手稿版本与原文相对应，第二个 jornada 是由弗朗西斯科·德·罗哈斯·索里利亚 (Francisco de Rojas Zorrilla) 撰写的。
      ja: 2 つのバージョンで伝えられる劇『エル メホール アミーゴ、エル ムエルト』では、オリジナルとリワークを区別するために、スタイロメトリック プロトコルが適用されています。分析の結果、ベルモンテ、ロハス、カルデロンのものとされる写本バージョンが原文と一致し、第 2 のジョルナダはフランシスコ デ ロハス ソリーリャによって書かれたことが示唆されています。
      ko: 두 가지 버전으로 전송되는 연극인 El mejor amigo, el muerto에서는 원본과 재작업을 구별하기 위해 문체 프로토콜이 적용됩니다. 분석에 따르면 Belmonte, Rojas 및 Calderón의 원고 버전은 원본 텍스트와 일치하며 두 번째 jornada는 Francisco de Rojas Zorrilla가 쓴 것으로 나타났습니다.
      ru: Стилометрический протокол применяется для различения оригинала и переделки в пьесе «El mejor amigo, el muerto», переданной в двух версиях. Анализ показывает, что рукописная версия, приписываемая Бельмонте, Рохасу и Кальдерону, соответствует оригинальному тексту и что вторая хорнада была написана Франсиско де Рохасом Соррильей.
      ar: تم تطبيق بروتوكول قياس الأسلوب للتمييز بين الأصل وإعادة الصياغة في El mejor amigo, el muerto، وهي مسرحية منقولة في نسختين. يشير التحليل إلى أن نسخة المخطوطة المنسوبة إلى بلمونت وروجاس وكالديرون تتوافق مع النص الأصلي، وأن الجورنادا الثاني كتبه فرانسيسكو دي روخاس زوريلا.
    cited_by:

