    type: "database"
    title: "ISTAE: Impresos sueltos del teatro antiguo español"
    authors: ["Alejandra Ulla Lorenzo", "Elena Martínez Carro", "Isabel Hernando Morata", "Concepción María Jiménez Fernández", "Szilvia Szmuk-Tanenbaum", "Álvaro Cuéllar", "Paula Casariego Castiñeira", "Guillermo Gómez Sánchez-Ferrer", "María Dolores Sánchez García", "Abraham Madroñal Durán", "Óscar García Fernández", "Germán Vega García-Luengos", "Débora Vaccari", "Pilar Egoscozábal Carrasco", "Marta Vizcaíno Ruíz", "Juan Udadondo Alegre", "Candela Iglesias Balsa", "Katerina Vaiopoulos", "Fernando Rodríguez-Gallego", "Ane Zapatero Molinuevo", "Elena Muñoz Rodríguez"]
    year: "2022–actualidad"
    url: "http://istae.uv.es"
    thumbnail: "/assets/images/pubs/istae.png"
    abstract:
      es: "Base de datos integrada del teatro clásico español que reúne y describe los impresos sueltos teatrales del Siglo de Oro. ISTAE centraliza información dispersa en diversos catálogos y archivos, facilitando la consulta y el estudio del patrimonio teatral áureo mediante recursos digitales abiertos."
      en: "Integrated database of Spanish classical theatre that gathers and describes loose theatrical prints from the Spanish Golden Age. ISTAE centralizes information scattered across various catalogues and archives, facilitating consultation and study of Golden Age theatrical heritage through open digital resources."
      fr: Base de données intégrée du théâtre classique espagnol qui rassemble et décrit des gravures théâtrales en vrac du Siècle d'Or espagnol. L'ISTAE centralise les informations dispersées dans divers catalogues et archives, facilitant la consultation et l'étude du patrimoine théâtral de l'Âge d'or grâce à des ressources numériques ouvertes.
      pt: Base de dados integrada do teatro clássico espanhol que reúne e descreve gravuras teatrais soltas da Idade de Ouro espanhola. O ISTAE centraliza informação dispersa por vários catálogos e arquivos, facilitando a consulta e o estudo do património teatral da Idade de Ouro através de recursos digitais abertos.
      it: Database integrato del teatro classico spagnolo che raccoglie e descrive stampe teatrali sciolte del Secolo d'Oro spagnolo. L'ISTAE centralizza le informazioni sparse in vari cataloghi e archivi, facilitando la consultazione e lo studio del patrimonio teatrale dell'Età dell'Oro attraverso risorse digitali aperte.
      de: Integrierte Datenbank des klassischen spanischen Theaters, die lose Theaterdrucke aus dem spanischen Goldenen Zeitalter sammelt und beschreibt. ISTAE zentralisiert Informationen, die über verschiedene Kataloge und Archive verstreut sind, und erleichtert so die Konsultation und das Studium des Theatererbes des Goldenen Zeitalters durch offene digitale Ressourcen.
      zh: 西班牙古典戏剧的综合数据库，收集和描述西班牙黄金时代的松散戏剧版画。 ISTAE 集中分散在各种目录和档案中的信息，通过开放的数字资源促进黄金时代戏剧遗产的咨询和研究。
      ja: スペインの古典演劇に関する統合データベース。スペイン黄金時代のゆるやかな演劇作品を収集し、説明しています。 ISTAE は、さまざまなカタログやアーカイブに散在する情報を一元管理し、オープンなデジタル リソースを通じて黄金時代の演劇遺産の相談と研究を促進します。
      ko: 스페인 황금기의 연극 판화를 수집하고 설명하는 스페인 고전 연극의 통합 데이터베이스입니다. ISTAE는 다양한 카탈로그와 아카이브에 흩어져 있는 정보를 중앙 집중화하여 개방형 디지털 리소스를 통해 황금 시대 연극 유산에 대한 상담과 연구를 촉진합니다.
      ru: Интегрированная база данных испанского классического театра, в которой собраны и описаны отдельные театральные репродукции Золотого века Испании. ISTAE централизует информацию, разбросанную по различным каталогам и архивам, облегчая консультации и изучение театрального наследия Золотого века с помощью открытых цифровых ресурсов.
      ar: قاعدة بيانات متكاملة للمسرح الكلاسيكي الإسباني تجمع وتصف المطبوعات المسرحية الفضفاضة من العصر الذهبي الإسباني. تقوم ISTAE بمركزية المعلومات المنتشرة عبر مختلف الفهارس والمحفوظات، مما يسهل التشاور ودراسة التراث المسرحي للعصر الذهبي من خلال الموارد الرقمية المفتوحة.
