  - id: "validacioncruzada"
    type: "article"
    title: "La necesidad de la validación cruzada en Stylo y cómo programarla en R"
    authors: ["Álvaro Cuéllar"]
    year: 2018
    publication: "Caracteres. Estudios culturales y críticos de la esfera digital"
    volume: "7"
    number: "2"
    pages: "301–320"
    url: "https://acortar.link/AjIJVS"
    thumbnail: "/assets/images/pubs/cruzada.png"
    abstract:
      es: "El artículo analiza los procesos informáticos más adecuados para la atribución de autoría mediante técnicas computacionales, y propone una implementación práctica de la validación cruzada en el entorno de R y el paquete Stylo."
      en: "The article analyzes the most suitable computational procedures for authorship attribution using computational techniques, and proposes a practical implementation of cross-validation in R and the Stylo package."

      fr: L'article analyse les procédures informatiques les plus appropriées pour l'attribution de la paternité à l'aide de techniques informatiques et propose une implémentation pratique de la validation croisée dans R et le package Stylo.
      pt: O artigo analisa os procedimentos computacionais mais adequados para atribuição de autoria utilizando técnicas computacionais, e propõe uma implementação prática de validação cruzada em R e no pacote Stylo.
      it: L'articolo analizza le procedure computazionali più adatte per l'attribuzione della paternità utilizzando tecniche computazionali e propone un'implementazione pratica della convalida incrociata in R e nel pacchetto Stylo.
      de: Der Artikel analysiert die am besten geeigneten Rechenverfahren für die Urheberschaftszuordnung mithilfe von Rechentechniken und schlägt eine praktische Implementierung der Kreuzvalidierung in R und dem Stylo-Paket vor.
      zh: 本文使用计算技术分析了最适合作者归属的计算程序，并提出了 R 和 Stylo 包中交叉验证的实际实现。
      ja: この記事では、計算技術を使用して著者の帰属に最適な計算手順を分析し、R と Stylo パッケージでの相互検証の実用的な実装を提案します。
      ko: 이 기사에서는 계산 기술을 사용하여 저자 귀속을 위한 가장 적합한 계산 절차를 분석하고 R 및 Stylo 패키지에서 교차 검증의 실제 구현을 제안합니다.
      ru: В статье анализируются наиболее подходящие вычислительные процедуры для установления авторства с использованием вычислительных методов и предлагается практическая реализация перекрестной проверки в R и пакете Stylo.
      ar: تحلل المقالة الإجراءات الحسابية الأكثر ملاءمة لإسناد التأليف باستخدام التقنيات الحسابية، وتقترح تنفيذًا عمليًا للتحقق المتبادل في R وحزمة Stylo.
