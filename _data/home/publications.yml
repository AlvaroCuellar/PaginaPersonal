    abstract:
      es: "Este estudio evalúa cien comedias del Siglo de Oro de autoría segura mediante el paquete stylo de R. Se analizan las configuraciones que optimizan la clasificación autoral (algoritmos, MFW, culling y n-gramas) y la extensión mínima necesaria para resultados fiables. La validación cruzada demuestra la eficacia de la estilometría en la atribución de autoría en el teatro áureo."
      en: "This study evaluates one hundred securely attributed Spanish Golden Age plays with the R package stylo. It analyzes the settings that optimize authorial classification (algorithms, MFW, culling, and n-grams) and the minimum length required for reliable results. Cross-validation demonstrates the effectiveness of stylometry for authorship attribution in Golden Age theatre."
      fr: Cette étude évalue cent pièces de théâtre espagnoles de l’âge d’or attribuées de manière sécurisée avec le stylo du package R. Il analyse les paramètres qui optimisent la classification des auteurs (algorithmes, MFW, culling et n-grams) et la longueur minimale requise pour des résultats fiables. La validation croisée démontre l'efficacité de la stylométrie pour l'attribution de la paternité dans le théâtre de l'âge d'or.
      pt: Este estudo avalia cem peças da Idade de Ouro espanhola atribuídas com segurança com a caneta do pacote R. Ele analisa as configurações que otimizam a classificação autoral (algoritmos, MFW, seleção e n-gramas) e o comprimento mínimo necessário para resultados confiáveis. A validação cruzada demonstra a eficácia da estilometria para atribuição de autoria no teatro da Idade de Ouro.
      it: Questo studio valuta un centinaio di opere teatrali spagnole del Secolo d'oro attribuite in modo sicuro con il pacchetto R stylo. Analizza le impostazioni che ottimizzano la classificazione autoriale (algoritmi, MFW, abbattimento e n-grammi) e la lunghezza minima richiesta per risultati affidabili. La validazione incrociata dimostra l'efficacia della stilometria per l'attribuzione della paternità nel teatro dell'Età dell'Oro.
      de: In dieser Studie werden hundert sicher zugeordnete Stücke des Goldenen Zeitalters Spaniens mit dem R-Paket-Stylo bewertet. Es analysiert die Einstellungen, die die Autorenklassifizierung optimieren (Algorithmen, MFW, Culling und N-Gramme) und die für zuverlässige Ergebnisse erforderliche Mindestlänge. Die Kreuzvalidierung zeigt die Wirksamkeit der Stilometrie für die Autorenzuschreibung im Theater des Goldenen Zeitalters.
      zh: 本研究使用 R 包风格评估了 100 部可靠归属的西班牙黄金时代戏剧。它分析优化作者分类的设置（算法、MFW、剔除和 n-gram）以及可靠结果所需的最小长度。交叉验证证明了黄金时代剧院中风格测量法对作者归属的有效性。
      ja: この研究では、R パッケージ スタイロを使用して、確実に帰属された 100 のスペイン黄金時代の演劇を評価します。著者の分類 (アルゴリズム、MFW、カリング、および N グラム) を最適化する設定と、信頼性の高い結果に必要な最小長を分析します。交差検証は、黄金時代の劇場における作者帰属に対するスタイロメトリーの有効性を示しています。
      ko: 이 연구에서는 R 패키지 스타일로를 사용하여 안전하게 귀속된 스페인 황금기 희곡 100편을 평가합니다. 신뢰할 수 있는 결과에 필요한 작성자 분류(알고리즘, MFW, 컬링, n-그램)와 최소 길이를 최적화하는 설정을 분석합니다. 교차 검증은 황금 시대 극장의 저자 귀속을 위한 스타일 측정의 효율성을 보여줍니다.
      ru: В этом исследовании оцениваются сто пьес Золотого века Испании, достоверно приписываемых стилусу пакета R. Он анализирует настройки, которые оптимизируют авторскую классификацию (алгоритмы, MFW, отсечение и n-граммы) и минимальную длину, необходимую для получения надежных результатов. Перекрестная проверка демонстрирует эффективность стилометрии для установления авторства в театре Золотого века.
      ar: تقوم هذه الدراسة بتقييم مائة مسرحية من العصر الذهبي الإسباني المنسوبة بشكل آمن باستخدام قلم الحزمة R. فهو يحلل الإعدادات التي تعمل على تحسين تصنيف المؤلف (الخوارزميات، وMFW، والتصفية، وn-grams) والحد الأدنى للطول المطلوب للحصول على نتائج موثوقة. يوضح التحقق المتبادل فعالية قياس الأسلوب في إسناد التأليف في مسرح العصر الذهبي.
