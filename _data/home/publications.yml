  - id: "coloso"
    type: "model"
    title: "Coloso Español - Modelo general de transcripción con 11 millones de palabras"
    authors: ["Álvaro Cuéllar (coordinador)", "Stefano Bazzaco", "Alba Comino", "Andrés Echavarría Peláez", "José Manuel Fradejas Rueda", "Francisco Gago Jover", "Ana García Serrano", "Raquel Liceras-Garrido", "Patricia Murrieta-Flores", "Humberto Olea Montero", "Rocío Ortuño Casanova", "Fernando J. Pancorbo", "Milena Peralta Friedburg", "Eva Sánchez-Salido", "Rodrigo Vega Sánchez", "Juan Carlos Vallejo Velásquez", "Ezequiel Villani"]
    year: 2023
    publication: "Transkribus"
    url: "https://readcoop.eu/model/coloso-espanol/"
    thumbnail: "/assets/images/pubs/model.png"
    abstract:
      es: "Supermodelo de inteligencia artificial que unifica todos los modelos anteriores para la transcripción de textos en español, tanto impresos como manuscritos de cualquier época. Entrenado con 11 millones de palabras y una precisión del 96 %. Coordinado por Álvaro Cuéllar, reúne materiales de distintos equipos académicos y representa un hito en el tratamiento de archivos y bibliotecas hispanas."
      en: "An artificial-intelligence supermodel that unifies all previous models for the transcription of Spanish texts, both printed and manuscript, from any period. Trained on 11 million words with 96% accuracy. Coordinated by Álvaro Cuéllar, it brings together materials from different academic teams and represents a milestone for the processing of Hispanic archives and libraries."
      fr: Un modèle d'intelligence artificielle qui unifie tous les modèles précédents pour la transcription de textes espagnols, imprimés et manuscrits, de n'importe quelle période. Formé sur 11 millions de mots avec une précision de 96 %. Coordonné par Álvaro Cuéllar, il rassemble des matériaux provenant de différentes équipes académiques et représente une étape importante pour le traitement des archives et des bibliothèques hispaniques.
      pt: Um supermodelo de inteligência artificial que unifica todos os modelos anteriores para a transcrição de textos espanhóis, impressos e manuscritos, de qualquer época. Treinado em 11 milhões de palavras com 96% de precisão. Coordenado por Álvaro Cuéllar, reúne materiais de diferentes equipes acadêmicas e representa um marco para o processamento de arquivos e bibliotecas hispânicas.
      it: Un top model di intelligenza artificiale che unifica tutti i modelli precedenti per la trascrizione di testi spagnoli, sia stampati che manoscritti, di qualsiasi epoca. Addestrato su 11 milioni di parole con una precisione del 96%. Coordinato da Álvaro Cuéllar, riunisce materiali provenienti da diversi team accademici e rappresenta una pietra miliare per il trattamento degli archivi e delle biblioteche ispaniche.
      de: Ein Supermodell der künstlichen Intelligenz, das alle bisherigen Modelle für die Transkription spanischer Texte, sowohl gedruckter als auch handschriftlicher Art, aus allen Epochen vereint. Auf 11 Millionen Wörtern mit einer Genauigkeit von 96 % trainiert. Es wird von Álvaro Cuéllar koordiniert, vereint Materialien verschiedener akademischer Teams und stellt einen Meilenstein für die Bearbeitung hispanischer Archive und Bibliotheken dar.
      zh: 一个人工智能超级模型，统一了以前所有时期的西班牙语文本转录模型，包括印刷版和手稿。经过 1100 万个单词的训练，准确率达到 96%。它由阿尔瓦罗·奎利亚尔 (Álvaro Cuéllar) 协调，汇集了来自不同学术团队的材料，代表了西班牙档案和图书馆处理的一个里程碑。
      ja: あらゆる時代のスペイン語テキスト (印刷物と写本の両方) を転写するためのこれまでのすべてのモデルを統合する人工知能のスーパーモデル。 96% の精度で 1,100 万語をトレーニングしました。アルバロ・クエヤルがコーディネートし、さまざまな学術チームからの資料を集め、ヒスパニック系のアーカイブと図書館の処理におけるマイルストーンを表しています。
      ko: 모든 시대의 인쇄본과 원고를 모두 포함하는 스페인어 텍스트의 전사에 대한 모든 이전 모델을 통합하는 인공 지능 슈퍼모델입니다. 1,100만 단어에 대해 96%의 정확도로 훈련되었습니다. Álvaro Cuéllar가 조직한 이 프로젝트는 다양한 학술 팀의 자료를 통합하고 히스패닉 기록 보관소 및 도서관 처리에 있어 이정표를 나타냅니다.
      ru: Супермодель искусственного интеллекта, которая объединяет все предыдущие модели транскрипции испанских текстов, как печатных, так и рукописных, любого периода. Обучено на 11 миллионах слов с точностью 96%. Координируемый Альваро Куэльяром, он объединяет материалы различных академических групп и представляет собой важную веху в обработке латиноамериканских архивов и библиотек.
      ar: عارضة أزياء فائقة الذكاء تعمل على توحيد جميع النماذج السابقة لنسخ النصوص الإسبانية، المطبوعة والمخطوطة، من أي فترة. تم التدريب على 11 مليون كلمة بدقة 96%. يجمع هذا المشروع، الذي يتولى تنسيقه ألفارو كويلار، مواد من فرق أكاديمية مختلفة ويمثل علامة فارقة في معالجة الأرشيفات والمكتبات ذات الأصول الأسبانية.
    cited_by:
