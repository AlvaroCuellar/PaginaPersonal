  - id: "tenotodistante"
    type: "chapter"
    title: "«Te noto distante». La consolidación de las Humanidades Digitales para el estudio del Siglo de Oro (2023–2026)"
    authors: ["Álvaro Cuéllar"]
    publication: "Actas del XIV Congreso de la Asociación Internacional Siglo de Oro"
    volume:
    number:
    pages:
    year: "en prensa"
    url:
    thumbnail: "/assets/images/pubs/prensa.png"
    abstract:
      es: "El capítulo ofrece un repaso de las publicaciones y recursos digitales sobre Siglo de Oro y Humanidades Digitales de los últimos tres años. Atiende a la consolidación del campo entre 2023 y 2026, con especial atención a las líneas de trabajo, herramientas y proyectos que han marcado este periodo."
      en: "The chapter reviews publications and digital resources on the Spanish Golden Age and Digital Humanities from the last three years. It addresses the consolidation of the field between 2023 and 2026, with particular attention to the lines of work, tools, and projects that marked this period."
      fr: Le chapitre passe en revue les publications et les ressources numériques sur l’âge d’or espagnol et les humanités numériques des trois dernières années. Il aborde la consolidation du domaine entre 2023 et 2026, avec une attention particulière aux axes de travail, aux outils et aux projets qui ont marqué cette période.
      pt: O capítulo analisa publicações e recursos digitais sobre a Idade de Ouro Espanhola e as Humanidades Digitais dos últimos três anos. Aborda a consolidação do campo entre 2023 e 2026, com especial atenção às linhas de trabalho, ferramentas e projetos que marcaram esse período.
      it: Il capitolo esamina le pubblicazioni e le risorse digitali sull'Età dell'oro spagnola e sulle discipline umanistiche digitali degli ultimi tre anni. Affronta il consolidamento del settore tra il 2023 e il 2026, con particolare attenzione alle linee di lavoro, agli strumenti e ai progetti che hanno segnato questo periodo.
      de: Das Kapitel gibt einen Überblick über Veröffentlichungen und digitale Ressourcen zum spanischen Goldenen Zeitalter und zu den digitalen Geisteswissenschaften der letzten drei Jahre. Es befasst sich mit der Konsolidierung des Fachgebiets zwischen 2023 und 2026, mit besonderem Augenmerk auf die Arbeitsbereiche, Werkzeuge und Projekte, die diesen Zeitraum geprägt haben.
      zh: 本章回顾了过去三年有关西班牙黄金时代和数字人文的出版物和数字资源。它讨论了 2023 年至 2026 年间该领域的整合，特别关注标志着这一时期的工作、工具和项目。
      ja: この章では、過去 3 年間のスペイン黄金時代とデジタル ヒューマニティーに関する出版物とデジタル リソースをレビューします。この期間を特徴づけた一連の作業、ツール、プロジェクトに特に注目しながら、2023 年から 2026 年までのこの分野の統合について取り上げています。
      ko: 이 장에서는 지난 3년간 스페인 황금시대와 디지털 인문학에 관한 출판물과 디지털 자원을 검토합니다. 이는 2023년에서 2026년 사이의 분야 통합을 다루며, 이 기간을 특징으로 하는 작업 라인, 도구 및 프로젝트에 특히 주의를 기울입니다.
      ru: В главе рассматриваются публикации и цифровые ресурсы, посвященные Золотому веку Испании и цифровым гуманитарным наукам за последние три года. В нем рассматривается консолидация этой области в период с 2023 по 2026 год, уделяя особое внимание направлениям работы, инструментам и проектам, которые ознаменовали этот период.
      ar: يستعرض الفصل المنشورات والموارد الرقمية عن العصر الذهبي الإسباني والعلوم الإنسانية الرقمية من السنوات الثلاث الماضية. ويتناول توحيد المجال بين عامي 2023 و2026، مع إيلاء اهتمام خاص لخطوط العمل والأدوات والمشاريع التي ميزت هذه الفترة.
